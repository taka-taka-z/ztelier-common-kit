<title>Amp — 顧客課題から始める変革設計</title>
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
:root{
  --amp:#5c7aff;--amp-d:#3a55d4;--amp-dd:#2a42b8;--amp-l:#7b94ff;
  --zs-blue:#0090d1;--zs-blue-l:#00a8e8;--zs-blue-d:#006da0;--zs-blue-dd:#004d73;
  --accent:#ff6b2b;--accent-l:#ff8a54;
  --sf:#ffffff;--sf2:#f0f4fb;--sf3:#e6ecf8;--bd:#d0d8ef;--bd2:#e4eaf5;
  --t1:#0a1a40;--t2:#4a5a82;--t3:#8b95b5;
  --ok:#16a34a;--ok-bg:#f0fdf4;--wn:#d97706;--wn-bg:#fffbeb;--er:#dc2626;--er-bg:#fef2f2;
  --ff:'Segoe UI','Meiryo',-apple-system,sans-serif;
  --xs:.7rem;--sm:.8rem;--bs:.875rem;--md:1rem;--lg:1.25rem;--xl:1.5rem;
  --r:4px;--r2:6px;--sh:0 2px 8px rgba(0,0,0,.1);--tr:.15s ease;
}
body{font-family:var(--ff);font-size:var(--bs);line-height:1.6;color:var(--t1);background:var(--sf2)}
.app{max-width:1440px;margin:0 auto;background:var(--sf);min-height:100vh;box-shadow:var(--sh)}

.hd{background:linear-gradient(135deg,#2a42b8,#5c7aff);color:#fff;padding:12px 24px;display:flex;align-items:center;justify-content:space-between}
.hd h1{font-size:var(--xl);font-weight:700;letter-spacing:-.01em}.hd h1 span{font-weight:400;opacity:.8;font-size:var(--md);margin-left:8px}
.hd-r{display:flex;align-items:center;gap:10px}
.badge{background:var(--accent);color:#fff;font-size:var(--xs);font-weight:700;padding:2px 8px;border-radius:10px;font-variant-numeric:tabular-nums}
.btn{display:inline-flex;align-items:center;gap:5px;padding:6px 14px;border:none;border-radius:var(--r);font-size:var(--sm);font-weight:600;cursor:pointer;transition:background var(--tr);font-family:var(--ff)}
.btn-a{background:var(--accent);color:#fff}.btn-a:hover{background:var(--accent-l)}.btn-a:disabled{opacity:.4;cursor:not-allowed}
.btn-o{background:rgba(255,255,255,.12);color:#fff;border:1px solid rgba(255,255,255,.3)}.btn-o:hover{background:rgba(255,255,255,.22)}.btn-o:disabled{opacity:.4;cursor:not-allowed}

.tabs{display:flex;border-bottom:2px solid var(--bd);background:var(--sf);padding:0 24px}

.strip{padding:8px 24px;background:var(--sf3);border-bottom:1px solid var(--bd);display:flex;align-items:center;gap:6px;flex-wrap:wrap;font-size:var(--xs)}

.fbox{padding:8px 12px;border-bottom:1px solid var(--bd)}

.finput:focus{outline:none;border-color:var(--amp);box-shadow:0 0 0 2px rgba(92,122,255,.15)}

.ci{padding:7px 12px;cursor:pointer;border-bottom:1px solid var(--bd2);border-left:3px solid transparent;display:flex;align-items:center;gap:8px;transition:background var(--tr);font-size:var(--sm)}

.ci-icon{width:22px;height:22px;border-radius:3px;display:flex;align-items:center;justify-content:center;font-size:9px;color:#fff;font-weight:700;flex-shrink:0}

.ucg{padding:16px 20px;display:grid;grid-template-columns:repeat(auto-fill,minmax(290px,1fr));gap:10px}
.uc{border:1px solid var(--bd);border-radius:var(--r2);padding:12px;cursor:pointer;transition:all var(--tr);position:relative;user-select:none}
.uc:hover{border-color:var(--amp-l);box-shadow:0 1px 4px rgba(92,122,255,.1)}
.uc.sel{border-color:var(--amp);background:var(--sf3);box-shadow:0 0 0 2px rgba(92,122,255,.2)}
.uc .ck{position:absolute;top:8px;right:8px;width:18px;height:18px;border:2px solid var(--bd);border-radius:3px;display:flex;align-items:center;justify-content:center;font-size:11px;color:transparent;transition:all var(--tr)}
.uc.sel .ck{background:var(--amp);border-color:var(--amp);color:#fff}
.uc-top{display:flex;align-items:flex-start;gap:10px;padding-right:24px;margin-bottom:4px}
.uc-ic{width:32px;height:32px;flex-shrink:0;border-radius:var(--r);display:flex;align-items:center;justify-content:center;opacity:.85}

/* ===== ARCHITECTURE VIEW ===== */
.arch{padding:24px}
.arch-title{font-size:var(--lg);font-weight:700;color:var(--amp-dd);margin-bottom:4px}
.arch-sub{font-size:var(--sm);color:var(--t2);margin-bottom:16px}

.stats{display:flex;gap:20px;margin-bottom:20px;flex-wrap:wrap;font-size:var(--sm);color:var(--t2)}
.stats strong{color:var(--amp-dd);font-variant-numeric:tabular-nums}

.platform{border:2px solid var(--zs-blue);border-radius:var(--r2);overflow:hidden;margin-bottom:24px}
.plat-header{background:var(--zs-blue);color:#fff;padding:10px 16px;font-weight:700;font-size:var(--md);text-align:center;letter-spacing:.02em}

.pillars{display:grid;grid-template-columns:repeat(5,1fr);border-bottom:1px solid var(--bd)}
.pillar{border-right:1px solid var(--bd);padding:0}

.p-slot{padding:6px 8px;margin-bottom:4px;border-radius:var(--r);font-size:var(--xs);transition:all .25s ease;border:1px solid transparent;position:relative;min-height:32px;display:flex;align-items:center;gap:6px}
.p-slot.off{background:#f8fafb;color:var(--t3);border-color:#edf1f5}

.cross-layers{display:grid;grid-template-columns:repeat(auto-fill,minmax(180px,1fr));gap:4px;padding:6px}

.meter{margin-bottom:24px}

/* ===== ECOSYSTEM — ENHANCED ===== */
.eco-section{margin-top:24px;border:2px solid var(--zs-blue);border-radius:var(--r2);overflow:hidden}
.eco-header{background:linear-gradient(135deg,var(--zs-blue-dd),var(--zs-blue-d));color:#fff;padding:10px 16px;font-weight:700;font-size:var(--md);display:flex;align-items:center;gap:8px}

.eco-card-r{font-size:var(--xs);color:var(--t2);line-height:1.4;margin-bottom:6px}

.ztmm-header .maaz-link{font-size:var(--xs);background:rgba(255,255,255,.15);padding:4px 12px;border-radius:var(--r);color:#fff;text-decoration:none;font-weight:600;border:1px solid rgba(255,255,255,.3);cursor:pointer;transition:background .15s}
.ztmm-header .maaz-link:hover{background:rgba(255,255,255,.25)}
.ztmm-grid{display:grid;grid-template-columns:repeat(5,1fr);background:var(--bd)}

.welcome{text-align:center;padding:60px 24px;color:var(--t2)}
.welcome h3{color:var(--amp-dd);margin-bottom:8px;font-size:var(--lg)}

/* === Tab 3: ゼロトラスト要件統合 === */
.zt-section{margin:0 0 24px;padding:20px;background:var(--sf);border:1px solid var(--bd);border-radius:10px}
.zt-section-hd{font-size:var(--lg);font-weight:700;color:var(--amp-dd);margin-bottom:12px;display:flex;align-items:center;gap:8px}

.zt-import-zone:hover{border-color:var(--accent);background:rgba(0,144,209,.04)}
.zt-import-zone.loaded{border-color:var(--ok);background:rgba(16,185,129,.04)}
.zt-scope-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(180px,1fr));gap:8px;margin-top:10px}
.zt-scope-item{display:flex;align-items:center;gap:8px;padding:8px 12px;border:1px solid var(--bd);border-radius:6px;cursor:pointer;transition:all .2s;font-size:var(--sm)}

.gap-table{width:100%;border-collapse:collapse;font-size:var(--sm)}

.gap-table .gap-lo{background:rgba(16,185,129,.06);color:#059669}
.gap-bar{height:6px;border-radius:3px;background:#edf1f5;overflow:hidden;min-width:60px}

.why-card{border:1px solid var(--bd);border-radius:8px;overflow:hidden;margin-bottom:12px}

.why-card-body{padding:14px;display:grid;gap:10px}

.why-content{font-size:var(--sm);color:var(--t1);line-height:1.5}
.sol-table{width:100%;border-collapse:collapse;font-size:var(--sm)}
.sol-table th{text-align:left;padding:8px 12px;background:var(--sf2);border-bottom:2px solid var(--bd);font-weight:600;color:var(--t2)}
.sol-table td{padding:8px 12px;border-bottom:1px solid var(--bd)}
.zt-btn-group{display:flex;gap:8px;flex-wrap:wrap;margin-top:16px}

.asis-manual{display:grid;grid-template-columns:repeat(5,1fr);gap:8px;margin-top:10px}

/* === Executive Report Modal === */
.rpt-overlay{position:fixed;inset:0;background:rgba(0,0,0,0.5);z-index:3000;display:flex;align-items:flex-start;justify-content:center;overflow-y:auto;padding:24px 16px}

.rpt-hd{display:flex;justify-content:space-between;align-items:center;margin-bottom:16px}
.rpt-hd-title{font-size:1.1rem;font-weight:800;color:var(--amp-dd)}
.rpt-hd-btns{display:flex;gap:8px}
.rpt-hd-btns button{background:none;border:1px solid var(--bd);border-radius:6px;padding:5px 14px;cursor:pointer;font-size:0.75rem;font-family:var(--ff);color:var(--t2);transition:all .2s}
.rpt-hd-btns button:hover{border-color:var(--amp);color:var(--amp)}
.rpt-meta{display:flex;gap:16px;padding:10px 16px;background:var(--sf2);border-radius:8px;margin-bottom:18px;flex-wrap:wrap}
.rpt-meta-item{display:flex;flex-direction:column;gap:2px}
.rpt-meta-label{font-size:0.62rem;color:var(--t3);font-weight:600;text-transform:uppercase;letter-spacing:.3px}
.rpt-meta-val{font-size:0.82rem;font-weight:700;color:var(--t1)}
.rpt-sec{margin-bottom:18px}
.rpt-sec-title{font-size:0.76rem;font-weight:700;color:var(--t2);text-transform:uppercase;letter-spacing:.5px;margin-bottom:8px;padding-bottom:4px;border-bottom:1px solid var(--bd)}
.rpt-kpi-row{display:grid;grid-template-columns:repeat(5,1fr);gap:8px;margin-bottom:14px}
.rpt-kpi{padding:12px;background:var(--sf2);border-radius:8px;text-align:center;border-top:3px solid var(--amp)}
.rpt-kpi-val{font-size:1.35rem;font-weight:800;line-height:1.1}
.rpt-kpi-label{font-size:0.65rem;color:var(--t3);margin-top:3px}
.rpt-gap-table{width:100%;border-collapse:collapse;font-size:0.78rem;margin-bottom:10px}
.rpt-gap-table th{text-align:left;padding:6px 10px;background:var(--sf2);border-bottom:2px solid var(--bd);font-weight:600;color:var(--t2);font-size:.7rem}
.rpt-gap-table td{padding:6px 10px;border-bottom:1px solid var(--bd2)}
.rpt-gap-table .num{text-align:center;font-weight:700}
.rpt-why-card{border:1px solid var(--bd);border-radius:8px;margin-bottom:10px;overflow:hidden}
.rpt-why-hd{padding:8px 12px;font-weight:700;font-size:0.82rem;display:flex;align-items:center;gap:8px}
.rpt-why-body{padding:10px 14px;font-size:0.76rem;line-height:1.6;display:grid;gap:6px}
.rpt-sol-grid{display:flex;flex-wrap:wrap;gap:5px;margin-top:6px}

@media print{
  .side,.tabs,.hd-r,.fbox{display:none}body{background:#fff}.app{box-shadow:none}.zt-import-zone{border-style:solid}

  .rpt-overlay{position:static !important;background:none !important;padding:0 !important}
  .rpt-box{max-width:100% !important;box-shadow:none !important;padding:0 !important}

}
@media(prefers-reduced-motion:reduce){*{animation-duration:.01ms!important;transition-duration:.01ms!important}}
@media(max-width:900px){.layout{flex-direction:column}.side{width:100%;min-width:0;border-right:none;border-bottom:1px solid var(--bd);max-height:200px}.pillars{grid-template-columns:repeat(2,1fr)}.ucg{grid-template-columns:1fr}.ztmm-pillars{grid-template-columns:repeat(2,1fr)}}

function normSol(s){
  const map={
    "ZPA (App Segmentation)":"ZPA",
    "ZPA Privileged Remote Access":"Privileged Remote Access",
    "Zero Trust Segmentation":"Microsegmentation"
  };
  return map[s]||s;
}

function solMatchesSlot(sol,slotId){
  const n=normSol(sol);
  return n===slotId||n.startsWith(slotId)||slotId.startsWith(n);
}

function solMatchesCross(sol,ids){
  const n=normSol(sol);
  return ids.some(id=>n===id||n.startsWith(id)||id.startsWith(n));
}

  ARCH.cross.forEach(cl=>{totalSlots++;if([...allS].some(x=>solMatchesCross(x,cl.ids)))activeSlots++});
  const pct=Math.round(activeSlots/totalSlots*100);

  const ecoMap={};
  us.forEach(u=>(u.eco||[]).forEach(e=>{if(!ecoMap[e])ecoMap[e]=new Set();ecoMap[e].add(u.t)}));
  const ecoArr=Object.entries(ecoMap).sort((a,b)=>b[1].size-a[1].size);

  function slotCount(slotId){return us.filter(u=>u.s.some(s=>solMatchesSlot(s,slotId))).length}
  function crossCount(ids){return us.filter(u=>u.s.some(s=>solMatchesCross(s,ids))).length}

  document.getElementById('mn').innerHTML=`<div class="arch">
    <div class="arch-title">Amp — お客様の成果を支える仕組み</div>
    <div class="arch-sub">選択された${us.length}件の課題を Zscaler Zero Trust Exchange でどうカバーするか（裏側の技術アーキテクチャ）</div>

    <div class="platform">
      <div class="plat-header">Zscaler Zero Trust Exchange™</div>
      <div class="pillars">
        ${ARCH.pillars.map(p=>{
          return`<div class="pillar"><div class="p-head" style="background:${p.color}">${p.name}</div><div class="p-body">${p.slots.map(s=>{
            const active=[...allS].some(x=>solMatchesSlot(x,s.id));
            const cnt=slotCount(s.id);

          }).join('')}</div></div>`;
        }).join('')}
      </div>
      <div class="cross-label">Cross-Platform Services</div>
      <div class="cross-layers">
        ${ARCH.cross.map(cl=>{
          const active=[...allS].some(x=>solMatchesCross(x,cl.ids));
          const cnt=crossCount(cl.ids);
          return`<div class="cl-slot ${active?'on':'off'}" style="${active?`background:${cl.color}`:''}">${cl.label}${active?`<span class="cl-count">${cnt}</span>`:''}</div>`;
        }).join('')}
      </div>
    </div>

    <!-- 未対処領域 — gap visualization -->
    ${(()=>{
      const inactivePillarSlots=[];
      ARCH.pillars.forEach(p=>p.slots.forEach(s=>{
        if(![...allS].some(x=>solMatchesSlot(x,s.id))) inactivePillarSlots.push({pillar:p.name,color:p.color,label:s.label});
      }));
      const inactiveCross=ARCH.cross.filter(cl=>![...allS].some(x=>solMatchesCross(x,cl.ids)));
      const totalInactive=inactivePillarSlots.length+inactiveCross.length;
      if(totalInactive===0){
        return '<div style="margin-top:18px;padding:16px 20px;background:#ecfdf5;border:1px solid #a7f3d0;border-left:4px solid #059669;border-radius:8px;color:#065f46;font-weight:600;font-size:13px">✅ 選択された課題で Zero Trust Exchange の全領域がカバーされています</div>';
      }
      const byPillar={};
      inactivePillarSlots.forEach(s=>{(byPillar[s.pillar]=byPillar[s.pillar]||{color:s.color,labels:[]}).labels.push(s.label)});
      return '<div style="margin-top:22px;background:#fff;border:1px solid var(--bd);border-radius:10px;overflow:hidden">'+
        '<div style="padding:12px 16px;background:#fff7e8;border-bottom:1px solid var(--bd);display:flex;align-items:center;gap:8px">'+
          '<span style="font-size:18px">⚠️</span>'+

          '<p style="font-size:12px;color:var(--t2);line-height:1.7;margin-bottom:12px">選択された課題ではまだカバーされていない領域です。追加の課題選択、または将来の拡張検討ポイントとしてご確認ください。</p>'+
          Object.entries(byPillar).map(([pname,d])=>
            '<div style="margin-bottom:10px"><div style="font-size:11px;font-weight:700;color:'+d.color+';margin-bottom:4px">'+pname+'</div><div style="display:flex;flex-wrap:wrap;gap:6px">'+
              d.labels.map(l=>'<span style="padding:3px 10px;background:'+d.color+'15;color:'+d.color+';border:1px solid '+d.color+'40;border-radius:3px;font-size:11px;font-weight:600">'+l+'</span>').join('')+

        '</div>'+
      '</div>';
    })()}

    <!-- Ecosystem — enhanced -->
    ${ecoArr.length?`<div class="eco-section">
      <div class="eco-header">
        <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="12" cy="12" r="3"/><path d="M12 1v4m0 14v4M4.22 4.22l2.83 2.83m9.9 9.9l2.83 2.83M1 12h4m14 0h4M4.22 19.78l2.83-2.83m9.9-9.9l2.83-2.83"/></svg>

// ============================================================
// Executive Report — ビジネス価値特化
// ============================================================
function openAmpReport(){
  const us=gSel();
  if(!us.length){alert('課題を選択してからレポートを生成してください');return}
  const cats=[...new Set(us.map(u=>u.cn))];
  const allSols=[...gAllSols()];
  const date=new Date().toISOString().slice(0,10);

  // 未対処領域の集計
  const inactivePillarSlots=[];
  ARCH.pillars.forEach(p=>p.slots.forEach(s=>{
    if(![...allSols].some(x=>solMatchesSlot(x,s.id))) inactivePillarSlots.push({pillar:p.name,color:p.color,label:s.label});
  }));
  const inactiveCross=ARCH.cross.filter(cl=>![...allSols].some(x=>solMatchesCross(x,cl.ids)));
  const totalSlots=ARCH.pillars.reduce((a,p)=>a+p.slots.length,0)+ARCH.cross.length;
  const activeSlots=totalSlots-inactivePillarSlots.length-inactiveCross.length;
  const covPct=Math.round(activeSlots/totalSlots*100);

  // ソリューション集計
  const solMap={};
  us.forEach(u=>u.s.forEach(s=>{
    if(!solMap[s])solMap[s]={count:0,categories:new Set()};
    solMap[s].count++;solMap[s].categories.add(u.cn);
  }));
  const solsSorted=Object.entries(solMap).sort((a,b)=>b[1].count-a[1].count);

  let h=`<div class="rpt-overlay" id="amp-report" onclick="closeAmpReport()">
  <div class="rpt-box" onclick="event.stopPropagation()">
    <div class="rpt-hd">
      <div class="rpt-hd-title">📊 ゼロトラスト導入価値レポート</div>
      <div class="rpt-hd-btns">
        <button onclick="printAmpReport()">🖨 印刷</button>
        <button onclick="closeAmpReport()">✕ 閉じる</button>
      </div>
    </div>

    <div class="rpt-meta">
      <div class="rpt-meta-item"><span class="rpt-meta-label">生成日</span><span class="rpt-meta-val">${date}</span></div>
      <div class="rpt-meta-item"><span class="rpt-meta-label">選択課題数</span><span class="rpt-meta-val">${us.length}件（${cats.length}カテゴリ）</span></div>
      <div class="rpt-meta-item"><span class="rpt-meta-label">ソリューション数</span><span class="rpt-meta-val">${allSols.length}</span></div>
      <div class="rpt-meta-item"><span class="rpt-meta-label">プラットフォームカバー率</span><span class="rpt-meta-val">${covPct}% (${activeSlots}/${totalSlots})</span></div>
    </div>

    <div class="rpt-sec">
      <div class="rpt-sec-title">全体サマリ</div>
      <div class="rpt-kpi-row">
        <div class="rpt-kpi"><div class="rpt-kpi-val" style="color:var(--accent)">${us.length}</div><div class="rpt-kpi-label">ビジネス課題</div></div>
        <div class="rpt-kpi" style="border-top-color:var(--ok)"><div class="rpt-kpi-val" style="color:var(--ok)">${allSols.length}</div><div class="rpt-kpi-label">Zscalerソリューション</div></div>
        <div class="rpt-kpi" style="border-top-color:var(--amp)"><div class="rpt-kpi-val" style="color:var(--amp)">${covPct}%</div><div class="rpt-kpi-label">ZTXカバー率</div></div>
        <div class="rpt-kpi" style="border-top-color:var(--wn)"><div class="rpt-kpi-val" style="color:var(--wn)">${inactivePillarSlots.length+inactiveCross.length}</div><div class="rpt-kpi-label">未対処領域</div></div>
      </div>
    </div>

    <div class="rpt-sec">
      <div class="rpt-sec-title">提案構成による価値・改善（3つの現場で何が変わるか）</div>
      <div style="font-size:.72rem;color:var(--t2);margin-bottom:10px;line-height:1.7">今回の提案（<strong>${us.length}件の課題 / ${allSols.length}個のZscalerソリューション / ZTXカバー率 ${covPct}%</strong>）によって、3つの立場の日常がどう変化するかを示します。</div>`;
  PERSONAS.forEach(p=>{
    const rowRpt=(arr,color)=>arr.map(m=>`<div style="display:grid;grid-template-columns:24px 1fr;gap:6px;padding:4px 0;border-bottom:1px dashed #eee"><div style="font-size:.65rem;color:${color};font-weight:700">${m.time}</div><div style="font-size:.68rem;color:var(--t2);line-height:1.55">${m.text}</div></div>`).join('');
    h+=`<div style="background:#fff;border:1px solid var(--bd);border-radius:8px;padding:12px 14px;margin-bottom:10px;page-break-inside:avoid">
      <div style="display:flex;align-items:center;gap:8px;margin-bottom:8px;padding-bottom:6px;border-bottom:1px solid var(--bd)">
        <div style="font-size:18px">${p.icon}</div>
        <div>
          <div style="font-weight:800;font-size:.78rem;color:var(--t1)">${p.role}</div>
          <div style="font-size:.6rem;color:var(--t3)">${p.name}</div>
        </div>
      </div>
      <div style="display:grid;grid-template-columns:1fr 1fr;gap:10px">
        <div>
          <div style="font-size:.6rem;font-weight:700;color:#dc2626;letter-spacing:1px;margin-bottom:3px;padding-bottom:2px;border-bottom:1.5px solid #dc2626">BEFORE — AS-IS の摩擦</div>
          ${rowRpt(p.before,'#dc2626')}
        </div>
        <div>
          <div style="font-size:.6rem;font-weight:700;color:#059669;letter-spacing:1px;margin-bottom:3px;padding-bottom:2px;border-bottom:1.5px solid #059669">AFTER — 本提案導入後</div>
          ${rowRpt(p.after,'#059669')}
        </div>
      </div>
      <div style="margin-top:8px;padding:6px 10px;background:#eff6ff;color:#1e40af;font-size:.68rem;font-weight:700;border-radius:4px;border-left:3px solid #1e40af">💎 ${p.outcome}</div>
    </div>`;
  });
  h+=`</div>

    <div class="rpt-sec">
      <div class="rpt-sec-title">選択された課題（カテゴリ別）</div>`;
  cats.forEach(cat=>{
    const catItems=us.filter(u=>u.cn===cat);
    h+=`<div style="margin-bottom:10px">
      <div style="font-size:.78rem;font-weight:700;color:var(--t1);margin-bottom:4px;padding:3px 8px;background:var(--sf2);border-radius:4px;display:inline-block">${cat}（${catItems.length}件）</div>
      <div style="display:flex;flex-direction:column;gap:3px">`;
    catItems.forEach(u=>{
      h+=`<div style="display:flex;align-items:center;gap:8px;padding:4px 8px;border-left:2px solid ${u.cc};font-size:.75rem">
        <span style="font-weight:600;color:var(--t1);flex:1">${u.t}</span>
        <span style="color:var(--t3);font-size:.68rem">${u.s.slice(0,3).join(', ')}${u.s.length>3?' +' +(u.s.length-3):''}</span>
      </div>`;
    });
    h+=`</div></div>`;
  });

  h+=`</div>

    <div class="rpt-sec">
      <div class="rpt-sec-title">確定ソリューション一覧</div>
      <table class="rpt-gap-table">
        <thead><tr><th>ソリューション</th><th class="num">対応課題数</th><th>対象カテゴリ</th></tr></thead>
        <tbody>`;
  solsSorted.forEach(([sol,info])=>{
    h+=`<tr><td style="font-weight:600">${sol}</td><td class="num">${info.count}</td><td style="font-size:.7rem;color:var(--t2)">${[...info.categories].join(' / ')}</td></tr>`;
  });
  h+=`</tbody></table>
    </div>`;

  if(inactivePillarSlots.length||inactiveCross.length){
    const byPillar={};
    inactivePillarSlots.forEach(s=>{(byPillar[s.pillar]=byPillar[s.pillar]||{color:s.color,labels:[]}).labels.push(s.label)});
    h+=`<div class="rpt-sec">
      <div class="rpt-sec-title">⚠️ 未対処のZero Trust Exchange領域</div>
      <div style="font-size:.72rem;color:var(--t2);margin-bottom:8px">今回の選択課題ではカバーされていない領域です。追加の課題選択、または将来拡張の検討ポイント。</div>`;
    Object.entries(byPillar).forEach(([pname,d])=>{
      h+=`<div style="margin-bottom:8px"><div style="font-size:.7rem;font-weight:700;color:${d.color};margin-bottom:3px">${pname}</div><div style="display:flex;flex-wrap:wrap;gap:4px">`+
        d.labels.map(l=>`<span style="padding:2px 8px;background:${d.color}15;color:${d.color};border:1px solid ${d.color}40;border-radius:3px;font-size:.68rem;font-weight:600">${l}</span>`).join('')+
        `</div></div>`;
    });
    if(inactiveCross.length){
      h+=`<div style="margin-top:6px;padding-top:6px;border-top:1px dashed var(--bd)"><div style="font-size:.7rem;font-weight:700;color:var(--t2);margin-bottom:3px">Cross-Platform Services</div><div style="display:flex;flex-wrap:wrap;gap:4px">`+
        inactiveCross.map(cl=>`<span style="padding:2px 8px;background:${cl.color}15;color:${cl.color};border:1px solid ${cl.color}40;border-radius:3px;font-size:.68rem;font-weight:600">${cl.label}</span>`).join('')+
        `</div></div>`;
    }
    h+=`</div>`;
  }

  h+=`<div style="text-align:center;font-size:.62rem;color:var(--t3);padding-top:10px;border-top:1px solid var(--bd)">
      Amp — 顧客課題から始める変革設計 — Generated ${date}
    </div>
  </div></div>`;

  document.body.insertAdjacentHTML('beforeend',h);
}

function closeAmpReport(){
  const m=document.getElementById('amp-report');
  if(m)m.remove();
  document.body.classList.remove('rpt-printing');
}

function printAmpReport(){
  document.body.classList.add('rpt-printing');
  setTimeout(()=>{window.print();document.body.classList.remove('rpt-printing')},100);
}


function reset(){sel.clear();aCat=null;view='sel';setTab('t1');document.getElementById('side').style.display='';upd();rMain()}

document.getElementById('sf').addEventListener('input',e=>rSide(e.target.value));
rSide();rMain();
</script>
