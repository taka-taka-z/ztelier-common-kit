/* ==== FILE IO ==== */
function fileDialog(accept, cb){
  const inp = document.createElement('input');
  inp.type = 'file'; inp.accept = accept;
  inp.onchange = e => { const f = e.target.files[0]; if(f){ const r = new FileReader(); r.onload = ev => cb(ev.target.result); r.readAsText(f); } };
  inp.click();
}

function importMAAZ(){
  fileDialog('.json', text => {
    try {
      const d = JSON.parse(text);
      if (!d.format || !d.format.startsWith('maaz-v4')){ showToast('⚠ MAAZ v4形式ではありません'); return; }
      STATE.maazFormat = d.format;

      /* v1.1.4 fix (FIX-1): 上流 MAAZ バグ検出ガード
         (1) 論理破綻チェック: coveredToBeEffective が理想値を超えていないか
             MAAZ v1.0.2 以前の技法二重加算バグの検出。実効値が理想値を超えるのは
             数学的に不可能なので、検出時は警告のみ出して処理は続行する。
         (2) バージョンチェック: tool_version 1.0.3 未満に警告
         (3) vulnCoeff の範囲バリデーション: [0, 1] に収まるか
      */
      if (d.effectiveCoverage){
        const ec = d.effectiveCoverage;
        // (1) 論理破綻
        if (typeof ec.coveredToBeEffective === 'number' && typeof ec.coveredToBeIdeal === 'number'){
          if (ec.coveredToBeEffective > ec.coveredToBeIdeal + 0.1){
            showToast(`⚠ MAAZ データ異常: 実効 ${ec.coveredToBeEffective.toFixed(1)} > 理想 ${ec.coveredToBeIdeal} (論理破綻)`);
            console.warn('MAAZ integrity violation: coveredToBeEffective > coveredToBeIdeal', ec);
          }
        }
        // (3) vulnCoeff 範囲
        ['asIsVulnCoeff','asIsVulnCoeffEffective','asIsVulnCoeffIdeal','toBeVulnCoeffEffective','toBeVulnCoeffIdeal'].forEach(k => {
          if (typeof ec[k] === 'number' && (ec[k] < 0 || ec[k] > 1.0)){
            showToast(`⚠ MAAZ データ異常: ${k} = ${ec[k]} (範囲 [0,1] 外)`);
          }
        });
      }
      // (2) 古いバージョン警告
      if (d.tool_version && typeof d.tool_version === 'string'){
        // セマンティックに比較する簡易実装 (major.minor.patch を想定)
        const cmpVer = (a, b) => {
          const pa = a.split('.').map(x => parseInt(x,10)||0);
          const pb = b.split('.').map(x => parseInt(x,10)||0);
          for (let i=0; i<Math.max(pa.length,pb.length); i++){
            const da = pa[i]||0, db = pb[i]||0;
            if (da !== db) return da - db;
          }
          return 0;
        };
        if (cmpVer(d.tool_version, '1.0.3') < 0){
          showToast(`⚠ MAAZ v${d.tool_version} 検出: effectiveCoverage 二重加算バグの可能性. v1.0.3 以降推奨`);
          console.warn(`MAAZ version ${d.tool_version} predates v1.0.3 fix`);
        }
      }

      /* === AS-IS vulnCoeff: v1.4.0 (QA Bug #1) MAAZ v1.0.3/1.0.4 両対応 ===
         MAAZ v1.0.4: asIsVulnCoeffEffective (SCF 補正済) + asIsVulnCoeffIdeal を export
         MAAZ v1.0.3: asIsVulnCoeff (Ideal のみ) を export — これが SCF未補正
         MAAZ v1.0.0: effectiveCoverage なし → threatCoverage から fallback 計算
         優先度: Effective → Ideal(asIsVulnCoeff) → threatCoverage 素値
         STATE.vulnCoeff_is_scf_corrected フラグを立て、toast の表現を正直にする (Bug #8)
      */
      STATE.vulnCoeff_is_scf_corrected = false;
      if (d.effectiveCoverage && typeof d.effectiveCoverage.asIsVulnCoeffEffective === 'number'){
        // MAAZ v1.0.4+: 真に SCF 補正済
        STATE.vulnCoeff        = d.effectiveCoverage.asIsVulnCoeffEffective;
        STATE.vulnCoeff_ideal  = d.effectiveCoverage.asIsVulnCoeffIdeal ?? d.effectiveCoverage.asIsVulnCoeffEffective;
        STATE.vulnCoeff_is_scf_corrected = true;
      } else if (d.effectiveCoverage && typeof d.effectiveCoverage.asIsVulnCoeff === 'number'){
        // MAAZ v1.0.3: asIsVulnCoeff は Ideal 値 (SCF 未補正) を含む。Ideal として扱う
        STATE.vulnCoeff        = d.effectiveCoverage.asIsVulnCoeff;
        STATE.vulnCoeff_ideal  = d.effectiveCoverage.asIsVulnCoeff;
        // flag 残す: SCF 未補正
      } else if (d.threatCoverage){
        // v1.0.0 以前の後方互換: SCF 補正なし
        const tc = d.threatCoverage;
        const asIsIdeal = Math.max(0, 1.0 - (tc.coveredAsIs / tc.total));
        STATE.vulnCoeff        = asIsIdeal;
        STATE.vulnCoeff_ideal  = asIsIdeal;
      }

      /* === TO-BE vulnCoeff: v4.3ではSCF補正済、旧版はSCF=1.0扱い === */
      if (d.effectiveCoverage){
        // v4.3.0以降: MAAZ側でSCF補正済の値をそのまま受取
        STATE.toBe_vulnCoeff       = d.effectiveCoverage.toBeVulnCoeffEffective;
        STATE.toBe_vulnCoeff_ideal = d.effectiveCoverage.toBeVulnCoeffIdeal;
        STATE.maazEffectiveCoverage = d.effectiveCoverage;
      } else if (d.threatCoverage){
        // v4.2.0以前: SCF補正なし（理想値=実効値）
        const toBe = 1.0 - (d.threatCoverage.coveredToBe / d.threatCoverage.total);
        STATE.toBe_vulnCoeff       = toBe;
        STATE.toBe_vulnCoeff_ideal = toBe;
        STATE.maazEffectiveCoverage = null;
      }

      /* === DLP系 vulnCoeff: ztCur/ztTgt を基準に DLP技法カバー状況を算出 ===
         旧版の fromLv>=3 判定ではJSONの全施策が fromLv=2 だった場合に AS-IS
         カバーが全く検出できず、dlpVulnCoeff=1.0 (完全脆弱) と過大評価する問題を修正。
         ztCur[actionId] >= toLv なら「その施策が既に到達済み」とみなし AS-IS covered に含める。
         v1.0.1 fix: AS-IS にも Data柱SCF補正を適用し、TO-BE との対称性を確保 (BUG#2対応)。
      */
      if (d.actions && Array.isArray(d.actions)){
        const dlpTechSet = new Set(DLP_TECHNIQUES);
        let dlpAsIsCovered = new Set(), dlpToBeCovered = new Set();
        d.actions.forEach(a => {
          (a.threats || []).forEach(t => {
            if (dlpTechSet.has(t)){
              const curLv = (d.ztCur && d.ztCur[a.id]) ?? 1;
              const tgtLv = (d.ztTgt && d.ztTgt[a.id]) ?? 1;
              if (curLv >= a.toLv) dlpAsIsCovered.add(t);
              if (tgtLv >= a.toLv) dlpToBeCovered.add(t);
            }
          });
        });
        const dlpTotal = DLP_TECHNIQUES.length;
        STATE.dlpVulnCoeff_ideal      = Math.max(0, 1.0 - (dlpAsIsCovered.size / dlpTotal));
        STATE.toBe_dlpVulnCoeff_ideal = Math.max(0, 1.0 - (dlpToBeCovered.size / dlpTotal));

        /* Data柱SCFで DLP の AS-IS・TO-BE 両方を補正（対称性確保）
           SCF=1.0 なら補正なし（理想＝実効）
           SCF=0.0 なら実効値=1.0 (全く緩和されない)に劣化 */
        const dataSCF = d.effectiveCoverage?.byPillar?.["Data"]?.scf ?? 1.0;
        STATE.dlpVulnCoeff = Math.max(0,
          STATE.dlpVulnCoeff_ideal + (1.0 - STATE.dlpVulnCoeff_ideal) * (1.0 - dataSCF)
        );
        STATE.toBe_dlpVulnCoeff = Math.max(0,
          STATE.toBe_dlpVulnCoeff_ideal + (1.0 - STATE.toBe_dlpVulnCoeff_ideal) * (1.0 - dataSCF)
        );
      } else if (d.statuses){
        // 後方互換: 旧 d.statuses 形式 (v4初期)
        const techs = Object.keys(d.statuses);
        let effCount = 0, gapCount = 0, dlpTotal = 0, dlpGap = 0;
        techs.forEach(tid => {
          const s = d.statuses[tid];
          if (s === 'na' || s === 'N/A') return;
          effCount++;
          const isGap = (s === 'none' || s === 'minimal' || s === 'None' || s === 'Minimal' || s === 0 || s === 1);
          if (isGap) gapCount++;
          if (DLP_TECHNIQUES.includes(tid)){ dlpTotal++; if (isGap) dlpGap++; }
        });
        STATE.dlpVulnCoeff = dlpTotal > 0 ? dlpGap / dlpTotal : 1.0;
        STATE.dlpVulnCoeff_ideal = STATE.dlpVulnCoeff;
        STATE.toBe_dlpVulnCoeff_ideal = STATE.toBe_dlpVulnCoeff;
      }

      /* === メタ情報保持（表示・ボトルネック警告用）=== */
      if (d.ztCur) STATE.ztCur = d.ztCur;
      if (d.ztTgt) STATE.ztTgt = d.ztTgt;
      if (d.overall) STATE.maazOverall = d.overall;
      if (d.bottleneck) STATE.maazBottleneck = d.bottleneck;
      if (d.pillarScores) STATE.pillarScores = d.pillarScores;
      if (d.scopeState) STATE.maazScopeState = d.scopeState;
      /* v1.1.3: ②拡張 — actions と threat technique counts */
      if (d.actions && Array.isArray(d.actions)) STATE.maazActions = d.actions;
      if (d.threatCoverage){
        STATE.maazNewlyMitigated = d.threatCoverage.newlyMitigated ?? null;
        STATE.maazThreatTotal    = d.threatCoverage.total ?? null;
      }
      /* v1.2.2: maazAdoptedActions / maazActionCosts は廃止されたためリセット処理も不要 */

      STATE.maazLoaded = true;
      /* ③ 後方互換: customer は string (MAAZ v1.0.1以前) または object {company_name, session_id} (v1.0.2+) */
      let customerName = '';
      let sessionId = null;
      if (typeof d.customer === 'object' && d.customer !== null){
        customerName = d.customer.company_name || '';
        sessionId = d.customer.session_id || null;
      } else {
        customerName = d.customer || '';
      }
      STATE.maazCustomer = customerName;
      if (customerName && !STATE.customer){ STATE.customer = customerName; }
      /* ④: session_id lineage 捕捉 */
      if (sessionId){
        if (!STATE.sourceSessions) STATE.sourceSessions = {};
        STATE.sourceSessions.maaz = sessionId;
      }
      renderAll();

      const asIsPct = (STATE.vulnCoeff * 100).toFixed(0);
      const toBePct = (STATE.toBe_vulnCoeff * 100).toFixed(0);
      /* v1.4.0 (QA Bug #8): AS-IS と TO-BE で SCF 補正状況が違う場合を正直に表示 */
      let suffix = '';
      if (d.effectiveCoverage){
        if (STATE.vulnCoeff_is_scf_corrected){
          suffix = ' (AS-IS/TO-BE 両方 SCF補正済)';
        } else {
          suffix = ' (TO-BE のみ SCF補正済 / MAAZ v1.0.4+ 推奨)';
        }
      }
      showToast('✓ MAAZ連携: AS-IS ' + asIsPct + '% → TO-BE ' + toBePct + '%' + suffix);
    } catch(e){ showToast('⚠ 読み込みエラー: ' + e.message); }
  });
}

function importForg(){
  fileDialog('.json', text => {
    try {
      const d = JSON.parse(text);
      /* v1.2.1 TRANSP-12: Forg 変数正規化の境界条件修正
       * v1.3.6 fix (Bug #8): Forg v4 native 0-5 スケール (非整数) の正しい扱い
       *
       * 【v1.3.5 までの問題点】
       * (A) schema デフォルトが 'normalized-0-1' で、3.6 のような値は Math.min(1, v) でクランプ
       *     → Forg JSON の S=3.6, L=3.4, C=3.25, LP=2.6 がすべて 1.0 にクランプされ、
       *       UI 表示は全て 100%、摩擦係数 F も実態と乖離
       * (B) Forg v4 は整数ではなく非整数の 1-5 または 0-5 スケール値を出力するが、
       *     旧 norm() は「整数 1-5 のみ Likert」として扱い、非整数は 'out of range' 警告だった
       *
       * 【v1.3.6 の修正】
       * (1) 明示スキーマ ('likert-1-5' / 'normalized-0-1' / 'scale-0-5') は従来通り尊重
       * (2) 自動判別ロジックを追加: 0 < v <= 1 なら正規化済、1 < v <= 5 なら Forg 0-5 スケール
       * (3) 0-5 スケールは v/5 で正規化 (これにより F_org 比率は保存され、Forg 側の F_value と一致)
       *
       * 【なぜ v/5 で (v-1)/4 ではないのか】
       * Forg JSON の F_value = (S×L)/(C×LP) を raw Likert で計算した値。
       * すなわち Forg 自身は raw 値を使って F を算出している。
       * v/5 は raw 値の線形スケーリングで比率を保存する (F_org 不変)。
       * (v-1)/4 は原点シフトを伴うため F_org が変わってしまう (Forg 側の F_value と乖離)。
       */
      const norm = (v, schema) => {
        // null/undefined ガード
        if (v === null || v === undefined || isNaN(v)) return 0.5;  // 中立値フォールバック
        // (1) スキーマ明示優先
        if (schema === 'likert-1-5'){
          return Math.max(0, Math.min(1, (v - 1) / 4));
        }
        if (schema === 'normalized-0-1'){
          return Math.max(0, Math.min(1, v));
        }
        if (schema === 'scale-0-5' || schema === 'forg-v4'){
          return Math.max(0, Math.min(1, v / 5));
        }
        // (2) 自動判別
        if (v < 0) return 0;
        if (v <= 1) return v;  // 0-1 正規化済とみなす
        if (v <= 5) return v / 5;  // Forg native 0-5 スケール (例: 3.6 → 0.72)
        // (3) 範囲外
        console.warn(`Forg variable out of expected range: ${v} (expect 0-1 normalized or 0-5 Forg scale). Clamping to 1.`);
        return 1;
      };
      if (d.meta?.schema_version && d.forg?.variables){
        const v = d.forg.variables;
        /* v1.4.0 (QA Bug #10): auto-detect must be per-JSON (global), not per-variable.
         * Forg v4 raw sample: S=5, L=5, C=0.1, LP=0.1 — C/LP are valid raw values <=1,
         * but per-variable auto-detect mis-classifies them as 'normalized 0-1'.
         * Resolution rule: if any variable > 1, treat ALL as 0-5 raw scale.
         */
        const vals = [v.S, v.L, v.C, (v.LP ?? v.Lp ?? v.lp)].filter(x => typeof x === 'number' && !isNaN(x));
        const anyAbove1 = vals.some(x => x > 1);
        const schema = d.meta?.variable_scale ?? (anyAbove1 ? 'scale-0-5' : 'normalized-0-1');
        STATE.forgS = norm(v.S ?? 0.5, schema);
        STATE.forgL = norm(v.L ?? 0.5, schema);
        STATE.forgC = norm(v.C ?? 0.5, schema);
        STATE.forgLp = norm(v.LP ?? v.Lp ?? v.lp ?? 0.5, schema);
        STATE.forgArchetype = d.forg.archetype?.name_ja ?? d.forg.archetype?.name ?? '不明';
        /* v1.3.0: archetype code を捕捉 (統一摩擦モデルのマッピング用) */
        STATE.forgArchetypeCode = d.forg.archetype?.code ?? d.forg.archetype?.id ?? d.forg.archetype?.cell_id ?? null;  /* v1.4.0 (QA Bug #2): Forg v1.1.0 emits cell_id */
        STATE.forgLoaded = true;
        STATE.forgCustomer = d.customer?.company_name ?? '';
        /* ④: session_id lineage 捕捉 (Forg の session_id は customer.session_id または meta.session_id) */
        const forgSessionId = d.customer?.session_id || d.meta?.session_id || null;
        if (forgSessionId){
          if (!STATE.sourceSessions) STATE.sourceSessions = {};
          STATE.sourceSessions.forg = forgSessionId;
        }
        /* v1.3.6: F_value cross-check (Forg 側が提供する F_org 値と Endeavor の計算が一致するか確認) */
        if (typeof d.forg.F_value === 'number' && isFinite(d.forg.F_value)){
          const endeavorForg = (STATE.forgS * STATE.forgL) / Math.max(1e-6, STATE.forgC * STATE.forgLp);  /* v1.4.0 (QA Bug #3): 0.01 floor was too aggressive at raw→normalized boundary; use 1e-6 to preserve ratio and match Forg's raw computation. */
          const relDiff = Math.abs(endeavorForg - d.forg.F_value) / Math.max(0.01, d.forg.F_value);
          if (relDiff > 0.02){  // 2% 誤差を超えたら警告
            console.warn(`Forg F_value mismatch: JSON=${d.forg.F_value.toFixed(4)}, Endeavor=${endeavorForg.toFixed(4)} (${(relDiff*100).toFixed(1)}% relative diff). Check scale normalization.`);
            showToast(`⚠ Forg F_value 不整合: JSON=${d.forg.F_value.toFixed(2)}, 計算=${endeavorForg.toFixed(2)}`);
          }
        }
        renderAll();
        showToast('✓ Forg 連携完了: ' + STATE.forgArchetype);
        return;
      }
      if (!d.format && !d.scores && !d.results && d.S === undefined && d.s === undefined){
        showToast('⚠ Forg形式ではありません'); return;
      }
      let s, l, c, lp, arch;
      if (d.format === 'forg-v4' || d.format === 'forg' || (typeof d.format === 'string' && d.format.startsWith('forg-v4'))){
        s = d.S ?? d.s ?? d.silo ?? 0.5;
        l = d.L ?? d.l ?? d.legacy ?? 0.5;
        c = d.C ?? d.c ?? d.crisis ?? 0.5;
        lp = d.LP ?? d.Lp ?? d.lp ?? d.leadership ?? 0.5;
        arch = d.archetype ?? d.archetype_label ?? '不明';
      } else if (d.scores){
        s = d.scores.S ?? d.scores.s ?? 0.5; l = d.scores.L ?? d.scores.l ?? 0.5;
        c = d.scores.C ?? d.scores.c ?? 0.5; lp = d.scores.LP ?? d.scores.Lp ?? d.scores.lp ?? 0.5;
        arch = d.archetype ?? '不明';
      } else if (d.results){
        s = d.results.S ?? d.results.s ?? 0.5; l = d.results.L ?? d.results.l ?? 0.5;
        c = d.results.C ?? d.results.c ?? 0.5; lp = d.results.LP ?? d.results.Lp ?? d.results.lp ?? 0.5;
        arch = d.results.archetype ?? '不明';
      } else {
        s = d.S ?? d.s ?? 0.5; l = d.L ?? d.l ?? 0.5;
        c = d.C ?? d.c ?? 0.5; lp = d.LP ?? d.Lp ?? d.lp ?? d.L_prime ?? 0.5;
        arch = d.archetype ?? '不明';
      }
      STATE.forgS = norm(s); STATE.forgL = norm(l);
      STATE.forgC = norm(c); STATE.forgLp = norm(lp);
      STATE.forgArchetype = arch; STATE.forgLoaded = true;
      /* v1.3.0: legacy Forg 形式では archetype が名前文字列のみ。
       * 既知の archetype 名 (JP/EN) → code への逆引きを試みる。
       * 一致しなければ null (加重平均フォールバックが使われる) */
      const archNameToCode = {
        // 英名
        'aligned & agile': 'aligned-agile', 'aligned and agile': 'aligned-agile',
        'heroic minority': 'heroic-minority',
        'silent drift': 'silent-drift',
        'fragmented': 'fragmented',
        'siloed & stuck': 'siloed-stuck', 'siloed and stuck': 'siloed-stuck',
        // 日本語訳 (Forg 側の訳語に合わせ、実データで調整可能)
        '統率・機敏': 'aligned-agile', '健全・機敏': 'aligned-agile',
        '英雄依存': 'heroic-minority',
        '慣性停滞': 'silent-drift', 'サイレントドリフト': 'silent-drift',
        '分断': 'fragmented',
        'サイロ硬直': 'siloed-stuck', 'サイロ停滞': 'siloed-stuck',
      };
      STATE.forgArchetypeCode = (arch && typeof arch === 'string')
        ? (archNameToCode[arch.toLowerCase()] ?? archNameToCode[arch] ?? null)
        : null;
      STATE.forgCustomer = d.customer ?? d.company ?? '';
      renderAll();
      showToast('✓ Forg 連携完了: ' + arch);
    } catch(e){ showToast('⚠ 読み込みエラー: ' + e.message); }
  });
}

function exportDecision(){
  /* ③ canonical meta helper */
  const makeSessionId = (name) => {
    const slug = String(name || 'unnamed')
      .trim().toLowerCase()
      .replace(/[^a-z0-9\u3040-\u309f\u30a0-\u30ff\u4e00-\u9fff]+/g, '-')
      .replace(/^-+|-+$/g, '') || 'unnamed';
    const dt = new Date().toISOString().slice(0,10).replace(/-/g,'');
    return `${slug}-${dt}`;
  };
  const customerName = STATE.customer || '';
  const generatedAt = new Date().toISOString();
  const data = {
    /* === State first so canonical meta can override === */
    ...STATE,
    changelog: CHANGELOG,
    /* === ③ canonical root meta (overrides STATE.customer string with object) === */
    format: 'endeavor-v1.4',
    tool_version: '1.4.0',
    calc_fix_applied: "2026-04-25: v1.4.0 QA 修正 #1-8 (MAAZ asIsVulnCoeff受信経路/Forg archetype.cell_id/F_value floor 1e-6/toast truth/title v1.1.2→v1.4.0/CSS var 定義/空div)",
    generated_at: generatedAt,
    customer: {
      company_name: customerName,
      session_id: makeSessionId(customerName)
    },
    /* === ④ session_id lineage: 上流ツールからの伝播 === */
    source_sessions: STATE.sourceSessions || {},
    /* === 後方互換フィールド: exportedAt 保持 + customer_name string も併存 === */
    exportedAt: generatedAt,
    customer_name: customerName,  // for legacy restore paths
  };
  const jsonStr = JSON.stringify(data, null, 2);
  let hash = 0;
  for (let i = 0; i < jsonStr.length; i++){
    const c = jsonStr.charCodeAt(i);
    hash = ((hash << 5) - hash) + c;
    hash |= 0;
  }
  data._integrity = 'djb2-' + Math.abs(hash).toString(16);
  const blob = new Blob([JSON.stringify(data, null, 2)], { type: 'application/json' });
  const url = URL.createObjectURL(blob);
  const a = document.createElement('a');
  a.href = url; a.download = `Endeavor_${STATE.customer || 'unnamed'}_${STATE.date}.json`;
  document.body.appendChild(a); a.click();
  setTimeout(() => { URL.revokeObjectURL(url); a.remove(); }, 100);
  showToast('✓ Endeavor JSON をエクスポートしました');
}

/* ==== TOAST ==== */
let _toastTimer = null;
function showToast(msg){
  let t = document.querySelector('.toast');
  if (t) t.remove();
  t = document.createElement('div');
  t.className = 'toast';
  t.textContent = msg;
  document.body.appendChild(t);
  clearTimeout(_toastTimer);
  _toastTimer = setTimeout(() => t.remove(), 2600);
}

/* ==== CHAPTER NAV ==== */
let currentChapter = 'intro';
function renderNav(){
  const nav = document.getElementById('navChapters');
  nav.innerHTML = '';
  CHAPTERS.forEach(c => {
    const b = document.createElement('button');
    b.className = 'nav-chapter' + (c.id === currentChapter ? ' on' : '');
    b.innerHTML = `<span class="n">${c.n}</span><span class="lb">${c.label}</span>`;
    b.onclick = () => setChapter(c.id);
    nav.appendChild(b);
  });
}
function setChapter(id){
  currentChapter = id;
  document.querySelectorAll('.view').forEach(v => v.classList.remove('on'));
  const v = document.getElementById('view-' + id);
  if (v) v.classList.add('on');
  renderNav();
  window.scrollTo({ top: 0, behavior: 'auto' });
  setTimeout(() => {
    document.querySelectorAll('.view.on .reveal').forEach(n => { n.classList.remove('in'); delete n.dataset.done; });
    document.querySelectorAll('.view.on [data-counter]').forEach(n => { n.textContent = '0'; delete n.dataset.done; });
    observeReveals(v);
    buildTOC();            /* v1.1.6 (⑦) */
  }, 30);
}

/* ==== v1.1.6 (⑦): Long-form TOC rail ==== */
let _tocObserver = null;
function buildTOC(){
  const rail = document.getElementById('toc-rail');
  if (!rail) return;
  const view = document.querySelector('.view.on');
  if (!view){ rail.classList.remove('on'); return; }

  /* Collect chapter-markers (excluding the hero marker) */
  const markers = Array.from(view.querySelectorAll('.chapter-marker'));
  /* First marker is usually the hero (Chapter NN without XX.Y); skip it */
  const subMarkers = markers.filter(m => {
    const num = m.querySelector('.chapter-num')?.textContent?.trim() || '';
    return /\d+\.\d+/.test(num) || /^\d+\.\d+$/.test(num);
  });

  /* If fewer than 2 sub-sections, hide TOC (no need for navigation) */
  if (subMarkers.length < 2){
    rail.classList.remove('on');
    rail.innerHTML = '';
    return;
  }

  /* Assign IDs to each marker if not present */
  subMarkers.forEach((m, i) => {
    if (!m.id) m.id = `toc-sec-${currentChapter}-${i}`;
  });

  /* Resolve chapter label */
  const chap = CHAPTERS.find(c => c.id === currentChapter);
  const chapLabel = chap ? `${chap.n} ${chap.label}` : currentChapter;

  /* Build TOC HTML */
  rail.innerHTML = `
    <div class="toc-label">${chapLabel}</div>
    <ul>
      ${subMarkers.map(m => {
        const num = m.querySelector('.chapter-num')?.textContent?.trim() || '';
        const label = m.querySelector('.chapter-label')?.textContent?.trim() || '';
        const labelMain = label.split('·')[0].trim();  /* drop JP subtitle */
        return `<li><a href="#${m.id}" data-target="${m.id}">
          <span class="toc-num">${num}</span>${labelMain}
        </a></li>`;
      }).join('')}
    </ul>`;
  rail.classList.add('on');

  /* Click handler: smooth scroll to target */
  rail.querySelectorAll('a').forEach(a => {
    a.addEventListener('click', (e) => {
      e.preventDefault();
      const target = document.getElementById(a.dataset.target);
      if (target){
        const top = target.getBoundingClientRect().top + window.scrollY - 100;
        window.scrollTo({ top, behavior: 'smooth' });
      }
    });
  });

  /* IntersectionObserver for active section highlighting */
  if (_tocObserver) _tocObserver.disconnect();
  _tocObserver = new IntersectionObserver((entries) => {
    /* Find the marker closest to top that's in view */
    const inView = entries.filter(e => e.isIntersecting);
    if (inView.length === 0) return;
    inView.sort((a,b) => a.boundingClientRect.top - b.boundingClientRect.top);
    const activeId = inView[0].target.id;
    rail.querySelectorAll('a').forEach(a => {
      a.classList.toggle('active', a.dataset.target === activeId);
    });
  }, { rootMargin: '-80px 0px -60% 0px', threshold: 0 });
  subMarkers.forEach(m => _tocObserver.observe(m));
}

/* ==== REVEAL / COUNTER ==== */
function animateCounter(e){
  const target = parseFloat(e.dataset.counter);
  const decimals = parseInt(e.dataset.decimals || '0', 10);
  const prefix = e.dataset.prefix || '';
  const suffix = e.dataset.suffix || '';
  if (matchMedia('(prefers-reduced-motion:reduce)').matches){
    e.textContent = prefix + (decimals > 0 ? target.toFixed(decimals) : Math.round(target)) + suffix; return;
  }
  const dur = 1100, t0 = performance.now(), iv = 1000/60;
  const tick = () => {
    const t = performance.now();
    const k = Math.min(1, (t - t0) / dur);
    const ease = 1 - Math.pow(1-k, 3);
    const v = target * ease;
    e.textContent = prefix + (decimals > 0 ? v.toFixed(decimals) : Math.round(v)) + suffix;
    if (k < 1) setTimeout(tick, iv);
  };
  setTimeout(tick, iv);
}
const _io = new IntersectionObserver(entries => {
  entries.forEach(e => {
    if (e.isIntersecting){
      e.target.classList.add('in');
      if (e.target.dataset.counter !== undefined && !e.target.dataset.done){
        animateCounter(e.target);
        e.target.dataset.done = '1';
      }
      _io.unobserve(e.target);
    }
  });
}, { rootMargin: '-5% 0px -5% 0px', threshold: 0.05 });
function observeReveals(root){
  (root || document).querySelectorAll('.reveal, [data-counter]').forEach(n => {
    if (!n.dataset.done) _io.observe(n);
  });
  setTimeout(() => {
    (root || document).querySelectorAll('.reveal:not(.in), [data-counter]:not([data-done])').forEach(n => {
      const r = n.getBoundingClientRect();
      if (r.top < window.innerHeight && r.bottom > 0){
        n.classList.add('in');
        if (n.dataset.counter !== undefined && !n.dataset.done){
          animateCounter(n); n.dataset.done = '1';
        }
      }
    });
  }, 60);
}

/* ==== INIT (runs last after all lets are initialized) ==== */
(function init(){
  const main = document.getElementById('main');
  CHAPTERS.forEach(c => {
    const d = document.createElement('div');
    d.id = 'view-' + c.id;
    d.className = 'view' + (c.id === currentChapter ? ' on' : '');
    main.appendChild(d);
  });
  renderNav();
  /* v1.3.9: 初期値からプリセットを逆引き (デフォルト値は 50/50 なので 'custom' になる想定) */
  STATE.prodScenario = detectProdScenario();
  renderAll();
  setTimeout(() => {
    observeReveals(document.querySelector('.view.on'));
    buildTOC();   /* v1.1.6 (⑦): initial TOC */
  }, 100);
})();
