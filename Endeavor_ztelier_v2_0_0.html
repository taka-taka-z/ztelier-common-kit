<!doctype html>
<html lang="ja">
<head>
<meta charset="utf-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1"/>
<title>Endeavor v1.4.0 — Zero Trust ROI Atelier</title>
<link rel="preconnect" href="https://fonts.googleapis.com"/>
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin/>
<link href="https://fonts.googleapis.com/css2?family=Outfit:wght@200;300;400;500;600;700&family=JetBrains+Mono:wght@400;500&family=Noto+Sans+JP:wght@300;400;500;600;700&display=swap" rel="stylesheet"/>
<style>
/* ============================================================
   Endeavor — Ztelier Edition v1.0
   Base: Ztelier Common Kit v1.3 (2026)
   Themes: paper (default light) | indigo (dark)
   ============================================================ */
:root,
[data-theme="paper"]{
  --bg:#F7F9FB; --bg-1:#FFFFFF; --bg-2:#F1F4F8; --bg-3:#E7ECF2;
  --ink-0:#001744; --ink:#0B1E3F; --ink-2:#3A4B6B; --ink-3:#6B7A95; --ink-4:#A3ADBF;
  --line:#E1E6EE; --line-2:#C9D1DE; --line-3:#A8B3C5;
  --primary:#246CF7; --primary-2:#1853CC; --primary-dim:#246CF718; --primary-tint:#E8EFFD;
  --trust:#7BA05B; --trust-2:#5F7D45; --trust-dim:#7BA05B18;
  --danger:#C04A4A; --warn:#C88A2A; --info:#246CF7;
  /* Benefit category palette */
  --c-hard:#1853CC;   /* 固定資産 */
  --c-opex:#3D8888;   /* 運用 */
  --c-prod:#7BA05B;   /* 生産性 */
  --c-risk:#5B4B9E;   /* リスク */
  --topbar-bg:rgba(247,249,251,0.86);
  --shadow-soft:0 1px 2px rgba(0,23,68,.04), 0 8px 28px rgba(0,23,68,.06);
  --shadow-lift:0 2px 6px rgba(0,23,68,.06), 0 24px 60px rgba(0,23,68,.10);
}
[data-theme="indigo"]{
  --bg:#050C1C; --bg-1:#0C1730; --bg-2:#122044; --bg-3:#1B2D5C;
  --ink-0:#FFFFFF; --ink:#EEF3FE; --ink-2:#B5C4E3; --ink-3:#7E93BE; --ink-4:#4F628B;
  --line:#1D2E54; --line-2:#2A3F6E; --line-3:#415B95;
  --primary:#5B8EFF; --primary-2:#3D74F0; --primary-dim:#5B8EFF22; --primary-tint:#10204A;
  --trust:#9BC47A; --trust-2:#7BA05B; --trust-dim:#9BC47A22;
  --danger:#D86A6A; --warn:#E0A545; --info:#5B8EFF;
  --c-hard:#6E9BFF; --c-opex:#65B0B0; --c-prod:#9BC47A; --c-risk:#9082D0;
  --topbar-bg:rgba(5,12,28,0.86);
  --shadow-soft:0 1px 2px rgba(0,0,0,.3), 0 8px 28px rgba(0,0,0,.4);
  --shadow-lift:0 2px 6px rgba(0,0,0,.35), 0 24px 60px rgba(0,0,0,.55);
}
:root{
  /* v1.4.0 (QA Bug #5): fallback defaults for CSS vars that were previously undefined */
  --ink-1: #0f172a;
  --kpi-color: #0ea5e9;
  --warn-bg: #fef3c7;

  --font-sans:"Outfit","Noto Sans JP",-apple-system,system-ui,sans-serif;
  --font-jp:"Noto Sans JP","Outfit",sans-serif;
  --font-mono:"JetBrains Mono",ui-monospace,SFMono-Regular,monospace;
  --font-display:"Outfit","Noto Sans JP",-apple-system,sans-serif;
}
*,*::before,*::after{box-sizing:border-box;}
html,body{margin:0;padding:0;background:var(--bg);color:var(--ink);font-family:var(--font-sans);-webkit-font-smoothing:antialiased;letter-spacing:0;text-rendering:optimizeLegibility;transition:background .3s, color .3s;}
body{min-height:100vh;}
.mono{font-family:var(--font-mono);font-feature-settings:"ss01","cv11";letter-spacing:.02em;}
.upper{text-transform:uppercase;letter-spacing:.14em;}
.jp{font-family:var(--font-jp);}
.num{font-variant-numeric:tabular-nums;letter-spacing:-0.01em;}
em{font-style:normal;color:var(--primary);font-weight:600;}
button{font-family:inherit;color:inherit;}
a{color:var(--primary);text-decoration:none;}
a:hover{text-decoration:underline;}

/* TOPBAR */
.topbar{border-bottom:1px solid var(--line);display:flex;align-items:center;padding:0 24px;gap:16px;height:64px;background:var(--topbar-bg);backdrop-filter:blur(12px) saturate(120%);-webkit-backdrop-filter:blur(12px) saturate(120%);position:sticky;top:0;z-index:50;transition:background .3s, border-color .3s;}
.brand{display:flex;align-items:center;gap:12px;flex-shrink:0;}
.brand-mark{width:32px;height:32px;flex-shrink:0;}
.brand-text{display:flex;flex-direction:column;line-height:1.1;min-width:0;}
.brand-title{font-family:var(--font-display);font-size:18px;color:var(--ink);font-weight:500;letter-spacing:-0.01em;white-space:nowrap;}
.brand-title em{font-style:normal;color:var(--primary);font-weight:600;}
.brand-sub{font-size:10px;color:var(--ink-3);letter-spacing:.16em;text-transform:uppercase;font-weight:500;white-space:nowrap;}
.nav-chapters{display:flex;gap:4px;flex-shrink:0;overflow-x:auto;scrollbar-width:none;}
.nav-chapters::-webkit-scrollbar{display:none;}
.nav-chapter{border:1px solid transparent;background:transparent;color:var(--ink-3);height:34px;padding:0 12px;cursor:pointer;font-family:var(--font-sans);font-size:13px;font-weight:500;border-radius:999px;white-space:nowrap;display:inline-flex;align-items:center;gap:8px;transition:all .15s;}
.nav-chapter:hover{color:var(--ink-2);background:var(--bg-2);}
.nav-chapter.on{background:var(--bg-1);border-color:var(--line-2);color:var(--ink);}
.nav-chapter .n{font-family:var(--font-mono);font-size:11px;color:var(--ink-4);font-weight:500;letter-spacing:.04em;font-variant-numeric:tabular-nums;}
.nav-chapter.on .n{color:var(--primary);}
.top-meta{display:flex;gap:8px;align-items:center;flex-shrink:0;}
.tag{display:inline-flex;align-items:center;gap:6px;font-size:11px;letter-spacing:.02em;color:var(--ink-2);font-weight:500;border:1px solid var(--line-2);padding:4px 10px;border-radius:999px;background:var(--bg-1);white-space:nowrap;}
.tag .dot{width:6px;height:6px;border-radius:50%;background:var(--ink-3);}
.tag.live .dot{background:var(--trust);box-shadow:0 0 0 3px var(--trust-dim);}
.tag.roi .v{font-family:var(--font-mono);font-weight:500;letter-spacing:.02em;}
.tag.roi .lb{font-size:10px;color:var(--ink-3);letter-spacing:.14em;text-transform:uppercase;}
.theme-toggle{width:34px;height:34px;border-radius:50%;border:1px solid var(--line-2);background:var(--bg-1);cursor:pointer;color:var(--ink-2);display:flex;align-items:center;justify-content:center;transition:all .2s;flex-shrink:0;}
.theme-toggle:hover{background:var(--bg-2);color:var(--ink);}
.theme-toggle svg{width:16px;height:16px;}
.avatar{width:32px;height:32px;border-radius:50%;background:linear-gradient(135deg,var(--primary),var(--primary-2));display:flex;align-items:center;justify-content:center;font-size:11px;color:#fff;font-weight:600;letter-spacing:0.02em;flex-shrink:0;}
.spacer{flex:1;min-width:0;}

/* Sections */
.section{padding:96px 48px;}
.section.hero{padding:120px 48px 80px;}
.section.tight{padding:48px;}
.container{max-width:1280px;margin:0 auto;}
.view{display:none;}
.view.on{display:block;animation:fadein .35s ease;}
@keyframes fadein{from{opacity:0}to{opacity:1}}

/* Chapter marker */
.chapter-marker{display:flex;align-items:baseline;gap:16px;margin-bottom:32px;flex-wrap:wrap;}
.chapter-num{font-family:var(--font-mono);font-size:13px;color:var(--primary);font-weight:500;letter-spacing:.08em;text-transform:uppercase;}
/* v1.1.4 (⑤): In-chapter section headings (replaces old XX.Y chapter-markers) */
.section-heading{display:flex;align-items:baseline;gap:14px;margin-bottom:18px;padding-bottom:10px;border-bottom:1px solid var(--line);}
.section-heading .section-kicker{font-family:var(--font-mono);font-size:10px;color:var(--ink-3);letter-spacing:.14em;text-transform:uppercase;font-weight:500;}
.section-heading .section-title{font-family:var(--font-jp);font-size:15px;color:var(--ink);font-weight:500;letter-spacing:0.01em;}

/* v1.1.5 (⑥): Evidence banner — provenance indicator */
.evidence-banner{
  display:flex; align-items:center; gap:16px;
  padding:14px 20px; margin:20px 0;
  border:1px solid var(--line); border-left-width:3px;
  border-radius:10px; background:var(--bg-1);
  font-family:var(--font-jp); font-size:12.5px;
  transition:all .3s;
}
.evidence-banner[data-mode="self"]{
  border-left-color:var(--ink-3);
  background:var(--bg-2);
}
.evidence-banner[data-mode="maaz"]{
  border-left-color:var(--primary);
  background:var(--primary-tint);
}
.evidence-banner[data-mode="forg"]{
  border-left-color:var(--warn);
  background:rgba(200,138,42,0.06);
}
.evidence-banner[data-mode="linked"]{
  border-left-color:var(--trust);
  background:rgba(123,160,91,0.06);
}
.evidence-banner .ev-icon{
  flex-shrink:0; width:28px; height:28px;
  display:flex; align-items:center; justify-content:center;
  border-radius:50%;
  background:var(--bg-1); border:1px solid var(--line);
  font-family:var(--font-mono); font-size:10px; font-weight:600;
}
.evidence-banner[data-mode="self"]   .ev-icon{ color:var(--ink-3); }
.evidence-banner[data-mode="maaz"]   .ev-icon{ color:var(--primary); border-color:color-mix(in oklab,var(--primary) 30%,var(--line)); }
.evidence-banner[data-mode="forg"]   .ev-icon{ color:var(--warn);    border-color:rgba(200,138,42,0.35); }
.evidence-banner[data-mode="linked"] .ev-icon{ color:var(--trust);   border-color:color-mix(in oklab,var(--trust) 30%,var(--line)); }
.evidence-banner .ev-body{ flex:1; line-height:1.55; }
.evidence-banner .ev-title{
  font-size:12.5px; font-weight:600; color:var(--ink);
  margin-bottom:2px;
}
.evidence-banner .ev-detail{
  font-size:11.5px; color:var(--ink-2); font-weight:300;
}
.evidence-banner code{
  font-family:var(--font-mono); font-size:10.5px;
  background:rgba(36,108,247,0.08); color:var(--ink-1);
  padding:1px 5px; border-radius:3px;
}

/* v1.1.6 (⑦): Long-form TOC rail — sticky left-side navigation */
.toc-rail{
  position:fixed;
  top:110px;
  left:max(16px, calc((100vw - 1280px) / 2 - 200px));
  width:180px;
  max-height:calc(100vh - 140px);
  overflow-y:auto;
  padding:16px 0;
  font-family:var(--font-jp);
  z-index:50;
  opacity:0;
  pointer-events:none;
  transition:opacity .3s;
}
.toc-rail.on{
  opacity:1;
  pointer-events:auto;
}
/* Hide on narrow viewports where there's no room */
@media (max-width:1480px){
  .toc-rail{ display:none; }
}
.toc-rail .toc-label{
  font-family:var(--font-mono); font-size:9px;
  color:var(--ink-3); letter-spacing:.16em; text-transform:uppercase;
  margin-bottom:10px; padding-left:12px;
}
.toc-rail ul{
  list-style:none; margin:0; padding:0;
  border-left:1px solid var(--line);
}
.toc-rail li{
  margin:0;
}
.toc-rail a{
  display:block;
  padding:7px 12px;
  margin-left:-1px;
  border-left:1px solid transparent;
  color:var(--ink-3);
  text-decoration:none;
  font-size:12px; line-height:1.35;
  transition:color .15s, border-color .15s;
}
.toc-rail a:hover{
  color:var(--ink-1);
  border-left-color:var(--ink-3);
}
.toc-rail a.active{
  color:var(--primary);
  font-weight:500;
  border-left-color:var(--primary);
  background:var(--primary-tint);
}
.toc-rail a .toc-num{
  font-family:var(--font-mono); font-size:9px;
  color:var(--ink-4); letter-spacing:.08em;
  display:block; margin-bottom:1px;
}
.toc-rail a.active .toc-num{ color:var(--primary); }
.toc-rail::-webkit-scrollbar{ width:4px; }
.toc-rail::-webkit-scrollbar-thumb{ background:var(--line-2); border-radius:2px; }.chapter-line{width:40px;height:1px;background:var(--line-2);}
.chapter-label{font-family:var(--font-sans);font-size:11px;color:var(--ink-3);font-weight:500;letter-spacing:.20em;text-transform:uppercase;}
.chapter-label .jp{text-transform:none;letter-spacing:.06em;}

/* Hero */
.kicker{font-family:var(--font-sans);font-size:13px;color:var(--primary);font-weight:500;letter-spacing:.08em;text-transform:uppercase;margin-bottom:18px;}
.h-display{font-family:var(--font-display);font-size:clamp(40px,7.5vw,96px);font-weight:500;line-height:1.05;letter-spacing:-0.025em;color:var(--ink);margin:0 0 24px 0;word-break:keep-all;overflow-wrap:break-word;line-break:strict;}
.h-display em{font-style:normal;color:var(--primary);font-weight:600;}
.h-sec{font-family:var(--font-display);font-size:clamp(28px,4vw,48px);font-weight:500;line-height:1.08;letter-spacing:-0.02em;color:var(--ink);margin:0 0 16px 0;}
.lede-jp{font-family:var(--font-jp);font-size:clamp(16px,1.7vw,20px);font-weight:300;line-height:1.7;color:var(--ink-2);max-width:44ch;margin:0 0 40px 0;}

/* Stats row */
.stats-row{display:grid;grid-template-columns:repeat(3,minmax(0,1fr));gap:40px;padding-top:32px;border-top:1px solid var(--line);max-width:880px;}
.stat-label{font-family:var(--font-sans);font-size:11px;color:var(--ink-3);font-weight:500;letter-spacing:.12em;text-transform:uppercase;margin-bottom:10px;}
.stat-value{display:flex;align-items:baseline;gap:6px;}
.metric-lg{font-family:var(--font-display);font-size:clamp(44px,5.2vw,64px);font-weight:300;line-height:1;letter-spacing:-0.03em;color:var(--ink);font-variant-numeric:tabular-nums;}
.stat-unit{font-size:16px;color:var(--ink-3);font-weight:400;}
.stat-caption{font-size:12px;color:var(--ink-3);margin-top:8px;font-family:var(--font-jp);font-weight:300;}

/* Buttons */
.btn{display:inline-flex;align-items:center;gap:8px;padding:10px 18px;border-radius:999px;border:1px solid var(--line-2);background:var(--bg-1);font-family:var(--font-sans);font-size:13px;font-weight:500;color:var(--ink);cursor:pointer;transition:all .15s;white-space:nowrap;}
.btn:hover{background:var(--bg-2);transform:translateY(-1px);box-shadow:var(--shadow-soft);}
.btn.primary{background:var(--ink-0);color:var(--bg);border-color:var(--ink-0);}
.btn.primary:hover{background:var(--ink);}
.btn.ghost{background:transparent;border-color:var(--line);}
.btn.sm{padding:6px 12px;font-size:12px;}

/* Cards */
.card{background:var(--bg-1);border:1px solid var(--line);border-radius:14px;transition:border-color .2s, box-shadow .2s, transform .2s;}
.card.elevated{box-shadow:var(--shadow-soft);}
.card.elevated:hover{box-shadow:var(--shadow-lift);transform:translateY(-1px);}
.section-head{display:flex;justify-content:space-between;align-items:center;padding:12px 16px;border-bottom:1px solid var(--line);background:var(--bg-2);border-radius:14px 14px 0 0;}
.section-head .idx{font-family:var(--font-mono);font-size:10px;color:var(--ink-4);letter-spacing:.14em;text-transform:uppercase;font-weight:500;}
.section-head .label{font-family:var(--font-mono);font-size:11px;color:var(--ink-2);letter-spacing:.14em;text-transform:uppercase;font-weight:500;}
.section-head .jp{font-size:11px;color:var(--ink-3);font-family:var(--font-jp);font-weight:400;}

/* KPI */
.kpi-card{padding:20px;display:flex;flex-direction:column;gap:6px;border-left:3px solid var(--kpi-color,var(--primary));}
.kpi-label{font-family:var(--font-mono);font-size:10px;color:var(--ink-3);letter-spacing:.14em;text-transform:uppercase;font-weight:500;}
.kpi-value{font-family:var(--font-display);font-size:32px;font-weight:500;color:var(--kpi-color,var(--ink));font-variant-numeric:tabular-nums;letter-spacing:-0.02em;line-height:1.1;}
.kpi-value .unit{font-size:14px;color:var(--ink-3);font-weight:400;margin-left:4px;}
.kpi-sub{font-size:11px;color:var(--ink-3);font-family:var(--font-jp);line-height:1.5;}

/* Reveal */
.reveal{opacity:0;transform:translateY(20px);transition:opacity .7s cubic-bezier(.2,.6,.2,1), transform .7s cubic-bezier(.2,.6,.2,1);}
.reveal.in{opacity:1;transform:translateY(0);}
.reveal.d1{transition-delay:.08s;}
.reveal.d2{transition-delay:.16s;}
.reveal.d3{transition-delay:.24s;}
.reveal.d4{transition-delay:.32s;}
@media(prefers-reduced-motion:reduce){.reveal{opacity:1;transform:none;transition:none;}}

/* Inputs / forms */
.input,.select,.textarea{border:1px solid var(--line-2);background:var(--bg-1);border-radius:8px;padding:8px 12px;font-family:var(--font-sans);font-size:13px;color:var(--ink);transition:border-color .15s;font-feature-settings:"palt";min-width:0;width:100%;}
.input:focus,.select:focus,.textarea:focus{outline:none;border-color:var(--primary);box-shadow:0 0 0 3px var(--primary-dim);}
.input.num{font-family:var(--font-mono);text-align:right;font-variant-numeric:tabular-nums;}
.field{display:flex;flex-direction:column;gap:6px;}
.field-lb{font-family:var(--font-mono);font-size:10px;color:var(--ink-3);letter-spacing:.14em;text-transform:uppercase;font-weight:500;}
.field-lb .jp{font-family:var(--font-jp);font-size:11px;color:var(--ink-4);text-transform:none;letter-spacing:.04em;font-weight:400;margin-left:6px;}
.field-unit{font-family:var(--font-mono);font-size:10px;color:var(--ink-4);letter-spacing:.14em;text-transform:uppercase;padding:0 8px;}

.input-group{display:flex;align-items:center;gap:6px;}
.input-group .input{flex:1;}

/* Grids */
.grid-2{display:grid;grid-template-columns:repeat(2,1fr);gap:16px;}
.grid-3{display:grid;grid-template-columns:repeat(3,1fr);gap:16px;}
.grid-4{display:grid;grid-template-columns:repeat(4,1fr);gap:16px;}
.grid-5{display:grid;grid-template-columns:repeat(5,1fr);gap:16px;}

/* Data table */
.dtable{width:100%;border-collapse:separate;border-spacing:0;border:1px solid var(--line);border-radius:14px;overflow:hidden;font-family:var(--font-sans);font-size:12px;}
.dtable thead{background:var(--bg-2);}
.dtable th{font-family:var(--font-mono);font-size:10px;color:var(--ink-3);letter-spacing:.14em;text-transform:uppercase;font-weight:500;text-align:left;padding:12px 14px;border-bottom:1px solid var(--line);}
.dtable th.num{text-align:right;}
.dtable td{padding:10px 14px;border-bottom:1px solid var(--line);color:var(--ink-2);vertical-align:middle;}
.dtable td.num{text-align:right;font-family:var(--font-mono);font-variant-numeric:tabular-nums;}
.dtable td .input{font-size:12px;padding:6px 10px;}
.dtable tr:last-child td{border-bottom:none;}
.dtable tr.total td{background:var(--bg-2);font-weight:600;color:var(--ink);}
.dtable tr.total td.num{color:var(--ink);font-size:14px;}

/* Waterfall */
.waterfall-wrap{padding:24px;}
.waterfall-wrap svg{display:block;width:100%;max-width:560px;margin:0 auto;}

/* Forg mini-bars */
/* v1.3.4: Forg 4 変数バーチャート UI を削除したため関連 CSS も除去
   (.forg-bar-row / .forg-bar-label / .forg-bar-track / .forg-bar-fill / .forg-bar-val) */

/* Forg attenuation cards */
.att-card{padding:18px;display:flex;flex-direction:column;gap:8px;}
.att-card .cat{font-family:var(--font-mono);font-size:11px;color:var(--ink-3);letter-spacing:.14em;text-transform:uppercase;font-weight:500;}
.att-card .cat .jp{font-family:var(--font-jp);font-size:10px;color:var(--ink-4);text-transform:none;letter-spacing:0;font-weight:400;margin-left:6px;}
.att-card .pct{font-family:var(--font-display);font-size:36px;font-weight:300;letter-spacing:-0.03em;line-height:1;font-variant-numeric:tabular-nums;}
.att-card .pct.good{color:var(--trust);}
.att-card .pct.mid{color:var(--warn);}
.att-card .pct.bad{color:var(--danger);}
.att-card .eff{font-family:var(--font-mono);font-size:11px;color:var(--ink-3);letter-spacing:.04em;}
.att-card .eff .v{color:var(--ink);font-weight:500;}

/* Compare cards (AS-IS vs TO-BE) */
.cmp-row{display:grid;grid-template-columns:1fr 80px 1fr;gap:12px;align-items:stretch;}
.cmp-card{padding:24px 20px;border-radius:14px;display:flex;flex-direction:column;gap:10px;align-items:center;justify-content:space-between;text-align:center;}
.cmp-card.danger{background:color-mix(in srgb,var(--danger) 4%, var(--bg-1));border:1px solid color-mix(in srgb,var(--danger) 16%, var(--line));}
.cmp-card.primary{background:color-mix(in srgb,var(--primary) 4%, var(--bg-1));border:1px solid color-mix(in srgb,var(--primary) 16%, var(--line));}
.cmp-card .tag{margin-bottom:4px;}
.cmp-card .big{font-family:var(--font-display);font-weight:300;line-height:1;font-variant-numeric:tabular-nums;letter-spacing:-0.03em;font-size:clamp(40px,6vw,72px);}
.cmp-card.danger .big{color:var(--danger);}
.cmp-card.primary .big{color:var(--primary);}
.cmp-card .unit{font-family:var(--font-jp);font-size:12px;color:var(--ink-3);margin-top:4px;}
.cmp-card .note{font-family:var(--font-mono);font-size:10px;color:var(--ink-3);letter-spacing:.08em;text-transform:uppercase;padding:6px 10px;border-radius:999px;background:var(--bg-2);}
.cmp-arrow{display:flex;flex-direction:column;align-items:center;justify-content:center;gap:6px;color:var(--ink-3);}
.cmp-arrow .arr{font-size:24px;}
.cmp-arrow .pct{font-family:var(--font-display);font-size:clamp(20px,2.5vw,28px);font-weight:500;color:var(--trust);letter-spacing:-0.02em;}
.cmp-arrow .lbl{font-family:var(--font-mono);font-size:9px;color:var(--ink-3);letter-spacing:.12em;text-transform:uppercase;text-align:center;}

/* Forg badge */
.forg-badge{display:inline-flex;gap:10px;align-items:center;padding:8px 14px;border:1px solid var(--line);background:var(--bg-1);border-radius:999px;font-family:var(--font-mono);font-size:11px;color:var(--ink-2);letter-spacing:.04em;}
.forg-badge .formula{color:var(--primary);font-weight:500;}
.forg-badge .sep{color:var(--ink-4);}

/* Tornado chart */
.tornado{display:flex;flex-direction:column;gap:10px;}
.tornado-row{display:grid;grid-template-columns:180px 1fr;gap:12px;align-items:center;}
.tornado-label{font-family:var(--font-jp);font-size:12px;color:var(--ink-2);text-align:right;}
.tornado-area{position:relative;height:24px;}
.tornado-center{position:absolute;left:50%;top:0;bottom:0;width:1px;background:var(--line-2);}
.tornado-bar{position:absolute;top:3px;bottom:3px;border-radius:3px;display:flex;align-items:center;justify-content:center;font-family:var(--font-mono);font-size:10px;font-weight:600;color:#fff;letter-spacing:.02em;}
.tornado-bar.positive{background:var(--trust);}
.tornado-bar.negative{background:var(--danger);}
.tornado-summary{display:grid;grid-template-columns:repeat(3,1fr);gap:10px;margin-top:16px;}
.tornado-summary > div{padding:12px;border:1px solid var(--line);border-radius:10px;text-align:center;background:var(--bg-1);}
.tornado-summary .lb{font-family:var(--font-mono);font-size:9px;color:var(--ink-3);letter-spacing:.14em;text-transform:uppercase;margin-bottom:6px;}
.tornado-summary .v{font-family:var(--font-mono);font-size:18px;font-weight:500;font-variant-numeric:tabular-nums;}
.tornado-summary .v.danger{color:var(--danger);}
.tornado-summary .v.trust{color:var(--trust);}

/* v1.1.3: Tornado group label (A/B sections) and pillar sensitivity enhancements */
.tornado-group-label{
  font-family:var(--font-mono); font-size:10px;
  color:var(--ink-3); letter-spacing:.14em; text-transform:uppercase;
  font-weight:600; margin:20px 0 10px;
  padding-top:12px; border-top:1px solid var(--line);
}
.tornado-group-label:first-child{ padding-top:0; border-top:none; margin-top:0; }
.tornado-group-sub{
  display:inline-block; margin-left:10px; font-weight:400;
  font-family:var(--font-jp); font-size:10.5px;
  color:var(--ink-3); letter-spacing:0; text-transform:none;
}
.pillar-sens-row .tornado-label{
  text-align:right; display:flex; flex-direction:column; align-items:flex-end; gap:2px;
  line-height:1.35;
}
.pillar-sens-bn{ font-weight:600; color:var(--warn); }
.pillar-sens-tag{
  display:inline-block; padding:1px 6px;
  font-family:var(--font-mono); font-size:8.5px;
  color:var(--warn); background:rgba(200,138,42,0.12);
  border:1px solid rgba(200,138,42,0.35);
  border-radius:3px; letter-spacing:.08em; text-transform:uppercase;
  margin-left:6px;
}
.pillar-sens-detail{
  font-family:var(--font-mono); font-size:9.5px;
  color:var(--ink-4); letter-spacing:.02em;
  font-weight:400;
}

/* v1.1.3: MAAZ Actions card (I · ZT Investment pre-population) */
.maaz-actions-card{
  margin-bottom:20px;
  background:var(--bg-1);
  border:1px solid var(--line);
  border-left:3px solid var(--trust);
  border-radius:10px;
  overflow:hidden;
}
.maaz-actions-head{
  display:flex; justify-content:space-between; align-items:center;
  padding:14px 20px;
  background:rgba(123,160,91,0.04);
  border-bottom:1px solid var(--line);
}
.maaz-actions-head .ti{
  font-family:var(--font-mono); font-size:10.5px;
  color:var(--trust); letter-spacing:.14em; text-transform:uppercase;
  font-weight:600;
}
.maaz-actions-head .sub{
  font-family:var(--font-jp); font-size:11.5px;
  color:var(--ink-3); font-weight:300;
}
.maaz-actions-body{ padding:12px 20px 16px; }
.maaz-action-item{
  /* v1.2.2: 参考情報のみ表示 (checkbox + cost input 削除) — 3 列に簡略化 */
  display:grid; grid-template-columns:64px 1fr 80px;
  gap:12px; align-items:center;
  padding:8px 10px;
  border-bottom:1px solid var(--line);
  font-size:12.5px;
  transition:background .15s;
}
.maaz-action-item:last-child{ border-bottom:none; }
.maaz-action-item:hover{ background:var(--bg-2); }
.maaz-action-item.ref-only{ cursor:default; }
.maaz-action-pillar{
  font-family:var(--font-mono); font-size:9.5px;
  color:var(--ink-3); letter-spacing:.06em; text-transform:uppercase;
  font-weight:500;
}
.maaz-action-desc{ color:var(--ink); line-height:1.45; }
.maaz-action-desc .lv{
  font-family:var(--font-mono); font-size:9.5px;
  color:var(--ink-4); margin-left:6px;
  letter-spacing:.04em;
}
.maaz-action-priority{
  font-family:var(--font-mono); font-size:9.5px;
  padding:2px 7px; border-radius:3px;
  letter-spacing:.06em; text-transform:uppercase;
  font-weight:500; text-align:center;
  justify-self:start;
}
.maaz-action-priority.critical{ color:#8B1A1A; background:#FDE2E2; border:1px solid #F6B8B8; }
.maaz-action-priority.high{     color:#8a4a1a; background:#FDE8CB; border:1px solid #F5C080; }
.maaz-action-priority.medium{   color:#1F4F7F; background:#E3EEFA; border:1px solid #A8C5E4; }
.maaz-actions-empty{
  padding:16px 20px;
  font-family:var(--font-jp); font-size:12px;
  color:var(--ink-3); text-align:center;
}

/* v1.1.3: MITRE ATT&CK basis banner */
.mitre-basis-banner{
  margin:16px 0;
  padding:14px 20px;
  background:var(--primary-tint);
  border:1px solid color-mix(in oklab, var(--primary) 25%, var(--line));
  border-left:3px solid var(--primary);
  border-radius:8px;
  display:flex; align-items:center; gap:16px;
}
.mitre-basis-banner .icon{
  flex-shrink:0; width:32px; height:32px;
  display:flex; align-items:center; justify-content:center;
  background:var(--bg-1); border-radius:50%;
  color:var(--primary);
  font-family:var(--font-mono); font-size:11px; font-weight:600;
  border:1px solid color-mix(in oklab, var(--primary) 30%, var(--line));
}
.mitre-basis-banner .body{ flex:1; }
.mitre-basis-banner .body .ti{
  font-family:var(--font-sans); font-size:12.5px; font-weight:600;
  color:var(--ink); margin-bottom:3px;
}
.mitre-basis-banner .body .detail{
  font-family:var(--font-jp); font-size:11.5px;
  color:var(--ink-2); line-height:1.55; font-weight:300;
}
.mitre-basis-banner code{
  font-family:var(--font-mono); font-size:11px;
  background:rgba(36,108,247,0.08); color:var(--primary-2);
  padding:1px 5px; border-radius:3px;
}

/* Pill banner */
.pill-banner{display:flex;gap:24px;padding:20px 28px;border-radius:14px;background:var(--bg-1);border:1px solid var(--line);align-items:center;flex-wrap:wrap;}
.pill-banner .lb{font-family:var(--font-mono);font-size:10px;color:var(--ink-3);letter-spacing:.14em;text-transform:uppercase;margin-bottom:4px;}
.pill-banner .v{font-family:var(--font-display);font-size:24px;font-weight:500;font-variant-numeric:tabular-nums;letter-spacing:-0.02em;}
.pill-banner .v.trust{color:var(--trust);}
.pill-banner .v.warn{color:var(--warn);}
.pill-banner .v.primary{color:var(--primary);}
.pill-banner > div:not(.div){flex:1;min-width:140px;}
.pill-banner > .div{width:1px;min-width:1px;background:var(--line);align-self:stretch;flex:0 0 1px;}

/* Footer */
.footer{border-top:1px solid var(--line);padding:48px;margin-top:64px;}
.footer-inner{max-width:1280px;margin:0 auto;display:flex;justify-content:space-between;align-items:center;gap:24px;flex-wrap:wrap;}
.footer-brand{display:flex;align-items:center;gap:12px;}
.footer-brand svg{width:24px;height:24px;}
.footer-label{font-family:var(--font-mono);font-size:10px;color:var(--ink-3);letter-spacing:.14em;text-transform:uppercase;}
.footer-sub{font-family:var(--font-jp);font-size:11px;color:var(--ink-3);font-weight:300;}

/* Toast */
.toast{position:fixed;bottom:32px;left:50%;transform:translateX(-50%);background:var(--ink-0);color:var(--bg);padding:12px 22px;border-radius:999px;font-family:var(--font-sans);font-size:13px;font-weight:500;box-shadow:var(--shadow-lift);z-index:200;animation:toast-in .3s cubic-bezier(.2,.6,.2,1);}
@keyframes toast-in{from{opacity:0;transform:translate(-50%,12px)}to{opacity:1;transform:translate(-50%,0)}}

/* Logic cards */
.logic-card{padding:20px;display:flex;flex-direction:column;gap:10px;}
.logic-card .ti{font-family:var(--font-display);font-size:16px;font-weight:500;color:var(--ink);}
.logic-card .formula{font-family:var(--font-mono);font-size:11px;color:var(--primary);background:var(--primary-tint);padding:8px 12px;border-radius:6px;letter-spacing:.02em;white-space:pre-wrap;}
.logic-card .desc{font-family:var(--font-jp);font-size:12px;color:var(--ink-2);line-height:1.6;}
.logic-card .src{font-family:var(--font-mono);font-size:9px;color:var(--ink-4);letter-spacing:.14em;text-transform:uppercase;}

/* Responsive */
/* Mobile/tablet responsive queries removed — desktop-only deployment */

@media print{
  .topbar,.footer,.theme-toggle,.btn,.nav-chapters{display:none !important;}
  .view{display:block !important;page-break-inside:avoid;}
  body{background:#fff !important;}
  .reveal{opacity:1 !important;transform:none !important;}
}

/* ==================================================================
   ZTELIER COMMON KIT v2.0 — UNIFICATION PATCH (AUTO-INJECTED)
   ==================================================================
*/
/* ============================================================
   Ztelier v2.0 — Common Kit Unification Patch
   Applied to: Amp / CSFA / Endeavor / MAAZ / forg / pupy
   Strategy: Non-destructive overlay. Adds v2 tokens + v2
   components + micro-interaction polish on top of existing v1.
   Fallback chains absorb CSFA's --bg-0/--ink-1 naming.
   ============================================================ */

/* ---------- v2 additive tokens (Paper) ---------- */
:root,
[data-theme="paper"]{
  /* 6段階Inkの補完 (既存5段階にGhostを追加) */
  --ink-ghost:    #D5DCE6;

  /* v2 エイリアス — 「Blue」命名で v2 ガイドと整合 */
  --blue:         var(--primary, #246CF7);
  --blue-dark:    var(--primary-2, #1853CC);
  --blue-tint:    var(--primary-tint, #E8EFFD);
  --blue-glow:    rgba(36, 108, 247, 0.14);
  --line-focus:   var(--primary, #246CF7);
  --line-strong:  var(--line-2, #C9D1DE);

  /* Semantic tints (未定義ファイル向けのフォールバック値) */
  --trust-tint:   #EEF3E6;
  --warn-tint:    #FAF1DF;
  --danger-tint:  #F8E7E7;

  /* Zero Trust 7 柱の固定色 (v2 標準) */
  --p-identity:    #1853CC;
  --p-devices:     #7BA05B;
  --p-networks:    #5B4B9E;
  --p-apps:        #B5832C;
  --p-data:        #A0517E;
  --p-visibility:  #3D8888;
  --p-automation:  #4A6FA5;

  /* v2 Horizon Gradient — 現在→未来 */
  --horizon-from:  #E8EFFD;
  --horizon-mid:   #DCE8FB;
  --horizon-to:    #CFE0F9;

  /* v2 radius / motion 標準 */
  --r-sm:  6px;
  --r-md:  10px;
  --r-lg:  14px;
  --r-pill: 999px;
  --ease-z: cubic-bezier(0.22, 0.61, 0.36, 1);
  --dur-fast: 180ms;
  --dur-z:    280ms;
  --dur-slow: 520ms;
  --shadow-focus-v2: 0 0 0 3px var(--blue-glow);
}

/* ---------- Indigo theme 差分 ---------- */
[data-theme="indigo"]{
  --ink-ghost:    #2E416B;
  --blue-glow:    rgba(91, 142, 255, 0.22);
  --horizon-from: #0C1730;
  --horizon-mid:  #122044;
  --horizon-to:   #1B2D5C;
  --trust-tint:   #14291A;
  --warn-tint:    #2B1F0D;
  --danger-tint:  #2B1212;
}

/* ============================================================
   Focus ring — WCAG 2.2 AA を満たす統一リング
   既存 outline を上書きせず、補強のみ
   ============================================================ */
:focus-visible{
  outline: 2px solid var(--blue, #246CF7);
  outline-offset: 2px;
}
button:focus-visible,
a:focus-visible,
[role="button"]:focus-visible,
input:focus-visible,
select:focus-visible,
textarea:focus-visible{
  outline: 2px solid var(--blue, #246CF7);
  outline-offset: 2px;
  box-shadow: var(--shadow-focus-v2);
}

/* ============================================================
   v2 Component: Chapter Marker
   「Chapter 02  ───  Maturity · 成熟度」 パターン
   ============================================================ */
.zt2-chapter{
  display: inline-flex;
  align-items: center;
  gap: 14px;
  font-family: var(--font-mono, "JetBrains Mono", monospace);
  font-size: 11px;
  letter-spacing: 0.18em;
  text-transform: uppercase;
  color: var(--ink-3, var(--ink-2, #6B7A95));
}
.zt2-chapter__num{ color: var(--blue); font-weight: 500; }
.zt2-chapter__line{
  display:inline-block;
  width: 36px; height: 1px;
  background: var(--line-2, var(--line-1, #C9D1DE));
}

/* ============================================================
   v2 Component: Kicker (統一仕様)
   既存 .kicker を再定義せず、.zt2-kicker として追加
   ============================================================ */
.zt2-kicker{
  font-family: var(--font-mono, monospace);
  font-size: 11px;
  letter-spacing: 0.18em;
  text-transform: uppercase;
  color: var(--blue);
  font-weight: 500;
  margin-bottom: 12px;
  display: inline-block;
}

/* ============================================================
   v2 Component: Z-Flow Grid (思考の Z 字動線)
   ============================================================ */
.zt2-zflow{
  position: relative;
  padding: 32px;
  background: var(--bg-2, var(--bg-2, #F1F4F8));
  border: 1px solid var(--line, var(--line-1, #E1E6EE));
  border-radius: var(--r-lg);
  background-image: radial-gradient(circle, var(--line-2, var(--line-strong, #C9D1DE)) 1px, transparent 1px);
  background-size: 24px 24px;
  background-position: -1px -1px;
}
.zt2-zflow__grid{
  display: grid;
  grid-template-columns: repeat(3, 1fr);
  gap: 20px;
  position: relative;
}
.zt2-zflow__cell{
  background: var(--bg-1, #FFFFFF);
  border: 1px solid var(--line, var(--line-1, #E1E6EE));
  border-radius: var(--r-md);
  padding: 18px;
  position: relative;
  min-height: 120px;
  transition: transform var(--dur-z) var(--ease-z), box-shadow var(--dur-z) var(--ease-z);
}
.zt2-zflow__cell.is-subject{
  border-color: var(--blue);
  box-shadow: var(--shadow-focus-v2);
}
.zt2-zflow__cell:hover{
  transform: translateY(-1px);
}
.zt2-zflow__step{
  position: absolute;
  top: -12px; left: -12px;
  width: 28px; height: 28px;
  border-radius: 50%;
  background: var(--blue);
  color: #fff;
  font-family: var(--font-mono);
  font-size: 12px; font-weight: 600;
  display: flex; align-items: center; justify-content: center;
  box-shadow: 0 0 0 4px var(--bg-2, #F1F4F8);
}
.zt2-zflow__step.is-supporting{ background: var(--ink-ghost); color: var(--ink-3); }
.zt2-zflow__label{
  font-family: var(--font-mono);
  font-size: 10px;
  letter-spacing: 0.14em;
  color: var(--ink-3, var(--ink-2));
  text-transform: uppercase;
  margin-bottom: 8px;
}
.zt2-zflow__title{
  font-family: var(--font-display, var(--font-sans));
  font-size: 15px; font-weight: 500;
  color: var(--ink, var(--ink-1));
  margin: 0 0 6px;
  line-height: 1.35;
}
.zt2-zflow__body{
  font-size: 12px;
  color: var(--ink-2);
  line-height: 1.65;
  margin: 0;
}

/* ============================================================
   v2 Component: Horizon Bar (現在→未来の帯)
   ============================================================ */
.zt2-horizon{
  background: var(--bg-1, #FFFFFF);
  border: 1px solid var(--line, var(--line-1, #E1E6EE));
  border-radius: var(--r-lg);
  padding: 32px;
}
.zt2-horizon__track{
  position: relative;
  height: 64px;
  border-radius: var(--r-md);
  background: linear-gradient(90deg, var(--horizon-from), var(--horizon-mid), var(--horizon-to));
  overflow: visible;
  margin: 28px 0 16px;
}
.zt2-horizon__now{
  position: absolute;
  top: 0; bottom: 0;
  width: 2px;
  background: var(--blue);
  z-index: 2;
}
.zt2-horizon__now::after{
  content: "NOW";
  position: absolute;
  top: -22px; left: 50%;
  transform: translateX(-50%);
  font-family: var(--font-mono);
  font-size: 10px;
  color: var(--blue);
  letter-spacing: 0.14em;
  background: var(--bg, var(--bg-0));
  padding: 2px 6px;
  border-radius: 3px;
  font-weight: 500;
}
.zt2-horizon__future{
  position: absolute;
  right: 12px; top: 50%;
  transform: translateY(-50%);
  color: var(--p-networks);
  font-family: var(--font-mono);
  font-size: 11px;
  letter-spacing: 0.14em;
}
.zt2-horizon__future::before{ content: "→  "; font-size: 14px; }
.zt2-horizon__stages{
  display: grid;
  grid-template-columns: repeat(4, 1fr);
  gap: 16px;
  margin-top: 24px;
}
.zt2-horizon__stage{
  padding: 14px 16px;
  border: 1px solid var(--line, var(--line-1));
  border-radius: var(--r-md);
  background: var(--bg-1, #FFFFFF);
}
.zt2-horizon__stage.is-current{
  border-color: var(--blue);
  background: var(--blue-tint);
}
[data-theme="indigo"] .zt2-horizon__stage.is-current{
  background: var(--bg-3);
}
.zt2-horizon__stage-num{
  font-family: var(--font-mono);
  font-size: 10px;
  letter-spacing: 0.14em;
  color: var(--ink-3, var(--ink-2));
  margin-bottom: 4px;
}
.zt2-horizon__stage.is-current .zt2-horizon__stage-num{ color: var(--blue); }
.zt2-horizon__stage-name{
  font-family: var(--font-display, var(--font-sans));
  font-size: 14px; font-weight: 500;
  color: var(--ink, var(--ink-1));
  margin-bottom: 2px;
}
.zt2-horizon__stage-meta{
  font-size: 11px;
  color: var(--ink-3, var(--ink-2));
}

/* ============================================================
   v2 Component: Pillar Rail / Dot (7 柱分類)
   ============================================================ */
.zt2-pillar{
  border-left: 3px solid var(--pillar-color, var(--blue));
  padding-left: 12px;
}
.zt2-pillar-dot{
  display: inline-block;
  width: 8px; height: 8px;
  border-radius: 50%;
  background: var(--pillar-color, var(--blue));
  margin-right: 8px;
  vertical-align: middle;
  flex-shrink: 0;
}
.zt2-pillar--identity{    --pillar-color: var(--p-identity); }
.zt2-pillar--devices{     --pillar-color: var(--p-devices); }
.zt2-pillar--networks{    --pillar-color: var(--p-networks); }
.zt2-pillar--apps{        --pillar-color: var(--p-apps); }
.zt2-pillar--data{        --pillar-color: var(--p-data); }
.zt2-pillar--visibility{  --pillar-color: var(--p-visibility); }
.zt2-pillar--automation{  --pillar-color: var(--p-automation); }

/* ============================================================
   v2 Component: Ink Scale (6段階可視化)
   ============================================================ */
.zt2-ink-scale{
  display: grid;
  grid-template-columns: repeat(6, 1fr);
  gap: 0;
  border: 1px solid var(--line, var(--line-1));
  border-radius: var(--r-md);
  overflow: hidden;
  background: var(--bg-1, #FFFFFF);
}
.zt2-ink-scale__item{
  padding: 14px 12px;
  border-right: 1px solid var(--line, var(--line-1));
}
.zt2-ink-scale__item:last-child{ border-right: none; }
.zt2-ink-scale__dot{
  width: 14px; height: 14px;
  border-radius: 3px;
  margin-bottom: 10px;
}

/* ============================================================
   既存コンポーネントの micro-interaction 統一
   (既存の .btn / .card / .tag / .topbar を弱めに上書き)
   ============================================================ */

/* Buttons — 押下感・フォーカス統一 */
.btn{
  transition:
    background var(--dur-fast) var(--ease-z),
    border-color var(--dur-fast) var(--ease-z),
    color var(--dur-fast) var(--ease-z),
    box-shadow var(--dur-fast) var(--ease-z),
    transform var(--dur-fast) var(--ease-z);
}
.btn:active{ transform: translateY(1px); }
.btn.primary:focus-visible{ box-shadow: var(--shadow-focus-v2); }

/* Cards — 浮き上がりの統一 */
.card{
  transition:
    transform var(--dur-z) var(--ease-z),
    box-shadow var(--dur-z) var(--ease-z),
    border-color var(--dur-z) var(--ease-z);
}

/* Tag / Pill — v2 variants */
.tag, .pill{
  transition: all var(--dur-fast) var(--ease-z);
}
.tag--zt2-blue, .pill--zt2-blue{
  background: var(--blue-tint);
  color: var(--blue-dark);
  border-color: transparent;
}
.tag--zt2-trust, .pill--zt2-trust{
  background: var(--trust-tint);
  color: var(--trust);
  border-color: transparent;
}
.tag--zt2-warn, .pill--zt2-warn{
  background: var(--warn-tint);
  color: var(--warn);
  border-color: transparent;
}
.tag--zt2-active, .pill--zt2-active{
  background: var(--ink-0, var(--ink-deep, #001744));
  color: #fff;
  border-color: var(--ink-0, #001744);
}

/* Topbar — スムーズなテーマ切替 */
.topbar{
  transition:
    background var(--dur-z) var(--ease-z),
    border-color var(--dur-z) var(--ease-z);
}

/* ============================================================
   v2 Utilities
   ============================================================ */
.zt2-ink-deep    { color: var(--ink-0) !important; }
.zt2-ink-primary { color: var(--ink, var(--ink-1)) !important; }
.zt2-ink-sec     { color: var(--ink-2) !important; }
.zt2-ink-muted   { color: var(--ink-3) !important; }
.zt2-ink-faint   { color: var(--ink-4) !important; }
.zt2-ink-ghost   { color: var(--ink-ghost) !important; }

.zt2-mono{
  font-family: var(--font-mono);
  letter-spacing: 0.14em;
  text-transform: uppercase;
  font-size: 11px;
  color: var(--ink-3, var(--ink-2));
}

/* Large metric (KPI) — v2 標準 */
.zt2-metric{
  font-family: var(--font-display, var(--font-sans));
  font-weight: 300;
  font-size: 48px;
  line-height: 1;
  color: var(--ink, var(--ink-1));
  letter-spacing: -0.01em;
}
.zt2-metric__unit{
  font-size: 14px;
  color: var(--ink-3);
  margin-left: 4px;
  font-weight: 400;
}

/* ============================================================
   Reduced motion — アクセシビリティ
   ============================================================ */
@media (prefers-reduced-motion: reduce){
  *, *::before, *::after{
    animation-duration: 0.01ms !important;
    animation-iteration-count: 1 !important;
    transition-duration: 0.01ms !important;
    scroll-behavior: auto !important;
  }
}

/* ============================================================
   Version signature (for debugging)
   ============================================================ */
body::before{
  content: "";
  /* Ztelier Common Kit v2.0 — applied */
}$

function fmt(n){
  if (!isFinite(n)) return '—';
  if (Math.abs(n) >= 1e8) return (n/1e8).toFixed(1) + '億';
  if (Math.abs(n) >= 1e4) return (n/1e4).toFixed(0) + '万';
  return n.toLocaleString();
}
function fmtYen(n){ return '¥' + fmt(n); }
function fmtPct(n){ return (n*100).toFixed(1) + '%'; }
function toM(yen){ return Math.round(yen / 1e6 * 100) / 100; }

       - damageC ≤ 売上 × 1.0 (年間売上を超える単発インシデントコストは非現実)
       - damageD ≤ 売上 × 1.0 (年間補償・賠償が年間売上超は持続不能)
       - ipValue ≤ 売上 × 5 (無形資産は年商の数倍以内が一般的レンジ)
     監査根拠: 物理的可能性を超える被害想定は ROI 過大計上の主因 */
  const _damageCap = (S.revenue && S.revenue > 0) ? S.revenue : Infinity;
  const _ipCap     = (S.revenue && S.revenue > 0) ? S.revenue * 5 : Infinity;
  const damageC_raw = S.forensicCost + S.recoveryCost + S.replaceCost + S.callCenterCost;
  const damageD_raw = S.compensationCost + S.notifyCost + S.legalCost + S.churnLoss;
  const damageC = Math.min(damageC_raw, _damageCap);
  const damageD = Math.min(damageD_raw, _damageCap);
  const ipValue_eff = Math.min(S.ipValue, _ipCap);
  const damageScaleCapped = (damageC_raw > damageC) || (damageD_raw > damageD) || (S.ipValue > ipValue_eff);

  const cyberProb_asis = S.baseRisk + S.cyberRiskMax * S.vulnCoeff;
  const dlpProb_asis = S.baseRisk + S.dlpRiskMax * S.dlpVulnCoeff;
  /* 理想値（スコープ100%時）: SCF補正前 vulnCoeff を使用 */
  const cyberProb_tobe_ideal = S.baseRisk + S.cyberRiskMax * S.toBe_vulnCoeff_ideal;
  const dlpProb_tobe_ideal   = S.baseRisk + S.dlpRiskMax * S.toBe_dlpVulnCoeff_ideal;
  /* === v1.5.0 (QA Audit C5 fix): 侵害確率の SCF 連動 ===
     旧: cyberProb_tobe = baseRisk + cyberRiskMax × toBe_vulnCoeff
         → SCF は impactRate / recoveryCostRate にのみ作用し、確率は理想値固定
     問題: 部分導入では脆弱性も部分残存するべきなのに侵害確率は常に理想 (3.9%) になる
     新: AS-IS と理想 TO-BE を networksSCF / dataSCF で線形補間
         SCF=1.0 → 理想 toBe_vulnCoeff、SCF=0.0 → AS-IS まで戻る
     ※ MAAZ 連携時は STATE.toBe_vulnCoeff が既にスコープ補正済の effectiveCoverage 値だが、
       MAAZ 未連携 (maazFallbackSCF=0.5) や手動入力時にも一貫した連動を保証する */
  const eff_toBe_vulnCoeff_cyber =
      (S.maazEffectiveCoverage && typeof S.maazEffectiveCoverage.toBeVulnCoeffEffective === 'number')
        ? S.toBe_vulnCoeff   /* MAAZ 連携時: 既に SCF 補正済値を使用 (旧挙動を維持) */
        : (S.toBe_vulnCoeff_ideal + (S.vulnCoeff - S.toBe_vulnCoeff_ideal) * (1 - networksSCF));
  const eff_toBe_dlpVulnCoeff =
      (S.maazEffectiveCoverage && typeof S.maazEffectiveCoverage.toBeVulnCoeffEffective === 'number')
        ? S.toBe_dlpVulnCoeff
        : (S.toBe_dlpVulnCoeff_ideal + (S.dlpVulnCoeff - S.toBe_dlpVulnCoeff_ideal) * (1 - dataSCF));
  const cyberProb_tobe = S.baseRisk + S.cyberRiskMax * eff_toBe_vulnCoeff_cyber;
  const dlpProb_tobe = S.baseRisk + S.dlpRiskMax * eff_toBe_dlpVulnCoeff;

  const hardSec = secTotal * (S.secReduction / 100);
  const hardHW = S.hwCost * (S.hwReduction / 100);
  const hardMPLS = nwTotal * (S.mplsReduction / 100);
  const hardRack = S.rackCost * (S.rackReduction / 100);
  const hardTotal = hardSec + hardHW + hardMPLS + hardRack;

  const opexPolicy = S.opexPolicyStaff * S.opexPolicyHours * 12 * S.adminHourly * (S.opexPolicyReduction / 100);
  const opexSoc = S.opexSocCost * (S.opexSocReduction / 100);
  const opexOutsource = S.opexOutsourceCost * (S.opexOutsourceReduction / 100);
  const opexTrouble = S.opexTroubleStaff * S.opexTroubleHours * 12 * S.adminHourly * (S.opexTroubleReduction / 100);
  const opexVpn = S.opexVpnStaff * S.opexVpnHours * 12 * S.adminHourly * (S.opexVpnReduction / 100);
  const opexPatch = S.opexPatchStaff * S.opexPatchHours * 12 * S.adminHourly * (S.opexPatchReduction / 100);
  const opexTotal = opexPolicy + opexSoc + opexOutsource + opexTrouble + opexVpn + opexPatch;

  const prodLatency = (S.prodLatencyMin / 60) * S.users * S.workDays * S.staffHourly * (S.prodLatencyReduction / 100) * (S.productivityCoeff / 100);
  const prodLogin = (S.prodLoginMin / 60) * S.users * S.workDays * S.staffHourly * (S.prodLoginReduction / 100) * (S.productivityCoeff / 100);
  const prodTotal = prodLatency + prodLogin;

  /* === Blast Radius (v1.1 SCF連動) ===
     Networks柱のSCFに応じて、被害影響範囲の縮小効果を減衰させる。
     SCF=1.0 なら理想値まで縮小、SCF=0.33（部分導入）ならほぼAS-IS近辺。
     たかさんのMGA思想 IF(flatNet=1, 全社, 5%) の連続値拡張。
     Networks柱のSCF がマイクロセグメンテーションの実効度を決める。 */
  /* v1.5.0 (QA Audit C3 fix): MAAZ未連携時の SCF フォールバックを 1.0 → maazFallbackSCF (default 0.5) に変更
     監査根拠: 「連携なき ROI に理想スコープ仮定を埋め込まない」保守主義原則 */
  const _scfFallback = (S.maazFallbackSCF != null) ? S.maazFallbackSCF : 0.5;
  const networksSCF = (S.maazEffectiveCoverage && S.maazEffectiveCoverage.byPillar &&
                       S.maazEffectiveCoverage.byPillar["Networks"])
                      ? S.maazEffectiveCoverage.byPillar["Networks"].scf : _scfFallback;
  /* v1.1.4 fix (FIX-2): DLP 被害率は Data 柱の SCF で補正すべき
     旧: eff_toBe_dlpDamageRate = f(networksSCF)
     問題: DLP は Data 柱の事象 (データ分類・DLPポリシー・暗号化)
     新: Data 柱の SCF を使用。Chubu 例では Data SCF=0.5 のため DLP リスクがより正直に出る */
  const dataSCF = (S.maazEffectiveCoverage && S.maazEffectiveCoverage.byPillar &&
                   S.maazEffectiveCoverage.byPillar["Data"])
                  ? S.maazEffectiveCoverage.byPillar["Data"].scf : _scfFallback;

  // impactRate: AS-IS 20% → TO-BE 2% への縮小を SCF で減衰
  const eff_toBe_impactRate = S.impactRate - (S.impactRate - S.toBe_impactRate) * networksSCF;
  // affectedUsers: 全社 → TO-BE値 への縮小を SCF で減衰（※prodLoss計算の参考値、直接は未使用）
  const eff_toBe_affectedUsers = S.users - (S.users - S.toBe_affectedUsers) * networksSCF;
  // recoveryCostRate: 100% → TO-BE(30%) への縮小を SCF で減衰
  const eff_toBe_recoveryCostRate = 1.0 - (1.0 - S.toBe_recoveryCostRate) * networksSCF;
  // DLPのダメージ率: 100% → toBe_dlpDamageRate への縮小を Data柱SCF で減衰 (v1.1.4 fix)
  const eff_toBe_dlpDamageRate = 1.0 - (1.0 - S.toBe_dlpDamageRate) * dataSCF;

  const toBe_revLoss = dailyRev * S.downDays * eff_toBe_impactRate;
  /* BUG FIX v1.1.1: toBe_prodLoss を AS-IS baseline からの線形補間で計算。
     旧実装: eff_affectedUsers × staffHourly × 8 × downDays（impactRate 欠落）
     → SCF低い時に TO-BE prodLoss が AS-IS prodLoss より大きくなる逆転バグ。
     新実装: SCF=0 なら AS-IS と同値、SCF=1 なら toBe_affectedUsers×労働ベース となる補間。

     BUG FIX v1.3.3 (Bug #7): prodLoss_toBeTarget に物理的上限を設定。
     問題: AS-IS 側は users × impactRate で「期待影響人数」を計算するが、
           TO-BE 側は toBe_affectedUsers をそのまま使う非対称性があり、
           小規模組織 (users=200, impactRate=0.2 で期待影響40人) では
           デフォルト toBe_affectedUsers=500 がベースラインを超える。
           結果として riskCyberSaved が負になる現象が発生した。
     修正: マイクロセグメンテーションによる被害局所化が AS-IS より悪化
           することは物理的にあり得ないので、AS-IS ベースラインを上限とする。
           影響範囲: users < 約2500 の小・中規模組織で過小評価されていた ROI を是正。 */
  const prodLoss_asisBase = S.users * S.staffHourly * 8 * S.downDays * S.impactRate;  // = AS-IS prodLoss
  const prodLoss_toBeTargetRaw = S.toBe_affectedUsers * S.staffHourly * 8 * S.downDays; // マイクロセグメ局所化後の被害
  const prodLoss_toBeTarget = Math.min(prodLoss_asisBase, prodLoss_toBeTargetRaw);      // v1.3.3: 物理的上限
  const toBe_prodLoss = prodLoss_asisBase - (prodLoss_asisBase - prodLoss_toBeTarget) * networksSCF;
  const toBe_damageB = toBe_revLoss + toBe_prodLoss;
  const riskCyber_asis = (damageB + damageC) * cyberProb_asis;
  const riskCyber_tobe = (toBe_damageB + damageC * eff_toBe_recoveryCostRate) * cyberProb_tobe;
  const riskCyberSaved = riskCyber_asis - riskCyber_tobe;
  const riskDLP_asis = (damageD + ipValue_eff) * dlpProb_asis;
  const riskDLP_tobe = (damageD + ipValue_eff) * eff_toBe_dlpDamageRate * dlpProb_tobe;
  const riskDLPSaved = riskDLP_asis - riskDLP_tobe;
  const riskTotal = riskCyberSaved + riskDLPSaved;

  const investTotal = S.investZscaler + S.investSI + S.investOps + S.investLBO + S.investOther;

  /* v1.1.4 fix (FIX-4): 理想シナリオ (スコープ 100% = SCF=1.0 想定) の ROI も計算
     旧: cyberProb_tobe_ideal / dlpProb_tobe_ideal は定義されていたが riskSaved 計算に未反映
         → Results 画面で Best-case を提示できなかった
     新: ideal 経路の risk saved / benefit / ROI を並行計算し、UI で「現実 vs 理想」対比可能にする */
  // 理想: SCF=1.0 なので全ての eff_* が toBe_* ターゲット値に到達
  const ideal_toBe_impactRate     = S.toBe_impactRate;
  const ideal_toBe_recoveryRate   = S.toBe_recoveryCostRate;
  const ideal_toBe_dlpDamageRate  = S.toBe_dlpDamageRate;
  const ideal_toBe_revLoss        = dailyRev * S.downDays * ideal_toBe_impactRate;
  /* v1.3.3 Bug #7 fix: ideal シナリオでも AS-IS ベースラインを物理的上限とする */
  const ideal_toBe_prodLoss       = Math.min(prodLoss_asisBase,
                                             S.toBe_affectedUsers * S.staffHourly * 8 * S.downDays);
  const ideal_toBe_damageB        = ideal_toBe_revLoss + ideal_toBe_prodLoss;
  const ideal_riskCyber_tobe      = (ideal_toBe_damageB + damageC * ideal_toBe_recoveryRate) * cyberProb_tobe_ideal;
  const ideal_riskCyberSaved      = riskCyber_asis - ideal_riskCyber_tobe;
  const ideal_riskDLP_tobe        = (damageD + ipValue_eff) * ideal_toBe_dlpDamageRate * dlpProb_tobe_ideal;
  const ideal_riskDLPSaved        = riskDLP_asis - ideal_riskDLP_tobe;
  const ideal_riskTotal           = ideal_riskCyberSaved + ideal_riskDLPSaved;
  const ideal_theoreticalBenefit  = hardTotal + opexTotal + prodTotal + ideal_riskTotal;
  const ideal_theoreticalROI      = ideal_theoreticalBenefit - investTotal;
  const ideal_roiPct              = investTotal > 0 ? (ideal_theoreticalROI / investTotal) * 100 : 0;

  const theoreticalBenefit = hardTotal + opexTotal + prodTotal + riskTotal;
  const theoreticalROI = theoreticalBenefit - investTotal;
  const roiPct = investTotal > 0 ? (theoreticalROI / investTotal) * 100 : 0;
  /* v1.3.7: 確定便益 (リスク期待値を除く) を明示的に保持。KPI Cards のストーリー表示に使用 */
  const basicBenefit = hardTotal + opexTotal + prodTotal;
  const basicNetProfit = basicBenefit - investTotal;
  const basicROI_pct = investTotal > 0 ? (basicNetProfit / investTotal) * 100 : 0;

  /* v1.3.2: Forg 本来の式に準拠した組織摩擦係数
   * Forg Journey v4.3 の定義:
   *   F_org = (S × L) / (C × L')
   *   分子: 縦割り × レガシー (摩擦増加要因の積)
   *   分母: 危機感 × 変革意志 (摩擦減少要因の積)
   *
   * 【乗算モデルの意味】
   *   - S または L の一方がゼロなら分子ゼロ → 摩擦なし
   *     (縦割りがなければレガシーがあっても摩擦にならない、逆も然り)
   *   - C または L' の一方がゼロなら分母ゼロ → 摩擦無限大
   *     (危機感だけあっても変革意志がなければ変革進まず、逆も然り)
   *   - 加重平均の線形モデルでは表現できない「相互作用」が本質
   *
   * 【0-1 正規化 (sigmoid)】
   *   F_01 = F_org / (1 + F_org)
   *   Forg=0 (最良) → F=0, Forg=1 (中立) → F=0.5, Forg→∞ (最悪) → F→1
   */
  const computeFriction = () => {
    if (!S.forgLoaded) {
      /* v1.5.0 (QA Audit C4 fix): Forg未連携時に F=0 で便益 100% 実現を仮定するのは
       * 監査上不当。業界平均 0.4 を保守的デフォルトとして採用し、UI でもその旨を表示する */
      const fallbackF = (S.forgFallbackFriction != null) ? S.forgFallbackFriction : 0.4;
      return { F: fallbackF, Forg_raw: null, source: 'industry-default' };
    }
    const epsilon = S.forgFrictionEpsilon ?? 0.01;
    const numerator   = S.forgS * S.forgL;
    const denominator = Math.max(epsilon, S.forgC * S.forgLp);
    const Forg_raw = numerator / denominator;
    const F = Forg_raw / (1 + Forg_raw);  // sigmoid 正規化
    return {
      F: Math.max(0, Math.min(1, F)),
      Forg_raw,
      source: 'forg-formula',
      numerator, denominator
    };
  };

  let attHard, attOpex, attProd, attRisk, frictionF, frictionSource, frictionForg_raw;
  if (S.useUnifiedFriction !== false){
    // v1.3.2: Forg 本来の式で単一摩擦係数 F を算出、全カテゴリに一律適用
    const fr = computeFriction();
    frictionF = fr.F;
    frictionForg_raw = fr.Forg_raw;
    frictionSource = fr.source;
    const attAll = 1 - frictionF;
    attHard = attAll; attOpex = attAll; attProd = attAll; attRisk = attAll;
  } else {
    /* 旧モデル (v1.2.x) — useUnifiedFriction=false の場合のみ使用 */
    attHard = S.forgLoaded ? (1 - S.alphaL * S.forgL)     : 1.0;
    attOpex = S.forgLoaded ? (1 - S.betaS  * S.forgS)     : 1.0;
    attProd = S.forgLoaded ? (1 - S.gammaC * (1 - S.forgC))  : 1.0;
    attRisk = S.forgLoaded ? (1 - S.deltaLp* (1 - S.forgLp)) : 1.0;
    frictionF = null;
    frictionForg_raw = null;
    frictionSource = 'legacy';
  }

  const effHard = hardTotal * attHard;
  const effOpex = opexTotal * attOpex;
  const effProd = prodTotal * attProd;
  const effRisk = riskTotal * attRisk;
  const effectiveBenefit = effHard + effOpex + effProd + effRisk;
  const effectiveROI = effectiveBenefit - investTotal;
  const effROI_pct = investTotal > 0 ? (effectiveROI / investTotal) * 100 : 0;

  const frictionCost = theoreticalROI - effectiveROI;
  const netInvestment = investTotal - hardTotal;
  const costReductionBenefit = effHard + effOpex + effProd;
  const paybackMonths = costReductionBenefit > 0 ? (investTotal / costReductionBenefit) * 12 : Infinity;
  const dailyFrictionLoss = frictionCost / S.workDays;

  /* ═══════════════════════════════════════════════════════════════════
     v1.2.0: 2年 Transformation モデル (ISSUE-5〜7 対応)
     ─────────────────────────────────────────────────────────────────
     前提: 経営が想定する Transformation 回収期間は 2 年以内
           3年目以降は業務/脅威環境変化で前提が陳腐化するため評価外
     ランプアップ: 1年目 50% (rampYear1), 2年目 100% (rampYear2)
     投資分類:
       - oneshot (SI/LBO/Other): 1年目のみ全額計上
       - recurring (Zscaler SaaS/Ops): 毎年計上
     v1.3.1: NPV 割引を削除 (2年短期なら割引は実務的にノイズ、WACC は企業固有値)
             代わりに 2年累計 CF (cumulativeCF_y2) を主指標化
     ═══════════════════════════════════════════════════════════════════ */
  // 投資を年度別に分解
  const investOneshot  = (S.investClass?.investSI     === 'oneshot'    ? S.investSI     : 0)
                       + (S.investClass?.investLBO    === 'oneshot'    ? S.investLBO    : 0)
                       + (S.investClass?.investOther  === 'oneshot'    ? S.investOther  : 0)
                       + (S.investClass?.investZscaler=== 'oneshot'    ? S.investZscaler: 0)
                       + (S.investClass?.investOps    === 'oneshot'    ? S.investOps    : 0);
  const investRecurring = (S.investClass?.investSI     === 'recurring' ? S.investSI     : 0)
                        + (S.investClass?.investLBO    === 'recurring' ? S.investLBO    : 0)
                        + (S.investClass?.investOther  === 'recurring' ? S.investOther  : 0)
                        + (S.investClass?.investZscaler=== 'recurring' ? S.investZscaler: 0)
                        + (S.investClass?.investOps    === 'recurring' ? S.investOps    : 0);
  const invest_y1 = investOneshot + investRecurring;   // 1年目: 一時金+年次両方
  const invest_y2 = investRecurring;                    // 2年目: 年次のみ
  const invest_2y = invest_y1 + invest_y2;

  // 便益 (単年満額) — ランプアップ前の年額
  const annualBenefitFull = effectiveBenefit;
  const benefit_y1 = annualBenefitFull * (S.rampYear1 ?? 0.5);
  const benefit_y2 = annualBenefitFull * (S.rampYear2 ?? 1.0);
  const benefit_2y = benefit_y1 + benefit_y2;

  // 正味キャッシュフロー (年次)
  const netCF_y1 = benefit_y1 - invest_y1;
  const netCF_y2 = benefit_y2 - invest_y2;
  const cumulativeCF_y1 = netCF_y1;
  const cumulativeCF_y2 = netCF_y1 + netCF_y2;

  /* v1.3.1: NPV 計算を削除
   * 2 年短期評価で割引率を効かせる意味は薄く、WACC は企業固有値のため
   * ツール側で勝手に決めるべきではない。代わりに 2年累計 CF (cumulativeCF_y2) を
   * 主指標として UI に表示する。 */

  // 2年累積 ROI
  const roi2y_pct = invest_2y > 0 ? (benefit_2y - invest_2y) / invest_2y * 100 : 0;

  /* === v1.5.0 (QA Audit C2 fix): Payback 月数の定義統一 ===
     旧 payback2yMonths は effectiveBenefit (= Hard+OpEx+Prod+Risk) を分母に使っていたが、
     Risk 削減額は確率×被害の期待値であり実現キャッシュではない。
     回収月数の保守主義原則 (現金フローのみ) と legacy paybackMonths との整合性のため、
     payback2yMonths も costReductionBenefit (Hard+OpEx+Prod、リスク除外) を基準に再定義。
     旧定義の参照値は payback2yMonths_riskInclusive に保持。 */
  const cashBenefit_y1 = costReductionBenefit * (S.rampYear1 ?? 0.5);
  const cashBenefit_y2 = costReductionBenefit * (S.rampYear2 ?? 1.0);
  const cashCF_y1 = cashBenefit_y1 - invest_y1;
  const cashCF_y2 = cashBenefit_y2 - invest_y2;
  const cashCumulCF_y1 = cashCF_y1;
  const cashCumulCF_y2 = cashCF_y1 + cashCF_y2;

  // 正確な Payback 期間 (単位: 月、2年=24ヶ月でキャップ) — Cash-only 基準 (v1.5.0)
  let payback2yMonths;
  if (cashCF_y1 >= 0 && cashCumulCF_y1 >= 0) {
    payback2yMonths = (cashBenefit_y1 / 12) > 0 ? Math.min(24, invest_y1 / (cashBenefit_y1 / 12)) : Infinity;
  } else if (cashCumulCF_y2 >= 0) {
    const remaining = -cashCumulCF_y1;
    const monthlyCashCF_y2 = (cashBenefit_y2 - invest_y2) / 12;
    payback2yMonths = 12 + (monthlyCashCF_y2 > 0 ? remaining / monthlyCashCF_y2 : 12);
    payback2yMonths = Math.min(24, payback2yMonths);
  } else {
    payback2yMonths = Infinity;
  }
  // 参考値: 旧定義 (Risk 含む期待値ベース)。監査トレース用。
  let payback2yMonths_riskInclusive;
  if (netCF_y1 >= 0 && cumulativeCF_y1 >= 0) {
    payback2yMonths_riskInclusive = (benefit_y1 / 12) > 0 ? Math.min(24, invest_y1 / (benefit_y1 / 12)) : Infinity;
  } else if (cumulativeCF_y2 >= 0) {
    const remaining = -cumulativeCF_y1;
    const monthlyNetCF_y2 = (benefit_y2 - invest_y2) / 12;
    payback2yMonths_riskInclusive = 12 + (monthlyNetCF_y2 > 0 ? remaining / monthlyNetCF_y2 : 12);
    payback2yMonths_riskInclusive = Math.min(24, payback2yMonths_riskInclusive);
  } else {
    payback2yMonths_riskInclusive = Infinity;
  }

  // ISSUE-5: 期待値モデル限界表示用データ
  // 「2年間のリスク削減は期待値であり、実被害は発生/非発生」を明示
  const probAsIs2y = 1 - Math.pow(1 - cyberProb_asis, 2); // 2年間に少なくとも1回発生する確率
  const probToBe2y = 1 - Math.pow(1 - cyberProb_tobe, 2);
  const riskBenefit_2y_expected = riskTotal * (S.rampYear1 + S.rampYear2); // 期待値

  };
}

/* ==== ROI WATERFALL (6-category dual bar: theoretical vs effective) ==== */
function buildROIWaterfallSVG(R){
  const oku = x => x / 1e8;
  // Series: [label, theoretical, effective, color-var, isSolo (single bar), isStriped, solidColor]
  const cats = [
    { lb:'Hard Cost', sub:'削減',    th: oku(R.hardTotal),        ef: oku(R.effHard),       c:'var(--c-hard)' },
    { lb:'OpEx',      sub:'削減',    th: oku(R.opexTotal),        ef: oku(R.effOpex),       c:'var(--c-opex)' },
    { lb:'生産性',    sub:'向上',    th: oku(R.prodTotal),        ef: oku(R.effProd),       c:'var(--c-prod)' },
    { lb:'リスク',    sub:'回避',    th: oku(R.riskTotal),        ef: oku(R.effRisk),       c:'var(--c-risk)' },
    { lb:'摩擦',      sub:'コスト',  th: null,                    ef: oku(R.frictionCost),  c:'var(--warn)', striped: true },
    { lb:'実効ROI',   sub:'',        th: oku(R.theoreticalROI),   ef: oku(R.effectiveROI),  c:'var(--ink-0)' },
  ];
  const w = 1000, h = 360;
  const padT = 40, padB = 80, padL = 36, padR = 20;
  const innerW = w - padL - padR;
  const innerH = h - padT - padB;
  const slotW = innerW / cats.length;
  const barW = 34, gap = 6, pairW = barW * 2 + gap;
  const values = cats.flatMap(c => [c.th, c.ef].filter(v => v != null));
  const maxV = Math.max(0, ...values);
  const minV = Math.min(0, ...values);
  const range = (maxV - minV) || 1;
  const scale = innerH / range;
  const baseY = padT + maxV * scale;
  const toY = v => baseY - v * scale;
  const fmtV = v => {
    const a = Math.abs(v);
    if (a >= 1) return v.toFixed(1) + '億';
    if (a >= 0.01) return (v * 10000).toFixed(0) + '万';
    return '—';
  };
  const bars = cats.map((c, i) => {
    const slotX = padL + slotW * i;
    const cx = slotX + slotW / 2;
    const singleBar = c.th == null;
    const xTh = singleBar ? cx - barW / 2 : cx - pairW / 2;
    const xEf = singleBar ? xTh : xTh + barW + gap;
    let html = '';
    if (!singleBar){
      const y0 = toY(0), yT = toY(c.th);
      const yTop = Math.min(y0, yT), hT = Math.max(2, Math.abs(yT - y0));
      const lyT = yT < y0 ? yTop - 6 : yTop + hT + 14;
      html += `<rect x="${xTh}" y="${yTop}" width="${barW}" height="${hT}" rx="2" fill="${c.c}" fill-opacity="0.32"/>`;
      html += `<text x="${xTh + barW/2}" y="${lyT}" text-anchor="middle" font-family="var(--font-mono)" font-size="11" font-weight="500" fill="var(--ink-3)">${fmtV(c.th)}</text>`;
    }
    const y0 = toY(0), yE = toY(c.ef);
    const yTopE = Math.min(y0, yE), hE = Math.max(2, Math.abs(yE - y0));
    const lyE = yE < y0 ? yTopE - 6 : yTopE + hE + 14;
    const fillE = c.striped ? 'url(#friction-stripes)' : c.c;
    html += `<rect x="${xEf}" y="${yTopE}" width="${barW}" height="${hE}" rx="2" fill="${fillE}"/>`;
    html += `<text x="${xEf + barW/2}" y="${lyE}" text-anchor="middle" font-family="var(--font-mono)" font-size="12" font-weight="600" fill="${c.c}">${fmtV(c.ef)}</text>`;
    // Label
    const lbY = padT + innerH + 24;
    html += `<text x="${cx}" y="${lbY}" text-anchor="middle" font-family="var(--font-jp)" font-size="12" font-weight="500" fill="var(--ink)">${c.lb}</text>`;
    if (c.sub) html += `<text x="${cx}" y="${lbY + 16}" text-anchor="middle" font-family="var(--font-jp)" font-size="11" fill="var(--ink-3)">${c.sub}</text>`;
    return html;
  }).join('');
  // Baseline
  const baseline = `<line x1="${padL}" y1="${baseY}" x2="${w - padR}" y2="${baseY}" stroke="var(--line-2)" stroke-width="1" stroke-dasharray="3,3"/>`;
  const defs = `<defs>
    <pattern id="friction-stripes" patternUnits="userSpaceOnUse" width="8" height="8" patternTransform="rotate(45)">
      <rect width="8" height="8" fill="var(--warn)" fill-opacity="0.18"/>
      <line x1="0" y1="0" x2="0" y2="8" stroke="var(--warn)" stroke-width="3"/>
    </pattern>
  </defs>`;
  const legendHtml = `<div style="display:flex;justify-content:flex-end;gap:18px;padding:0 8px 12px 8px;font-family:var(--font-mono);font-size:10px;color:var(--ink-3);letter-spacing:.08em">
    <span style="display:inline-flex;align-items:center;gap:6px"><span style="display:inline-block;width:14px;height:10px;background:var(--ink-3);opacity:.32;border-radius:1px"></span>薄 = 理論</span>
    <span style="display:inline-flex;align-items:center;gap:6px"><span style="display:inline-block;width:14px;height:10px;background:var(--ink);border-radius:1px"></span>濃 = 実効</span>
  </div>`;
  const svg = `<svg viewBox="0 0 ${w} ${h}" preserveAspectRatio="xMidYMid meet" width="100%" style="display:block">${defs}${baseline}${bars}</svg>`;
  return legendHtml + svg;
}

/* ==== WATERFALL SVG (dual-layer: theoretical ghost + effective solid) ==== */
function buildWaterfallSVG(R, w, h){
  const investOku = R.investTotal / 1e8;
  const hardOku = R.effHard / 1e8;
  const opexOku = R.effOpex / 1e8;
  const prodOku = R.effProd / 1e8;
  const netOku = investOku - hardOku - opexOku - prodOku;
  const barW = w * 0.12, labelH = 28, topPad = 34;
  const cumVals = [
    [0, investOku],
    [investOku, investOku - hardOku],
    [investOku - hardOku, investOku - hardOku - opexOku],
    [investOku - hardOku - opexOku, netOku],
    [0, netOku],
  ];
  const colors = [
    ['var(--primary)','var(--primary)'],
    ['var(--c-hard)','var(--c-hard)'],
    ['var(--c-opex)','var(--c-opex)'],
    ['var(--c-prod)','var(--c-prod)'],
    [netOku <= 0 ? 'var(--trust)' : 'var(--danger)', netOku <= 0 ? 'var(--trust)' : 'var(--danger)'],
  ];
  const labels = ['ZT投資','固定資産↓','運用コスト↓','生産性↓','実質負担'];
  const allV = [...cumVals.flat(), 0];
  const maxV = Math.max(...allV), minV = Math.min(...allV);
  const usableH = h - labelH - topPad;
  const scale = usableH / ((maxV - minV) || 1);
  const base = topPad + maxV * scale;
  const gapW = (w - 5 * barW) / 6;
  const barX = i => gapW + i * (barW + gapW);
  const toY = v => base - v * scale;
  const bars = cumVals.map(([v0, v1], i) => {
    const x = barX(i), bx = x + barW / 2;
    const yTop = Math.min(toY(v0), toY(v1));
    const bh = Math.max(Math.abs(toY(v1) - toY(v0)), 2);
    const valStr = Math.abs(v1 - v0).toFixed(1) + '億';
    const rawLY = (i % 2 === 0) ? yTop - 6 : yTop - 18;
    const vLY = Math.max(rawLY, 12);
    const conn = i < 3
      ? `<line x1="${x+barW}" y1="${toY(v1)}" x2="${barX(i+1)}" y2="${toY(v1)}" stroke="var(--line-2)" stroke-width="1" stroke-dasharray="3,2"/>`
      : '';
    return conn +
      `<rect x="${x}" y="${yTop}" width="${barW}" height="${bh}" rx="3" fill="${colors[i][0]}"/>` +
      `<text x="${bx}" y="${vLY}" text-anchor="middle" fill="${colors[i][0]}" font-size="10" font-weight="600" font-family="var(--font-mono)">${valStr}</text>` +
      `<text x="${bx}" y="${h - labelH + 14}" text-anchor="middle" fill="var(--ink-3)" font-size="9" font-family="var(--font-jp)">${labels[i]}</text>`;
  }).join('');
  return `<svg viewBox="0 0 ${w} ${h}" width="100%" style="max-width:${w}px">
    <line x1="0" y1="${base}" x2="${w}" y2="${base}" stroke="var(--line-2)" stroke-width="1.5" stroke-dasharray="4,3"/>
    <text x="4" y="${base - 3}" fill="var(--ink-4)" font-size="8" font-family="var(--font-mono)">0</text>
    ${bars}
  </svg>`;
}

/* ==== v1.2.2: MAAZ Actions card builder — 参考情報のみ表示 ====

 *   MAAZ 推奨アクション自体はパートナーとの見積もり調整材料として有用なので
 *   read-only の参考リストとして残す。 */
function buildMaazActionsCard(){
  if (!STATE.maazLoaded || !STATE.maazActions || STATE.maazActions.length === 0){
    return '';
  }
  const actions = STATE.maazActions;
  const priorityLabels = { critical:'Critical', high:'High', medium:'Medium' };
  const phaseLabels    = { 'quick-win':'Quick Win', 'short-term':'Short-Term', strategic:'Strategic' };

  const rowsHtml = actions.map((a) => {
    const prio = priorityLabels[a.priority] || a.priority;
    const phase = phaseLabels[a.phase] || a.phase;
    return `<div class="maaz-action-item ref-only">
      <div class="maaz-action-pillar">${a.pillar}</div>
      <div class="maaz-action-desc">${a.desc || '(説明なし)'}<span class="lv">Lv${a.fromLv}→${a.toLv} · ${phase}</span></div>
      <div class="maaz-action-priority ${a.priority}">${prio}</div>
    </div>`;
  }).join('');

  return `
    <div class="maaz-actions-card reveal">
      <div class="maaz-actions-head">
        <div>
          <div class="ti">✦ MAAZ 推奨アクション (${actions.length}件) — 参考情報</div>
          <div class="sub">パートナー見積もり取得時のスコープ確認材料として活用。金額入力は下の投資カテゴリへ。</div>
        </div>
      </div>
      <div class="maaz-actions-body">${rowsHtml}</div>
    </div>`;
}

/* ==== v1.1.5 (⑥): Evidence banner — provenance indicator ====
   4 modes based on (maazLoaded × forgLoaded):
   - self   : neither linked — pure self-reported inputs
   - maaz   : only MAAZ linked — ATT&CK-based vuln coefficients
   - forg   : only Forg linked — organizational friction model
   - linked : both linked — fully integrated (ideal state) */
function buildEvidenceBanner(){
  const m = STATE.maazLoaded, f = STATE.forgLoaded;
  let mode, title, detail;
  if (m && f){
    mode = 'linked';
    const cn = STATE.customer || '(顧客名未設定)';
    const maazSid = STATE.sourceSessions?.maaz || '—';
    const forgSid = STATE.sourceSessions?.forg || '—';
    title = `統合評価 — ${cn}`;
    detail = `MAAZ (ATT&CK実測) と Forg (組織摩擦モデル) の両方が連携済み。数値は客観的 assessment ベース。<code>maaz:${maazSid}</code> <code>forg:${forgSid}</code>`;
  } else if (m && !f){
    mode = 'maaz';
    const cn = STATE.customer || '(顧客名未設定)';
    const maazSid = STATE.sourceSessions?.maaz || '—';
    title = `MAAZ 連携のみ — ${cn}`;
    detail = `脆弱性係数は ATT&CK 実測ベース。ただし Forg が未連携のため、便益の実現率は手入力値（S/L/C/Lp）が採用されています。<code>maaz:${maazSid}</code>`;
  } else if (!m && f){
    mode = 'forg';
    const cn = STATE.customer || '(顧客名未設定)';
    const forgSid = STATE.sourceSessions?.forg || '—';
    title = `Forg 連携のみ — ${cn}`;
    detail = `組織摩擦モデルは客観的な assessment ベース。ただし MAAZ が未連携のため、脆弱性係数は手入力値が採用されています。<code>forg:${forgSid}</code>`;
  } else {
    mode = 'self';
    title = `自己申告ベース — データ未連携`;
    detail = `MAAZ と Forg の両方が未連携です。全ての数値は手入力で、客観的 assessment の裏付けがありません。Chapter 00 の「外部データ連携」から JSON を読込むと evidence が差し替わります。`;
  }
  const iconLetter = { self:'—', maaz:'M', forg:'F', linked:'✓' }[mode];
  return `
    <div class="evidence-banner reveal" data-mode="${mode}">
      <div class="ev-icon">${iconLetter}</div>
      <div class="ev-body">
        <div class="ev-title">${title}</div>
        <div class="ev-detail">${detail}</div>
      </div>
    </div>`;
}

/* ==== v1.1.3: MITRE ATT&CK basis banner (Probability section) ==== */
function buildMitreBasisBanner(R){
  if (!STATE.maazLoaded || STATE.maazNewlyMitigated == null || STATE.maazThreatTotal == null){
    return '';
  }
  const newly = STATE.maazNewlyMitigated;
  const total = STATE.maazThreatTotal;
  if (total === 0) return '';
  const mitigationRate = newly / total;  // 0.0..1.0
  const cyberReduction_pt = (R.cyberProb_asis - R.cyberProb_tobe) * 100; // percentage points
  const cyberReduction_rel = (R.cyberProb_asis > 0) ? ((R.cyberProb_asis - R.cyberProb_tobe) / R.cyberProb_asis) * 100 : 0;
  return `
    <div class="mitre-basis-banner reveal">
      <div class="icon">M</div>
      <div class="body">
        <div class="ti">MITRE ATT&amp;CK 実測根拠 — 確率低減の算定基準</div>
        <div class="detail">
          MAAZ の Assessment から得られた <code>newlyMitigated = ${newly}</code> / <code>total = ${total}</code> 技法（緩和率 <strong>${(mitigationRate*100).toFixed(1)}%</strong>）を、本ツールの <code>vulnCoeff</code> (AS-IS) ～ <code>toBe_vulnCoeff</code> (TO-BE) の差分に反映。結果として Cyber 被弾確率は <strong>${fmtPct(R.cyberProb_asis)}</strong> → <strong>${fmtPct(R.cyberProb_tobe)}</strong>（相対 ${cyberReduction_rel.toFixed(1)}% 減）と算定されています。この数値は自己申告ではなく、ATT&amp;CK テクニック単位のカバレッジ測定に基づきます。
        </div>
      </div>
    </div>`;
}

/* ==== TORNADO SENSITIVITY ==== */
function buildTornado(R){
  const baseROI = R.effectiveROI;

  /* === [A] 既存: Forg係数 + Invest系の感度 === */
  const coreVars = [
    {key:'vulnCoeff', label:'脆弱性係数 (AS-IS)'},
    {key:'forgS', label:"Forg S (サイロ度)"},
    {key:'forgL', label:"Forg L (レガシー)"},
    {key:'investZscaler', label:"ZT投資額"},
    {key:'secReduction', label:"セキュリティ削減率"},
  ];
  const coreResults = coreVars.map(v => {
    const orig = STATE[v.key];
    STATE[v.key] = orig * 0.8;
    const lowR = calc();
    STATE[v.key] = orig * 1.2;
    const highR = calc();
    STATE[v.key] = orig;
    return { label: v.label, low: lowR.effectiveROI - baseROI, high: highR.effectiveROI - baseROI };
  });

  /* === [B] ②拡張: MAAZ Pillar別感度 (load時のみ) ===
     各 pillar のスコープ網羅率 (SCF) を現在値 → bottleneck target (0.8) に
     改善した場合の ROI 増分を計算。他 pillar は不変。
     MAAZ は既に byPillar[p] = {scf, threatsAtTo, techniquesLost, ...} を持つので、
     Δ_vulnCoeff = (techniquesLost_current - techniquesLost_target) / effectiveCoverage.total
     として toBe_vulnCoeff を一時的に減少させ calc() を実行する。                    */
  let pillarResults = [];
  const ec = STATE.maazEffectiveCoverage;
  const TARGET_SCF = 0.80;  // MAAZ bottleneck が採用する閾値と整合
  if (STATE.maazLoaded && ec && ec.byPillar && ec.total){
    const PILLAR_ORDER = ['Identity','Devices','Networks','App & Workload','Data','Cross-Cutting'];
    PILLAR_ORDER.forEach(p => {
      const d = ec.byPillar[p];
      if (!d || d.threatsAtTo === 0) return;
      const gainScope = Math.max(0, TARGET_SCF - d.scf);
      if (gainScope < 0.001) return;  // 既に閾値以上の pillar は除外（無改善）
      // 技法数ベースでの緩和増分
      const techGain = d.threatsAtTo * gainScope;
      const deltaVuln = techGain / ec.total;
      // 一時的に toBe_vulnCoeff を改善させて calc
      const origToBe = STATE.toBe_vulnCoeff;
      STATE.toBe_vulnCoeff = Math.max(0.03, origToBe - deltaVuln);
      const improved = calc();
      STATE.toBe_vulnCoeff = origToBe;
      pillarResults.push({
        label: p,
        scf: d.scf,
        threatsAtTo: d.threatsAtTo,
        techGain: techGain,
        low: 0,                                        // "improvement only" 片側感度
        high: improved.effectiveROI - baseROI
      });
    });
    // 効果の大きい順に並べ替え（bottleneck が最上段）
    pillarResults.sort((a,b) => b.high - a.high);
  }

  const allDeltas = [
    ...coreResults.flatMap(r => [Math.abs(r.low), Math.abs(r.high)]),
    ...pillarResults.map(r => Math.abs(r.high))
  ];
  const maxDelta = Math.max(...allDeltas, 1);

  const buildRow = (r, oneSided) => {
    const left = Math.min(r.low, r.high);
    const right = Math.max(r.low, r.high);
    const leftW = Math.abs(Math.min(left, 0)) / maxDelta * 48;
    const rightW = Math.abs(Math.max(right, 0)) / maxDelta * 48;
    const leftStart = 50 - leftW;
    let leftBar = '', rightBar = '';
    if (leftW > 0.5) leftBar = `<div class="tornado-bar negative" style="left:${leftStart}%;width:${leftW}%">${leftW>=8?fmt(Math.round(left)):''}</div>`;
    if (rightW > 0.5) rightBar = `<div class="tornado-bar positive" style="left:50%;width:${rightW}%">${rightW>=8?'+'+fmt(Math.round(right)):''}</div>`;
    return `<div class="tornado-row">
      <div class="tornado-label">${r.label}</div>
      <div class="tornado-area">
        <div class="tornado-center"></div>
        ${leftBar}${rightBar}
      </div>
    </div>`;
  };

  const coreRowsHtml = coreResults.map(r => buildRow(r, false)).join('');

  /* Pillar感度セクションHTML */
  let pillarSection = '';
  if (pillarResults.length > 0){
    const bottleneckP = STATE.maazBottleneck?.pillar;
    const rowsHtml = pillarResults.map(r => {
      const isBn = r.label === bottleneckP;
      const labelHtml = isBn
        ? `<span class="pillar-sens-bn">${r.label}</span><span class="pillar-sens-tag">bottleneck</span>`
        : r.label;
      const left = Math.min(r.low, r.high);
      const right = Math.max(r.low, r.high);
      const leftW = Math.abs(Math.min(left, 0)) / maxDelta * 48;
      const rightW = Math.abs(Math.max(right, 0)) / maxDelta * 48;
      const leftStart = 50 - leftW;
      let leftBar = '', rightBar = '';
      if (leftW > 0.5) leftBar = `<div class="tornado-bar negative" style="left:${leftStart}%;width:${leftW}%">${leftW>=8?fmt(Math.round(left)):''}</div>`;
      if (rightW > 0.5) rightBar = `<div class="tornado-bar positive" style="left:50%;width:${rightW}%">${rightW>=8?'+'+fmt(Math.round(right)):''}</div>`;
      const detailHtml = `<span class="pillar-sens-detail">SCF ${(r.scf*100).toFixed(0)}%→${(TARGET_SCF*100).toFixed(0)}% · 緩和+${r.techGain.toFixed(1)}技法</span>`;
      return `<div class="tornado-row pillar-sens-row">
        <div class="tornado-label">${labelHtml}${detailHtml}</div>
        <div class="tornado-area">
          <div class="tornado-center"></div>
          ${leftBar}${rightBar}
        </div>
      </div>`;
    }).join('');
    pillarSection = `
      <div class="tornado-group-label">
        [B] MAAZ Pillar 投資感度 <span class="tornado-group-sub">各柱のスコープ網羅率を ${(TARGET_SCF*100).toFixed(0)}% まで引き上げた場合の ROI 改善幅</span>
      </div>
      <div class="tornado">${rowsHtml}</div>`;
  }

  const worstROI = coreResults.reduce((a, r) => a + Math.min(r.low, r.high), baseROI);
  const bestROI  = coreResults.reduce((a, r) => a + Math.max(r.low, r.high), baseROI);

  return `<div class="tornado-group-label">
      [A] 係数感度 (±20%)
    </div>
    <div class="tornado">${coreRowsHtml}</div>
    ${pillarSection}
    <div class="tornado-summary">
      <div><div class="lb">悲観 (全-20%)</div><div class="v danger num">${fmtYen(Math.round(worstROI))}</div></div>
      <div><div class="lb">ベースケース</div><div class="v num">${fmtYen(Math.round(baseROI))}</div></div>
      <div><div class="lb">楽観 (全+20%)</div><div class="v trust num">${fmtYen(Math.round(bestROI))}</div></div>
    </div>`;
}

/* v1.3.9: 生産性プリセット選択ヘルパー
 * selectProdScenario(code) で STATE の値を書き換え、選択中フラグを保存 */
function selectProdScenario(code){
  const s = PROD_SCENARIOS[code];
  if (!s) return;
  STATE.prodLatencyReduction = s.prodLatencyReduction;
  STATE.prodLoginReduction = s.prodLoginReduction;
  STATE.prodScenario = code;
  renderAll();
  showToast('✓ ' + s.hint);
}

/* v1.3.9: 現在の値からシナリオを逆引き。一致しなければ 'custom' */
function detectProdScenario(){
  for (const [k, s] of Object.entries(PROD_SCENARIOS)){
    if (STATE.prodLatencyReduction === s.prodLatencyReduction &&
        STATE.prodLoginReduction === s.prodLoginReduction){
      return k;
    }
  }
  return 'custom';
}

function renderAll(){
  /* v1.3.9: prodScenario が 'custom' かつ値がプリセットと一致すればプリセット名に戻す
   *         (JSON import 後や、手動で戻した場合に活性プリセットが点灯するように) */
  if (STATE.prodScenario === 'custom' || !STATE.prodScenario){
    const detected = detectProdScenario();
    if (detected !== 'custom') STATE.prodScenario = detected;
  } else {
    /* 現在のプリセット名が宣言されているが、値が一致しなくなっていれば 'custom' に落とす */
    const s = PROD_SCENARIOS[STATE.prodScenario];
    if (s && (s.prodLatencyReduction !== STATE.prodLatencyReduction ||
              s.prodLoginReduction !== STATE.prodLoginReduction)){
      STATE.prodScenario = 'custom';
    }
  }
  /* v1.3.8: 再描画時にスクロール位置とフォーカスを保存 → 復元
   * 背景: type=number の入力は v1.3.8 で onchange 化したため blur 時のみ再描画するが、
   *       テキスト入力など他のハンドラが renderAll() を呼んだ際に画面がジャンプする問題を
   *       二重保険として解消。
   * アプローチ:
   *   (1) 現在のスクロール位置 (window.scrollY) を保存
   *   (2) アクティブな要素 (input/textarea) の id または data-path を記録
   *   (3) 再描画後、setTimeout で スクロール位置を復元
   *   (4) 同じ id の要素があれば再フォーカス + caret 位置も復元 */
  const savedScrollY = window.scrollY;
  const active = document.activeElement;
  const activeInfo = (active && (active.tagName === 'INPUT' || active.tagName === 'TEXTAREA'))
    ? { id: active.id || null, selStart: active.selectionStart, selEnd: active.selectionEnd }
    : null;

  renderIntro();
  renderInputs();
  renderDamage();
  renderBenefits();
  renderInvestment();   /* v1.1.4 (⑤) new chapter 04 */
  renderDashboard();
  renderResults();
  renderLogic();        /* v1.1.4 (⑤) new chapter 07 */
  updateTop();

  /* スクロール位置の即時復元 (DOM 更新の同期的完了後) */
  window.scrollTo(0, savedScrollY);

  setTimeout(() => {
    observeReveals(document.querySelector('.view.on'));
    /* スクロール位置の再復元 (reveal アニメ等で高さが変わる対策) */
    if (Math.abs(window.scrollY - savedScrollY) > 2) {
      window.scrollTo(0, savedScrollY);
    }
    /* アクティブな入力欄にフォーカスと caret 位置を復元 */
    if (activeInfo && activeInfo.id) {
      const el = document.getElementById(activeInfo.id);
      if (el && (el.tagName === 'INPUT' || el.tagName === 'TEXTAREA')) {
        try {
          el.focus({ preventScroll: true });
          if (typeof activeInfo.selStart === 'number') {
            el.setSelectionRange(activeInfo.selStart, activeInfo.selEnd);
          }
        } catch(e) { /* some input types don't support selectionRange */ }
      }
    }
  }, 30);
}

function updateTop(){
  const R = calc();
  const el = document.getElementById('topRoiVal');
  if (el) el.textContent = R.effROI_pct.toFixed(0) + '%';
}
