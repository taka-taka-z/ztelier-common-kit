<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>F_org 組織摩擦診断 v4.3.0 | DXとセキュリティが連動しない理由を物理学的に診断する</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800;900&family=JetBrains+Mono:wght@500;700&display=swap" rel="stylesheet">
<style>
@import url('https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@300;400;500;600;700&family=Noto+Sans+JP:wght@300;400;500;700;900&display=swap');
:root{
  /* === Ztelier v1.1.0 Paper系トークン（v4.3.0でダーク→ライト全面移行） === */
  /* 背景階調：Paper(#F7F9FB) を基調に、より薄い/濃いバリアント */
  --bg-0:#F7F9FB;         /* ベース Paper */
  --bg-1:#FFFFFF;         /* カード背景（純白） */
  --bg-2:#EEF2F6;         /* 二次要素背景（薄グレー） */
  --bg-3:#E3E9F0;         /* 三次要素背景（やや濃いグレー） */
  /* ボーダー：Muted Stone 系の薄グレー */
  --border:#D4DAE2;
  --border-hi:#246CF7;    /* Primary Blue でフォーカス表現 */
  /* テキスト：Charcoal Ink 系 */
  --txt:#2A2D34;          /* 本文 */
  --txt2:#5A6270;         /* 二次テキスト */
  --txt3:#8A8F98;         /* 三次テキスト（Muted Stone） */
  /* アクセントカラー（意味符号としては維持、Paper背景で見える明度に調整） */
  --blue:#246CF7;         /* Ztelier Primary */
  --navy:#001744;         /* Ztelier Deep */
  --sage:#7BA05B;         /* Ztelier Accent（Forgアイコン色） */
  --cyan:#0891B2;         /* LP/Leadership：シアン系だがPaperで見える値 */
  --green:#4A7C59;        /* 成功/加速帯 */
  --yellow:#D97706;       /* L/Legacy：警告系オレンジ寄り */
  --orange:#EA580C;
  --red:#B91C1C;          /* S/Silo：Paperで映える赤 */
  --purple:#7C3AED;
  --pink:#BE185D;         /* C/Crisis：Paperで映える濃いピンク */
  --radius-sm:8px;--radius-md:12px;--radius-lg:16px;
  /* Shadows：Paperベースでは薄く */
  --shadow-card:0 1px 3px rgba(0,23,68,0.06), 0 1px 2px rgba(0,23,68,0.04);
  --shadow-elevated:0 4px 12px rgba(0,23,68,0.08), 0 2px 4px rgba(0,23,68,0.04);
  --shadow-glow-cyan:0 0 0 3px rgba(8,145,178,.10);
  --shadow-glow-red:0 0 0 3px rgba(185,28,28,.08);
  --shadow-glow-green:0 0 0 3px rgba(74,124,89,.08);
  --shadow-glow-yellow:0 0 0 3px rgba(217,119,6,.08);
  --transition-fast:.15s ease;--transition-normal:.25s ease;
}
*{margin:0;padding:0;box-sizing:border-box}
body{font-family:'Inter','メイリオ',Meiryo,'Noto Sans JP',sans-serif;background:var(--bg-0);color:var(--txt);min-height:100vh;line-height:1.7;font-size:16px}
.mono{font-family:'JetBrains Mono',monospace}
body::before{content:'';position:fixed;inset:0;background:none;
  pointer-events:none;z-index:0}
.app{position:relative;z-index:1;max-width:1200px;margin:0 auto;padding:28px 28px}

.hdr{display:flex;align-items:center;justify-content:space-between;padding:24px 28px;background:var(--navy);color:#FFFFFF;border:1px solid var(--navy);border-radius:var(--radius-lg);margin-bottom:20px;box-shadow:var(--shadow-card)}
.hdr-left{display:flex;align-items:center;gap:18px}

.hdr h1{font-size:22px;font-weight:700;letter-spacing:-.3px;color:#FFFFFF}
.hdr .sub{font-size:14px;color:#B8C4D6;margin-top:3px;letter-spacing:.3px}

/* Customer input */
.cust{display:flex;gap:14px;align-items:center;margin-bottom:20px;padding:16px 24px;background:var(--bg-1);border:1px solid var(--border);border-radius:var(--radius-md);flex-wrap:wrap}
.cust label{font-size:15px;color:var(--txt2);white-space:nowrap;font-weight:500}
.cust input{background:var(--bg-2);border:1px solid var(--border);border-radius:var(--radius-sm);padding:12px 16px;color:var(--txt);font-size:16px;font-family:inherit;outline:none;transition:border var(--transition-fast)}
.cust input:focus{border-color:var(--blue);box-shadow:0 0 0 3px rgba(36,108,247,.15)}

/* Progress bar */
.progress-wrap{margin-bottom:20px;padding:14px 24px;background:var(--bg-1);border:1px solid var(--border);border-radius:var(--radius-md)}
.progress-info{display:flex;justify-content:space-between;align-items:center;margin-bottom:10px}
.progress-label{font-size:14px;color:var(--txt2);font-weight:500}
.progress-count{font-size:16px;color:var(--cyan);font-weight:700}
.progress-bar{height:10px;background:var(--bg-3);border-radius:5px;overflow:hidden}
.progress-fill{height:100%;background:linear-gradient(90deg,var(--blue),var(--sage));border-radius:5px;transition:width .5s ease}

/* Tabs */
.tabs{display:flex;gap:4px;margin-bottom:20px;background:var(--bg-1);padding:5px;border-radius:var(--radius-md);border:1px solid var(--border);flex-wrap:wrap}
.tab{flex:1;padding:14px 18px;border:none;background:transparent;color:var(--txt2);font-family:inherit;font-size:15px;font-weight:600;border-radius:10px;cursor:pointer;transition:all var(--transition-fast);text-align:center;white-space:nowrap;min-width:100px;min-height:48px;display:flex;align-items:center;justify-content:center;gap:8px}
.tab:hover{background:var(--bg-2);color:var(--txt)}
.tab.active{background:var(--bg-2);color:var(--txt);box-shadow:var(--shadow-card)}
.tab-icon{width:18px;height:18px;flex-shrink:0}

/* Score cards — PROJECTOR HERO SIZE */
.scores{display:grid;grid-template-columns:repeat(auto-fit,minmax(180px,1fr));gap:14px;margin-bottom:20px}
.sc{background:linear-gradient(160deg,var(--bg-2),var(--bg-1));border:1px solid var(--border);border-radius:var(--radius-lg);padding:20px 16px;text-align:center;position:relative;overflow:hidden;transition:all var(--transition-normal);box-shadow:var(--shadow-card)}
.sc:hover{border-color:var(--border-hi);transform:translateY(-2px);box-shadow:var(--shadow-elevated)}
.sc .lbl{font-size:13px;color:var(--txt2);text-transform:uppercase;letter-spacing:1px;margin-bottom:8px;font-weight:600}
.sc .val{font-size:36px;font-weight:900;line-height:1}
.sc .unit{font-size:13px;color:var(--txt2);margin-top:6px;font-weight:500}

/* Sections */
.section{margin-bottom:20px;background:var(--bg-1);border:1px solid var(--border);border-radius:var(--radius-lg);overflow:hidden;box-shadow:var(--shadow-card)}
.sec-hdr{display:flex;align-items:center;justify-content:space-between;padding:16px 24px}
.sec-hdr-l{display:flex;align-items:center;gap:14px}
.sec-hdr h2{font-size:17px;font-weight:700}

/* Question cards */
.qcard{background:var(--bg-2);border:1px solid var(--border);border-radius:var(--radius-md);padding:20px 24px;margin-bottom:14px;transition:border-color var(--transition-fast)}
.qcard:hover{border-color:var(--border-hi)}
.qcard.answered{border-left:4px solid var(--sage);background:#F4F8F1}
.qlabel{font-size:12px;color:var(--txt3);letter-spacing:2px;text-transform:uppercase;margin-bottom:10px;font-weight:700}
.qtext{font-size:16px;font-weight:600;color:var(--txt);line-height:1.6;margin-bottom:6px}
.qhint{font-size:14px;color:var(--txt2);font-style:italic;margin-bottom:14px;line-height:1.6;padding-left:14px;border-left:3px solid var(--border)}

/* Score buttons — BIG TOUCH TARGETS */
.score-row{display:flex;gap:8px}
.sbtn{flex:1;height:52px;border:2px solid var(--border);background:transparent;color:var(--txt3);font-family:'JetBrains Mono',monospace;font-size:18px;font-weight:600;border-radius:var(--radius-sm);cursor:pointer;transition:all var(--transition-fast);min-width:52px}
.sbtn:hover{border-color:var(--blue);color:var(--txt);background:rgba(36,108,247,.06)}
.sbtn:focus-visible{outline:3px solid var(--blue);outline-offset:2px}
.sbtn.sel-lo{background:rgba(185,28,28,.08);border-color:var(--red);color:var(--red);font-weight:800}
.sbtn.sel-mi{background:rgba(217,119,6,.08);border-color:var(--yellow);color:var(--yellow);font-weight:800}
.sbtn.sel-hi{background:rgba(36,108,247,.08);border-color:var(--blue);color:var(--blue);font-weight:800}
.slabels{display:flex;justify-content:space-between;margin-top:8px;font-size:12px;color:var(--txt3);font-weight:600}

/* Number inputs */
.ninput{background:var(--bg-1);border:2px solid var(--border);border-radius:var(--radius-sm);color:var(--txt);font-family:'JetBrains Mono',monospace;font-size:17px;padding:12px 16px;width:140px;text-align:right;outline:none;transition:border var(--transition-fast)}
.ninput:focus{border-color:var(--blue);box-shadow:0 0 0 3px rgba(36,108,247,.15)}

/* Badges */
.badge{font-family:'JetBrains Mono',monospace;font-size:12px;padding:5px 12px;border-radius:6px;letter-spacing:1px;font-weight:700}

/* Buttons */
.btn{padding:12px 24px;border:2px solid var(--border);background:var(--bg-2);color:var(--txt);font-family:inherit;font-size:15px;font-weight:600;border-radius:var(--radius-sm);cursor:pointer;transition:all var(--transition-fast);display:inline-flex;align-items:center;gap:10px;min-height:48px}
.btn:hover{border-color:var(--blue);background:rgba(36,108,247,.06);box-shadow:var(--shadow-glow-cyan)}
.btn:focus-visible{outline:3px solid var(--blue);outline-offset:2px}
.btn-icon{width:18px;height:18px;flex-shrink:0}

/* Matrix */
.matrix{display:grid;grid-template-columns:1fr 1fr;gap:8px;margin:10px 0}
.mcell{padding:18px;border-radius:10px;text-align:center;border:2px solid transparent;transition:all .3s ease;opacity:.2}
.mcell.active{opacity:1;border-color:var(--blue);background:#E8F0FE;box-shadow:0 2px 8px rgba(36,108,247,0.15)}
.mcell-icon{width:36px;height:36px;margin:0 auto 8px}
.mcell-name{font-size:14px;font-weight:700;line-height:1.4}
.mcell-tl{background:rgba(217,119,6,.04)}.mcell-tr{background:rgba(74,124,89,.05)}.mcell-bl{background:rgba(138,143,152,.04)}.mcell-br{background:rgba(185,28,28,.04)}

/* Contradictions */
.contra{background:#FFF8E6;border:1px solid rgba(217,119,6,.25);border-radius:10px;padding:14px 20px;margin-bottom:12px}
.contra-title{font-size:12px;color:var(--yellow);letter-spacing:1.5px;margin-bottom:6px;font-weight:700;display:flex;align-items:center;gap:8px}
.contra-desc{font-size:14px;color:var(--txt2);line-height:1.7}

/* Recommendations */
.rec{display:flex;gap:14px;padding:14px 0;border-bottom:1px solid var(--border)}
.rec:last-child{border-bottom:none}
.rec-pri{font-size:11px;padding:4px 10px;border-radius:6px;height:fit-content;white-space:nowrap;font-weight:700;flex-shrink:0;margin-top:4px;letter-spacing:.5px}
.pri-1{background:rgba(185,28,28,.08);color:var(--red);border:1px solid rgba(185,28,28,.25)}
.pri-2{background:rgba(217,119,6,.08);color:var(--yellow);border:1px solid rgba(217,119,6,.22)}
.pri-3{background:rgba(36,108,247,.06);color:var(--blue);border:1px solid rgba(36,108,247,.18)}
.rec-title{font-size:15px;font-weight:700;margin-bottom:4px}
.rec-desc{font-size:14px;color:var(--txt2);line-height:1.7}

/* Role indicator */
.role-indicator{font-size:12px;padding:4px 12px;border-radius:6px;font-weight:700;white-space:nowrap;display:inline-flex;align-items:center;gap:6px}
.role-num{background:rgba(185,28,28,.06);color:var(--red);border:1px solid rgba(185,28,28,.2)}
.role-den{background:rgba(8,145,178,.06);color:var(--cyan);border:1px solid rgba(8,145,178,.18)}

/* Intro section */
.intro-grid{display:grid;grid-template-columns:1fr 1fr;gap:14px;margin-top:14px}
.intro-card{padding:14px 18px;background:var(--bg-2);border-radius:var(--radius-sm);border:1px solid var(--border)}
.intro-card-label{font-weight:700;margin-bottom:4px;font-size:15px}
.intro-card-desc{font-size:14px;color:var(--txt2);line-height:1.6}

/* Footer */
.footer{text-align:center;padding:24px 0;font-size:13px;color:var(--txt3)}
.footer a{color:var(--blue);text-decoration:none;transition:color var(--transition-fast)}
.footer a:hover{color:var(--navy)}
.security-badge{margin-top:12px;padding:12px 24px;background:var(--bg-1);border:1px solid var(--border);border-radius:var(--radius-sm);display:inline-flex;align-items:center;gap:10px;font-size:14px;color:var(--txt2)}

/* Print styles */
@media print{
  :root{
    --bg-0:#ffffff;--bg-1:#f5f7fa;--bg-2:#f0f2f5;--bg-3:#e8ebf0;
    --border:#cccccc;--border-hi:#999999;
    --txt:#1a1a1a;--txt2:#555555;--txt3:#888888;
    --blue:#2563eb;--cyan:#0891b2;--green:#059669;--yellow:#b45309;
    --orange:#c2410c;--red:#dc2626;--purple:#7c3aed;--pink:#be185d;
  }
  @page{size:297mm 167mm;margin:6mm}
  body{-webkit-print-color-adjust:exact;print-color-adjust:exact}
  body::before{display:none}
  .tabs,.cust,.scores,.no-print,.progress-wrap{display:none!important}
  .app{padding:0;max-width:none}
  .hdr{display:none!important}
  .print-hdr{display:flex!important}
  .result-page{font-size:10px}
  .result-grid3{grid-template-columns:1fr 1fr!important;gap:8px!important;margin-bottom:8px!important}
  .result-bottom{gap:8px!important}
  .section{margin-bottom:0!important;border-radius:6px;box-shadow:none}
  .sec-hdr{padding:6px 12px}
  .sec-hdr h2{font-size:11px}
  .forg-big{font-size:36px!important}
  .arc-desc{font-size:9px!important;line-height:1.4!important}
  .mcell{opacity:1!important;padding:8px!important}
  .mcell.active{border:2px solid #246CF7!important;box-shadow:none!important}
  .mcell-icon{width:20px!important;height:20px!important}
  .mcell-name{font-size:9px!important}
  .contra{margin-bottom:4px;padding:6px 10px}
  .exec-summary{margin-bottom:8px!important}
  .exec-summary .sec-hdr{padding:6px 12px!important}
  .exec-summary .sec-hdr h2{font-size:11px!important}
  .exec-grid{gap:10px!important}
  .exec-grid > div:first-child div:nth-child(2){font-size:16px!important}
  .exec-grid > div:nth-child(2){padding:10px 12px!important}
  .contra-title{font-size:8px!important}
  .contra-desc{font-size:9px!important;line-height:1.3!important}
  .rec{padding:4px 0}
  .rec-title{font-size:10px}
  .rec-desc{font-size:9px;line-height:1.3}
  .rec-pri{font-size:8px!important;padding:1px 5px!important}
  .footer-print{display:block!important}
}
@media(max-width:768px){
  .scores{grid-template-columns:1fr 1fr}
  .intro-grid{grid-template-columns:1fr}
  .hdr{flex-direction:column;gap:12px;text-align:center}
  .hdr-left{flex-direction:column;text-align:center}
  .exec-grid{grid-template-columns:1fr!important;gap:12px!important}
}
::-webkit-scrollbar{width:5px}::-webkit-scrollbar-track{background:var(--bg-0)}::-webkit-scrollbar-thumb{background:var(--border);border-radius:3px}
</style>

    const answered=Object.entries(sc).filter(([k,v])=>v>0&&k!=='itBudget'&&k!=='revenue').length + (sc.itBudget>0&&sc.revenue>0?1:0);

    // ========================================================
    // v4.3.0: 経営層向け4パターン診断（Dominant Pattern）
    // 業界平均F値テーブル（MVPはdefaultのみ。実AW蓄積で業界別値を追加予定）
    // ========================================================
    const INDUSTRY_AVG = {
      default: { S:3.0, L:3.5, C:2.8, LP:2.8 }
    };
    const avg = INDUSTRY_AVG.default;

    // 悪化方向への偏差（正の値ほど「平均より悪い」）
    // S, L は高いほど悪い / C, LP は低いほど悪い
    const deviations = {
      S:  S  - avg.S,
      L:  L  - avg.L,
      C:  avg.C  - C,
      LP: avg.LP - LP
    };
    // 優先順位 LP > S > C > L（経営層の動きやすさ順）
    const priorityOrder = ['LP','S','C','L'];
    let dominantVar = priorityOrder[0];
    for (const k of priorityOrder.slice(1)) {
      if (deviations[k] > deviations[dominantVar]) dominantVar = k;
    }

    // 4パターン × 1アクション（ZT非依存文言、設計書 Phase 2 準拠）
    const PATTERN_META = {
      S:  { id:'silo_strong',      name:'縦割りが強い',
            diagnosis:'縦割りの壁が厚く、横断の意思決定が通らない',
            action:'次の経営会議で、横断変革チームの経営スポンサーを1人指名する',
            kotter:'Kotter Step 2 (Coalition)' },
      L:  { id:'legacy_heavy',     name:'技術的負債が重い',
            diagnosis:'IT予算の大半が「守りのIT」に消えている',
            action:'「いつまでにどの業務環境を現代化するか」の期限をボードで合意する',
            kotter:'Kotter Step 4 (Communicate)' },
      C:  { id:'crisis_weak',      name:'危機感が弱い',
            diagnosis:'経営層が同業他社のインシデントを「他人事」と捉えている',
            action:'同業被害事例と自社の想定被害額を、次の役員会で定量提示する',
            kotter:'Kotter Step 1 (Urgency)' },
      LP: { id:'leadership_weak',  name:'変革意志が弱い',
            diagnosis:'変革失敗時に痛い目を見る責任者が特定されていない',
            action:'次のQで、セキュリティ投資の意思決定権を持つ事業責任者を1人指名する',
            kotter:'Kotter Step 3 (Vision)' }
    };
    const pm = PATTERN_META[dominantVar];
    const dominantPattern = {
      pattern_id: pm.id,
      pattern_name_ja: pm.name,
      diagnosis_ja: pm.diagnosis,
      most_deviated_variable: dominantVar,
      deviation: deviations[dominantVar]
    };
    const suggestion = {
      action_ja: pm.action,
      reference_framework: pm.kotter,
      common_footer_ja: 'セキュリティ対策は手段です。守るべき事業価値が先に定義されている必要があります'
    };
    const forgIndustryAvg = (avg.S * avg.L) / (avg.C * avg.LP);  // = (3.0×3.5)/(2.8×2.8) ≒ 1.34

    return{S,L,C,LP,forg,archetype,arcIcon,arcColor,arcDesc,arcCell,contradictions,damage,recs,answered,budgetRatio,budgetScore,
           dominantPattern,suggestion,forgIndustryAvg};
  },[sc]);

  const renderScore=(q,role)=>{

        </div>
        <div style={{display:'flex',alignItems:'center',gap:10}}>
          <span style={{fontSize:13,color:'var(--txt2)',width:90,fontWeight:500}}>年間売上高:</span>
          <input className="ninput" type="number" value={sc.revenue||''} onChange={e=>up('revenue',parseFloat(e.target.value)||0)} placeholder="5000" style={{width:120}}/>

        <div className="progress-fill" style={{width:`${(calc.answered/19)*100}%`}}/>

        </div>
        <div style={{marginTop:16,fontSize:12,color:'var(--txt3)',lineHeight:1.6}}>

        </div>

    <div className="scores">
      {[{l:'F_org',v:calc.answered>0?forgStr:'—',c:forgColor,u:forgStatus},

        {l:'L (レガシー)',v:calc.L>0?calc.L.toFixed(1):'—',c:'var(--yellow)',u:'5問'},
        {l:'C (危機感)',v:calc.C>0?calc.C.toFixed(1):'—',c:'var(--pink)',u:'4問'},
        {l:"L' (意志)",v:calc.LP>0?calc.LP.toFixed(1):'—',c:'var(--cyan)',u:'5問'},

    <div className="tabs">
      {SECTIONS.map(s=><button key={s.key} className={`tab ${tab===s.key?'active':''}`} onClick={()=>switchTab(s.key)}>
        <span className="badge" style={{background:`${s.color}18`,color:s.color,border:`1px solid ${s.color}33`}}>{s.badge}</span>{s.label}

      <button className={`tab ${tab==='result'?'active':''}`} onClick={()=>switchTab('result')}>

      </button>

    {SECTIONS.map(sec=>tab===sec.key&&(
      <div key={sec.key}>
        <div className="section"><div className="sec-hdr"><div className="sec-hdr-l">
          <span className="badge" style={{background:`${sec.color}18`,color:sec.color,border:`1px solid ${sec.color}33`}}>{sec.badge}</span>
          <div><h2>{sec.label} — {sec.sub}</h2></div>

        <span className={`role-indicator ${sec.role==='numerator'?'role-num':'role-den'}`}>
          <span style={{width:14,height:14,display:'inline-flex'}}>{sec.role==='numerator'?<Icons.brick/>:<Icons.rocket/>}</span>
          {sec.roleLabel}

          <span style={{width:14,height:14,display:'inline-flex',color:sec.role==='numerator'?'var(--red)':'var(--cyan)'}}>{sec.role==='numerator'?<Icons.brick/>:<Icons.rocket/>}</span>
          <span style={{color:sec.role==='numerator'?'var(--red)':'var(--cyan)',fontWeight:500}}>Forg式の{sec.role==='numerator'?'分子（摩擦）':'分母（推進力）'}</span>
          <span style={{opacity:.7}}>{sec.roleHint}</span>
        </div>
        <div style={{padding:'12px 20px'}}>
          {sec.questions.map(q=>(

              <div className="qlabel">{q.label}</div>
              <div className="qtext">{q.text}</div>
              {q.hint&&<div className="qhint">{q.hint}</div>}
              {renderScore(q,sec.role)}
            </div>
          ))}

        {/* Next section navigation */}
        {nextTab&&<div className="no-print" style={{textAlign:'center',marginTop:8}}>
          <button className="btn" style={{borderColor:'var(--cyan)',color:'var(--cyan)',gap:10}} onClick={()=>switchTab(nextTab)}>
            次へ: {nextLabel}
            <span style={{width:16,height:16,display:'inline-flex'}}><Icons.arrowRight/></span>

        </div>}
      </div>
    ))}

    {tab==='result'&&<div className="result-page">
      {/* Print-only header */}

            <div style={{display:'flex',alignItems:'flex-start',gap:6}}><span style={{width:14,height:14,color:'var(--green)',flexShrink:0}}><Icons.rocket/></span><span><b>臨界点型</b>: 危機感と意志が揃い変革が加速可能</span></div>
            <div style={{display:'flex',alignItems:'flex-start',gap:6}}><span style={{width:14,height:14,color:'var(--txt3)',flexShrink:0}}><Icons.sleep/></span><span><b>思考停止型</b>: 正常性バイアスで動けない状態</span></div>
            <div style={{display:'flex',alignItems:'flex-start',gap:6}}><span style={{width:14,height:14,color:'var(--red)',flexShrink:0}}><Icons.fire/></span><span><b>消去法型</b>: 外圧頼みでリーダー不在</span></div>
          </div>
          <div style={{marginTop:16,padding:'14px 16px',borderRadius:8,background:`${calc.arcColor}0a`,border:`1px solid ${calc.arcColor}33`}}>
            <div style={{display:'flex',alignItems:'center',gap:8,marginBottom:8}}>
              <ArcIcon name={calc.arcIcon} size={22} color={calc.arcColor}/>
              <span style={{fontSize:14,fontWeight:700,color:calc.arcColor}}>{calc.archetype}</span>
            </div>
            <div className="arc-desc" style={{fontSize:12,color:'var(--txt2)',lineHeight:1.6}}>{calc.arcDesc}</div>
          </div>
        </div></div>
      </div>

      {/* === v4.3.0: 経営層サマリ（Dominant Pattern × 1 Action） === */}
      {calc.answered>=10 && calc.dominantPattern && (() => {
        // パターン別のアクセントカラー（既存の変数色を流用）
        const patternColorMap = {
          silo_strong:      'var(--red)',
          legacy_heavy:     'var(--yellow)',
          crisis_weak:      'var(--pink)',
          leadership_weak:  'var(--cyan)'
        };
        const accentColor = patternColorMap[calc.dominantPattern.pattern_id] || 'var(--txt2)';
        return (
          <div className="section exec-summary" style={{marginBottom:16,borderLeft:`4px solid ${accentColor}`}}>
            <div className="sec-hdr"><div className="sec-hdr-l">
              <span style={{width:18,height:18,color:accentColor,flexShrink:0}}><Icons.lightning/></span>
              <h2>経営層サマリ</h2>
              <span style={{fontSize:10,color:'var(--txt3)',marginLeft:8}}>次の一手を一言で</span>
            </div></div>
            <div style={{padding:'16px 20px 20px'}}>
              <div style={{display:'grid',gridTemplateColumns:'1fr 1.4fr',gap:20,alignItems:'start'}}
                   className="exec-grid">
                {/* 左ブロック：診断 */}
                <div>
                  <div style={{fontSize:10,color:'var(--txt3)',letterSpacing:'0.08em',marginBottom:6,fontWeight:600}}>DIAGNOSIS</div>
                  <div style={{fontSize:20,fontWeight:800,color:accentColor,marginBottom:8,lineHeight:1.3}}>
                    {calc.dominantPattern.pattern_name_ja}
                  </div>
                  <div style={{fontSize:13,color:'var(--txt2)',lineHeight:1.6}}>
                    {calc.dominantPattern.diagnosis_ja}
                  </div>
                  <div style={{fontSize:10,color:'var(--txt3)',marginTop:10,fontFamily:'monospace'}}>
                    最大偏差: {calc.dominantPattern.most_deviated_variable} 軸 （業界平均 {calc.forgIndustryAvg.toFixed(2)} 比）
                  </div>
                </div>
                {/* 右ブロック：次の一手 */}
                <div style={{background:`${accentColor}0a`,padding:'14px 18px',borderRadius:8,border:`1px solid ${accentColor}33`}}>
                  <div style={{fontSize:10,color:'var(--txt3)',letterSpacing:'0.08em',marginBottom:6,fontWeight:600}}>NEXT ACTION</div>
                  <div style={{fontSize:15,fontWeight:700,color:'var(--txt1)',lineHeight:1.6,marginBottom:10}}>
                    {calc.suggestion.action_ja}
                  </div>
                  <div style={{fontSize:10,color:'var(--txt3)',fontStyle:'italic'}}>
                    ref. {calc.suggestion.reference_framework}
                  </div>
                </div>
              </div>
              {/* 共通脚注 */}
              <div style={{marginTop:14,paddingTop:12,borderTop:'1px dashed var(--border)',fontSize:11,color:'var(--txt3)',fontStyle:'italic',textAlign:'center'}}>
                {calc.suggestion.common_footer_ja}
              </div>
            </div>
          </div>
        );
      })()}

      {/* Contradictions + Actions */}
      <div className="result-bottom" style={{display:'grid',gridTemplateColumns:calc.contradictions.length>0?'1fr 1fr':'1fr',gap:16}}>
        {calc.contradictions.length>0&&<div className="section" style={{marginBottom:0}}>
          <div className="sec-hdr"><div className="sec-hdr-l">
            <span style={{width:18,height:18,color:'var(--yellow)'}}><Icons.warning/></span>
            <h2>矛盾検出（{calc.contradictions.length}件）</h2>
          </div></div>
          <div style={{padding:'12px 20px'}}>
            {calc.contradictions.map((c,i)=><div key={i} className="contra">
              <div className="contra-title mono">
                <span style={{width:14,height:14,flexShrink:0}}><Icons.warning/></span>
                {c.title}
              </div>
              <div className="contra-desc">{c.desc}</div>
            </div>)}
          </div>
        </div>}

        <div className="section" style={{marginBottom:0}}>
          <div className="sec-hdr"><div className="sec-hdr-l"><h2>変革アクション優先順位（{calc.recs.length}件）</h2></div></div>
          <div style={{padding:'12px 20px'}}>
            {calc.recs.map((r,i)=>(
              <div key={i} className="rec">
                <span className={`rec-pri mono pri-${r.p}`}>{r.p===1?'URGENT':r.p===2?'MEDIUM':'BASELINE'}</span>
                <div><div className="rec-title">{r.t}</div><div className="rec-desc">{r.d}</div></div>
              </div>
            ))}
          </div>
        </div>
      </div>

      <div className="no-print" style={{display:'flex',justifyContent:'center',gap:10,marginTop:16,flexWrap:'wrap'}}>
        <button className="btn" onClick={()=>{setSc({s1:0,s2:0,s3:0,s4:0,s5:0,l1:0,l2:0,l3:0,l4:0,l5:0,c1:0,c2:0,c4:0,lp1:0,lp2:0,lp3:0,lp4:0,lp5:0,itBudget:0,revenue:0});switchTab('S');}}>
          <span className="btn-icon"><Icons.refresh/></span>リセット
        </button>
        <button className="btn" onClick={()=>window.print()}>
          <span className="btn-icon"><Icons.printer/></span>スライド用PDF出力
        </button>
        <button className="btn" style={{borderColor:'var(--green)',color:'var(--green)'}} onClick={()=>{
          // Ztelier Context v1.1.0 準拠のJSON出力
          // Common Kit の ZtelierContext API が読み込まれていればそれを使い、
          // 失敗時はフォールバックで素のオブジェクトを生成してダウンロード
          try {
            if (typeof window.ZtelierContext !== 'undefined' && window.ZtelierContext.empty) {
              const ctx = window.ZtelierContext.empty({
                company_name: customer || 'unnamed',
                created_by: 'Forg v4.3.0'
              });
              const forgStatus = calc.forg < 1 ? '変革の加速帯' : calc.forg < 2 ? '変革の停滞帯' : '変革の膠着帯';
              window.ZtelierContext.updateTool(ctx, 'forg', {
                completed: true,
                version: '4.3.0',
                variables: { S: calc.S, L: calc.L, C: calc.C, LP: calc.LP },
                budget_ratio: calc.budgetScore > 0 ? {
                  it_budget_jpy: sc.itBudget * 100000000,
                  annual_revenue_jpy: sc.revenue * 100000000,
                  ratio_percent: calc.budgetRatio,
                  score: calc.budgetScore
                } : null,
                F_value: calc.forg,
                F_status: calc.answered === 0 ? null : forgStatus,
                industry_average_F: calc.forgIndustryAvg,
                deviation_from_average: calc.forg - calc.forgIndustryAvg,
                archetype: {
                  cell_id: calc.arcCell,
                  name_ja: calc.archetype,
                  description_ja: calc.arcDesc
                },
                contradictions: calc.contradictions.map(c => ({
                  pattern_id: null,
                  title_ja: c.title,
                  description_ja: c.desc
                })),
                damage_estimate_jpy: calc.damage * 100000000,
                recommendations: calc.recs.map(r => ({
                  priority: r.p,
                  title_ja: r.t,
                  description_ja: r.d,
                  trigger_variable: null
                })),
                dominant_pattern: calc.dominantPattern,
                suggestion: calc.suggestion
              });
              const filename = `ztelier-context-${ctx.meta.session_id}.json`;
              window.ZtelierContext.exportToFile(ctx, filename);
            } else {
              // フォールバック：Common Kit 未ロード時は素のJSON生成
              const fallback = {
                meta: {
                  schema_version: '1.1.0',
                  ztelier_version: '1.1.0',
                  session_id: `aw-${new Date().toISOString().slice(0,10).replace(/-/g,'')}-${customer||'unnamed'}`,
                  created_at: new Date().toISOString(),
                  created_by: 'Forg v4.3.0 (offline)'
                },
                customer: { company_name: customer || 'unnamed' },
                forg: {
                  completed: true,
                  version: '4.3.0',
                  variables: { S: calc.S, L: calc.L, C: calc.C, LP: calc.LP },
                  F_value: calc.forg,
                  dominant_pattern: calc.dominantPattern,
                  suggestion: calc.suggestion
                }
              };
              const blob = new Blob([JSON.stringify(fallback,null,2)], {type:'application/json'});
              const url = URL.createObjectURL(blob);
              const a = document.createElement('a');
              a.href = url;
              a.download = `ztelier-context-${customer||'unnamed'}-${new Date().toISOString().slice(0,10)}.json`;
              a.click();
              URL.revokeObjectURL(url);
            }
          } catch(e) {
            alert('Ztelier Context 出力エラー: ' + e.message);
            console.error(e);
          }
        }}>
          <span className="btn-icon"><Icons.upload/></span>Ztelier Context 出力
        </button>
      </div>
    </div>}

    <div className="footer">
      F<sub>org</sub> 組織摩擦診断ツール v4.3.0 — Architecture Workshop AS-IS Diagnostic<br/>
      19項目（S:5 / L:5 / C:4 / L':5）| ITR 2026 / Deloitte / Flexera ベンチマーク参照 | DXとセキュリティが連動しない理由を物理学的に診断する
      <div className="security-badge">
        <span style={{width:16,height:16,color:'var(--green)',flexShrink:0}}><Icons.shield/></span>
        このツールは完全にローカルで動作します。入力データは一切外部に送信されません。
      </div>
      <div style={{marginTop:12,fontSize:11,color:'var(--txt2)'}}>
        Designed by <a href="https://www.linkedin.com/in/takayoshi-takaoka/" target="_blank" rel="noopener">髙岡 隆佳</a> | Evangelist & Architect, <a href="https://www.zscaler.com/" target="_blank" rel="noopener">Zscaler</a>
      </div>
      <div style={{marginTop:6,fontSize:10}}>
        ゼロトラスト移行の詳細診断・ROI算出は <a href="https://www.zscaler.com/" target="_blank" rel="noopener">Architecture Workshop</a> にてご提供しています
      </div>
    </div>
  </div>);
}
ReactDOM.createRoot(document.getElementById('root')).render(<App/>);
</script>
</body>
</html>
