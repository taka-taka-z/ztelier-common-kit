<!doctype html>
<html lang="ja">
<head>
<meta charset="utf-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover"/>
<title>MAAZ — Zero Trust Maturity Atelier</title>
<link rel="preconnect" href="https://fonts.googleapis.com"/>
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin/>
<link href="https://fonts.googleapis.com/css2?family=Outfit:wght@200;300;400;500;600;700&family=JetBrains+Mono:wght@400;500&family=Noto+Sans+JP:wght@300;400;500;600;700&display=swap" rel="stylesheet"/>

<style>
/* ============================================================
   MAAZ — Ztelier Edition v1.0.1 (AS-IS SCF 対称性修正 / BUG#2 対応)
   Base: Ztelier Common Kit v1.3 (2026)
   Themes: paper (default light) | indigo (dark)
   ============================================================ */
:root,
[data-theme="paper"]{
  --bg:    #F7F9FB;
  --bg-1:  #FFFFFF;
  --bg-2:  #F1F4F8;
  --bg-3:  #E7ECF2;

  --ink-0: #001744;
  --ink:   #0B1E3F;
  --ink-2: #3A4B6B;
  --ink-3: #6B7A95;
  --ink-4: #A3ADBF;

  --line:   #E1E6EE;
  --line-2: #C9D1DE;
  --line-3: #A8B3C5;

  --primary:     #246CF7;
  --primary-2:   #1853CC;
  --primary-dim: #246CF718;
  --primary-tint:#E8EFFD;
  --primary-weak:#A8C9F5;

  --trust:     #7BA05B;
  --trust-2:   #5F7D45;
  --trust-dim: #7BA05B18;
  --trust-weak:#C2D5AE;

  --danger:  #C04A4A;
  --warn:    #C88A2A;
  --info:    #246CF7;

  /* 6-pillar palette (MAAZ pillars mapped to Ztelier ZTMM 7-palette) */
  --p-identity: #1853CC;
  --p-devices:  #7BA05B;
  --p-networks: #5B4B9E;
  --p-apps:     #B5832C;
  --p-data:     #A0517E;
  --p-cross:    #3D8888;

  /* Tier bands */
  --t-traditional: #C04A4A;
  --t-initial:     #C88A2A;
  --t-advanced:    #246CF7;
  --t-optimal:     #7BA05B;

  --topbar-bg: rgba(247, 249, 251, 0.86);
  --shadow-soft: 0 1px 2px rgba(0,23,68,.04), 0 8px 28px rgba(0,23,68,.06);
  --shadow-lift: 0 2px 6px rgba(0,23,68,.06), 0 24px 60px rgba(0,23,68,.10);
}

[data-theme="indigo"]{
  --bg:    #050C1C;
  --bg-1:  #0C1730;
  --bg-2:  #122044;
  --bg-3:  #1B2D5C;

  --ink-0: #FFFFFF;
  --ink:   #EEF3FE;
  --ink-2: #B5C4E3;
  --ink-3: #7E93BE;
  --ink-4: #4F628B;

  --line:   #1D2E54;
  --line-2: #2A3F6E;
  --line-3: #415B95;

  --primary:     #5B8EFF;
  --primary-2:   #3D74F0;
  --primary-dim: #5B8EFF22;
  --primary-tint:#10204A;
  --primary-weak:#3A5894;

  --trust:     #9BC47A;
  --trust-2:   #7BA05B;
  --trust-dim: #9BC47A22;
  --trust-weak:#5E7A44;

  --danger:  #D86A6A;
  --warn:    #E0A545;
  --info:    #5B8EFF;

  --p-identity: #6E9BFF;
  --p-devices:  #9BC47A;
  --p-networks: #9082D0;
  --p-apps:     #D4A556;
  --p-data:     #C876A8;
  --p-cross:    #65B0B0;

  --t-traditional: #D86A6A;
  --t-initial:     #E0A545;
  --t-advanced:    #5B8EFF;
  --t-optimal:     #9BC47A;

  --topbar-bg: rgba(5, 12, 28, 0.86);
  --shadow-soft: 0 1px 2px rgba(0,0,0,.3), 0 8px 28px rgba(0,0,0,.4);
  --shadow-lift: 0 2px 6px rgba(0,0,0,.35), 0 24px 60px rgba(0,0,0,.55);
}

/* Font stacks */
:root{
  --font-sans:    "Outfit", "Noto Sans JP", -apple-system, system-ui, sans-serif;
  --font-jp:      "Noto Sans JP", "Outfit", sans-serif;
  --font-mono:    "JetBrains Mono", ui-monospace, SFMono-Regular, monospace;
  --font-display: "Outfit", "Noto Sans JP", -apple-system, sans-serif;
}

*,*::before,*::after{ box-sizing:border-box; }
html,body{
  margin:0; padding:0; background:var(--bg); color:var(--ink);
  font-family:var(--font-sans);
  -webkit-font-smoothing:antialiased;
  letter-spacing:0;
  text-rendering:optimizeLegibility;
  transition: background .3s, color .3s;
}
body{ min-height:100vh; }

.mono{ font-family:var(--font-mono); font-feature-settings:"ss01","cv11"; letter-spacing:.02em; }
.upper{ text-transform:uppercase; letter-spacing:.14em; }
.jp{ font-family:var(--font-jp); }
.num{ font-variant-numeric: tabular-nums; letter-spacing:-0.01em; }

em{ font-style:normal; color:var(--primary); font-weight:600; }

button{ font-family:inherit; color:inherit; }
a{ color:var(--primary); text-decoration:none; }
a:hover{ text-decoration:underline; }

/* ==== Top Bar ==== */
.topbar{
  border-bottom:1px solid var(--line);
  display:flex; align-items:center;
  padding:0 24px; gap:16px; height:64px;
  background: var(--topbar-bg);
  backdrop-filter: blur(12px) saturate(120%);
  -webkit-backdrop-filter: blur(12px) saturate(120%);
  position:sticky; top:0; z-index:50;
  transition: background .3s, border-color .3s;
}
.brand{ display:flex; align-items:center; gap:12px; flex-shrink:0; }
.brand-mark{ width:32px; height:32px; flex-shrink:0; }
.brand-text{ display:flex; flex-direction:column; line-height:1.1; min-width:0; }
.brand-title{
  font-family:var(--font-display); font-size:18px; color:var(--ink);
  font-weight:500; letter-spacing:-0.01em; white-space:nowrap;
}
.brand-title em{
  font-style:normal; color:var(--primary); font-weight:600;
}
.brand-sub{
  font-size:10px; color:var(--ink-3);
  letter-spacing:.16em; text-transform:uppercase; font-weight:500;
  white-space:nowrap;
}

.nav-chapters{
  display:flex; gap:4px; flex-shrink:0; overflow-x:auto;
  scrollbar-width:none;
}
.nav-chapters::-webkit-scrollbar{ display:none; }
.nav-chapter{
  border:1px solid transparent; background: transparent;
  color: var(--ink-3);
  height:34px; padding:0 12px; cursor:pointer;
  font-family:var(--font-sans); font-size:13px; font-weight:500;
  border-radius:999px; white-space:nowrap;
  display:inline-flex; align-items:center; gap:8px;
  transition:all .15s;
}
.nav-chapter:hover{ color:var(--ink-2); background:var(--bg-2); }
.nav-chapter.on{
  background: var(--bg-1); border-color: var(--line-2); color: var(--ink);
}
.nav-chapter .n{
  font-family:var(--font-mono);
  font-size:11px; color: var(--ink-4); font-weight:500;
  letter-spacing: .04em;
  font-variant-numeric: tabular-nums;
}
.nav-chapter.on .n{ color: var(--primary); }

.top-meta{ display:flex; gap:8px; align-items:center; flex-shrink:0; }
.tag{
  display:inline-flex; align-items:center; gap:6px;
  font-size:11px; letter-spacing:.02em;
  color:var(--ink-2); font-weight:500;
  border:1px solid var(--line-2); padding:4px 10px; border-radius:999px;
  background: var(--bg-1); white-space:nowrap;
}
.tag .dot{ width:6px; height:6px; border-radius:50%; background:var(--ink-3); }
.tag.live .dot{ background:var(--trust); box-shadow: 0 0 0 3px var(--trust-dim); }
.tag.fbadge{ gap:8px; }
.tag.fbadge .v{ font-family:var(--font-mono); font-weight:500; letter-spacing:.02em; }
.tag.fbadge .lb{ font-size:10px; color:var(--ink-3); letter-spacing:.14em; text-transform:uppercase; }

.theme-toggle{
  width:34px; height:34px; border-radius:50%;
  border:1px solid var(--line-2); background:var(--bg-1);
  cursor:pointer; color:var(--ink-2);
  display:flex; align-items:center; justify-content:center;
  transition: all .2s;
  flex-shrink:0;
}
.theme-toggle:hover{ background:var(--bg-2); color:var(--ink); }
.theme-toggle svg{ width:16px; height:16px; }

.avatar{
  width:32px; height:32px; border-radius:50%;
  background:linear-gradient(135deg, var(--primary), var(--primary-2));
  display:flex; align-items:center; justify-content:center;
  font-size:11px; color:#fff; font-weight:600; letter-spacing:0.02em;
  flex-shrink:0;
}

.spacer{ flex:1; min-width:0; }

/* ==== Sections & Hero ==== */
.section{ padding: 64px 48px; }
.section.hero{ padding: 120px 48px 80px; }
.section.tight{ padding: 32px 48px; }
.container{ max-width: 1280px; margin: 0 auto; }

.section-divider{
  height:1px; background: var(--line);
  max-width: 1280px; margin: 0 auto;
}

.view{ display:none; }
.view.on{ display:block; animation: fadein .35s ease; }
@keyframes fadein{ from{opacity:0} to{opacity:1} }

/* ==== Chapter marker ==== */
.chapter-marker{
  display:flex; align-items:baseline; gap:16px; margin-bottom:32px;
  flex-wrap:wrap;
}
.chapter-num{
  font-family:var(--font-mono); font-size:13px;
  color:var(--primary); font-weight:500;
  letter-spacing:.08em; text-transform:uppercase;
}
.chapter-line{ width:40px; height:1px; background:var(--line-2); }
.chapter-label{
  font-family:var(--font-sans); font-size:11px;
  color:var(--ink-3); font-weight:500;
  letter-spacing:.20em; text-transform:uppercase;
}
.chapter-label .jp{ text-transform:none; letter-spacing:.06em; }

/* ==== Hero typography ==== */
.kicker{
  font-family:var(--font-sans); font-size:13px;
  color:var(--primary); font-weight:500;
  letter-spacing:.08em; text-transform:uppercase;
  margin-bottom:18px;
}
.h-display{
  font-family:var(--font-display);
  font-size:clamp(40px, 7.5vw, 96px);
  font-weight:500; line-height:1.05; letter-spacing:-0.025em;
  color:var(--ink); margin:0 0 24px 0;
}
.h-display em{ font-style:normal; color:var(--primary); font-weight:600; }

.h-sec{
  font-family:var(--font-display);
  font-size:clamp(28px, 4vw, 48px);
  font-weight:500; line-height:1.08; letter-spacing:-0.02em;
  color:var(--ink); margin:0 0 16px 0;
}

.lede-jp{
  font-family:var(--font-jp);
  font-size:clamp(16px, 1.7vw, 20px);
  font-weight:300; line-height:1.7;
  color:var(--ink-2); max-width: 44ch;
  margin:0 0 40px 0;
}

/* ==== Stats row ==== */
.stats-row{
  display:grid; grid-template-columns: repeat(auto-fit, minmax(180px, 1fr));
  gap:32px; padding-top:32px; border-top:1px solid var(--line);
  max-width:1000px;
}
.stat-label{
  font-family:var(--font-sans); font-size:11px;
  color:var(--ink-3); font-weight:500;
  letter-spacing:.12em; text-transform:uppercase;
  margin-bottom:10px;
}
.stat-value{ display:flex; align-items:baseline; gap:6px; }
.metric-lg{
  font-family:var(--font-display);
  font-size:clamp(44px, 5.2vw, 64px);
  font-weight:300; line-height:1; letter-spacing:-0.03em;
  color:var(--ink);
  font-variant-numeric: tabular-nums;
}
.stat-unit{ font-size:16px; color:var(--ink-3); font-weight:400; }
.stat-caption{
  font-size:12px; color:var(--ink-3); margin-top:8px;
  font-family:var(--font-jp); font-weight:300;
}

/* ==== Buttons ==== */
.btn{
  display:inline-flex; align-items:center; gap:8px;
  padding:10px 18px; border-radius:999px;
  border:1px solid var(--line-2); background:var(--bg-1);
  font-family:var(--font-sans); font-size:13px; font-weight:500;
  color:var(--ink); cursor:pointer;
  transition: all .15s;
  white-space:nowrap;
}
.btn:hover{ background:var(--bg-2); transform:translateY(-1px); box-shadow:var(--shadow-soft); }
.btn.primary{
  background:var(--ink-0); color:var(--bg); border-color:var(--ink-0);
}
.btn.primary:hover{ background:var(--ink); }
.btn.ghost{
  background:transparent; border-color:var(--line);
}
.btn.sm{ padding:6px 12px; font-size:12px; }

/* ==== Pillar chips ==== */
.pchip{
  display:inline-flex; align-items:center; gap:8px;
  padding:6px 14px; border-radius:999px;
  border:1px solid var(--line); background:var(--bg-1);
  font-family:var(--font-sans); font-size:12px; font-weight:500;
  color:var(--ink-2); cursor:pointer;
  transition: all .15s; white-space:nowrap;
}
.pchip:hover{ background:var(--bg-2); color:var(--ink); }
.pchip.on{
  background:var(--ink-0); color:var(--bg); border-color:var(--ink-0);
}
.pchip .dot{
  width:8px; height:8px; border-radius:50%; flex-shrink:0;
}
.pchip .jp{ font-size:11px; color:var(--ink-3); margin-left:2px; }
.pchip.on .jp{ color:rgba(255,255,255,.7); }

.pchip-row{
  display:flex; flex-wrap:wrap; gap:8px; margin:16px 0 32px 0;
}

/* ==== Cards ==== */
.card{
  background:var(--bg-1);
  border:1px solid var(--line);
  border-radius:14px;
  transition: border-color .2s, box-shadow .2s, transform .2s;
}
.card.elevated{ box-shadow:var(--shadow-soft); }
.card.elevated:hover{ box-shadow:var(--shadow-lift); transform:translateY(-1px); }

.section-head{
  display:flex; justify-content:space-between; align-items:center;
  padding:12px 16px;
  border-bottom:1px solid var(--line);
  background:var(--bg-2);
  border-radius:14px 14px 0 0;
}
.section-head .idx{
  font-family:var(--font-mono); font-size:10px;
  color:var(--ink-4); letter-spacing:.14em;
  text-transform:uppercase; font-weight:500;
}
.section-head .label{
  font-family:var(--font-mono); font-size:11px;
  color:var(--ink-2); letter-spacing:.14em;
  text-transform:uppercase; font-weight:500;
}
.section-head .jp{
  font-size:11px; color:var(--ink-3);
  font-family:var(--font-jp); font-weight:400;
}

/* ==== KPI small ==== */
.kpi{
  border:1px solid var(--line);
  padding:12px 14px; border-radius:10px;
  background:var(--bg-1);
  display:flex; flex-direction:column; gap:6px;
}
.kpi-label{
  font-family:var(--font-mono); font-size:9px;
  color:var(--ink-4); letter-spacing:.14em;
  text-transform:uppercase; font-weight:500;
}
.kpi-value{
  font-family:var(--font-mono); font-size:22px;
  color:var(--ink); font-weight:500;
  font-variant-numeric:tabular-nums;
}
.kpi-delta{
  font-family:var(--font-mono); font-size:10px;
  color:var(--trust); letter-spacing:.02em;
}
.kpi-delta.down{ color:var(--danger); }
.kpi-sub{
  font-size:11px; color:var(--ink-3);
  font-family:var(--font-jp);
}

/* ==== Reveal animations ==== */
.reveal{
  opacity:0; transform: translateY(20px);
  transition: opacity .7s cubic-bezier(.2,.6,.2,1), transform .7s cubic-bezier(.2,.6,.2,1);
}
.reveal.in{ opacity:1; transform:translateY(0); }
.reveal.d1{ transition-delay:.08s; }
.reveal.d2{ transition-delay:.16s; }
.reveal.d3{ transition-delay:.24s; }
.reveal.d4{ transition-delay:.32s; }
@media (prefers-reduced-motion: reduce){
  .reveal{ opacity:1; transform:none; transition:none; }
}

/* ==== Heatmap matrix ==== */
.matrix{
  display:grid;
  grid-template-columns: 180px repeat(4, 1fr) 120px;
  gap:1px; background:var(--line);
  border:1px solid var(--line); border-radius:14px; overflow:hidden;
}
.matrix-head, .matrix-cell{
  background:var(--bg-1); padding:12px 14px;
  font-family:var(--font-sans); font-size:12px;
  color:var(--ink-2);
  display:flex; flex-direction:column; gap:4px;
  min-height:56px; justify-content:center;
}
.matrix-head{
  background:var(--bg-2);
  font-family:var(--font-mono); font-size:10px;
  color:var(--ink-3); letter-spacing:.14em; text-transform:uppercase;
  font-weight:500;
}
.matrix-head .sub{
  font-family:var(--font-jp); font-size:10px;
  color:var(--ink-4); text-transform:none; letter-spacing:0; font-weight:400;
}
.matrix-row-head{
  background:var(--bg-2);
  font-family:var(--font-mono); font-size:11px;
  color:var(--ink); font-weight:500;
  display:flex; align-items:center; gap:8px;
}
.matrix-row-head .dot{ width:8px; height:8px; border-radius:50%; }
.matrix-row-head .code{ letter-spacing:.04em; }
.matrix-row-head .jp{
  font-size:10px; color:var(--ink-3);
  font-family:var(--font-jp); font-weight:400;
  margin-left:auto;
}

.mcell{
  background:var(--bg-1); padding:10px;
  cursor:pointer; position:relative;
  display:flex; flex-direction:column; gap:4px;
  transition: background .15s;
  min-height:72px;
}
.mcell:hover{ background:var(--bg-2); }
.mcell-lv{
  font-family:var(--font-mono); font-size:10px;
  color:var(--ink-4); letter-spacing:.14em; font-weight:500;
}
.mcell-desc{
  font-family:var(--font-jp); font-size:11px;
  color:var(--ink-2); line-height:1.4;
}
.mcell.cur{
  background: color-mix(in srgb, var(--pillar) 18%, var(--bg-1));
  border:2px solid var(--pillar);
  box-shadow: inset 0 0 0 1px var(--pillar);
}
.mcell.cur .mcell-lv{ color:var(--pillar); font-weight:600; }
.mcell.tgt{
  background: color-mix(in srgb, var(--trust) 8%, var(--bg-1));
}
.mcell.tgt::after{
  content:""; position:absolute; inset:2px;
  border:1.5px dashed var(--trust); border-radius:6px; pointer-events:none;
}
.mcell.cur.tgt{
  background: color-mix(in srgb, var(--pillar) 22%, var(--bg-1));
}

.matrix-status{
  background:var(--bg-2); padding:10px 12px;
  display:flex; flex-direction:column; gap:6px; justify-content:center;
  font-family:var(--font-mono); font-size:10px;
  color:var(--ink-3); letter-spacing:.04em;
}
.matrix-status .gap{
  font-size:16px; color:var(--ink); font-weight:500;
}
.matrix-status .gap.up{ color:var(--trust); }
.matrix-status .gap.flat{ color:var(--ink-3); }

/* ==== Dual slider (AS-IS / TO-BE toggle + level buttons) ==== */
.ds-wrap{
  background:var(--bg-2);
  border-top:1px solid var(--line);
  padding:12px 14px;
  display:none;
}
.ds-wrap.on{ display:flex; gap:12px; align-items:center; flex-wrap:wrap; }
.ds-mode{ display:inline-flex; gap:2px; background:var(--bg-3); border-radius:999px; padding:2px; }
.ds-mode button{
  border:none; background:transparent; cursor:pointer;
  padding:5px 12px; border-radius:999px;
  font-family:var(--font-sans); font-size:11px; font-weight:500;
  color:var(--ink-3); letter-spacing:.02em;
  transition: all .15s;
}
.ds-mode button.on{ background:var(--bg-1); color:var(--ink); box-shadow:var(--shadow-soft); }
.ds-mode.tobe button.on{ color:var(--trust-2); }
.ds-levels{ display:inline-flex; gap:4px; }
.ds-level{
  border:1px solid var(--line-2); background:var(--bg-1); cursor:pointer;
  padding:6px 12px; border-radius:8px;
  font-family:var(--font-mono); font-size:11px; font-weight:500;
  color:var(--ink-2); letter-spacing:.04em;
  transition: all .15s;
  min-width:58px;
}
.ds-level:hover{ background:var(--bg-2); color:var(--ink); }
.ds-level.cur{
  background: var(--pillar); border-color:var(--pillar); color:#fff;
}
.ds-level.tgt::before{
  content:"▲"; font-size:9px; margin-right:4px; color:var(--trust);
}
.ds-level.cur.tgt::before{ color:rgba(255,255,255,.8); }

/* ==== Maturity bars ==== */
.mbar{
  display:grid;
  grid-template-columns: 200px 1fr 80px;
  gap:12px; align-items:center; padding:8px 0;
  border-bottom:1px dashed var(--line);
}
.mbar:last-child{ border-bottom:none; }
.mbar-label{
  font-family:var(--font-mono); font-size:11px;
  color:var(--ink); font-weight:500;
  display:flex; align-items:center; gap:8px;
}
.mbar-label .dot{ width:8px; height:8px; border-radius:50%; }
.mbar-label .jp{
  font-family:var(--font-jp); font-size:10px;
  color:var(--ink-3); font-weight:400;
}
.mbar-track{
  height:8px; background:var(--bg-3); border-radius:4px;
  position:relative; overflow:visible;
}
.mbar-cur{
  position:absolute; left:0; top:0; bottom:0;
  background: var(--pillar); border-radius:4px;
  transition: width .6s cubic-bezier(.2,.6,.2,1);
}
.mbar-tgt-mark{
  position:absolute; top:-3px; bottom:-3px; width:2px;
  background: var(--trust-2); border-radius:1px;
}
.mbar-tgt-mark::before{
  content:""; position:absolute; top:-4px; left:-4px;
  border-left:5px solid transparent; border-right:5px solid transparent;
  border-top:5px solid var(--trust-2);
}
.mbar-val{
  font-family:var(--font-mono); font-size:12px; color:var(--ink);
  text-align:right; letter-spacing:.02em;
}
.mbar-val .delta{
  font-size:10px; color:var(--trust); margin-left:4px;
}

/* ==== Gauge ==== */
.gauge{
  position:relative;
  display:flex; flex-direction:column; align-items:center;
  padding:20px 20px 16px;
  width:220px;
}
.gauge-svg-wrap{
  position:relative;
  width:180px; height:110px;
}
.gauge-svg-wrap svg{ width:180px; height:110px; display:block; }
.gauge-v{
  position:absolute;
  left:0; right:0;
  top:22px;              /* アーク内側中央: viewBox 10-80 の間、top=22 で文字中心 y≈42 */
  display:flex;
  align-items:center;
  justify-content:center;
  height:40px;
  font-family:var(--font-display); font-size:36px;
  font-weight:300; color:var(--ink);
  font-variant-numeric:tabular-nums; letter-spacing:-0.02em;
  line-height:1;
  pointer-events:none;
}
.gauge-l{
  font-family:var(--font-mono); font-size:10px;
  color:var(--ink-3); letter-spacing:.14em; text-transform:uppercase;
  margin-top:10px;
}
.gauge-tier{
  font-family:var(--font-sans); font-size:12px;
  font-weight:500; color:var(--tier); letter-spacing:.04em;
  margin-top:4px;
}

/* ==== Coverage donut ==== */
.donut-card{ padding:24px; display:flex; flex-direction:column; align-items:center; gap:12px; }
.donut{ position:relative; width:140px; height:140px; }
.donut svg{ width:100%; height:100%; transform:rotate(-90deg); }
.donut-center{
  position:absolute; inset:0;
  display:flex; flex-direction:column; align-items:center; justify-content:center;
  gap:2px;
}
.donut-pct{
  font-family:var(--font-display); font-size:32px;
  font-weight:300; color:var(--ink);
  font-variant-numeric:tabular-nums; letter-spacing:-0.02em;
}
.donut-pct-dual{
  font-family:var(--font-display); font-size:22px;
  font-weight:300; color:var(--ink);
  font-variant-numeric:tabular-nums; letter-spacing:-0.02em;
  display:flex; align-items:baseline; gap:4px;
}
.donut-arrow{
  font-size:13px; color:var(--ink-3); font-weight:300;
  margin: 0 2px;
}
.donut-lb{
  font-family:var(--font-mono); font-size:9px;
  color:var(--ink-3); letter-spacing:.14em; text-transform:uppercase;
}
.donut-title{
  font-family:var(--font-mono); font-size:11px;
  color:var(--ink-2); letter-spacing:.14em; text-transform:uppercase;
  font-weight:500; text-align:center;
}
.donut-sub{
  font-family:var(--font-jp); font-size:11px;
  color:var(--ink-3); text-align:center;
}
.donut-legend{
  display:flex; gap:14px; justify-content:center;
  margin-top:4px;
}
.donut-legend-item{
  display:flex; align-items:center; gap:5px;
  font-family:var(--font-mono); font-size:9px;
  color:var(--ink-3); letter-spacing:.1em; text-transform:uppercase;
}
.donut-legend-swatch{
  display:inline-block; width:10px; height:10px;
  border-radius:2px;
}

/* ==== Radar ==== */
.radar-card{ padding:24px; }
.radar-card svg{ width:100%; height:auto; display:block; }

/* ==== Grids ==== */
.grid-3{ display:grid; grid-template-columns: repeat(3, 1fr); gap:16px; }
.grid-2{ display:grid; grid-template-columns: repeat(2, 1fr); gap:16px; }
.grid-4{ display:grid; grid-template-columns: repeat(4, 1fr); gap:12px; }
.grid-6{ display:grid; grid-template-columns: repeat(6, 1fr); gap:12px; }

/* ==== Threat card ==== */
.threat-card{
  display:grid; grid-template-columns: 100px 110px 1fr 80px;
  gap:14px; align-items:center;
  padding:14px 16px;
  border-bottom:1px solid var(--line);
  cursor:pointer; transition: background .15s;
}
.threat-card:hover{ background:var(--bg-2); }
.threat-card:last-child{ border-bottom:none; }
.threat-id{
  font-family:var(--font-mono); font-size:12px;
  color:var(--ink-2); font-weight:500; letter-spacing:.02em;
}
.threat-phase{
  font-family:var(--font-mono); font-size:9px;
  color:var(--ink-3); letter-spacing:.14em; text-transform:uppercase;
  background:var(--bg-2); padding:4px 8px; border-radius:999px;
  border:1px solid var(--line); text-align:center;
}
.threat-body{ display:flex; flex-direction:column; gap:4px; min-width:0; }
.threat-name{
  font-family:var(--font-jp); font-size:13px;
  color:var(--ink); font-weight:500; line-height:1.4;
}
.threat-tactic{
  font-family:var(--font-sans); font-size:10px;
  color:var(--ink-3); letter-spacing:.08em; text-transform:uppercase;
}
.threat-risk{
  display:flex; align-items:center; justify-content:flex-end; gap:6px;
  font-family:var(--font-mono); font-size:10px;
  letter-spacing:.14em; text-transform:uppercase; font-weight:500;
}
.threat-risk .dot{ width:8px; height:8px; border-radius:50%; }
.threat-risk.critical{ color:var(--danger); }
.threat-risk.critical .dot{ background:var(--danger); box-shadow:0 0 0 3px color-mix(in srgb, var(--danger) 20%, transparent); }
.threat-risk.high{ color:var(--warn); }
.threat-risk.high .dot{ background:var(--warn); }
.threat-risk.medium{ color:var(--ink-3); }
.threat-risk.medium .dot{ background:var(--ink-3); }
.threat-card.mitigated{ opacity:0.55; }
.threat-card.mitigated .threat-name{ text-decoration:line-through; text-decoration-color:var(--trust); text-decoration-thickness:1px; }

/* ==== Action kanban ==== */
.kanban{
  display:grid;
  grid-template-columns: 160px repeat(3, 1fr);
  gap:1px; background:var(--line);
  border:1px solid var(--line); border-radius:14px; overflow:hidden;
}
.kanban-head{
  background:var(--bg-2); padding:14px 16px;
  font-family:var(--font-mono); font-size:10px;
  color:var(--ink-3); letter-spacing:.14em; text-transform:uppercase;
  font-weight:500;
}
.kanban-head .period{
  font-family:var(--font-jp); font-size:10px;
  color:var(--ink-4); letter-spacing:0; text-transform:none;
  font-weight:400; margin-top:2px;
}
.kanban-pillar-head{
  background:var(--bg-2); padding:14px 12px;
  font-family:var(--font-mono); font-size:11px;
  color:var(--ink); font-weight:500; letter-spacing:.04em;
  display:flex; align-items:center; gap:8px;
  border-right:2px solid var(--pillar);
}
.kanban-pillar-head .dot{ width:8px; height:8px; border-radius:50%; background:var(--pillar); }
.kanban-cell{
  background:var(--bg-1); padding:10px;
  display:flex; flex-direction:column; gap:6px;
  min-height:80px;
}
.ktile{
  border:1px solid var(--line); border-radius:8px;
  padding:8px 10px;
  background: var(--bg-1);
  display:flex; flex-direction:column; gap:4px;
  cursor:pointer; transition: all .15s;
}
.ktile:hover{ border-color:var(--line-2); box-shadow:var(--shadow-soft); }
.ktile-code{
  font-family:var(--font-mono); font-size:10px;
  color:var(--ink-3); letter-spacing:.04em; font-weight:500;
}
.ktile-fn{
  font-family:var(--font-jp); font-size:11px;
  color:var(--ink); line-height:1.4;
}
.ktile-meta{
  display:flex; gap:6px; font-family:var(--font-mono); font-size:9px;
  letter-spacing:.1em; text-transform:uppercase;
  color:var(--ink-4);
}
.ktile-meta .lv{ color:var(--trust); font-weight:500; }
.ktile-pri{
  display:inline-block; font-size:9px;
  padding:1px 6px; border-radius:999px;
  letter-spacing:.1em; text-transform:uppercase; font-weight:600;
  font-family:var(--font-mono);
}
.ktile-pri.critical{ background: color-mix(in srgb, var(--danger) 16%, transparent); color:var(--danger); }
.ktile-pri.high{ background: color-mix(in srgb, var(--warn) 20%, transparent); color:var(--warn); }
.ktile-pri.medium{ background:var(--bg-3); color:var(--ink-3); }

/* ==== Report roadmap table ==== */
.rtable{
  width:100%; border-collapse:separate; border-spacing:0;
  border:1px solid var(--line); border-radius:14px; overflow:hidden;
  font-family:var(--font-sans); font-size:12px;
}
.rtable thead{ background:var(--bg-2); }
.rtable th{
  font-family:var(--font-mono); font-size:10px;
  color:var(--ink-3); letter-spacing:.14em; text-transform:uppercase;
  font-weight:500; text-align:left;
  padding:12px 14px; border-bottom:1px solid var(--line);
}
.rtable td{
  padding:12px 14px; border-bottom:1px solid var(--line);
  color:var(--ink-2); vertical-align:top;
}
.rtable tr:last-child td{ border-bottom:none; }
.rtable .pillar-cell{
  font-family:var(--font-mono); font-weight:500; color:var(--ink);
  display:flex; align-items:center; gap:8px;
}
.rtable .pillar-cell .dot{ width:8px; height:8px; border-radius:50%; }
.rtable .phase-cell{
  font-family:var(--font-jp); font-size:11px; line-height:1.5;
}
.rtable .phase-cell .count{
  display:inline-block; background:var(--primary-tint); color:var(--primary);
  font-family:var(--font-mono); font-size:10px; font-weight:600;
  padding:2px 8px; border-radius:999px; letter-spacing:.04em;
  margin-bottom:6px;
}

/* ==== Exec summary box ==== */
.exec-wrap{
  background:var(--bg-1); border:1px solid var(--line); border-radius:14px;
  padding:32px; margin-bottom:24px;
}
.exec-eye{
  font-family:var(--font-mono); font-size:10px;
  color:var(--primary); letter-spacing:.14em; text-transform:uppercase;
  font-weight:500; margin-bottom:12px;
}
.exec-narr{
  font-family:var(--font-jp); font-size:16px;
  color:var(--ink); line-height:1.8; font-weight:300;
}
.exec-narr em{ color:var(--primary); font-weight:500; }
.exec-narr strong{ color:var(--ink); font-weight:600; }

/* ==== Input / select ==== */
.input, .select{
  border:1px solid var(--line-2); background:var(--bg-1);
  border-radius:8px; padding:8px 12px;
  font-family:var(--font-sans); font-size:13px;
  color:var(--ink);
  transition: border-color .15s;
  font-feature-settings: "palt";
  min-width:0;
}
.input:focus, .select:focus{
  outline:none; border-color:var(--primary);
  box-shadow: 0 0 0 3px var(--primary-dim);
}
.field{
  display:flex; flex-direction:column; gap:6px;
}
.field-lb{
  font-family:var(--font-mono); font-size:10px;
  color:var(--ink-3); letter-spacing:.14em; text-transform:uppercase;
  font-weight:500;
}

/* ==== Footer ==== */
.footer{
  border-top:1px solid var(--line);
  padding:48px; margin-top:64px;
}
.footer-inner{
  max-width:1280px; margin:0 auto;
  display:flex; justify-content:space-between; align-items:center;
  gap:24px; flex-wrap:wrap;
}
.footer-brand{ display:flex; align-items:center; gap:12px; }
.footer-brand svg{ width:24px; height:24px; }
.footer-label{
  font-family:var(--font-mono); font-size:10px;
  color:var(--ink-3); letter-spacing:.14em; text-transform:uppercase;
}
.footer-sub{
  font-family:var(--font-jp); font-size:11px;
  color:var(--ink-3); font-weight:300;
}

/* ==== Toast ==== */
.toast{
  position:fixed; bottom:32px; left:50%; transform:translateX(-50%);
  background:var(--ink-0); color:var(--bg);
  padding:12px 22px; border-radius:999px;
  font-family:var(--font-sans); font-size:13px; font-weight:500;
  box-shadow:var(--shadow-lift);
  z-index:200;
  animation: toast-in .3s cubic-bezier(.2,.6,.2,1);
}
@keyframes toast-in{ from{opacity:0; transform:translate(-50%, 12px)} to{opacity:1; transform:translate(-50%,0)} }

/* ==== Modal ==== */
.modal-bd{
  position:fixed; inset:0; background:rgba(0,23,68,.4);
  backdrop-filter: blur(4px);
  z-index:150;
  display:flex; align-items:center; justify-content:center;
  padding:40px 20px;
  animation: fadein .2s ease;
}
.modal{
  background:var(--bg-1); border-radius:14px;
  max-width:560px; width:100%; max-height:80vh; overflow:auto;
  padding:28px; box-shadow:var(--shadow-lift);
  border:1px solid var(--line);
}
.modal h3{
  font-family:var(--font-display); font-size:20px; font-weight:500;
  margin:0 0 16px 0; color:var(--ink);
}

/* ==== Responsive ==== */
@media (max-width: 1100px){
  .section{ padding: 48px 32px; }
  .section.hero{ padding: 88px 32px 56px; }
  .grid-6{ grid-template-columns: repeat(3, 1fr); }
  .grid-4{ grid-template-columns: repeat(2, 1fr); }
  .matrix{ grid-template-columns: 150px repeat(4, 1fr) 100px; }
  .kanban{ grid-template-columns: 140px repeat(3, 1fr); }
  .threat-card{ grid-template-columns: 90px 1fr 80px; }
  .threat-card .threat-phase{ display:none; }
}
@media (max-width: 820px){
  .topbar{ padding:0 16px; gap:10px; }
  .brand-sub{ display:none; }
  .nav-chapter{ padding:0 10px; }
  .nav-chapter .lb{ display:none; }
  .tag.live, .tag.fbadge{ display:none; }
  .section{ padding: 56px 20px; }
  .section.hero{ padding: 56px 20px; }
  .stats-row{ grid-template-columns: 1fr; gap:24px; }
  .grid-3, .grid-2{ grid-template-columns: 1fr; }
  .grid-6, .grid-4{ grid-template-columns: repeat(2, 1fr); }
  .chapter-marker{ gap:10px; }
  .matrix{
    grid-template-columns: 1fr;
    border-radius:10px;
  }
  .matrix-head, .matrix-row-head, .matrix-status{ display:none; }
  .mcell{ min-height:60px; }
  .kanban{ grid-template-columns: 1fr; }
  .kanban-head{ display:none; }
  .footer{ padding:36px 20px; }
}
@media (max-width: 560px){
  .avatar{ display:none; }
  .footer-label{ font-size:9px; letter-spacing:.10em; }
  .threat-card{ grid-template-columns: 1fr 80px; }
  .threat-card .threat-id{ display:none; }
}

/* ==================================================================
   ZTELIER COMMON KIT v2.0 — UNIFICATION PATCH (AUTO-INJECTED)
   ==================================================================
*/
/* ============================================================
   Ztelier v2.0 — Common Kit Unification Patch
   Applied to: Amp / CSFA / Endeavor / MAAZ / forg / pupy
   Strategy: Non-destructive overlay. Adds v2 tokens + v2
   components + micro-interaction polish on top of existing v1.
   Fallback chains absorb CSFA's --bg-0/--ink-1 naming.
   ============================================================ */

/* ---------- v2 additive tokens (Paper) ---------- */
:root,
[data-theme="paper"]{
  /* 6段階Inkの補完 (既存5段階にGhostを追加) */
  --ink-ghost:    #D5DCE6;

  /* v2 エイリアス — 「Blue」命名で v2 ガイドと整合 */
  --blue:         var(--primary, #246CF7);
  --blue-dark:    var(--primary-2, #1853CC);
  --blue-tint:    var(--primary-tint, #E8EFFD);
  --blue-glow:    rgba(36, 108, 247, 0.14);
  --line-focus:   var(--primary, #246CF7);
  --line-strong:  var(--line-2, #C9D1DE);

  /* Semantic tints (未定義ファイル向けのフォールバック値) */
  --trust-tint:   #EEF3E6;
  --warn-tint:    #FAF1DF;
  --danger-tint:  #F8E7E7;

  /* Zero Trust 7 柱の固定色 (v2 標準) */
  --p-identity:    #1853CC;
  --p-devices:     #7BA05B;
  --p-networks:    #5B4B9E;
  --p-apps:        #B5832C;
  --p-data:        #A0517E;
  --p-visibility:  #3D8888;
  --p-automation:  #4A6FA5;

  /* v2 Horizon Gradient — 現在→未来 */
  --horizon-from:  #E8EFFD;
  --horizon-mid:   #DCE8FB;
  --horizon-to:    #CFE0F9;

  /* v2 radius / motion 標準 */
  --r-sm:  6px;
  --r-md:  10px;
  --r-lg:  14px;
  --r-pill: 999px;
  --ease-z: cubic-bezier(0.22, 0.61, 0.36, 1);
  --dur-fast: 180ms;
  --dur-z:    280ms;
  --dur-slow: 520ms;
  --shadow-focus-v2: 0 0 0 3px var(--blue-glow);
}

/* ---------- Indigo theme 差分 ---------- */
[data-theme="indigo"]{
  --ink-ghost:    #2E416B;
  --blue-glow:    rgba(91, 142, 255, 0.22);
  --horizon-from: #0C1730;
  --horizon-mid:  #122044;
  --horizon-to:   #1B2D5C;
  --trust-tint:   #14291A;
  --warn-tint:    #2B1F0D;
  --danger-tint:  #2B1212;
}

/* ============================================================
   Focus ring — WCAG 2.2 AA を満たす統一リング
   既存 outline を上書きせず、補強のみ
   ============================================================ */
:focus-visible{
  outline: 2px solid var(--blue, #246CF7);
  outline-offset: 2px;
}
button:focus-visible,
a:focus-visible,
[role="button"]:focus-visible,
input:focus-visible,
select:focus-visible,
textarea:focus-visible{
  outline: 2px solid var(--blue, #246CF7);
  outline-offset: 2px;
  box-shadow: var(--shadow-focus-v2);
}

/* ============================================================
   v2 Component: Chapter Marker
   「Chapter 02  ───  Maturity · 成熟度」 パターン
   ============================================================ */
.zt2-chapter{
  display: inline-flex;
  align-items: center;
  gap: 14px;
  font-family: var(--font-mono, "JetBrains Mono", monospace);
  font-size: 11px;
  letter-spacing: 0.18em;
  text-transform: uppercase;
  color: var(--ink-3, var(--ink-2, #6B7A95));
}
.zt2-chapter__num{ color: var(--blue); font-weight: 500; }
.zt2-chapter__line{
  display:inline-block;
  width: 36px; height: 1px;
  background: var(--line-2, var(--line-1, #C9D1DE));
}

/* ============================================================
   v2 Component: Kicker (統一仕様)
   既存 .kicker を再定義せず、.zt2-kicker として追加
   ============================================================ */
.zt2-kicker{
  font-family: var(--font-mono, monospace);
  font-size: 11px;
  letter-spacing: 0.18em;
  text-transform: uppercase;
  color: var(--blue);
  font-weight: 500;
  margin-bottom: 12px;
  display: inline-block;
}

/* ============================================================
   v2 Component: Z-Flow Grid (思考の Z 字動線)
   ============================================================ */
.zt2-zflow{
  position: relative;
  padding: 32px;
  background: var(--bg-2, var(--bg-2, #F1F4F8));
  border: 1px solid var(--line, var(--line-1, #E1E6EE));
  border-radius: var(--r-lg);
  background-image: radial-gradient(circle, var(--line-2, var(--line-strong, #C9D1DE)) 1px, transparent 1px);
  background-size: 24px 24px;
  background-position: -1px -1px;
}
.zt2-zflow__grid{
  display: grid;
  grid-template-columns: repeat(3, 1fr);
  gap: 20px;
  position: relative;
}
.zt2-zflow__cell{
  background: var(--bg-1, #FFFFFF);
  border: 1px solid var(--line, var(--line-1, #E1E6EE));
  border-radius: var(--r-md);
  padding: 18px;
  position: relative;
  min-height: 120px;
  transition: transform var(--dur-z) var(--ease-z), box-shadow var(--dur-z) var(--ease-z);
}
.zt2-zflow__cell.is-subject{
  border-color: var(--blue);
  box-shadow: var(--shadow-focus-v2);
}
.zt2-zflow__cell:hover{
  transform: translateY(-1px);
}
.zt2-zflow__step{
  position: absolute;
  top: -12px; left: -12px;
  width: 28px; height: 28px;
  border-radius: 50%;
  background: var(--blue);
  color: #fff;
  font-family: var(--font-mono);
  font-size: 12px; font-weight: 600;
  display: flex; align-items: center; justify-content: center;
  box-shadow: 0 0 0 4px var(--bg-2, #F1F4F8);
}
.zt2-zflow__step.is-supporting{ background: var(--ink-ghost); color: var(--ink-3); }
.zt2-zflow__label{
  font-family: var(--font-mono);
  font-size: 10px;
  letter-spacing: 0.14em;
  color: var(--ink-3, var(--ink-2));
  text-transform: uppercase;
  margin-bottom: 8px;
}
.zt2-zflow__title{
  font-family: var(--font-display, var(--font-sans));
  font-size: 15px; font-weight: 500;
  color: var(--ink, var(--ink-1));
  margin: 0 0 6px;
  line-height: 1.35;
}
.zt2-zflow__body{
  font-size: 12px;
  color: var(--ink-2);
  line-height: 1.65;
  margin: 0;
}

/* ============================================================
   v2 Component: Horizon Bar (現在→未来の帯)
   ============================================================ */
.zt2-horizon{
  background: var(--bg-1, #FFFFFF);
  border: 1px solid var(--line, var(--line-1, #E1E6EE));
  border-radius: var(--r-lg);
  padding: 32px;
}
.zt2-horizon__track{
  position: relative;
  height: 64px;
  border-radius: var(--r-md);
  background: linear-gradient(90deg, var(--horizon-from), var(--horizon-mid), var(--horizon-to));
  overflow: visible;
  margin: 28px 0 16px;
}
.zt2-horizon__now{
  position: absolute;
  top: 0; bottom: 0;
  width: 2px;
  background: var(--blue);
  z-index: 2;
}
.zt2-horizon__now::after{
  content: "NOW";
  position: absolute;
  top: -22px; left: 50%;
  transform: translateX(-50%);
  font-family: var(--font-mono);
  font-size: 10px;
  color: var(--blue);
  letter-spacing: 0.14em;
  background: var(--bg, var(--bg-0));
  padding: 2px 6px;
  border-radius: 3px;
  font-weight: 500;
}
.zt2-horizon__future{
  position: absolute;
  right: 12px; top: 50%;
  transform: translateY(-50%);
  color: var(--p-networks);
  font-family: var(--font-mono);
  font-size: 11px;
  letter-spacing: 0.14em;
}
.zt2-horizon__future::before{ content: "→  "; font-size: 14px; }
.zt2-horizon__stages{
  display: grid;
  grid-template-columns: repeat(4, 1fr);
  gap: 16px;
  margin-top: 24px;
}
.zt2-horizon__stage{
  padding: 14px 16px;
  border: 1px solid var(--line, var(--line-1));
  border-radius: var(--r-md);
  background: var(--bg-1, #FFFFFF);
}
.zt2-horizon__stage.is-current{
  border-color: var(--blue);
  background: var(--blue-tint);
}
[data-theme="indigo"] .zt2-horizon__stage.is-current{
  background: var(--bg-3);
}
.zt2-horizon__stage-num{
  font-family: var(--font-mono);
  font-size: 10px;
  letter-spacing: 0.14em;
  color: var(--ink-3, var(--ink-2));
  margin-bottom: 4px;
}
.zt2-horizon__stage.is-current .zt2-horizon__stage-num{ color: var(--blue); }
.zt2-horizon__stage-name{
  font-family: var(--font-display, var(--font-sans));
  font-size: 14px; font-weight: 500;
  color: var(--ink, var(--ink-1));
  margin-bottom: 2px;
}
.zt2-horizon__stage-meta{
  font-size: 11px;
  color: var(--ink-3, var(--ink-2));
}

/* ============================================================
   v2 Component: Pillar Rail / Dot (7 柱分類)
   ============================================================ */
.zt2-pillar{
  border-left: 3px solid var(--pillar-color, var(--blue));
  padding-left: 12px;
}
.zt2-pillar-dot{
  display: inline-block;
  width: 8px; height: 8px;
  border-radius: 50%;
  background: var(--pillar-color, var(--blue));
  margin-right: 8px;
  vertical-align: middle;
  flex-shrink: 0;
}
.zt2-pillar--identity{    --pillar-color: var(--p-identity); }
.zt2-pillar--devices{     --pillar-color: var(--p-devices); }
.zt2-pillar--networks{    --pillar-color: var(--p-networks); }
.zt2-pillar--apps{        --pillar-color: var(--p-apps); }
.zt2-pillar--data{        --pillar-color: var(--p-data); }
.zt2-pillar--visibility{  --pillar-color: var(--p-visibility); }
.zt2-pillar--automation{  --pillar-color: var(--p-automation); }

/* ============================================================
   v2 Component: Ink Scale (6段階可視化)
   ============================================================ */
.zt2-ink-scale{
  display: grid;
  grid-template-columns: repeat(6, 1fr);
  gap: 0;
  border: 1px solid var(--line, var(--line-1));
  border-radius: var(--r-md);
  overflow: hidden;
  background: var(--bg-1, #FFFFFF);
}
.zt2-ink-scale__item{
  padding: 14px 12px;
  border-right: 1px solid var(--line, var(--line-1));
}
.zt2-ink-scale__item:last-child{ border-right: none; }
.zt2-ink-scale__dot{
  width: 14px; height: 14px;
  border-radius: 3px;
  margin-bottom: 10px;
}

/* ============================================================
   既存コンポーネントの micro-interaction 統一
   (既存の .btn / .card / .tag / .topbar を弱めに上書き)
   ============================================================ */

/* Buttons — 押下感・フォーカス統一 */
.btn{
  transition:
    background var(--dur-fast) var(--ease-z),
    border-color var(--dur-fast) var(--ease-z),
    color var(--dur-fast) var(--ease-z),
    box-shadow var(--dur-fast) var(--ease-z),
    transform var(--dur-fast) var(--ease-z);
}
.btn:active{ transform: translateY(1px); }
.btn.primary:focus-visible{ box-shadow: var(--shadow-focus-v2); }

/* Cards — 浮き上がりの統一 */
.card{
  transition:
    transform var(--dur-z) var(--ease-z),
    box-shadow var(--dur-z) var(--ease-z),
    border-color var(--dur-z) var(--ease-z);
}

/* Tag / Pill — v2 variants */
.tag, .pill{
  transition: all var(--dur-fast) var(--ease-z);
}
.tag--zt2-blue, .pill--zt2-blue{
  background: var(--blue-tint);
  color: var(--blue-dark);
  border-color: transparent;
}
.tag--zt2-trust, .pill--zt2-trust{
  background: var(--trust-tint);
  color: var(--trust);
  border-color: transparent;
}
.tag--zt2-warn, .pill--zt2-warn{
  background: var(--warn-tint);
  color: var(--warn);
  border-color: transparent;
}
.tag--zt2-active, .pill--zt2-active{
  background: var(--ink-0, var(--ink-deep, #001744));
  color: #fff;
  border-color: var(--ink-0, #001744);
}

/* Topbar — スムーズなテーマ切替 */
.topbar{
  transition:
    background var(--dur-z) var(--ease-z),
    border-color var(--dur-z) var(--ease-z);
}

/* ============================================================
   v2 Utilities
   ============================================================ */
.zt2-ink-deep    { color: var(--ink-0) !important; }
.zt2-ink-primary { color: var(--ink, var(--ink-1)) !important; }
.zt2-ink-sec     { color: var(--ink-2) !important; }
.zt2-ink-muted   { color: var(--ink-3) !important; }
.zt2-ink-faint   { color: var(--ink-4) !important; }
.zt2-ink-ghost   { color: var(--ink-ghost) !important; }

.zt2-mono{
  font-family: var(--font-mono);
  letter-spacing: 0.14em;
  text-transform: uppercase;
  font-size: 11px;
  color: var(--ink-3, var(--ink-2));
}

/* Large metric (KPI) — v2 標準 */
.zt2-metric{
  font-family: var(--font-display, var(--font-sans));
  font-weight: 300;
  font-size: 48px;
  line-height: 1;
  color: var(--ink, var(--ink-1));
  letter-spacing: -0.01em;
}
.zt2-metric__unit{
  font-size: 14px;
  color: var(--ink-3);
  margin-left: 4px;
  font-weight: 400;
}

/* ============================================================
   Reduced motion — アクセシビリティ
   ============================================================ */
@media (prefers-reduced-motion: reduce){
  *, *::before, *::after{
    animation-duration: 0.01ms !important;
    animation-iteration-count: 1 !important;
    transition-duration: 0.01ms !important;
    scroll-behavior: auto !important;
  }
}

/* ============================================================

function Gauge({ score, label, size=180 }){
  const tier = tierOfScore(score);
  const col = tierColor(tier);
  const r = 70, cx = 90, cy = 80;
  const sweep = Math.PI;
  const pct = Math.max(0, Math.min(100, score)) / 100;
  const x1 = cx - r, y1 = cy;
  const x2 = cx + r, y2 = cy;
  // 角度: 0% で -π (左端 180°)、100% で 0 (右端 0°)
  // start から end への弧はすべて「上半円」の一部なので large-arc-flag は常に 0
  const ang = sweep * pct - Math.PI;
  const px = cx + r * Math.cos(ang);
  const py = cy + r * Math.sin(ang);
  return (
    <div className="gauge" style={{ "--tier": col }}>
      <div className="gauge-svg-wrap">
        <svg viewBox="0 0 180 110">
          <path d={`M ${x1} ${y1} A ${r} ${r} 0 0 1 ${x2} ${y2}`} fill="none" stroke="var(--bg-3)" strokeWidth="12" strokeLinecap="round"/>
          {pct > 0 && (
            <path d={`M ${x1} ${y1} A ${r} ${r} 0 0 1 ${px} ${py}`} fill="none" stroke={col} strokeWidth="12" strokeLinecap="round"/>
          )}
        </svg>
        <div className="gauge-v num">{Math.round(score)}</div>
      </div>
      <div className="gauge-l">{label || "MATURITY"}</div>
      <div className="gauge-tier">{tier}</div>
    </div>
  );
}

function CoverageDonut({ title, sub, covered, total, coveredAsIs, tone="primary" }){
  const R = 54, C = 2 * Math.PI * R;
  const strokeToBe  = tone === "trust" ? "var(--trust)" : "var(--primary)";
  const strokeAsIs  = tone === "trust" ? "var(--trust-weak)" : "var(--primary-weak)";
  const hasAsIs = typeof coveredAsIs === "number";

  const pctToBe  = total > 0 ? covered / total : 0;
  const pctAsIs  = (hasAsIs && total > 0) ? coveredAsIs / total : 0;

  // TO-BE フル円描画 → AS-IS を上に重ねる（薄い色が内側、濃い色が外側に見える）
  const offToBe = C - C * pctToBe;
  const offAsIs = C - C * pctAsIs;

  return (
    <div className="donut-card card">
      <div className="donut">
        <svg viewBox="0 0 120 120">
          {/* 土台: 未カバー分のグレー全円 */}
          <circle cx="60" cy="60" r={R} fill="none" stroke="var(--bg-3)" strokeWidth="10"/>
          {/* TO-BE カバレッジ全体（AS-IS + 新規追加分、濃色） */}
          <circle cx="60" cy="60" r={R} fill="none" stroke={strokeToBe} strokeWidth="10" strokeLinecap="round"
                  strokeDasharray={C} strokeDashoffset={offToBe}/>
          {/* AS-IS（既存カバー分、薄色で TO-BE の一部を上書き） */}
          {hasAsIs && pctAsIs > 0 && (
            <circle cx="60" cy="60" r={R} fill="none" stroke={strokeAsIs} strokeWidth="10" strokeLinecap="round"
                    strokeDasharray={C} strokeDashoffset={offAsIs}/>
          )}
        </svg>
        <div className="donut-center">
          {hasAsIs ? (
            <>
              <div className="donut-pct-dual num">
                <span style={{color:"var(--ink-3)"}}>{Math.round(pctAsIs * 100)}</span>
                <span className="donut-arrow">→</span>
                <span>{Math.round(pctToBe * 100)}<span style={{fontSize:"13px",color:"var(--ink-3)",marginLeft:"1px"}}>%</span></span>
              </div>
              <div className="donut-lb">{coveredAsIs} → {covered} / {total}</div>
            </>
          ) : (
            <>
              <div className="donut-pct num">{Math.round(pctToBe * 100)}<span style={{fontSize:"15px",color:"var(--ink-3)",marginLeft:"2px"}}>%</span></div>
              <div className="donut-lb">{covered}/{total}</div>
            </>
          )}
        </div>
      </div>
      <div className="donut-title">{title}</div>
      {sub && <div className="donut-sub">{sub}</div>}
      {hasAsIs && (
        <div className="donut-legend">
          <span className="donut-legend-item"><span className="donut-legend-swatch" style={{background:strokeAsIs}}></span>AS-IS</span>
          <span className="donut-legend-item"><span className="donut-legend-swatch" style={{background:strokeToBe}}></span>TO-BE</span>
        </div>
      )}
    </div>
  );
}

function Radar({ data }){
  const size = 280, cx = size/2, cy = size/2, R = 100;
  const n = data.length;
  const pt = (v, i) => {
    const a = (i / n) * 2 * Math.PI - Math.PI/2;
    const r = (v / 4) * R;
    return [cx + r * Math.cos(a), cy + r * Math.sin(a)];
  };
  const axisPt = (i, r) => {
    const a = (i / n) * 2 * Math.PI - Math.PI/2;
    return [cx + r * Math.cos(a), cy + r * Math.sin(a)];
  };
  const curPath = data.map((d,i) => pt(d.cur,i).join(",")).join(" ");
  const tgtPath = data.map((d,i) => pt(d.tgt,i).join(",")).join(" ");
  return (
    <div className="radar-card card">
      <svg viewBox={`0 0 ${size} ${size}`}>
        {[1,2,3,4].map(v => (
          <polygon key={v}
            points={data.map((d,i) => axisPt(i, (v/4)*R).join(",")).join(" ")}
            fill="none" stroke="var(--line)" strokeWidth="1"/>
        ))}
        {data.map((d,i) => {
          const [ax,ay] = axisPt(i, R);
          return <line key={i} x1={cx} y1={cy} x2={ax} y2={ay} stroke="var(--line)" strokeWidth="1"/>;
        })}
        <polygon points={tgtPath} fill="var(--trust-dim)" stroke="var(--trust)" strokeWidth="1.5" strokeDasharray="3,3"/>
        <polygon points={curPath} fill="var(--primary-dim)" stroke="var(--primary)" strokeWidth="2"/>
        {data.map((d,i) => {
          const [lx,ly] = axisPt(i, R + 18);
          const c = pillarOf(d.pillar);
          return (
            <g key={i}>
              <text x={lx} y={ly} fontFamily="var(--font-mono)" fontSize="10" fill="var(--ink-2)" textAnchor="middle" dominantBaseline="middle" style={{letterSpacing:".04em"}}>{c.code}</text>
            </g>
          );
        })}
      </svg>
      <div style={{ display:"flex", gap:"16px", justifyContent:"center", marginTop:"12px", fontSize:"11px", color:"var(--ink-3)", fontFamily:"var(--font-mono)", letterSpacing:".04em"}}>
        <span><span style={{display:"inline-block",width:"10px",height:"2px",background:"var(--primary)",marginRight:"6px",verticalAlign:"middle"}}></span>AS-IS</span>
        <span><span style={{display:"inline-block",width:"10px",height:"2px",background:"var(--trust)",marginRight:"6px",verticalAlign:"middle",borderTop:"2px dashed var(--trust)"}}></span>TO-BE</span>
      </div>
    </div>
  );
}

            <CoverageDonut title="MITRE ATLAS" sub="AI Security" covered={atlCovered} coveredAsIs={atlCoveredAsIs} total={atlTotal} tone="primary"/>
            <CoverageDonut title="ZTMM Maturity" sub={`${LEVEL_LABELS[Math.round(ztmmOverall.curAvg)-1] || "Traditional"} → ${LEVEL_LABELS[Math.round(ztmmOverall.tgtAvg)-1] || "Optimal"}`} covered={Math.round(ztmmOverall.tgt)} coveredAsIs={Math.round(ztmmOverall.cur)} total={100} tone="trust"/>
          </div>
        </div>
      </section>

      <section className="section">
        <div className="container">
          <ChapterMarker num="01.3" label="Pillar Radar" jp="6ピラーレーダー"/>
          <div className="grid-2 reveal">
            <Radar data={radarData}/>
            <div className="card elevated" style={{padding:"28px",display:"flex",flexDirection:"column",gap:"20px"}}>
              {(() => {
                // 形状診断: 6柱 curAvg の分布から型を分類
                const curs = PILLAR_ORDER.map(p => pillarScores[p].curAvg);
                const mean = curs.reduce((a,b) => a+b, 0) / curs.length;
                const variance = curs.reduce((a,b) => a + Math.pow(b-mean, 2), 0) / curs.length;
                const sd = Math.sqrt(variance);
                const range = Math.max(...curs) - Math.min(...curs);
                let shapeType, shapeIcon, shapeDesc;
                if (mean < 1.8) {
                  shapeType = "基礎構築型";
                  shapeIcon = "⊙";
                  shapeDesc = "全柱がLv2未満。まず基礎の底上げが必要。投資分散を避け、高リスク領域から順次強化を推奨します。";
                } else if (range >= 1.5) {
                  const strongest = PILLAR_ORDER[curs.indexOf(Math.max(...curs))];
                  const weakest = PILLAR_ORDER[curs.indexOf(Math.min(...curs))];
                  shapeType = "偏在型";
                  shapeIcon = "◭";
                  shapeDesc = `${strongest}が先行、${weakest}が遅延。最弱柱が全体の実効性を制約するため、ここへの集中投資が効果的です。`;
                } else if (sd < 0.3) {
                  shapeType = "均整型";
                  shapeIcon = "⬡";
                  shapeDesc = "全柱がバランスよく進捗。ただし横並び成熟は攻撃者に隙を与えにくい反面、突出領域がないため中位水準で止まりがち。";
                } else {
                  shapeType = "進行型";
                  shapeIcon = "◇";
                  shapeDesc = "複数柱が成熟に向けて進行中。各柱のギャップを順次解消しながら全体底上げを図る段階です。";
                }

                // 優先順位ラダー: ギャップ降順TOP3
                const ladder = PILLAR_ORDER
                  .map(p => ({
                    pillar: p,
                    gap: pillarScores[p].gap,
                    newThreats: pillarScores[p].newThreats,
                    curAvg: pillarScores[p].curAvg,
                    tgtAvg: pillarScores[p].tgtAvg
                  }))
                  .filter(x => x.gap > 0)
                  .sort((a,b) => b.gap - a.gap)
                  .slice(0, 3);

                // 次アクション予告: 最大ギャップ柱の critical/quick-win を抽出
                const topPillar = ladder[0]?.pillar;
                const priorityActions = (actionItems || [])
                  .filter(a => a.pillar === topPillar)
                  .sort((a,b) => {
                    const pr = { critical:0, high:1, medium:2 };
                    const pp = { "quick-win":0, "short-term":1, strategic:2 };
                    if (pr[a.priority] !== pr[b.priority]) return pr[a.priority] - pr[b.priority];
                    return pp[a.phase] - pp[b.phase];
                  })
                  .slice(0, 3);

                return (
                  <>
                    {/* Section 1: Shape Diagnosis */}
                    <div>
                      <div style={{fontFamily:"var(--font-mono)",fontSize:"10px",color:"var(--ink-3)",letterSpacing:".14em",textTransform:"uppercase",marginBottom:"12px"}}>Shape Diagnosis · 形状診断</div>
                      <div style={{display:"flex",gap:"14px",alignItems:"flex-start"}}>
                        <div style={{fontSize:"36px",lineHeight:"1",color:"var(--primary)",flexShrink:0,marginTop:"-4px"}}>{shapeIcon}</div>
                        <div>
                          <div style={{fontFamily:"var(--font-jp)",fontSize:"15px",fontWeight:600,color:"var(--ink)",marginBottom:"4px"}}>{shapeType}</div>
                          <div style={{fontFamily:"var(--font-jp)",fontSize:"12px",lineHeight:"1.65",color:"var(--ink-2)"}}>{shapeDesc}</div>
                          <div style={{fontFamily:"var(--font-mono)",fontSize:"10px",color:"var(--ink-3)",marginTop:"8px",letterSpacing:".04em"}}>
                            μ={mean.toFixed(2)} · σ={sd.toFixed(2)} · range={range.toFixed(2)}
                          </div>
                        </div>
                      </div>
                    </div>

                    {/* Section 2: Priority Ladder */}
                    {ladder.length > 0 && (
                      <div style={{borderTop:"1px solid var(--line)",paddingTop:"18px"}}>
                        <div style={{fontFamily:"var(--font-mono)",fontSize:"10px",color:"var(--ink-3)",letterSpacing:".14em",textTransform:"uppercase",marginBottom:"12px"}}>Priority Ladder · 投資優先順位</div>
                        <div style={{display:"flex",flexDirection:"column",gap:"8px"}}>
                          {ladder.map((x, i) => {
                            const pi = pillarOf(x.pillar);
                            return (
                              <div key={x.pillar} style={{display:"grid",gridTemplateColumns:"24px 1fr auto",gap:"12px",alignItems:"center"}}>
                                <div style={{fontFamily:"var(--font-mono)",fontSize:"18px",fontWeight:300,color:"var(--ink-3)",lineHeight:1,letterSpacing:"-0.02em"}}>{i+1}</div>
                                <div>
                                  <div style={{display:"flex",alignItems:"center",gap:"8px"}}>
                                    <span style={{width:"8px",height:"8px",borderRadius:"50%",background:`var(${pi.var})`,flexShrink:0}}></span>
                                    <span style={{fontFamily:"var(--font-sans)",fontSize:"13px",fontWeight:500,color:"var(--ink)"}}>{x.pillar}</span>
                                  </div>
                                  <div style={{fontFamily:"var(--font-mono)",fontSize:"10px",color:"var(--ink-3)",marginTop:"2px",letterSpacing:".04em"}}>
                                    Lv{x.curAvg.toFixed(1)} → Lv{x.tgtAvg.toFixed(1)}
                                  </div>
                                </div>
                                <div style={{textAlign:"right"}}>
                                  <div style={{fontFamily:"var(--font-mono)",fontSize:"13px",fontWeight:500,color:"var(--primary)",fontVariantNumeric:"tabular-nums"}}>Gap {x.gap.toFixed(2)}</div>
                                  <div style={{fontFamily:"var(--font-mono)",fontSize:"10px",color:"var(--trust)",marginTop:"2px",letterSpacing:".04em"}}>+{x.newThreats} 技法緩和</div>
                                </div>
                              </div>
                            );
                          })}
                        </div>
                      </div>
                    )}

                    {/* Section 3: Next Actions Preview */}
                    {priorityActions.length > 0 && (
                      <div style={{borderTop:"1px solid var(--line)",paddingTop:"18px"}}>
                        <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:"12px"}}>
                          <div style={{fontFamily:"var(--font-mono)",fontSize:"10px",color:"var(--ink-3)",letterSpacing:".14em",textTransform:"uppercase"}}>Next Actions · {topPillar} 最優先</div>
                          {onGotoActions && (
                            <button onClick={onGotoActions}
                              style={{fontFamily:"var(--font-mono)",fontSize:"10px",color:"var(--primary)",letterSpacing:".08em",textTransform:"uppercase",padding:"3px 8px",border:"1px solid var(--primary)",borderRadius:"4px",background:"transparent",cursor:"pointer"}}>
                              詳細 →
                            </button>
                          )}
                        </div>
                        <div style={{display:"flex",flexDirection:"column",gap:"8px"}}>
                          {priorityActions.map(a => {
                            const priColor = a.priority === "critical" ? "var(--danger)" : a.priority === "high" ? "var(--warn)" : "var(--ink-3)";
                            return (
                              <div key={a.id + "-" + a.toLv} style={{display:"grid",gridTemplateColumns:"auto 1fr auto",gap:"10px",alignItems:"center",padding:"8px 10px",background:"var(--bg-2)",borderRadius:"4px"}}>
                                <span style={{fontFamily:"var(--font-mono)",fontSize:"10px",fontWeight:600,color:priColor,letterSpacing:".04em",textTransform:"uppercase"}}>{a.priority}</span>
                                <div style={{minWidth:0}}>
                                  <div style={{fontFamily:"var(--font-jp)",fontSize:"12px",fontWeight:500,color:"var(--ink)",overflow:"hidden",textOverflow:"ellipsis",whiteSpace:"nowrap"}}>{a.fn}</div>
                                  <div style={{fontFamily:"var(--font-jp)",fontSize:"10px",color:"var(--ink-3)",marginTop:"1px",overflow:"hidden",textOverflow:"ellipsis",whiteSpace:"nowrap"}}>{a.desc}</div>
                                </div>
                                <span style={{fontFamily:"var(--font-mono)",fontSize:"10px",color:"var(--ink-3)",letterSpacing:".04em",flexShrink:0}}>Lv{a.fromLv}→{a.toLv}</span>
                              </div>
                            );
                          })}
                        </div>
                      </div>
                    )}
                  </>
                );
              })()}
            </div>
          </div>
        </div>
      </section>

      {/* ============ CISO Report merged sections (v1.1) ============ */}
      {/* === Chapter 01.4: Roadmap Table === */}
      <section className="section">
        <div className="container">
          <ChapterMarker num="01.4" label="Roadmap Table" jp="ロードマップ表"/>
          <p className="lede-jp reveal" style={{marginBottom:"16px",fontSize:"13px",color:"var(--ink-2)"}}>
            各ピラーの推奨施策を Quick Win (0–3ヶ月) / Short-term (3–6ヶ月) / Strategic (6–12ヶ月) の3フェーズで整理。
          </p>
          <table className="rtable reveal">
            <thead>
              <tr>
                <th>Pillar</th>
                <th>Quick Win · 0–3M</th>
                <th>Short-term · 3–6M</th>
                <th>Strategic · 6–12M</th>
              </tr>
            </thead>
            <tbody>
              {PILLAR_ORDER.map(p => {
                const pi = pillarOf(p);
                const items = (actionItems || []).filter(a => a.pillar === p);
                const qw = items.filter(a => a.phase === "quick-win");
                const st = items.filter(a => a.phase === "short-term");
                const sg = items.filter(a => a.phase === "strategic");
                return (
                  <tr key={p}>
                    <td className="pillar-cell"><span className="dot" style={{background:`var(${pi.var})`}}></span>{pi.code} <span style={{fontFamily:"var(--font-jp)",fontSize:"11px",color:"var(--ink-3)",fontWeight:400,marginLeft:"4px"}}>· {pi.jp}</span></td>
                    <td className="phase-cell">
                      {qw.length > 0 && <div className="count">{qw.length}</div>}
                      {qw.map((a,i) => <div key={i} style={{fontSize:"11px",color:"var(--ink-2)",marginBottom:"2px"}}>{a.id} → Lv{a.toLv}</div>)}
                      {qw.length === 0 && <span style={{color:"var(--ink-4)"}}>—</span>}
                    </td>
                    <td className="phase-cell">
                      {st.length > 0 && <div className="count">{st.length}</div>}
                      {st.map((a,i) => <div key={i} style={{fontSize:"11px",color:"var(--ink-2)",marginBottom:"2px"}}>{a.id} → Lv{a.toLv}</div>)}
                      {st.length === 0 && <span style={{color:"var(--ink-4)"}}>—</span>}
                    </td>
                    <td className="phase-cell">
                      {sg.length > 0 && <div className="count">{sg.length}</div>}
                      {sg.map((a,i) => <div key={i} style={{fontSize:"11px",color:"var(--ink-2)",marginBottom:"2px"}}>{a.id} → Lv{a.toLv}</div>)}
                      {sg.length === 0 && <span style={{color:"var(--ink-4)"}}>—</span>}
                    </td>
                  </tr>
                );
              })}
            </tbody>
          </table>
        </div>
      </section>

      {/* === Chapter 01.5: Residual Critical Threats === */}
      {(() => {
        const criticalThreats = TECHNIQUES.filter(t => t.risk === "critical" && !threatCoverage.coveredToBeSet.has(t.id));
        return (
          <section className="section">
            <div className="container">
              <ChapterMarker num="01.5" label="Residual Critical Threats" jp="残余クリティカル脅威"/>
              <p className="lede-jp reveal" style={{marginBottom:"16px",fontSize:"13px",color:"var(--ink-2)"}}>
                TO-BE 到達後も緩和できない critical リスクの脅威。追加対策・受容判断の対象として整理します。
              </p>
              <div className="card elevated reveal" style={{padding:"0",overflow:"hidden"}}>
                {criticalThreats.length === 0 && (
                  <div style={{padding:"32px",textAlign:"center",color:"var(--trust)",fontFamily:"var(--font-jp)",fontSize:"14px"}}>
                    ✓ TO-BE 到達後のクリティカル残余脅威はありません。
                  </div>
                )}
                {criticalThreats.map(t => (
                  <div key={t.id} className="threat-card">
                    <div className="threat-id">{t.id}</div>
                    <div className="threat-phase">{PHASES[t.phase]?.labelEn || t.phase}</div>
                    <div className="threat-body">
                      <div className="threat-name">{t.name}</div>
                      <div className="threat-tactic">{t.ztAction}</div>
                    </div>
                    <div className="threat-risk critical"><span className="dot"></span>critical</div>
                  </div>
                ))}
              </div>
            </div>
          </section>
        );
      })()}

      {/* === Chapter 01.6: Executive Summary (for CISO) === */}
      {(() => {
        const critActions = (actionItems || []).filter(a => a.priority === "critical").length;
        const qwActions = (actionItems || []).filter(a => a.phase === "quick-win").length;
        return (
          <section className="section">
            <div className="container">
              <ChapterMarker num="01.6" label="Executive Summary" jp="エグゼクティブサマリ"/>
              <div className="exec-wrap reveal">
                <div className="exec-eye">For {customerName || "—"} · {assessmentDate || new Date().toISOString().slice(0,10)}</div>
                <div className="exec-narr">
                  現在のゼロトラスト成熟度は <strong>Lv{ztmmOverall.curAvg.toFixed(1)}</strong>（{Math.round(ztmmOverall.cur)}/100 · <em>{tierOfScore(ztmmOverall.cur)}</em>）。
                  推奨される {(actionItems || []).length} 件のアクションを実施することで成熟度は <strong>Lv{ztmmOverall.tgtAvg.toFixed(1)}</strong> に向上し、
                  MITRE ATT&amp;CK・ATLAS の脅威カバレッジは <em>+{threatCoverage.newlyMitigated}</em> 件改善（計 {threatCoverage.coveredToBe}/{threatCoverage.total} · {Math.round(threatCoverage.coveredToBe/threatCoverage.total*100)}%）します。
                  特に <em>Quick Win {qwActions} 件</em> は 3 ヶ月以内で着手可能な施策群です。
                  {effectiveCoverage && bottleneck && (
                    <> なお、<strong style={{color:"var(--warn)"}}>{bottleneck.pillar}柱のスコープ網羅率 {(bottleneck.scf*100).toFixed(0)}%</strong> が実効カバレッジを <strong style={{color:"var(--warn)"}}>+{((effectiveCoverage.toBeVulnCoeffEffective - effectiveCoverage.toBeVulnCoeffIdeal)*100).toFixed(1)}pt</strong> 目減りさせています（詳細は Scope 章）。</>
                  )}
                </div>
              </div>
            </div>
          </section>
        );
      })()}
    </>
  );
}

/* ================== ASSESSMENT VIEW ================== */
function AssessmentView({ ztCur, ztTgt, setCur, setTgt, onReset }){
  const [activeId, setActiveId] = useState(null);
  const [mode, setMode] = useState("cur");

  const groups = {};
  ZTMM_DATA.forEach(c => {
    if (!groups[c.pillar]) groups[c.pillar] = [];
    groups[c.pillar].push(c);
  });

  const total = 18;
  const changed = Object.entries(ztCur).filter(([k,v]) => v > 1).length;

  return (
    <>
      <Hero num="02" label="Assessment" jp="アセスメント"
        kicker="Rules live where decisions happen.">
        <h1 className="h-display reveal d1">
          Eighteen controls —<br/>bound by <em>where we are</em> and <em>where we're going</em>.
        </h1>
        <p className="lede-jp reveal d2">
          各セルをクリックすると AS-IS / TO-BE を切り替えて編集できます。色の塗りが現在地、破線のアウトラインが目標です。
        </p>
        <StatsRow stats={[
          { label:"Progress",   value: changed, unit:`/ ${total}`, caption:"AS-IS updated" },
          { label:"Avg AS-IS",  value: (Object.values(ztCur).reduce((a,b)=>a+b,0)/total), decimals:1, caption:"1 (Traditional) – 4 (Optimal)" },
          { label:"Avg TO-BE",  value: (Object.values(ztTgt).reduce((a,b)=>a+b,0)/total), decimals:1, caption:"Target maturity" }
        ]}/>
      </Hero>

      <section className="section">
        <div className="container">
          <ChapterMarker num="02.1" label="Control Matrix" jp="コントロール・マトリクス"/>
          <div style={{display:"flex",gap:"12px",alignItems:"center",marginBottom:"20px",flexWrap:"wrap"}}>
            <div className="ds-mode" style={{display:"inline-flex",gap:"2px",background:"var(--bg-2)",borderRadius:"999px",padding:"2px",border:"1px solid var(--line)"}}>
              <button className={mode==="cur"?"on":""} onClick={() => setMode("cur")}
                style={{border:"none",background:mode==="cur"?"var(--primary)":"transparent",color:mode==="cur"?"#fff":"var(--ink-3)",cursor:"pointer",padding:"6px 14px",borderRadius:"999px",fontFamily:"var(--font-sans)",fontSize:"12px",fontWeight:500,letterSpacing:".02em"}}>AS-IS</button>
              <button className={mode==="tgt"?"on":""} onClick={() => setMode("tgt")}
                style={{border:"none",background:mode==="tgt"?"var(--trust)":"transparent",color:mode==="tgt"?"#fff":"var(--ink-3)",cursor:"pointer",padding:"6px 14px",borderRadius:"999px",fontFamily:"var(--font-sans)",fontSize:"12px",fontWeight:500,letterSpacing:".02em"}}>TO-BE</button>
            </div>
            <span style={{fontFamily:"var(--font-jp)",fontSize:"12px",color:"var(--ink-3)"}}>
              編集モード: <strong style={{color:"var(--ink)"}}>{mode==="cur"?"AS-IS（現在地）":"TO-BE（目標）"}</strong> · セルをクリックして Lv を設定
            </span>
            <div className="spacer"></div>
            <button className="btn sm ghost" onClick={onReset}>リセット</button>
          </div>

          {PILLAR_ORDER.map(p => {
            const ctrls = groups[p] || [];
            const pi = pillarOf(p);
            return (
              <div key={p} style={{marginBottom:"24px"}}>
                <div style={{display:"flex",alignItems:"center",gap:"10px",marginBottom:"10px"}}>
                  <span style={{width:"10px",height:"10px",borderRadius:"50%",background:`var(${pi.var})`}}></span>
                  <span style={{fontFamily:"var(--font-mono)",fontSize:"12px",color:"var(--ink)",fontWeight:500,letterSpacing:".04em"}}>{pi.code}</span>
                  <span style={{fontFamily:"var(--font-jp)",fontSize:"12px",color:"var(--ink-2)"}}>· {pi.jp}</span>
                </div>
                <div className="matrix">
                  <div className="matrix-head">Control<div className="sub">コントロール</div></div>
                  {[1,2,3,4].map(lv => (
                    <div key={lv} className="matrix-head">Lv{lv}<div className="sub">{LEVEL_LABELS[lv-1]} · {LEVEL_JP[lv-1]}</div></div>
                  ))}
                  <div className="matrix-head">Status<div className="sub">AS-IS / TO-BE</div></div>
                  {ctrls.map(c => (
                    <MatrixRow key={c.id} ctrl={c} cur={ztCur[c.id]} tgt={ztTgt[c.id]}
                      editing={mode}
                      onSetCur={(lv) => setCur(c.id, lv)}
                      onSetTgt={(lv) => setTgt(c.id, lv)}
                      onToggle={() => setActiveId(activeId === c.id ? null : c.id)}/>
                  ))}
                </div>
              </div>
            );
          })}
        </div>
      </section>
    </>
  );
}

/* ================== THREAT MAP VIEW ================== */
function ThreatMapView({ ztCur, ztTgt, mitigatedByAsIs, mitigatedByToBe }){
  const [fPhase, setFPhase] = useState("all");
  const [fActor, setFActor] = useState("all");
  const [fStatus, setFStatus] = useState("all");

  const filtered = TECHNIQUES.filter(t => {
    if (fPhase !== "all" && t.phase !== fPhase) return false;
    if (fActor !== "all"){
      const a = THREAT_ACTORS.find(x => x.id === fActor);
      if (!a || !a.techs.includes(t.id)) return false;
    }
    if (fStatus === "mit" && !mitigatedByToBe.has(t.id)) return false;
    if (fStatus === "open" && mitigatedByToBe.has(t.id)) return false;
    return true;
  });

  const total = TECHNIQUES.length;
  const totalMit = TECHNIQUES.filter(t => mitigatedByToBe.has(t.id)).length;

  return (
    <>
      <Hero num="03" label="Threats" jp="脅威マップ"
        kicker="A journey, not a sprint.">
        <h1 className="h-display reveal d1">
          Sixty-three techniques,<br/>aligned on <em>one axis</em>.
        </h1>
        <p className="lede-jp reveal d2">
