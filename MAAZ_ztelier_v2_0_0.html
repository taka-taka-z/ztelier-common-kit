/* ================== SCOPE VIEW (v1.1 new) ==================
   ゼロトラストの実効性は「対応するリソースのスコープ」が全て。
   ZTMM成熟度が高くても、NHI/LAN/WAN等が対象外なら実効カバレッジは目減り。
   ============================================================== */
function ScopeView({ scopeState, setScopeState, effectiveCoverage, bottleneck, threatCoverage, pillarScores }){
  const setScope = (pillar, resId, val) => {
    setScopeState(prev => ({
      ...prev,
      [pillar]: { ...(prev[pillar] || {}), [resId]: val }
    }));
  };

  const resetAllY = () => {
    const reset = {};
    PILLAR_ORDER.forEach(p => {
      reset[p] = {};
      SCOPE_RESOURCES[p].forEach(r => { reset[p][r.id] = "Y"; });
    });
    setScopeState(reset);
  };

  const idealVulnCoeff = 1 - (threatCoverage.coveredToBe / threatCoverage.total);
  const effectiveVulnCoeff = effectiveCoverage.toBeVulnCoeffEffective;
  const degradationPt = (effectiveVulnCoeff - idealVulnCoeff) * 100;

  return (
    <>
      <Hero num="02.5" label="Scope" jp="スコープ網羅性"
        kicker="Coverage is everything.">
        <h1 className="h-display reveal d1">
          Maturity without <em>scope</em><br/>is maturity unearned.
        </h1>
        <p className="lede-jp reveal d2">
          ゼロトラストの実効性は<em>対応リソースのスコープ</em>が全てです。
          NHIが対象外・LAN/WANに従来接続が残存といった欠落は、
          技法カバレッジを目減りさせ、<strong>実効TO-BE脆弱性係数を押し上げます</strong>。
        </p>
        <StatsRow stats={[
          { label:"理想 TO-BE",     value: idealVulnCoeff*100,     decimals:1, unit:"%", caption:"スコープ100%時" },
          { label:"実効 TO-BE",     value: effectiveVulnCoeff*100, decimals:1, unit:"%", caption:"SCF補正後" },
          { label:"スコープ目減り", value: degradationPt,          decimals:1, unit:"pt", caption:"潜在リスク増分" },
          bottleneck ? { label:"ボトルネック", value: bottleneck.pillar, caption: `SCF ${(bottleneck.scf*100).toFixed(0)}%` } : null
        ].filter(Boolean)}/>
      </Hero>

      <section className="section">
        <div className="container">
          <ChapterMarker num="02.5.1" label="Resource Coverage" jp="リソース別網羅性評価"/>
          <div style={{display:"flex",gap:"12px",alignItems:"center",marginBottom:"20px",flexWrap:"wrap"}}>
            <span style={{fontFamily:"var(--font-jp)",fontSize:"12px",color:"var(--ink-3)"}}>
              各リソースに対し <strong style={{color:"var(--trust)"}}>Y</strong>（完全）/ <strong style={{color:"var(--warn)"}}>P</strong>（部分）/ <strong style={{color:"var(--danger)"}}>N</strong>（対象外・リスクあり）/ <strong style={{color:"var(--ink-3)"}}>N/A</strong>（存在しない・評価除外）を指定
            </span>
            <div className="spacer"></div>
            <button className="btn sm ghost" onClick={resetAllY}>全て Y にリセット</button>
          </div>

          {PILLAR_ORDER.map(p => (
            <PillarScopeCard key={p}
              pillar={p}
              scopeState={scopeState[p] || {}}
              setScope={(resId, val) => setScope(p, resId, val)}
              pillarData={effectiveCoverage.byPillar[p]}
              isBottleneck={bottleneck?.pillar === p}
            />
          ))}
        </div>
      </section>

      {bottleneck && (
        <section className="section tight">
          <div className="container">
            <div style={{
              padding:"24px",
              background:"var(--primary-dim)",
              borderLeft:"3px solid var(--primary)",
              borderRadius:"6px"
            }}>
              <div style={{
                fontFamily:"var(--font-mono)",fontSize:"10px",
                color:"var(--primary)",letterSpacing:".14em",textTransform:"uppercase",
                marginBottom:"8px"
              }}>
                Improvement Suggestion
              </div>
              <div style={{fontFamily:"var(--font-jp)",fontSize:"15px",lineHeight:"1.7",color:"var(--ink)"}}>
                <strong>{bottleneck.pillar}</strong>柱のスコープ網羅率が
                <strong style={{color:"var(--warn)"}}> {(bottleneck.scf*100).toFixed(0)}%</strong> に留まっており、
                <strong> {bottleneck.techniquesLost.toFixed(1)}</strong>技法分のカバレッジを失っています。<br/>
                この柱のスコープを<strong>80%</strong>まで拡張すると、
                実効TO-BE脆弱性係数が
                <strong style={{color:"var(--danger)"}}> {(effectiveVulnCoeff*100).toFixed(1)}%</strong> →
                <strong style={{color:"var(--trust)"}}> {(bottleneck.improvedVulnCoeff*100).toFixed(1)}%</strong>
                に改善します。
              </div>
            </div>
          </div>
        </section>
      )}
    </>
  );
}

function PillarScopeCard({ pillar, scopeState, setScope, pillarData, isBottleneck }){
  const pi = pillarOf(pillar);
  const scf = pillarData?.scf ?? 1.0;
  const scfPct = (scf * 100).toFixed(0);
  const scfColor = scf >= 0.8 ? "var(--trust)" : scf >= 0.5 ? "var(--warn)" : "var(--danger)";
  const resources = SCOPE_RESOURCES[pillar] || [];

  return (
    <div style={{
      marginBottom:"20px",
      padding:"20px",
      background:"var(--bg-1)",
      border:`1px solid ${isBottleneck ? 'var(--warn)' : 'var(--line)'}`,
      borderLeft:`3px solid ${isBottleneck ? 'var(--warn)' : `var(${pi.var})`}`,
      borderRadius:"6px",
      boxShadow:"var(--shadow-soft)"
    }}>
      <div style={{display:"flex",alignItems:"baseline",gap:"12px",marginBottom:"16px",flexWrap:"wrap"}}>
        <span style={{width:"10px",height:"10px",borderRadius:"50%",background:`var(${pi.var})`,flexShrink:0}}></span>
        <span style={{fontFamily:"var(--font-mono)",fontSize:"12px",color:"var(--ink)",fontWeight:500,letterSpacing:".04em"}}>{pi.code}</span>
        <span style={{fontFamily:"var(--font-jp)",fontSize:"13px",color:"var(--ink-2)"}}>· {pi.jp} / {pillar}</span>
        {isBottleneck && (
          <span style={{
            fontFamily:"var(--font-mono)",fontSize:"10px",
            color:"var(--warn)",letterSpacing:".14em",textTransform:"uppercase",
            padding:"2px 8px",background:"rgba(200,138,42,0.1)",borderRadius:"4px"
          }}>
            ⚠ Bottleneck
          </span>
        )}
        <div className="spacer"></div>
        <span style={{
          fontFamily:"var(--font-mono)",fontSize:"13px",fontWeight:600,
          color:scfColor,letterSpacing:".02em"
        }}>
          SCF {scfPct}%
        </span>
      </div>

      <div style={{display:"grid",gap:"6px"}}>
        {resources.map(r => {
          const current = scopeState[r.id] || "Y";
          return (
            <div key={r.id} style={{
              display:"grid",
              gridTemplateColumns:"1fr auto",
              gap:"16px",
              alignItems:"center",
              padding:"8px 0",
              borderTop:"1px solid var(--line)"
            }}>
              <div>
                <div style={{fontFamily:"var(--font-jp)",fontSize:"13px",color:"var(--ink)",fontWeight:500}}>{r.label}</div>
                <div style={{fontFamily:"var(--font-jp)",fontSize:"11px",color:"var(--ink-3)",marginTop:"2px"}}>{r.desc}</div>
              </div>
              <div style={{display:"inline-flex",gap:"2px",background:"var(--bg-2)",borderRadius:"6px",padding:"2px",border:"1px solid var(--line)"}}>
                {["Y","P","N","NA"].map(v => {
                  const vMeta = SCOPE_VALUES[v];
                  const active = current === v;
                  const activeColor = v === "Y"  ? "var(--trust)"
                                    : v === "P"  ? "var(--warn)"
                                    : v === "N"  ? "var(--danger)"
                                    : "var(--ink-3)";  // NA は中性グレー
                  const displayLabel = v === "NA" ? "N/A" : v;
                  return (
                    <button key={v}
                      onClick={() => setScope(r.id, v)}
                      title={vMeta.desc}
                      aria-label={`${r.label} を ${vMeta.label}`}
                      aria-pressed={active}
                      style={{
                        border:"none",
                        background: active ? activeColor : "transparent",
                        color: active ? "#fff" : "var(--ink-3)",
                        cursor:"pointer",
                        padding:"4px 10px",
                        borderRadius:"4px",
                        fontFamily:"var(--font-mono)",
                        fontSize:"12px",
                        fontWeight:600,
                        letterSpacing:".02em",
                        transition:"background .15s, color .15s",
                        minWidth:"32px",
                        opacity: (!active && v === "NA") ? 0.7 : 1
                      }}
                    >
                      {displayLabel}
                    </button>
                  );
                })}
              </div>
            </div>
          );
        })}
      </div>

      {pillarData && (
        <div style={{
          marginTop:"14px",paddingTop:"12px",borderTop:"1px solid var(--line)",
          display:"flex",gap:"24px",flexWrap:"wrap",
          fontFamily:"var(--font-jp)",fontSize:"12px",color:"var(--ink-3)"
        }}>
          <span>
            TO-BE技法 <strong style={{color:"var(--ink-2)",fontFamily:"var(--font-mono)"}}>{pillarData.threatsAtTo}</strong> のうち{' '}
            <strong style={{color:"var(--ink)",fontFamily:"var(--font-mono)"}}>{pillarData.effectiveContribution.toFixed(1)}</strong> が実効
          </span>
          {pillarData.techniquesLost > 0.1 && (
            <span style={{color:"var(--warn)"}}>
              目減り <strong style={{fontFamily:"var(--font-mono)"}}>{pillarData.techniquesLost.toFixed(1)}</strong> 技法
            </span>
          )}
          {pillarData.naCount > 0 && (
            <span style={{color:"var(--ink-3)"}}>
              評価外 <strong style={{fontFamily:"var(--font-mono)"}}>{pillarData.naCount}</strong> / {pillarData.totalResources}
            </span>
          )}
        </div>
      )}
    </div>
  );
}

/* ================== ACTION PLAN VIEW ================== */
function ActionPlanView({ actionItems }){
  const phases = [

    { key:"strategic", label:"Strategic", period:"6-12ヶ月" },

  const grouped = {};

        <StatsRow stats={[
          { label:"Actions", value: totalActions, caption:"auto-derived from gaps" },

        <div className="container">
          <ChapterMarker num="04.1" label="Roadmap Kanban" jp="ロードマップ・カンバン"/>

            <div className="card elevated" style={{padding:"40px",textAlign:"center",color:"var(--ink-3)",fontFamily:"var(--font-jp)",fontSize:"14px"}}>
              ギャップがありません。Assessment 画面で TO-BE を AS-IS より高く設定すると、アクションが自動生成されます。

                <div key={ph.key} className="kanban-head">{ph.label}<div className="period">{ph.period}</div></div>
              ))}

                const pi = pillarOf(p);
                const row = grouped[p];
                return (
                  <React.Fragment key={p}>
                    <div className="kanban-pillar-head" style={{"--pillar": `var(${pi.var})`}}>
                      <span className="dot"></span>
                      <div>
                        <div>{pi.code}</div>

                      </div>
                    </div>
                    {phases.map(ph => (
                      <div key={ph.key} className="kanban-cell">
                        {row[ph.key].length === 0 && <span style={{color:"var(--ink-4)",fontSize:"10px",fontFamily:"var(--font-mono)",letterSpacing:".1em"}}>—</span>}
                        {row[ph.key].map((a,i) => (
                          <div key={i} className="ktile">
                            <div className="ktile-code">{a.id}</div>
                            <div className="ktile-fn">{a.fn}</div>
                            <div className="ktile-meta">
                              <span>Lv{a.fromLv}</span><span>→</span><span className="lv">Lv{a.toLv}</span>
                              <span className={"ktile-pri " + a.priority}>{a.priority}</span>
                            </div>
                          </div>
                        ))}
                      </div>
                    ))}
                  </React.Fragment>
                );
              })}

          )}
        </div>
      </section>
    </>
  );
}

/* ================== CISO REPORT VIEW (Ztelier v1.0.1) ==================
   CISO向け印刷最適化View。A4縦で8ページ構成。
   画面上でもプレビューとして閲覧可能、印刷時は本Viewが出力される。
   ================================================================ */
function CisoReportView({ customerName, assessmentDate, ztCur, ztTgt, pillarScores, ztmmOverall, threatCoverage, actionItems, radarData, effectiveCoverage, bottleneck, scopeState, onPrint }){
  const criticalThreats = TECHNIQUES.filter(t => t.risk === "critical" && !threatCoverage.coveredToBeSet.has(t.id));
  const critActions = (actionItems || []).filter(a => a.priority === "critical").length;
  const highActions = (actionItems || []).filter(a => a.priority === "high").length;
  const qwActions = (actionItems || []).filter(a => a.phase === "quick-win").length;
  const stActions = (actionItems || []).filter(a => a.phase === "short-term").length;
  const sgActions = (actionItems || []).filter(a => a.phase === "strategic").length;

  // Shape diagnosis (同じロジックをDashboardから)
  const curs = PILLAR_ORDER.map(p => pillarScores[p].curAvg);
  const mean = curs.reduce((a,b) => a+b, 0) / curs.length;
  const sd = Math.sqrt(curs.reduce((a,b) => a + Math.pow(b-mean, 2), 0) / curs.length);
  const range = Math.max(...curs) - Math.min(...curs);
  let shapeType, shapeDesc;
  if (mean < 1.8){ shapeType="基礎構築型"; shapeDesc="全柱がLv2未満。まず基礎の底上げが必要。投資分散を避け、高リスク領域から順次強化を推奨する。"; }
  else if (range >= 1.5){
    const strongest = PILLAR_ORDER[curs.indexOf(Math.max(...curs))];
    const weakest = PILLAR_ORDER[curs.indexOf(Math.min(...curs))];
    shapeType="偏在型"; shapeDesc=`${strongest}が先行、${weakest}が遅延。最弱柱が全体の実効性を制約するため、ここへの集中投資が効果的である。`;
  }
  else if (sd < 0.3){ shapeType="均整型"; shapeDesc="全柱がバランスよく進捗。ただし横並び成熟は攻撃者に隙を与えにくい反面、突出領域がないため中位水準で止まりがち。"; }
  else { shapeType="進行型"; shapeDesc="複数柱が成熟に向けて進行中。各柱のギャップを順次解消しながら全体底上げを図る段階。"; }

  // Priority ladder
  const ladder = PILLAR_ORDER.map(p => ({
    pillar: p, gap: pillarScores[p].gap, newThreats: pillarScores[p].newThreats,
    curAvg: pillarScores[p].curAvg, tgtAvg: pillarScores[p].tgtAvg
  })).filter(x => x.gap > 0).sort((a,b) => b.gap - a.gap);

  // Top 10 critical/high cross-pillar actions
  const crossPriority = (actionItems || [])
    .filter(a => a.priority === "critical" || a.priority === "high")
    .sort((a,b) => {
      const pr = {critical:0, high:1}; const ph = {"quick-win":0, "short-term":1, strategic:2};
      if (pr[a.priority] !== pr[b.priority]) return pr[a.priority] - pr[b.priority];
      return ph[a.phase] - ph[b.phase];
    }).slice(0, 10);

  const today = assessmentDate || new Date().toISOString().slice(0,10);
  const coverageRate = Math.round(threatCoverage.coveredToBe/threatCoverage.total*100);
  const overallTier = tierOfScore(ztmmOverall.cur);
  const tgtTier = tierOfScore(ztmmOverall.tgt);

  return (
    <div className="ciso-report">

      {/* =========== P1: COVER =========== */}
      <div className="report-page report-cover">
        <div className="rc-brand">
          <svg width="42" height="42" viewBox="0 0 32 32" fill="none" style={{marginBottom:"12px"}}>
            <circle cx="16" cy="16" r="15" stroke="currentColor" strokeWidth="1" strokeOpacity=".5"/>
            <path d="M9 10 L23 10 L9 22 L23 22" stroke="currentColor" strokeWidth="1.5" strokeLinecap="round" strokeLinejoin="round"/>
          </svg>
          <div className="rc-brand-label">MAA<em>Z</em></div>
          <div className="rc-brand-sub">Zero Trust Maturity Atelier</div>
        </div>

        <div className="rc-title-block">
          <div className="rc-eyebrow">ZERO TRUST MATURITY ASSESSMENT</div>
          <div className="rc-title">Executive Report</div>
          <div className="rc-subtitle">ゼロトラスト成熟度評価レポート</div>
        </div>

        <div className="rc-meta">
          <div className="rc-meta-row"><span className="rc-meta-lb">CLIENT</span><span className="rc-meta-val">{customerName || "—"}</span></div>
          <div className="rc-meta-row"><span className="rc-meta-lb">ASSESSMENT DATE</span><span className="rc-meta-val">{today}</span></div>
          <div className="rc-meta-row"><span className="rc-meta-lb">FRAMEWORK</span><span className="rc-meta-val">CISA ZTMM v2 · MITRE ATT&CK · ATLAS · NIST SP800-207</span></div>
          <div className="rc-meta-row"><span className="rc-meta-lb">PREPARED BY</span><span className="rc-meta-val">Zscaler Japan — Transformation Architect</span></div>
        </div>

        <div className="rc-kpi-block">
          <div className="rc-kpi">
            <div className="rc-kpi-num">{Math.round(ztmmOverall.cur)}<span className="rc-kpi-arrow">→</span>{Math.round(ztmmOverall.tgt)}</div>
            <div className="rc-kpi-lb">MATURITY SCORE</div>
            <div className="rc-kpi-sub">{overallTier} → {tgtTier}</div>
          </div>
          <div className="rc-kpi">
            <div className="rc-kpi-num">{coverageRate}<span className="rc-kpi-unit">%</span></div>
            <div className="rc-kpi-lb">THREAT COVERAGE</div>
            <div className="rc-kpi-sub">+{threatCoverage.newlyMitigated} newly mitigated</div>
          </div>
          <div className="rc-kpi">
            <div className="rc-kpi-num">{(actionItems || []).length}</div>
            <div className="rc-kpi-lb">RECOMMENDED ACTIONS</div>
            <div className="rc-kpi-sub">{critActions} critical · {qwActions} quick-win</div>
          </div>

/* ================== APP ================== */
function App(){
  const [chapter, setChapter] = useState("intro");
  const [customerName, setCustomerName] = useState("");
  const [assessmentDate, setAssessmentDate] = useState(new Date().toISOString().slice(0,10));
  const [toast, setToast] = useState(null);

  const defaultCur = {};
  const defaultTgt = {};
  ZTMM_DATA.forEach(c => { defaultCur[c.id] = 1; defaultTgt[c.id] = 4; });
  const [ztCur, setZtCur] = useState(defaultCur);
  const [ztTgt, setZtTgt] = useState(defaultTgt);

  /* ==== Scope state (v1.1 new) — default all Y (full coverage) ==== */
  const defaultScopeState = {};
  PILLAR_ORDER.forEach(p => {
    defaultScopeState[p] = {};
    (SCOPE_RESOURCES[p] || []).forEach(r => { defaultScopeState[p][r.id] = "Y"; });
  });
  const [scopeState, setScopeState] = useState(defaultScopeState);

  const [snapshots, setSnapshots] = useState(() => {
    try { return JSON.parse(localStorage.getItem("maaz:snapshots") || "[]"); }
    catch { return []; }
  });

  const setCur = (id, lv) => {
    setZtCur(prev => {
      const next = { ...prev, [id]: lv };
      if (next[id] > ztTgt[id]) setZtTgt(t => ({...t, [id]: lv}));
      return next;
    });
  };
  const setTgt = (id, lv) => {
    setZtTgt(prev => {
      if (lv < ztCur[id]) return prev;
      return { ...prev, [id]: lv };
    });
  };
  const resetAll = () => {
    setZtCur({ ...defaultCur });
    setZtTgt({ ...defaultTgt });
    showToast("リセットしました");
  };

  const applyPreset = (p) => {
    if (!p){ setChapter("assessment"); return; }
    setZtTgt({ ...p.targets });
    showToast(`プリセット「${p.label}」を適用しました`);
    setChapter("assessment");
  };

  const showToast = (msg) => {
    setToast(msg);
    setTimeout(() => setToast(null), 2200);
  };

  /* ==== Calculations ==== */
  const mitigatedByAsIs = useMemo(() => {
    const s = new Set();
    ZTMM_MITRE_MAP.forEach(m => {
      if (ztCur[m.ztmm] >= m.lv) m.techs.forEach(t => s.add(t));
    });
    return s;
  }, [ztCur]);

  const mitigatedByToBe = useMemo(() => {
    const s = new Set();
    ZTMM_MITRE_MAP.forEach(m => {
      if (ztTgt[m.ztmm] >= m.lv) m.techs.forEach(t => s.add(t));
    });
    return s;
  }, [ztTgt]);

  const threatCoverage = useMemo(() => {
    const total = TECHNIQUES.length;
    const coveredAsIs = mitigatedByAsIs.size;
    const coveredToBe = mitigatedByToBe.size;
    const newlyMitigated = [...mitigatedByToBe].filter(t => !mitigatedByAsIs.has(t)).length;
    return {
      total, coveredAsIs, coveredToBe, newlyMitigated,
      remaining: total - coveredToBe,
      coveredAsIsSet: mitigatedByAsIs, coveredToBeSet: mitigatedByToBe
    };
  }, [mitigatedByAsIs, mitigatedByToBe]);

  const pillarScores = useMemo(() => {
    const scores = {};
    PILLAR_ORDER.forEach(p => {
      const ctrls = ZTMM_DATA.filter(z => z.pillar === p);
      const curSum = ctrls.reduce((s,c) => s + ztCur[c.id], 0);
      const tgtSum = ctrls.reduce((s,c) => s + ztTgt[c.id], 0);
      const curAvg = curSum / ctrls.length;
      const tgtAvg = tgtSum / ctrls.length;
      const threatsAtAs = new Set(), threatsAtTo = new Set();
      ZTMM_MITRE_MAP.forEach(m => {
        const ctrl = ZTMM_DATA.find(z => z.id === m.ztmm);
        if (ctrl?.pillar !== p) return;
        if (ztCur[m.ztmm] >= m.lv) m.techs.forEach(t => threatsAtAs.add(t));
        if (ztTgt[m.ztmm] >= m.lv) m.techs.forEach(t => threatsAtTo.add(t));
      });
      const newThreats = [...threatsAtTo].filter(t => !threatsAtAs.has(t)).length;
      scores[p] = { curAvg, tgtAvg, gap: tgtAvg - curAvg, threatsAtAs: threatsAtAs.size, threatsAtTo: threatsAtTo.size, newThreats };
    });
    return scores;
  }, [ztCur, ztTgt]);

  const ztmmOverall = useMemo(() => {
    const vals = Object.values(ztCur);
    const tgtVals = Object.values(ztTgt);
    const curAvg = vals.reduce((a,b) => a+b, 0) / vals.length;
    const tgtAvg = tgtVals.reduce((a,b) => a+b, 0) / tgtVals.length;
    return {
      cur: ((curAvg - 1) / 3) * 100,
      tgt: ((tgtAvg - 1) / 3) * 100,
      curAvg, tgtAvg
    };
  }, [ztCur, ztTgt]);

  /* ==== Effective Coverage (v1.0.3 fix) — SCF補正後のTO-BEカバレッジ ====
   * ─────────────────────────────────────────────────────────────────────
   * v1.0.3 fix (2026-04-24): 技法二重加算バグ (Bug #3) を修正
   *   旧: effectiveSum = Σ_pillar(threatsAtTo × scf)
   *        → 複数 pillar にまたがる技法が重複加算され、
   *          coveredToBeEffective > unique技法数 になる論理破綻
   *          (実データで 54 unique 技法に対し effectiveSum=54.70 と 100%超)
   *   新: 技法ごとに、その技法をカバーする全 pillar のうち最大 SCF を採用
   *        effectiveSum = Σ_t(max_p(scf[p] : p covers t))
   *        数学的に effectiveSum ≤ unique技法数 が保証される
   *
   *   byPillar.effectiveContribution は「その pillar が 最大 SCF 提供側として
   *   実効カバーに寄与した技法数」に再定義 (ベストカバー pillar 単位)。
   * ==== */
  const effectiveCoverage = useMemo(() => {
    const total = TECHNIQUES.length;
    const byPillar = {};

    // Step 1: 各 pillar の SCF と、その pillar がカバーする技法集合を算出
    const pillarScfMap = {};
    const pillarTechsToBeMap = {};
    const pillarTechsAsIsMap = {};

    PILLAR_ORDER.forEach(p => {
      const resources = SCOPE_RESOURCES[p] || [];
      let applicableCount = 0;
      let valueSum = 0;
      let naCount = 0;
      resources.forEach(r => {
        const v = (scopeState[p] || {})[r.id] || "Y";
        const meta = SCOPE_VALUES[v];
        if (!meta || meta.value === null) { naCount++; return; }
        valueSum += meta.value;
        applicableCount++;
      });
      const scf = applicableCount > 0 ? valueSum / applicableCount : 1.0;
      pillarScfMap[p] = scf;

      const pillarTechsToBe = new Set();
      const pillarTechsAsIs = new Set();
      ZTMM_MITRE_MAP.forEach(m => {
        const ctrl = ZTMM_DATA.find(z => z.id === m.ztmm);
        if (ctrl?.pillar !== p) return;
        if (ztTgt[m.ztmm] >= m.lv) m.techs.forEach(t => pillarTechsToBe.add(t));
        if (ztCur[m.ztmm] >= m.lv) m.techs.forEach(t => pillarTechsAsIs.add(t));
      });
      pillarTechsToBeMap[p] = pillarTechsToBe;
      pillarTechsAsIsMap[p] = pillarTechsAsIs;

      byPillar[p] = {
        scf,
        threatsAtTo: pillarTechsToBe.size,
        threatsAtAs: pillarTechsAsIs.size,
        applicableCount, naCount,
        totalResources: resources.length
      };
    });

    // Step 2: 技法ごとに best SCF (max across covering pillars) を決定
    const techBestScfToBe = new Map();
    const techBestPillarToBe = new Map();
    PILLAR_ORDER.forEach(p => {
      const scf = pillarScfMap[p];
      pillarTechsToBeMap[p].forEach(t => {
        if (!techBestScfToBe.has(t) || techBestScfToBe.get(t) < scf) {
          techBestScfToBe.set(t, scf);
          techBestPillarToBe.set(t, p);
        }
      });
    });
    const techBestScfAsIs = new Map();
    const techBestPillarAsIs = new Map();
    PILLAR_ORDER.forEach(p => {
      const scf = pillarScfMap[p];
      pillarTechsAsIsMap[p].forEach(t => {
        if (!techBestScfAsIs.has(t) || techBestScfAsIs.get(t) < scf) {
          techBestScfAsIs.set(t, scf);
          techBestPillarAsIs.set(t, p);
        }
      });
    });

    // Step 3: 技法ベース effectiveSum 算出 (二重加算なし)
    let effectiveSum = 0;
    techBestScfToBe.forEach(scf => { effectiveSum += scf; });
    let effectiveAsIsSum = 0;
    techBestScfAsIs.forEach(scf => { effectiveAsIsSum += scf; });

    // Step 4: byPillar に "best-cover 寄与" と損失技法数を記録
    PILLAR_ORDER.forEach(p => {
      const scf = pillarScfMap[p];
      // 当 pillar が best-cover 提供者になった技法数 × scf を "effectiveContribution" とする
      let contrib = 0;
      techBestPillarToBe.forEach((bp, t) => { if (bp === p) contrib += scf; });
      let contribAsIs = 0;
      techBestPillarAsIs.forEach((bp, t) => { if (bp === p) contribAsIs += scf; });

      // 損失 = この pillar がこの技法の唯一/最適カバー元で、かつ scf < 1 の分
      const lost = byPillar[p].threatsAtTo - contrib;           // 近似: 他 pillar 寄与分は差し引く
      const lostAsIs = byPillar[p].threatsAtAs - contribAsIs;

      byPillar[p].effectiveContribution     = contrib;
      byPillar[p].effectiveContributionAsIs = contribAsIs;
      byPillar[p].techniquesLost            = Math.max(0, byPillar[p].threatsAtTo * (1 - scf));
      byPillar[p].techniquesLostAsIs        = Math.max(0, byPillar[p].threatsAtAs * (1 - scf));
    });

    const coverageRateIdeal         = mitigatedByToBe.size / total;
    const coverageRateEffective     = effectiveSum / total;
    const coverageRateAsIsIdeal     = mitigatedByAsIs.size / total;
    const coverageRateAsIsEffective = effectiveAsIsSum / total;

    return {
      total,
      coveredToBeIdeal:       mitigatedByToBe.size,
      coveredToBeEffective:   effectiveSum,
      coveredAsIsIdeal:       mitigatedByAsIs.size,
      coveredAsIsEffective:   effectiveAsIsSum,
      coverageRateIdeal,
      coverageRateEffective,
      coverageRateAsIsIdeal,
      coverageRateAsIsEffective,
      toBeVulnCoeffIdeal:     Math.max(0.03, 1.0 - coverageRateIdeal),
      toBeVulnCoeffEffective: Math.max(0.03, 1.0 - coverageRateEffective),
      asIsVulnCoeff:          Math.max(0.03, 1.0 - coverageRateAsIsIdeal),
      asIsVulnCoeffIdeal:     Math.max(0.03, 1.0 - coverageRateAsIsIdeal),
      asIsVulnCoeffEffective: Math.max(0.03, 1.0 - coverageRateAsIsEffective),
      byPillar
    };
  }, [mitigatedByAsIs, mitigatedByToBe, scopeState, ztCur, ztTgt]);

  /* ==== Bottleneck detection (v1.0.3 fix) ====
   * 旧: pillar 単位 techniquesLost 最大の pillar を特定し、
   *     potentialGain = threatsAtTo × (targetSCF - currentSCF)
   *     → Bug #3 の二重加算と整合しない近似だった
   * 新: 技法ベース effectiveSum と整合する改善推定
   *     当該 pillar が best-cover 提供者になっている技法のみ SCF 引き上げで改善
   */
  const bottleneck = useMemo(() => {
    let worstPillar = null;
    let worstLoss = 0.5;
    PILLAR_ORDER.forEach(p => {
      const d = effectiveCoverage.byPillar[p];
      if (d && d.techniquesLost > worstLoss) {
        worstLoss = d.techniquesLost;
        worstPillar = p;
      }
    });
    if (!worstPillar) return null;

    const data = effectiveCoverage.byPillar[worstPillar];
    const currentSCF = data.scf;
    const targetSCF = 0.80;
    if (currentSCF >= targetSCF) return null;

    // v1.0.3: 改善幅は "この pillar の effectiveContribution" を targetSCF で再計算
    // (best-cover 提供技法数は同じと仮定)
    const bestCoverTechsInPillar = data.effectiveContribution / currentSCF;
    const potentialGain = bestCoverTechsInPillar * (targetSCF - currentSCF);
    const improvedRate = (effectiveCoverage.coveredToBeEffective + potentialGain) / effectiveCoverage.total;
    const improvedVulnCoeff = Math.max(0.03, 1.0 - improvedRate);

    return {
      pillar: worstPillar,
      scf: currentSCF,
      techniquesLost: data.techniquesLost,
      improvedScf: targetSCF,
      improvedVulnCoeff,
      suggestion: `${worstPillar}網羅率を${(currentSCF*100).toFixed(0)}%→${(targetSCF*100).toFixed(0)}%に上げると、実効TO-BEが${(effectiveCoverage.toBeVulnCoeffEffective*100).toFixed(1)}%→${(improvedVulnCoeff*100).toFixed(1)}%に改善`
    };
  }, [effectiveCoverage]);

  const actionItems = useMemo(() => {
    const items = [];
    ZTMM_DATA.forEach(c => {
      const cur = ztCur[c.id], tgt = ztTgt[c.id];
      if (tgt <= cur) return;
      for (let lv = cur + 1; lv <= tgt; lv++){
        const threats = ZTMM_MITRE_MAP
          .filter(m => m.ztmm === c.id && m.lv === lv)
          .flatMap(m => m.techs)
          .map(tid => TECHNIQUES.find(t => t.id === tid))
          .filter(Boolean);
        const hasCrit = threats.some(t => t.risk === "critical");
        const hasHigh = threats.some(t => t.risk === "high");
        const priority = hasCrit ? "critical" : hasHigh ? "high" : "medium";
        const phase = lv <= 2 ? "quick-win" : lv === 3 ? "short-term" : "strategic";
        items.push({
          id: c.id, pillar: c.pillar, fn: c.fn,
          fromLv: lv - 1, toLv: lv,
          priority, phase, threats: threats.map(t => t.id),
          desc: c.lv[lv-1]
        });
      }
    });
    return items.sort((a,b) => {
      const pr = { critical: 0, high: 1, medium: 2 };
      const pp = { "quick-win": 0, "short-term": 1, strategic: 2 };
      if (pr[a.priority] !== pr[b.priority]) return pr[a.priority] - pr[b.priority];
      return pp[a.phase] - pp[b.phase];
    });
  }, [ztCur, ztTgt]);

  const radarData = useMemo(() =>
    PILLAR_ORDER.map(p => ({ pillar: p, cur: pillarScores[p].curAvg, tgt: pillarScores[p].tgtAvg }))
  , [pillarScores]);

  /* ==== v1.0.2: Canonical meta helpers (ztelier共通) ==== */
  const makeSessionId = useCallback((name) => {
    const slug = String(name || "unnamed")
      .trim()
      .toLowerCase()
      .replace(/[^a-z0-9\u3040-\u309f\u30a0-\u30ff\u4e00-\u9fff]+/g, "-")
      .replace(/^-+|-+$/g, "") || "unnamed";
    const dt = new Date().toISOString().slice(0,10).replace(/-/g,"");
    return `${slug}-${dt}`;
  }, []);

  /* ==== Exports ==== */
  const exportJSON = useCallback(() => {
    const payload = {
      format: "maaz-v4.3.0",
      tool_version: "1.0.4",
      calc_fix_applied: "2026-04-25: v1.0.4 export asIsVulnCoeffEffective/Ideal fields (QA Bug #1 joint-fix with Endeavor)",
      generated_at: new Date().toISOString(),
      customer: {
        company_name: customerName || "",
        session_id: makeSessionId(customerName)
      },
      assessmentDate,
      ztCur, ztTgt,
      overall: ztmmOverall, threatCoverage: {
        total: threatCoverage.total,
        coveredAsIs: threatCoverage.coveredAsIs,
        coveredToBe: threatCoverage.coveredToBe,
        newlyMitigated: threatCoverage.newlyMitigated
      },
      pillarScores: Object.fromEntries(PILLAR_ORDER.map(p => [p, pillarScores[p]])),
      actions: actionItems,
      /* v1.1 新規: スコープ網羅性 / 実効カバレッジ / ボトルネック */
      scopeState,
      effectiveCoverage: {
        total:                   effectiveCoverage.total,
        coveredToBeIdeal:        effectiveCoverage.coveredToBeIdeal,
        coveredToBeEffective:    Number(effectiveCoverage.coveredToBeEffective.toFixed(2)),
        coverageRateIdeal:       Number(effectiveCoverage.coverageRateIdeal.toFixed(4)),
        coverageRateEffective:   Number(effectiveCoverage.coverageRateEffective.toFixed(4)),
        toBeVulnCoeffIdeal:      Number(effectiveCoverage.toBeVulnCoeffIdeal.toFixed(4)),
        toBeVulnCoeffEffective:  Number(effectiveCoverage.toBeVulnCoeffEffective.toFixed(4)),
        asIsVulnCoeff:           Number(effectiveCoverage.asIsVulnCoeff.toFixed(4)),
        /* v1.0.4: 欠落していた SCF 補正系 2 フィールドを追加 (Bug #1 joint-fix) */
        asIsVulnCoeffIdeal:      Number(effectiveCoverage.asIsVulnCoeffIdeal.toFixed(4)),
        asIsVulnCoeffEffective:  Number(effectiveCoverage.asIsVulnCoeffEffective.toFixed(4)),
        byPillar: Object.fromEntries(PILLAR_ORDER.map(p => {
          const d = effectiveCoverage.byPillar[p];
          return [p, {
            scf:                   Number(d.scf.toFixed(4)),
            threatsAtTo:           d.threatsAtTo,
            effectiveContribution: Number(d.effectiveContribution.toFixed(2)),
            techniquesLost:        Number(d.techniquesLost.toFixed(2))
          }];
        }))
      },
      bottleneck: bottleneck ? {
        pillar:            bottleneck.pillar,
        scf:               Number(bottleneck.scf.toFixed(4)),
        techniquesLost:    Number(bottleneck.techniquesLost.toFixed(2)),
        improvedScf:       bottleneck.improvedScf,
        improvedVulnCoeff: Number(bottleneck.improvedVulnCoeff.toFixed(4)),
        suggestion:        bottleneck.suggestion
      } : null
    };
    const blob = new Blob([JSON.stringify(payload, null, 2)], { type: "application/json" });
    downloadBlob(blob, `maaz_${(customerName||"assessment").replace(/\s+/g,"_")}_${assessmentDate}.json`);
    showToast("JSON をエクスポートしました");
  }, [customerName, assessmentDate, ztCur, ztTgt, ztmmOverall, threatCoverage, pillarScores, actionItems, scopeState, effectiveCoverage, bottleneck]);

  const exportCSV = useCallback(() => {
    const headers = ["id","name","tactic","phase","risk","mitigatedAsIs","mitigatedToBe"];
    const rows = TECHNIQUES.map(t => [
      t.id, t.name, t.tactic, t.phase, t.risk,
      mitigatedByAsIs.has(t.id) ? "yes" : "no",
      mitigatedByToBe.has(t.id) ? "yes" : "no"
    ]);
    const csv = [headers, ...rows].map(r => r.map(c => `"${String(c).replace(/"/g,'""')}"`).join(",")).join("\n");
    const blob = new Blob(["\ufeff" + csv], { type: "text/csv;charset=utf-8" });
    downloadBlob(blob, `maaz_techniques_${assessmentDate}.csv`);
    showToast("CSV をエクスポートしました");
  }, [mitigatedByAsIs, mitigatedByToBe, assessmentDate]);

  const exportCsfa = useCallback(() => {
    const payload = {
      format: "maaz-v4-csfa",
      tool_version: "1.0.4",
      calc_fix_applied: "2026-04-25: v1.0.4 export asIsVulnCoeffEffective/Ideal fields (QA Bug #1 joint-fix with Endeavor)",
      generated_at: new Date().toISOString(),
      customer: {
        company_name: customerName || "",
        session_id: makeSessionId(customerName)
      },
      assessmentDate,
      overall_tier_label: tierOfAvg(ztmmOverall.curAvg),
      overall_score_0_100: Math.round(ztmmOverall.cur),
      target_score_0_100: Math.round(ztmmOverall.tgt),
      controls: ZTMM_DATA.map(c => ({
        id: c.id, pillar: c.pillar, fn: c.fn,
        asIs: ztCur[c.id], toBe: ztTgt[c.id]
      })),
      evidenceHint: "deriveEvidence()"
    };
    const blob = new Blob([JSON.stringify(payload, null, 2)], { type: "application/json" });
    downloadBlob(blob, `maaz_csfa_${assessmentDate}.json`);
    showToast("CSFA 連携 JSON を出力しました");
  }, [customerName, assessmentDate, ztmmOverall, ztCur, ztTgt]);

  const saveSnapshot = useCallback(() => {
    const snap = {
      time: new Date().toLocaleString("ja-JP"),
      curAvg: ztmmOverall.curAvg,
      tgtAvg: ztmmOverall.tgtAvg,
      actions: actionItems.length,
      ztCur: {...ztCur}, ztTgt: {...ztTgt}
    };
    const next = [snap, ...snapshots].slice(0, 10);
    setSnapshots(next);
    try { localStorage.setItem("maaz:snapshots", JSON.stringify(next)); } catch {}
    showToast("スナップショットを保存しました");
  }, [ztmmOverall, actionItems, ztCur, ztTgt, snapshots]);

  /* ==== Update topbar F-badge ==== */
  useEffect(() => {
    const el = document.getElementById("topFval");
    if (el) el.textContent = Math.round(ztmmOverall.cur);
  }, [ztmmOverall.cur]);

  /* ==== Re-observe reveals when chapter changes ==== */
  useEffect(() => {
    window.scrollTo({ top: 0, behavior: "auto" });
    setTimeout(() => {
      document.querySelectorAll(".reveal").forEach(n => { n.classList.remove("in"); delete n.dataset.done; });
      document.querySelectorAll("[data-counter]").forEach(n => { n.textContent = "0"; delete n.dataset.done; });
      if (window.observeReveals) window.observeReveals();
    }, 30);
  }, [chapter]);

  /* ==== Render chapter nav ==== */
  useEffect(() => {
    const nav = document.getElementById("navChapters");
    if (!nav) return;
    nav.innerHTML = "";
    CHAPTERS.forEach(c => {
      const b = document.createElement("button");
      b.className = "nav-chapter" + (c.id === chapter ? " on" : "");
      b.setAttribute("data-ch", c.id);
      b.innerHTML = `<span class="n">${c.n}</span><span class="lb">${c.label}</span>`;
      b.onclick = () => setChapter(c.id);
      nav.appendChild(b);
    });
  }, [chapter]);

  /* ==== Render view ==== */
  let content;
  if (chapter === "intro"){
    content = <IntroView customerName={customerName} setCustomerName={setCustomerName}
      assessmentDate={assessmentDate} setAssessmentDate={setAssessmentDate}
      onPreset={applyPreset} onStart={() => setChapter("assessment")}/>;
  } else if (chapter === "dashboard"){
    content = <DashboardView ztCur={ztCur} ztTgt={ztTgt} pillarScores={pillarScores} ztmmOverall={ztmmOverall}
      threatCoverage={threatCoverage} radarData={radarData}
      effectiveCoverage={effectiveCoverage} bottleneck={bottleneck}
      actionItems={actionItems} onGotoActions={() => setChapter("actions")}
      customerName={customerName} assessmentDate={assessmentDate}/>;
  } else if (chapter === "assessment"){
    content = <AssessmentView ztCur={ztCur} ztTgt={ztTgt} setCur={setCur} setTgt={setTgt} onReset={resetAll}/>;
  } else if (chapter === "scope"){
    content = <ScopeView scopeState={scopeState} setScopeState={setScopeState}
      effectiveCoverage={effectiveCoverage} bottleneck={bottleneck}
      threatCoverage={threatCoverage} pillarScores={pillarScores}/>;
  } else if (chapter === "threats"){
    content = <ThreatMapView ztCur={ztCur} ztTgt={ztTgt} mitigatedByAsIs={mitigatedByAsIs} mitigatedByToBe={mitigatedByToBe}/>;
  } else if (chapter === "actions"){
    content = <ActionPlanView actionItems={actionItems}/>;
  } else if (chapter === "export"){
    content = <ExportView
      onExportJSON={exportJSON} onExportCSV={exportCSV}
      onExportCsfa={exportCsfa}
      onPrint={() => {
        // Report 章に遷移してから印刷、完了後に元の章に戻る
        const prevChapter = chapter;
        setChapter("report");
        // DOMにreport-pageが実際に生成されるまで確認してから印刷を実行
        const waitAndPrint = (attempts) => {
          if (attempts > 30) {  // 3秒でタイムアウト
            console.error("Report view did not render in time");
            return;
          }
          const reportVisible = document.querySelector(".ciso-report .report-page");
          if (reportVisible) {
            // 追加の描画安定化待機
            setTimeout(() => {
              window.print();
              const restore = () => setChapter(prevChapter);
              if (window.onafterprint !== undefined) {
                window.onafterprint = () => { restore(); window.onafterprint = null; };
              }
              setTimeout(restore, 500);
            }, 150);
          } else {
            setTimeout(() => waitAndPrint(attempts + 1), 100);
          }
        };
        setTimeout(() => waitAndPrint(0), 50);
      }}
      onSaveSnapshot={saveSnapshot} snapshots={snapshots}
      ztmmOverall={ztmmOverall} threatCoverage={threatCoverage} actionItems={actionItems}/>;
  }

  // CisoReportView は CHAPTERS タブには表示しないが、印刷時は表示する特別View
  const reportContent = chapter === "report" ? (
    <CisoReportView
      customerName={customerName} assessmentDate={assessmentDate}
      ztCur={ztCur} ztTgt={ztTgt} pillarScores={pillarScores} ztmmOverall={ztmmOverall}
      threatCoverage={threatCoverage} actionItems={actionItems}
      radarData={radarData}
      effectiveCoverage={effectiveCoverage} bottleneck={bottleneck} scopeState={scopeState}
      onPrint={() => window.print()}/>
  ) : null;

  return (
    <>
      {CHAPTERS.map(c => (
        <div key={c.id} className={"view" + (c.id === chapter ? " on" : "")} style={{display: c.id === chapter ? "block" : "none"}}>
          {c.id === chapter ? content : null}
        </div>
      ))}
      {/* Hidden report view — only rendered when chapter==='report' (triggered by Export's print button) */}
      <div className={"view" + (chapter === "report" ? " on" : "")} style={{display: chapter === "report" ? "block" : "none"}}>
        {reportContent}
      </div>
      {toast && <div className="toast">{toast}</div>}
    </>
  );
}

function downloadBlob(blob, filename){
  const url = URL.createObjectURL(blob);
  const a = document.createElement("a");
  a.href = url; a.download = filename;
  document.body.appendChild(a); a.click();
  setTimeout(() => { URL.revokeObjectURL(url); a.remove(); }, 100);
}


/* === INITIALIZATION === */
const rootEl = document.getElementById("views");
ReactDOM.createRoot(rootEl).render(<App/>);

/* === THEME TOGGLE === */
(function(){
  const btn = document.getElementById("themeToggle");
  const icon = document.getElementById("themeIcon");
  const sun = '<circle cx="12" cy="12" r="4"/><path d="M12 2v2M12 20v2M4.93 4.93l1.41 1.41M17.66 17.66l1.41 1.41M2 12h2M20 12h2M4.93 19.07l1.41-1.41M17.66 6.34l1.41-1.41"/>';

    document.body.setAttribute("data-theme", next);
    icon.innerHTML = next === "indigo" ? sun : moon;
    localStorage.setItem("maaz:theme", next);
  });
})();

/* === REVEAL OBSERVER + COUNTERS === */
function animateCounter(el){
  const target = parseFloat(el.dataset.counter);
  const decimals = parseInt(el.dataset.decimals || "0", 10);
  const prefix = el.dataset.prefix || "";
  const suffix = el.dataset.suffix || "";
  if (matchMedia("(prefers-reduced-motion:reduce)").matches){
    el.textContent = prefix + (decimals>0 ? target.toFixed(decimals) : Math.round(target)) + suffix;
    return;
  }
  const dur = 1100, t0 = performance.now(), iv = 1000/60;
  const tick = () => {
    const t = performance.now();
    const k = Math.min(1, (t - t0) / dur);
    const ease = 1 - Math.pow(1-k, 3);
    const v = target * ease;
    el.textContent = prefix + (decimals>0 ? v.toFixed(decimals) : Math.round(v)) + suffix;
    if (k < 1) setTimeout(tick, iv);
  };
  setTimeout(tick, iv);
}

const _revealIo = new IntersectionObserver((entries) => {
  entries.forEach(e => {
    if (e.isIntersecting){
      e.target.classList.add("in");
      if (e.target.dataset.counter !== undefined && !e.target.dataset.done){
        animateCounter(e.target);
        e.target.dataset.done = "1";
      }
      _revealIo.unobserve(e.target);
    }
  });
}, { rootMargin: "-5% 0px -5% 0px", threshold: 0.05 });

function observeReveals(root){
  (root || document).querySelectorAll(".reveal, [data-counter]").forEach(n => {
    if (!n.dataset.done) _revealIo.observe(n);
  });
  setTimeout(() => {
    (root || document).querySelectorAll(".reveal:not(.in), [data-counter]:not([data-done])").forEach(n => {
      const r = n.getBoundingClientRect();
      if (r.top < window.innerHeight && r.bottom > 0){
        n.classList.add("in");
        if (n.dataset.counter !== undefined && !n.dataset.done){
          animateCounter(n); n.dataset.done = "1";
        }
      }
    });
  }, 60);
}
window.observeReveals = observeReveals;
