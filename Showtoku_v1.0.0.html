@import url('https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700;800&family=JetBrains+Mono:wght@400;500;600&display=swap');

*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
:root{
  --bg-primary:#f7f8fb;
  --bg-secondary:#eef1f6;
  --bg-tertiary:#f0f2f7;
  --bg-card:#ffffff;
  --bg-input:#f4f5f9;
  --bg-dark:#1a2744;
  --bg-dark-2:#243254;
  --border:rgba(20,40,80,0.08);
  --border-hover:rgba(20,40,80,0.16);
  --border-strong:rgba(20,40,80,0.22);
  --text-primary:#1a2340;
  --text-secondary:#4a5578;
  --text-muted:#7080a0;
  --text-inverse:#ffffff;
  --accent-primary:#1a3d7c;
  --accent-light:#2a5ba8;
  --accent-glow:rgba(26,61,124,0.08);
  --zs-blue:#0090d1;
  --zs-blue-dim:rgba(0,144,209,0.12);
  --green:#0a6847;
  --green-light:#15803d;
  --green-dim:rgba(10,104,71,0.08);
  --amber:#b87a1a;
  --amber-dim:rgba(184,122,26,0.10);
  --red:#b91c1c;
  --red-dim:rgba(185,28,28,0.08);
  --violet:#6d28d9;
  --violet-dim:rgba(109,40,217,0.08);
  --tier-0:#c0c8d8;
  --tier-1:#f87171;
  --tier-2:#fbbf24;
  --tier-3:#34d399;
  --tier-4:#1a3d7c;
  --radius:6px;
  --radius-lg:8px;
  --radius-sm:4px;
  --shadow:0 1px 3px rgba(20,40,80,0.06),0 1px 2px rgba(20,40,80,0.04);
  --shadow-lg:0 2px 8px rgba(20,40,80,0.08);
  --font:'Plus Jakarta Sans','Meiryo','Noto Sans JP',sans-serif;
  --mono:'JetBrains Mono','Cascadia Code','Consolas',monospace;
  --sp-xs:4px;--sp-sm:8px;--sp-md:12px;--sp-lg:16px;--sp-xl:24px;--sp-2xl:32px;
  --tr:.15s ease;
}
html{font-size:16px;scroll-behavior:smooth}
body{font-family:var(--font);background:var(--bg-primary);color:var(--text-primary);min-height:100vh;-webkit-font-smoothing:antialiased}
::selection{background:rgba(26,61,124,0.15);color:var(--text-primary)}
::-webkit-scrollbar{width:6px;height:6px}
::-webkit-scrollbar-track{background:transparent}
::-webkit-scrollbar-thumb{background:rgba(20,40,80,0.12);border-radius:3px}
::-webkit-scrollbar-thumb:hover{background:rgba(20,40,80,0.22)}

/* Header */
.header{background:linear-gradient(135deg,#1a2744 0%,#243254 100%);padding:12px 32px;display:flex;align-items:center;gap:16px;position:sticky;top:0;z-index:100;box-shadow:0 1px 4px rgba(20,40,80,0.15)}
.header-icon{width:44px;height:44px;border-radius:8px;overflow:hidden;flex-shrink:0;box-shadow:0 0 0 2px rgba(255,255,255,0.12),0 2px 6px rgba(0,0,0,0.25);background:#fff}
.header-icon img{width:100%;height:100%;object-fit:cover;display:block}
.header-title{display:flex;flex-direction:column;gap:1px}
.header-title h1{font-size:1.05rem;font-weight:800;color:#fff;letter-spacing:0.8px}
.header-title h1 .ver{font-size:0.68rem;font-weight:500;opacity:0.6;margin-left:6px;letter-spacing:0.2px}
.header-title p{font-size:0.68rem;color:rgba(255,255,255,0.55);letter-spacing:0.3px}
.header-right{margin-left:auto;display:flex;gap:8px;align-items:center}
.header-input{background:rgba(255,255,255,0.1);border:1px solid rgba(255,255,255,0.15);border-radius:var(--radius);color:#fff;padding:7px 12px;font-size:0.78rem;font-family:var(--font);transition:border-color 0.2s}
.header-input::placeholder{color:rgba(255,255,255,0.4)}
.header-input:focus{outline:none;border-color:rgba(255,255,255,0.4);box-shadow:0 0 0 3px rgba(255,255,255,0.06)}
.header-input.customer{width:180px}
.header-input.date{color-scheme:dark}
.header-btn{background:rgba(255,255,255,0.12);border:1px solid rgba(255,255,255,0.2);border-radius:var(--radius);color:#fff;padding:7px 12px;font-size:0.75rem;font-weight:600;font-family:var(--font);cursor:pointer;transition:var(--tr)}
.header-btn:hover{background:rgba(255,255,255,0.22)}
.header-btn.primary{background:var(--zs-blue);border-color:var(--zs-blue)}
.header-btn.primary:hover{background:#00a8e8}

/* Tabs */
.tab-bar{display:flex;gap:0;background:var(--bg-card);border-bottom:1px solid var(--border);padding:0 24px;overflow-x:auto;scrollbar-width:none;box-shadow:0 1px 2px rgba(20,40,80,0.04)}
.tab-bar::-webkit-scrollbar{display:none}
.tab{padding:13px 16px;cursor:pointer;font-size:0.78rem;color:var(--text-muted);border-bottom:2px solid transparent;transition:color 0.2s,border-color 0.2s;white-space:nowrap;font-weight:500;letter-spacing:0.3px;display:flex;align-items:center;gap:6px;font-family:var(--font);background:none;border-top:none;border-left:none;border-right:none}
.tab:hover{color:var(--text-secondary)}
.tab.active{color:var(--accent-primary);border-bottom-color:var(--accent-primary);font-weight:700}
.tab-sep{width:1px;height:22px;background:var(--border);margin:auto 6px;flex-shrink:0}
.tab-badge{font-size:0.65rem;padding:1px 6px;border-radius:8px;background:var(--bg-input);color:var(--text-secondary);font-family:var(--mono);font-weight:600;min-width:22px;text-align:center}
.tab.active .tab-badge{background:var(--accent-glow);color:var(--accent-primary)}

/* Main */
.main{max-width:1400px;margin:0 auto;padding:var(--sp-xl) var(--sp-2xl)}
.panel{display:none}
.panel.active{display:block}

/* Cards */
.card{background:var(--bg-card);border:1px solid var(--border);border-radius:var(--radius-lg);padding:var(--sp-xl);margin-bottom:var(--sp-lg);box-shadow:var(--shadow)}
.card-title{font-size:0.72rem;font-weight:700;color:var(--accent-primary);margin-bottom:var(--sp-md);display:flex;align-items:center;gap:var(--sp-sm);letter-spacing:1px;text-transform:uppercase}
.card-title::before{content:'';width:3px;height:14px;background:var(--accent-primary);border-radius:2px;flex-shrink:0}
.card-subtitle{font-size:0.8rem;color:var(--text-secondary);margin-bottom:var(--sp-md);font-weight:400;line-height:1.55}

/* KPI */
.kpi-row{display:grid;grid-template-columns:repeat(auto-fit,minmax(180px,1fr));gap:var(--sp-md);margin-bottom:var(--sp-lg)}
.kpi{background:var(--bg-card);border:1px solid var(--border);border-radius:var(--radius-lg);padding:16px;position:relative;overflow:hidden;box-shadow:var(--shadow);transition:border-color 0.2s}
.kpi:hover{border-color:var(--border-hover)}
.kpi::after{content:'';position:absolute;top:0;left:0;right:0;height:2px;background:var(--accent-primary)}
.kpi.green::after{background:var(--green)}
.kpi.amber::after{background:var(--amber)}
.kpi.red::after{background:var(--red)}
.kpi.violet::after{background:var(--violet)}
.kpi-label{font-size:0.66rem;color:var(--text-muted);margin-bottom:6px;text-transform:uppercase;letter-spacing:1.2px;font-weight:700}
.kpi-value{font-size:1.5rem;font-weight:700;color:var(--text-primary);font-family:var(--mono);line-height:1}
.kpi-sub{font-size:0.7rem;color:var(--text-muted);margin-top:6px}

/* Function sections */
.fn-hero{background:linear-gradient(135deg,#fff 0%,var(--bg-tertiary) 100%);border:1px solid var(--border);border-radius:var(--radius-lg);padding:20px 24px;margin-bottom:var(--sp-lg);display:flex;align-items:center;gap:20px;box-shadow:var(--shadow)}
.fn-hero-icon{width:48px;height:48px;border-radius:10px;background:var(--accent-primary);color:#fff;display:flex;align-items:center;justify-content:center;font-size:1.4rem;flex-shrink:0;font-weight:800;font-family:var(--mono);letter-spacing:-0.5px}
.fn-hero-text{flex:1;min-width:0}
.fn-hero-title{font-size:1.15rem;font-weight:700;letter-spacing:-0.2px;margin-bottom:3px}
.fn-hero-title .en{font-size:0.72rem;font-weight:500;color:var(--text-muted);margin-left:8px;letter-spacing:0.5px}
.fn-hero-desc{font-size:0.8rem;color:var(--text-secondary);line-height:1.5}
.fn-hero-stats{display:flex;gap:18px;flex-shrink:0}
.fn-hero-stat{text-align:right}
.fn-hero-stat-label{font-size:0.64rem;color:var(--text-muted);text-transform:uppercase;letter-spacing:1px;font-weight:700}
.fn-hero-stat-value{font-size:1.15rem;font-weight:700;font-family:var(--mono);color:var(--text-primary)}

/* Category card */
.cat-card{background:var(--bg-card);border:1px solid var(--border);border-radius:var(--radius-lg);margin-bottom:var(--sp-md);box-shadow:var(--shadow);overflow:hidden}
.cat-header{padding:14px 20px;display:flex;align-items:center;gap:var(--sp-md);cursor:pointer;transition:background 0.15s;border-bottom:1px solid transparent}
.cat-header:hover{background:var(--bg-tertiary)}
.cat-header.expanded{border-bottom-color:var(--border);background:var(--bg-tertiary)}
.cat-id{font-family:var(--mono);font-size:0.8rem;font-weight:700;color:var(--accent-primary);min-width:80px;letter-spacing:-0.3px}
.cat-name{flex:1;font-size:0.88rem;font-weight:600;color:var(--text-primary)}
.cat-name .en{font-size:0.7rem;color:var(--text-muted);font-weight:400;margin-left:8px}
.cat-stats{display:flex;gap:14px;align-items:center;font-size:0.72rem}
.cat-stat{display:flex;flex-direction:column;text-align:right;gap:1px;min-width:60px}
.cat-stat-label{font-size:0.6rem;color:var(--text-muted);text-transform:uppercase;letter-spacing:0.8px;font-weight:700}
.cat-stat-val{font-family:var(--mono);font-weight:700;color:var(--text-primary);font-size:0.82rem}
.cat-chevron{font-size:0.8rem;color:var(--text-muted);transition:transform 0.2s;margin-left:4px}
.cat-header.expanded .cat-chevron{transform:rotate(90deg)}

.cat-body{display:none;padding:0}
.cat-body.show{display:block}

/* Subcategory */
.sub-item{padding:14px 20px;border-bottom:1px solid var(--border);display:grid;grid-template-columns:auto 1fr auto;gap:var(--sp-md);align-items:flex-start}
.sub-item:last-child{border-bottom:none}
.sub-item:hover{background:var(--bg-tertiary)}
.sub-id{font-family:var(--mono);font-size:0.72rem;font-weight:700;color:var(--accent-primary);padding:3px 7px;background:var(--accent-glow);border-radius:var(--radius-sm);min-width:82px;text-align:center;letter-spacing:-0.3px}
.sub-content{min-width:0}
.sub-text{font-size:0.82rem;color:var(--text-primary);line-height:1.5;margin-bottom:6px}
.sub-meta{display:flex;gap:10px;flex-wrap:wrap;align-items:center;font-size:0.68rem}
.sub-meta-chip{padding:2px 7px;border-radius:10px;background:var(--bg-input);color:var(--text-secondary);font-family:var(--mono);font-weight:600;display:inline-flex;align-items:center;gap:4px;letter-spacing:0.2px}
.sub-meta-chip.zs{background:var(--zs-blue-dim);color:#006da0}
.sub-meta-chip.ztmm{background:var(--violet-dim);color:var(--violet)}
.sub-meta-chip.ai{background:linear-gradient(90deg,rgba(109,40,217,0.12),rgba(0,144,209,0.12));color:#6d28d9;border:1px solid rgba(109,40,217,0.25);font-weight:700}
.sub-meta-chip.airmf{background:rgba(10,104,71,0.12);color:#0a6847;font-size:0.64rem}
.sub-meta-chip.gai{background:rgba(184,122,26,0.12);color:#b87a1a;font-size:0.64rem}

.ai-indicator{display:inline-flex;align-items:center;gap:4px;padding:2px 7px;background:linear-gradient(90deg,#6d28d9,#0090d1);color:#fff;font-size:0.62rem;font-weight:800;border-radius:10px;letter-spacing:0.5px;font-family:var(--mono);box-shadow:0 1px 3px rgba(109,40,217,0.25)}
.ai-note{margin-top:6px;padding:8px 10px;background:linear-gradient(90deg,rgba(109,40,217,0.06),rgba(0,144,209,0.06));border-left:3px solid #6d28d9;border-radius:var(--radius-sm);font-size:0.72rem;color:var(--text-primary);line-height:1.55}
.ai-note strong{color:#6d28d9;font-weight:700}
.ai-note-meta{display:flex;gap:6px;flex-wrap:wrap;margin-top:6px;font-size:0.64rem}
.sub-meta-chip.cov-0{background:var(--red-dim);color:var(--red)}
.sub-meta-chip.cov-25{background:var(--amber-dim);color:var(--amber)}
.sub-meta-chip.cov-50{background:var(--amber-dim);color:var(--amber)}
.sub-meta-chip.cov-75{background:var(--green-dim);color:var(--green-light)}
.sub-meta-chip.cov-100{background:var(--green-dim);color:var(--green-light)}

.sub-note{font-size:0.7rem;color:var(--text-muted);margin-top:6px;line-height:1.5;font-style:italic}
.sub-scores{display:flex;flex-direction:column;gap:6px;min-width:240px;flex-shrink:0}
.tier-row{display:flex;align-items:center;gap:8px}
.tier-row-label{font-size:0.64rem;color:var(--text-muted);text-transform:uppercase;letter-spacing:0.5px;font-weight:700;min-width:50px}
.tier-btns{display:flex;gap:2px}
.tier-btn{width:26px;height:26px;border-radius:4px;border:1px solid var(--border);background:var(--bg-card);color:var(--text-muted);font-size:0.72rem;font-weight:700;cursor:pointer;transition:var(--tr);font-family:var(--mono)}
.tier-btn:hover{border-color:var(--border-strong);background:var(--bg-tertiary)}
.tier-btn.active[data-t="0"]{background:var(--tier-0);color:#fff;border-color:var(--tier-0)}
.tier-btn.active[data-t="1"]{background:var(--tier-1);color:#fff;border-color:var(--tier-1)}
.tier-btn.active[data-t="2"]{background:var(--tier-2);color:#fff;border-color:var(--tier-2)}
.tier-btn.active[data-t="3"]{background:var(--tier-3);color:#fff;border-color:var(--tier-3)}
.tier-btn.active[data-t="4"]{background:var(--tier-4);color:#fff;border-color:var(--tier-4)}
.tier-btn.evidence{border-style:dashed;background:var(--accent-glow);cursor:default;opacity:0.9}
.tier-warn{font-size:0.64rem;padding:2px 6px;border-radius:3px;font-weight:700;font-family:var(--mono);white-space:nowrap}
.tier-warn.over{background:var(--red-dim);color:var(--red)}
.tier-warn.under{background:var(--amber-dim);color:var(--amber)}
.tier-warn.align{background:var(--green-dim);color:var(--green-light)}

/* Coverage bar */
.cov-bar{width:80px;height:6px;background:var(--bg-input);border-radius:3px;overflow:hidden;position:relative}
.cov-bar-fill{height:100%;border-radius:3px;transition:width 0.3s}
.cov-bar-fill.c0{background:var(--red);width:0%}
.cov-bar-fill.c25{background:var(--amber);width:25%}
.cov-bar-fill.c50{background:var(--amber);width:50%}
.cov-bar-fill.c75{background:var(--green);width:75%}
.cov-bar-fill.c100{background:var(--green);width:100%}

/* Heatmap */
.heatmap-container{overflow-x:auto;padding:4px}
.heatmap{display:grid;gap:3px;grid-template-columns:110px repeat(6,1fr);font-family:var(--mono)}
.hm-corner{grid-column:1;background:transparent}
.hm-fn-hdr{padding:8px 10px;background:var(--bg-dark);color:#fff;border-radius:var(--radius-sm);text-align:center;font-size:0.72rem;font-weight:700;letter-spacing:0.8px}
.hm-cat-label{padding:8px 10px;background:var(--bg-tertiary);border-radius:var(--radius-sm);font-size:0.7rem;font-weight:700;color:var(--text-primary);display:flex;align-items:center;justify-content:space-between}
.hm-cat-label .code{color:var(--accent-primary)}
.hm-cell{padding:8px;border-radius:var(--radius-sm);font-size:0.7rem;font-weight:700;text-align:center;color:#fff;position:relative;cursor:pointer;transition:transform 0.15s}
.hm-cell:hover{transform:scale(1.06);z-index:5;box-shadow:var(--shadow-lg)}
.hm-cell.t0{background:var(--tier-0);color:#4a5578}
.hm-cell.t1{background:var(--tier-1)}
.hm-cell.t2{background:var(--tier-2);color:#6b4a00}
.hm-cell.t3{background:var(--tier-3);color:#064e3b}
.hm-cell.t4{background:var(--tier-4)}
.hm-cell.empty{background:repeating-linear-gradient(45deg,#eef1f6,#eef1f6 4px,#f7f8fb 4px,#f7f8fb 8px);color:#7080a0}
.hm-cell-count{font-size:0.62rem;opacity:0.85;display:block;margin-top:1px;font-weight:500}

/* Overview radar */
.chart-wrap{display:grid;grid-template-columns:1fr 1fr;gap:var(--sp-lg);margin-bottom:var(--sp-lg)}
.chart-card{background:var(--bg-card);border:1px solid var(--border);border-radius:var(--radius-lg);padding:20px;box-shadow:var(--shadow)}
.chart-title{font-size:0.76rem;font-weight:700;color:var(--accent-primary);margin-bottom:12px;letter-spacing:0.5px;text-transform:uppercase}
.radar-svg{width:100%;height:auto;max-width:400px;margin:0 auto;display:block}

/* Top gaps list */
.gap-list{display:flex;flex-direction:column;gap:8px}
.gap-row{display:flex;align-items:center;gap:10px;padding:10px 12px;background:var(--bg-tertiary);border-radius:var(--radius);font-size:0.78rem;transition:var(--tr);border-left:3px solid transparent}
.gap-row:hover{background:#e8ecf4;border-left-color:var(--accent-primary)}
.gap-row-id{font-family:var(--mono);font-size:0.72rem;font-weight:700;color:var(--accent-primary);min-width:82px}
.gap-row-text{flex:1;color:var(--text-primary);font-size:0.75rem;line-height:1.4;min-width:0}
.gap-row-delta{font-family:var(--mono);font-weight:700;font-size:0.82rem;padding:3px 8px;border-radius:4px;white-space:nowrap}
.gap-row-delta.high{background:var(--red-dim);color:var(--red)}
.gap-row-delta.mid{background:var(--amber-dim);color:var(--amber)}

/* Import/Export */
.io-area{display:grid;grid-template-columns:1fr 1fr;gap:var(--sp-lg)}
.io-card{background:var(--bg-tertiary);border:2px dashed var(--border);border-radius:var(--radius-lg);padding:20px;text-align:center;transition:var(--tr)}
.io-card:hover{border-color:var(--accent-light);background:var(--accent-glow)}
.io-card h3{font-size:0.88rem;font-weight:700;color:var(--accent-primary);margin-bottom:6px}
.io-card p{font-size:0.74rem;color:var(--text-secondary);margin-bottom:14px;line-height:1.5}
.io-card .btn{background:var(--accent-primary);color:#fff;border:none;border-radius:var(--radius);padding:10px 20px;font-size:0.8rem;font-weight:600;cursor:pointer;transition:var(--tr);font-family:var(--font)}
.io-card .btn:hover{background:var(--accent-light)}
.io-log{margin-top:var(--sp-md);font-family:var(--mono);font-size:0.72rem;background:#fff;border:1px solid var(--border);border-radius:var(--radius);padding:10px 12px;text-align:left;max-height:120px;overflow-y:auto;line-height:1.55;color:var(--text-secondary);white-space:pre-wrap}
.io-log.ok{border-color:var(--green);background:var(--green-dim);color:var(--green-light)}
.io-log.err{border-color:var(--red);background:var(--red-dim);color:var(--red)}

/* CISO Report */
.report-hero{background:linear-gradient(135deg,var(--bg-dark) 0%,var(--bg-dark-2) 100%);color:#fff;padding:28px 32px;border-radius:var(--radius-lg);margin-bottom:var(--sp-lg)}
.report-hero h2{font-size:1.3rem;font-weight:800;margin-bottom:8px;letter-spacing:-0.2px}
.report-hero .meta{font-size:0.75rem;opacity:0.65;letter-spacing:0.5px;font-family:var(--mono)}
.report-section{background:var(--bg-card);border:1px solid var(--border);border-radius:var(--radius-lg);padding:20px 24px;margin-bottom:var(--sp-md);box-shadow:var(--shadow)}
.report-section h3{font-size:0.9rem;font-weight:700;color:var(--accent-primary);margin-bottom:12px;letter-spacing:0.3px;display:flex;align-items:center;gap:10px}
.report-section h3::before{content:'';width:4px;height:16px;background:var(--accent-primary);border-radius:2px}
.report-section p{font-size:0.82rem;color:var(--text-secondary);line-height:1.65;margin-bottom:8px}
.report-table{width:100%;border-collapse:collapse;font-size:0.76rem;margin-top:8px}
.report-table th{text-align:left;padding:8px 10px;background:var(--bg-tertiary);color:var(--text-primary);font-weight:700;font-size:0.72rem;letter-spacing:0.5px;border-bottom:2px solid var(--border)}
.report-table td{padding:8px 10px;border-bottom:1px solid var(--border);color:var(--text-primary)}
.report-table tr:last-child td{border-bottom:none}
.report-table .mono{font-family:var(--mono);font-weight:600;color:var(--accent-primary)}

.ceiling-note{padding:10px 14px;background:var(--violet-dim);border-left:3px solid var(--violet);border-radius:var(--radius);font-size:0.76rem;color:var(--text-primary);line-height:1.55;margin:10px 0}
.ceiling-note strong{color:var(--violet)}

/* Tooltip */
.tip{position:relative;display:inline-flex;align-items:center;gap:3px;cursor:help}
.tip-body{position:absolute;bottom:calc(100% + 6px);left:50%;transform:translateX(-50%);background:var(--bg-dark);color:#fff;padding:8px 10px;border-radius:var(--radius);font-size:0.7rem;white-space:nowrap;opacity:0;pointer-events:none;transition:opacity 0.15s;z-index:50;max-width:260px;white-space:normal;width:240px;text-align:left;line-height:1.5;font-weight:400}
.tip:hover .tip-body{opacity:1}
.tip-body::after{content:'';position:absolute;top:100%;left:50%;transform:translateX(-50%);border:5px solid transparent;border-top-color:var(--bg-dark)}

/* Legend */
.legend{display:flex;gap:12px;flex-wrap:wrap;padding:10px 14px;background:var(--bg-tertiary);border-radius:var(--radius);font-size:0.72rem;margin-bottom:var(--sp-md)}
.legend-item{display:flex;align-items:center;gap:5px}
.legend-dot{width:10px;height:10px;border-radius:2px}

/* Responsive */
@media (max-width:900px){
  .chart-wrap{grid-template-columns:1fr}
  .io-area{grid-template-columns:1fr}
  .sub-item{grid-template-columns:1fr;gap:10px}
  .sub-scores{width:100%;min-width:0}
  .fn-hero{flex-direction:column;align-items:flex-start}
  .main{padding:var(--sp-md) var(--sp-md)}
  .heatmap{grid-template-columns:90px repeat(6,minmax(50px,1fr))}
}
</style>
</head>

/* Compute effective AI-enhanced coverage for a subcategory */
function effCov(subId){
  const base = CSF_ZTMM_MAP[subId]?.cov || 0;
  const boost = CSF_AI_OVERLAY[subId]?.cov_boost || 0;
  return Math.min(100, base + boost);
}

/* ════════════════════════════════════════════════════════════════════
   AI RMF → Zscaler モジュール マッピング（CSF_AI_OVERLAY から集約導出）
   各 AI RMF サブカテゴリに対する Z モジュール適用と到達可能カバー率を計算
   ════════════════════════════════════════════════════════════════════ */
const AIRMF_ZS_MAP = (() => {
  const agg = {};
  Object.entries(CSF_AI_OVERLAY).forEach(([csfId, ov])=>{
    (ov.ai_rmf||[]).forEach(rmfId=>{
      if(!agg[rmfId]) agg[rmfId] = {mods:new Set(), gaiRisks:new Set(), linkedCsfs:[], maxBoost:0, notes:[]};
      (ov.ai_mods||[]).forEach(m=>agg[rmfId].mods.add(m));
      (ov.ai_gai||[]).forEach(g=>agg[rmfId].gaiRisks.add(g));
      agg[rmfId].linkedCsfs.push(csfId);
      agg[rmfId].maxBoost = Math.max(agg[rmfId].maxBoost, ov.cov_boost||0);
      if(ov.note) agg[rmfId].notes.push(ov.note);
    });
  });
  // cov%: Z モジュール本数 × CSF連携幅で算定（0/30/55/75/90）
  const result = {};
  Object.entries(agg).forEach(([rmfId, v])=>{
    const modCount = v.mods.size;
    const csfCount = v.linkedCsfs.length;
    let cov = 0;
    if(modCount === 0) cov = csfCount >= 2 ? 20 : 0;
    else if(modCount === 1) cov = csfCount >= 3 ? 55 : csfCount >= 2 ? 45 : 35;
    else if(modCount === 2) cov = csfCount >= 3 ? 75 : csfCount >= 2 ? 65 : 55;
    else cov = csfCount >= 2 ? 90 : 75;
    result[rmfId] = {
      mods: [...v.mods],
      cov,
      gaiRisks: [...v.gaiRisks],
      linkedCsfs: [...new Set(v.linkedCsfs)],
      notes: v.notes
    };
  });
  return result;
})();

/* AI RMF sub の Zscaler 到達可能カバー率（= 到達上限 tier 算定の基礎） */
function aiRmfEffCov(rmfId){ return AIRMF_ZS_MAP[rmfId]?.cov || 0; }

/* カバー率から到達可能 tier 上限を算定（CSF と同ルール） */
function aiRmfCeiling(rmfId){
  const cov = aiRmfEffCov(rmfId);
  return cov >= 75 ? 4 : cov >= 50 ? 3 : cov >= 25 ? 2 : cov > 0 ? 1 : 0;
}

/* ════════════════════════════════════════════════════════════════════
   State
   ════════════════════════════════════════════════════════════════════ */
const STORAGE_KEY = "csf_gap_v1_state";
const state = {
  customer:"",
  date: new Date().toISOString().slice(0,10),
  self:{},     // subcat id → tier 0-4 (self-declared)
  target:{},   // subcat id → tier 0-4 (target)
  evidence:{}, // subcat id → tier 0-4 (from MAAZ) — evidence-priority
  aiRmfSelf:{},   // AI RMF sub id → tier 0-4 (AS-IS)
  aiRmfTarget:{}, // AI RMF sub id → tier 0-4 (TO-BE)
  maazLoaded:false,
  maazTimestamp:null,
  currentTab:"overview"
};
function saveState(){ try{ localStorage.setItem(STORAGE_KEY, JSON.stringify(state)); }catch(e){} }
function loadState(){
  try{
    const s = localStorage.getItem(STORAGE_KEY);
    if(s){ Object.assign(state, JSON.parse(s)); }
  }catch(e){}
  if(!state.aiRmfSelf) state.aiRmfSelf = {};
  if(!state.aiRmfTarget) state.aiRmfTarget = {};
  // Init defaults: self/target to 0, no evidence
  CSF_FRAMEWORK.functions.forEach(f=>f.categories.forEach(c=>c.subs.forEach(s=>{
    if(!(s.id in state.self)) state.self[s.id]=0;
    if(!(s.id in state.target)) state.target[s.id]=3;
  })));
  // AI RMF: AS-IS=0, TO-BE=到達可能上限（それが3未満なら3、超えるなら上限）
  AI_RMF.functions.forEach(f=>f.categories.forEach(c=>c.subs.forEach(s=>{
    if(!(s.id in state.aiRmfSelf)) state.aiRmfSelf[s.id]=0;
    if(!(s.id in state.aiRmfTarget)){
      const ceil = aiRmfCeiling(s.id);
      state.aiRmfTarget[s.id] = ceil>0 ? Math.min(ceil, 3) : 3;
    }
  })));
}

/* ════════════════════════════════════════════════════════════════════
   Scoring utilities
   ════════════════════════════════════════════════════════════════════ */
// Active tier: evidence if present, else self
function getActive(subId){
  return (subId in state.evidence) ? state.evidence[subId] : state.self[subId];
}
// Delta: self - evidence (positive = overconfidence)
function getDelta(subId){
  if(!(subId in state.evidence)) return null;
  return (state.self[subId]||0) - state.evidence[subId];
}
// Category average (based on active = evidence-priority)
function catAvg(cat){
  if(!cat.subs.length) return 0;
  const sum = cat.subs.reduce((a,s)=>a+getActive(s.id),0);
  return sum / cat.subs.length;
}
// Function average
function fnAvg(fn){
  const all = fn.categories.flatMap(c=>c.subs);
  if(!all.length) return 0;
  return all.reduce((a,s)=>a+getActive(s.id),0) / all.length;
}
// Category Zscaler-coverage weighted (reachable ceiling)
function catCoverage(cat){
  if(!cat.subs.length) return 0;
  const sum = cat.subs.reduce((a,s)=>a+effCov(s.id),0);
  return sum / cat.subs.length;
}
function fnCoverage(fn){
  const all = fn.categories.flatMap(c=>c.subs);
  if(!all.length) return 0;
  return all.reduce((a,s)=>a+effCov(s.id),0) / all.length;
}
// Total subcategories / gap count
function totalSubs(){ return CSF_FRAMEWORK.functions.flatMap(f=>f.categories.flatMap(c=>c.subs)).length; }
function gapCount(){
  return CSF_FRAMEWORK.functions.flatMap(f=>f.categories.flatMap(c=>c.subs))
    .filter(s=>getActive(s.id) < (state.target[s.id]||0)).length;
}
function avgDelta(){
  const deltas = [];
  Object.keys(state.evidence).forEach(k=>{
    deltas.push((state.self[k]||0) - state.evidence[k]);
  });
  if(!deltas.length) return null;
  return deltas.reduce((a,b)=>a+b,0)/deltas.length;
}
function overallAvg(){
  const all = CSF_FRAMEWORK.functions.flatMap(f=>f.categories.flatMap(c=>c.subs));
  return all.reduce((a,s)=>a+getActive(s.id),0) / all.length;
}
function overallCoverage(){
  const all = CSF_FRAMEWORK.functions.flatMap(f=>f.categories.flatMap(c=>c.subs));
  return all.reduce((a,s)=>a+effCov(s.id),0) / all.length;
}

/* ─── AI RMF 集計 ─── */
function aiRmfAllSubs(){
  return AI_RMF.functions.flatMap(f=>f.categories.flatMap(c=>c.subs));
}
function aiRmfOverallAvg(){
  const all = aiRmfAllSubs();
  return all.reduce((a,s)=>a+(state.aiRmfSelf[s.id]||0),0) / all.length;
}
function aiRmfOverallTarget(){
  const all = aiRmfAllSubs();
  return all.reduce((a,s)=>a+(state.aiRmfTarget[s.id]||0),0) / all.length;
}
function aiRmfOverallCov(){
  const all = aiRmfAllSubs();
  return all.reduce((a,s)=>a+aiRmfEffCov(s.id),0) / all.length;
}
function aiRmfGapCount(){
  return aiRmfAllSubs().filter(s=>(state.aiRmfSelf[s.id]||0) < (state.aiRmfTarget[s.id]||0)).length;
}
function aiRmfFnAvg(fn){
  const subs = fn.categories.flatMap(c=>c.subs);
  if(!subs.length) return 0;
  return subs.reduce((a,s)=>a+(state.aiRmfSelf[s.id]||0),0) / subs.length;
}
function aiRmfFnTargetAvg(fn){
  const subs = fn.categories.flatMap(c=>c.subs);
  if(!subs.length) return 0;
  return subs.reduce((a,s)=>a+(state.aiRmfTarget[s.id]||0),0) / subs.length;
}
function aiRmfFnCov(fn){
  const subs = fn.categories.flatMap(c=>c.subs);
  if(!subs.length) return 0;
  return subs.reduce((a,s)=>a+aiRmfEffCov(s.id),0) / subs.length;
}

/* ════════════════════════════════════════════════════════════════════
   MAAZ → CSF Evidence derivation
   ════════════════════════════════════════════════════════════════════ */
// MAAZ ZTMM items have levels 1-4. We map lv N → CSF tier N.
// Absence of data = tier 0.
// CSF subcategory Evidence-Tier = floor(avg(mapped ZTMM levels), capped by coverage)
function deriveEvidence(maazZtmm){
  // maazZtmm: { "ID-01": {asIs: 1-4 (or 0)}, ... }
  const ev = {};
  Object.keys(CSF_ZTMM_MAP).forEach(subId=>{
    const map = CSF_ZTMM_MAP[subId];
    if(!map.ztmm.length) return;  // out-of-scope: no evidence
    const levels = map.ztmm
      .map(z=>maazZtmm[z])
      .filter(x=>x!==undefined && x!==null)
      .map(x=>typeof x==="object" ? (x.asIs ?? x.level ?? 0) : x);
    if(!levels.length) return;
    const avg = levels.reduce((a,b)=>a+b,0) / levels.length;
    // Cap by coverage: if coverage is low, cap evidence ceiling
    const ceilByCov = map.cov >= 75 ? 4 : map.cov >= 50 ? 3 : map.cov >= 25 ? 2 : 1;
    ev[subId] = Math.min(Math.round(avg), ceilByCov);
  });
  return ev;
}

  else if(tab === "matrix") main.innerHTML = renderMatrix();
  else if(tab === "airmf") main.innerHTML = renderAIRMF();

  else if(tab.startsWith("fn_")){
    const fnId = tab.slice(3);
    const fn = CSF_FRAMEWORK.functions.find(f=>f.id===fnId);
    if(fn) main.innerHTML = renderFunction(fn);
  }
  attachHandlers();
}

function fmt(v,p=2){ return Number(v).toFixed(p); }
function pctFmt(v){ return Math.round(v) + "%"; }

function covClass(cov){
  if(cov===0) return "cov-0";
  if(cov<=25) return "cov-25";
  if(cov<=50) return "cov-50";
  if(cov<=75) return "cov-75";
  return "cov-100";
}
function covBarClass(cov){
  if(cov===0) return "c0";
  if(cov<=25) return "c25";
  if(cov<=50) return "c50";
  if(cov<=75) return "c75";
  return "c100";
}

    ? `<span style="color:var(--green-light);font-weight:700">MAAZ取込済</span> · ${state.maazTimestamp||""}`

  const fnStats = CSF_FRAMEWORK.functions.map(f=>({
    id:f.id, jp:f.jp, avg:fnAvg(f), cov:fnCoverage(f), color:f.color
  }));

  // Top 10 gaps (biggest target - active)
  const allSubs = CSF_FRAMEWORK.functions.flatMap(f=>f.categories.flatMap(c=>c.subs.map(s=>({...s,fnId:f.id,fnJp:f.jp,cov:CSF_ZTMM_MAP[s.id]?.cov||0}))));

    .map(s=>({...s, gap:(state.target[s.id]||0) - getActive(s.id)}))

        <div class="kpi-sub">目標未達のサブカテゴリ</div>
      </div>
      <div class="kpi ${delta===null?'':(delta>0?'red':'green')}">
        <div class="kpi-label">自己認識乖離 Δ</div>
        <div class="kpi-value">${delta===null?'—':(delta>0?'+':'')+fmt(delta,2)}</div>
        <div class="kpi-sub">${delta===null?'MAAZ未取込':(delta>0?'過信傾向':'過小評価傾向')}</div>
      </div>
    </div>
  </div>

  <div class="ceiling-note">
    <strong>設計思想:</strong> CSFを憲法(方向性)、ZTAを実装軸とします。組織活動(GV)や物理要件(PR.AA-06等)はZscaler到達上限が低く、実装カバーは平均で${pctFmt(cov)}にとどまります。残余は方針・人事・ファシリティ施策で補完します。
  </div>

  <div class="chart-wrap">
    <div class="chart-card">
      <div class="chart-title">機能別 成熟度レーダー</div>
      ${renderRadar(fnStats)}
    </div>

      <div class="chart-title">機能別 Zscalerカバー範囲</div>

    <div class="card-title">優先対応ギャップ Top10 (目標-現状 × 対応可能性)</div>

    <div class="gap-list">
      ${gaps.length===0?'<p style="color:var(--text-muted);text-align:center;padding:20px">目標ティアに全サブカテゴリが到達しています</p>':gaps.map(g=>`

    <div class="gap-list">
      ${topDeltas.map(g=>`
        <div class="gap-row">
          <div class="gap-row-id">${g.id}</div>

function renderRadar(stats){
  const size=340, cx=size/2, cy=size/2, R=110;
  const N=stats.length;
  const angle=i=>(i/N)*2*Math.PI - Math.PI/2;
  const pt=(r,i)=>`${cx+r*Math.cos(angle(i))},${cy+r*Math.sin(angle(i))}`;
  const grids = [1,2,3,4].map(lv=>{
    const pts = stats.map((_,i)=>pt(R*lv/4,i)).join(' ');
    return `<polygon points="${pts}" fill="none" stroke="rgba(20,40,80,0.08)" stroke-width="1"/>`;
  }).join('');
  const axes = stats.map((_,i)=>`<line x1="${cx}" y1="${cy}" x2="${cx+R*Math.cos(angle(i))}" y2="${cy+R*Math.sin(angle(i))}" stroke="rgba(20,40,80,0.08)" stroke-width="1"/>`).join('');
  const datapts = stats.map((s,i)=>pt(R*s.avg/4,i)).join(' ');
  const labels = stats.map((s,i)=>{
    const lx = cx+(R+22)*Math.cos(angle(i));
    const ly = cy+(R+22)*Math.sin(angle(i));
    return `<text x="${lx}" y="${ly}" text-anchor="middle" dominant-baseline="central" style="font-size:11px;font-weight:700;fill:${s.color};font-family:var(--font)">${s.jp}</text>
            <text x="${lx}" y="${ly+13}" text-anchor="middle" style="font-size:10px;fill:var(--text-muted);font-family:var(--mono)">${fmt(s.avg,2)}</text>`;
  }).join('');
  const dots = stats.map((s,i)=>`<circle cx="${cx+R*s.avg/4*Math.cos(angle(i))}" cy="${cy+R*s.avg/4*Math.sin(angle(i))}" r="4" fill="${s.color}"/>`).join('');
  return `<svg class="radar-svg" viewBox="0 0 ${size} ${size}">
    ${grids}${axes}
    <polygon points="${datapts}" fill="rgba(26,61,124,0.12)" stroke="var(--accent-primary)" stroke-width="2"/>
    ${dots}${labels}
  </svg>`;
}

function renderCoverageBars(stats){

        <div class="cat-stat"><div class="cat-stat-label">ZSカバー</div><div class="cat-stat-val">${pctFmt(catCoverage(cat))}</div></div>
        <div class="cat-stat"><div class="cat-stat-label">項目</div><div class="cat-stat-val">${cat.subs.length}</div></div>
      </div>
      <div class="cat-chevron">▶</div>
    </div>
    <div class="cat-body ${expanded?'show':''}">
      ${cat.subs.map(s=>renderSub(s)).join('')}
    </div>
  </div>`;
}

function renderSub(sub){
  const map = CSF_ZTMM_MAP[sub.id] || {ztmm:[],mods:[],cov:0,note:""};
  const ai = CSF_AI_OVERLAY[sub.id];
  const active = getActive(sub.id);
  const self = state.self[sub.id]||0;
  const target = state.target[sub.id]||0;
  const ev = state.evidence[sub.id];
  const delta = getDelta(sub.id);
  const eCov = effCov(sub.id);

  const modsHtml = map.mods.length > 0
    ? map.mods.map(m=>`<span class="sub-meta-chip zs">${m}</span>`).join('')
    : (ai && ai.ai_mods.length > 0 ? '' : '<span class="sub-meta-chip" style="background:var(--bg-input);color:var(--text-muted)">対象外</span>');
  const aiModsHtml = ai && ai.ai_mods.length > 0
    ? ai.ai_mods.map(m=>`<span class="sub-meta-chip ai" title="${ZS_MODULES[m]?.jp||m}">${m}</span>`).join('')
    : '';
  const ztmmHtml = map.ztmm.length > 0
    ? map.ztmm.map(z=>`<span class="sub-meta-chip ztmm">${z}</span>`).join('')
    : '';

  let warn = '';
  if(ev !== undefined){
    if(delta > 0) warn = `<span class="tier-warn over">過信+${delta}</span>`;
    else if(delta < 0) warn = `<span class="tier-warn under">過小${delta}</span>`;
    else warn = `<span class="tier-warn align">整合</span>`;
  }

  // AI section (conditional)
  let aiBlock = '';
  if(ai){
    const rmfHtml = ai.ai_rmf.map(r=>`<span class="sub-meta-chip airmf">AI RMF · ${r}</span>`).join('');
    const gaiHtml = ai.ai_gai.map(g=>{
      const risk = AI_RMF.gaiRisks.find(r=>r.id===g);
      return `<span class="sub-meta-chip gai" title="${risk?.desc||''}">GAI · ${risk?.jp||g}</span>`;
    }).join('');
    aiBlock = `
      <div class="ai-note">
        <strong>🤖 AI観点:</strong> ${ai.note}
        ${ai.cov_boost>0?`<span style="margin-left:8px;padding:1px 6px;background:#6d28d9;color:#fff;border-radius:3px;font-size:0.62rem;font-weight:700;font-family:var(--mono)">AI +${ai.cov_boost}%</span>`:''}
        <div class="ai-note-meta">${rmfHtml}${gaiHtml}</div>
      </div>`;
  }

  return `
  <div class="sub-item" data-subid="${sub.id}">
    <div class="sub-id">${sub.id}${ai?'<span class="ai-indicator" style="margin-top:3px">AI</span>':''}</div>
    <div class="sub-content">
      <div class="sub-text">${sub.jp}</div>
      <div class="sub-meta">
        <div class="cov-bar"><div class="cov-bar-fill ${covBarClass(eCov)}"></div></div>
        <span class="sub-meta-chip ${covClass(eCov)}">ZSカバー ${eCov}%${ai&&ai.cov_boost?` <span style="opacity:0.7">(基本${map.cov}+AI${ai.cov_boost})</span>`:''}</span>
        ${modsHtml}
        ${aiModsHtml}
        ${ztmmHtml?`<span style="color:var(--text-muted);margin:0 2px">·</span>${ztmmHtml}`:''}
      </div>
      ${map.note?`<div class="sub-note">${map.note}</div>`:''}
      ${aiBlock}
    </div>
    <div class="sub-scores">
      <div class="tier-row">
        <span class="tier-row-label">現状</span>
        <div class="tier-btns" data-kind="self" data-subid="${sub.id}">
          ${[0,1,2,3,4].map(t=>{
            const isActive = (ev !== undefined ? ev === t : self === t);
            const isEv = ev !== undefined && ev === t;
            return `<button class="tier-btn ${isActive?'active':''} ${isEv?'evidence':''}" data-t="${t}" ${isEv?'title="Evidence(MAAZ由来)"':''}>${t}</button>`;
          }).join('')}
        </div>
        ${warn}
      </div>
      <div class="tier-row">
        <span class="tier-row-label">目標</span>
        <div class="tier-btns" data-kind="target" data-subid="${sub.id}">
          ${[0,1,2,3,4].map(t=>`<button class="tier-btn ${target===t?'active':''}" data-t="${t}">${t}</button>`).join('')}
        </div>
      </div>
      ${ev !== undefined && self !== ev?`
      <div class="tier-row" style="margin-top:2px">
        <span class="tier-row-label" style="color:var(--accent-light)">申告</span>
        <div class="tier-btns" data-kind="self-override" data-subid="${sub.id}">
          ${[0,1,2,3,4].map(t=>`<button class="tier-btn ${self===t?'active':''}" data-t="${t}" style="opacity:0.6;transform:scale(0.9)">${t}</button>`).join('')}
        </div>
      </div>`:''}
    </div>
  </div>`;
}

/* ── Matrix heatmap ── */
function renderMatrix(){
  // Build a grid: rows = categories (22), columns = 6 functions — but since categories belong to one function,
  // we'll do rows=categories grouped by function, with the cell showing avg tier.
  // Better: grid of all categories, one per row, with 2 columns per category: Evidence/Self tier + Coverage %.
  // Simpler: 2D heatmap by function × tier bucket
  // Let's show categories as rows, with tier color
  const cats = CSF_FRAMEWORK.functions.flatMap(f=>f.categories.map(c=>({...c, fn:f})));
  const fnIds = CSF_FRAMEWORK.functions.map(f=>f.id);

  // Build by function: each row shows the tier chart for that category
  const rows = CSF_FRAMEWORK.functions.map(f=>{
    return `<div style="margin-bottom:24px">
      <div style="font-size:0.82rem;font-weight:700;color:${f.color};margin-bottom:8px;letter-spacing:0.3px">${f.jp} <span style="color:var(--text-muted);font-weight:500">${f.en}</span></div>
      <div style="display:grid;grid-template-columns:140px 1fr 80px 80px;gap:4px;align-items:center;font-size:0.72rem">
        ${f.categories.map(c=>{
          const avg = catAvg(c);
          const cov = catCoverage(c);
          const tier = Math.round(avg);
          return `
            <div style="padding:8px 10px;background:var(--bg-tertiary);border-radius:var(--radius-sm);font-family:var(--mono);font-weight:700;color:${f.color};font-size:0.72rem">${c.id}</div>
            <div style="padding:8px 10px;background:var(--bg-tertiary);border-radius:var(--radius-sm);color:var(--text-primary);font-weight:500">${c.jp}</div>
            <div class="hm-cell t${tier}" style="cursor:default">${fmt(avg,2)}<span class="hm-cell-count">/4.0</span></div>
            <div style="padding:8px 10px;background:var(--bg-tertiary);border-radius:var(--radius-sm);font-family:var(--mono);font-weight:700;color:${cov<25?'var(--red)':cov<75?'var(--amber)':'var(--green-light)'}">${pctFmt(cov)}</div>
          `;
        }).join('')}
      </div>
    </div>`;
  }).join('');

  // Subcategory-level heatmap (compact squares)
  const subMatrix = CSF_FRAMEWORK.functions.map(f=>{
    return `<div style="margin-bottom:20px">
      <div style="font-size:0.78rem;font-weight:700;color:${f.color};margin-bottom:8px">${f.jp} (${f.categories.reduce((a,c)=>a+c.subs.length,0)}項目)</div>
      <div style="display:flex;gap:3px;flex-wrap:wrap">
        ${f.categories.flatMap(c=>c.subs).map(s=>{
          const t = Math.round(getActive(s.id));
          const cov = CSF_ZTMM_MAP[s.id]?.cov || 0;
          return `<div class="hm-cell t${t}" title="${s.id} · Tier ${t} · ZS ${cov}%" style="width:32px;height:32px;padding:0;display:flex;align-items:center;justify-content:center;font-size:0.68rem;border:${cov===0?'1px dashed rgba(255,255,255,0.35)':'none'}">${t}</div>`;
        }).join('')}
      </div>
    </div>`;
  }).join('');

  return `
  <div class="card">
    <div class="card-title">カテゴリ単位マトリクス</div>
    <div class="card-subtitle">22カテゴリの現状ティアとZscalerカバー上限を一覧。ティア色=Evidence優先の実現値</div>
    ${rows}
  </div>
  <div class="card">
    <div class="card-title">サブカテゴリ単位ヒートマップ (106項目)</div>
    <div class="card-subtitle">破線枠=Zscaler対象外(組織・物理・人事施策で補完)</div>
    ${subMatrix}
  </div>`;
}

}

/* ── CISO Report ── */
function renderReport(){
  const avg = overallAvg();
  const cov = overallCoverage();
  const gap = gapCount();
  const total = totalSubs();

  const allSubs = CSF_FRAMEWORK.functions.flatMap(f=>f.categories.flatMap(c=>c.subs.map(s=>({...s,fnJp:f.jp,fnId:f.id,cov:CSF_ZTMM_MAP[s.id]?.cov||0}))));

  // Priority actions: high gap, high coverage
  const priorityActions = allSubs
    .map(s=>({...s, gap:(state.target[s.id]||0)-getActive(s.id)}))
    .filter(s=>s.gap>0)
    .sort((a,b)=>(b.gap*b.cov/100) - (a.gap*a.cov/100))
    .slice(0,8);

  // Residual (low coverage + high gap = needs org initiatives)
  const residual = allSubs
    .map(s=>({...s, gap:(state.target[s.id]||0)-getActive(s.id)}))
    .filter(s=>s.gap>0 && s.cov<=25)
    .sort((a,b)=>b.gap - a.gap)
    .slice(0,6);

  // Overconfidence
  const overconf = state.maazLoaded ? allSubs
    .map(s=>({...s, d:getDelta(s.id)}))
    .filter(s=>s.d!==null && s.d>=1)
    .sort((a,b)=>b.d-a.d)
    .slice(0,6) : [];

  return `

/* ════════════════════════════════════════════════════════════════════
   Event handlers
   ════════════════════════════════════════════════════════════════════ */
function attachHandlers(){
  // Category toggle
  document.querySelectorAll('.cat-header').forEach(h=>{
    h.addEventListener('click',(e)=>{
      if(e.target.closest('.tier-btn')) return;
      const card = h.closest('.cat-card');
      const body = card.querySelector('.cat-body');
      h.classList.toggle('expanded');
      body.classList.toggle('show');
    });
  });
  // Tier button clicks
  document.querySelectorAll('.tier-btns').forEach(group=>{
    const kind = group.dataset.kind;
    const subId = group.dataset.subid;
    group.querySelectorAll('.tier-btn').forEach(btn=>{
      if(btn.classList.contains('evidence')) return;
      btn.addEventListener('click',(e)=>{
        e.stopPropagation();
        const t = +btn.dataset.t;
        if(kind === "self" || kind === "self-override"){
          state.self[subId] = t;
        } else if(kind === "target"){
          state.target[subId] = t;
        } else if(kind === "airmf-self"){
          state.aiRmfSelf[subId] = t;
        } else if(kind === "airmf-target"){
          state.aiRmfTarget[subId] = t;
        }
        saveState();
        renderMain();
      });
    });
  });
  // IO handlers (only on IO tab)
  const btnImp = document.getElementById('btnImportMaazIO');
  const btnExp = document.getElementById('btnExportIO');
  if(btnImp) btnImp.addEventListener('click',()=>document.getElementById('fileImport').click());
  if(btnExp) btnExp.addEventListener('click',exportJSON);
}

function renderAll(){
  renderTabs();
  renderMain();
  document.getElementById("customerName").value = state.customer||"";
  document.getElementById("assessmentDate").value = state.date||"";
}

/* ════════════════════════════════════════════════════════════════════
   Import / Export
   ════════════════════════════════════════════════════════════════════ */
function handleMaazImport(file){
  // Re-fetch logEl on each call (DOM is rebuilt by renderMain)
  const setLog = (msg,cls)=>{
    const el = document.getElementById('ioLogImport');
    if(el){ el.textContent=msg; el.className='io-log '+(cls||''); }
  };
  const reader = new FileReader();
  reader.onload = (e)=>{
    try{
      const data = JSON.parse(e.target.result);
      // Expect MAAZ ZTMM data — look for ztmm or zt.items or ztmmScores keys
      // Be flexible: { ztmm: [{id, asIs}] } or { ztmmScores: {"ID-01": 3} } or top-level
      let ztmmMap = {};
      if(data.ztmmScores && typeof data.ztmmScores === "object"){
        ztmmMap = data.ztmmScores;
      } else if(Array.isArray(data.ztmm)){
        data.ztmm.forEach(z=>{
          if(z.id) ztmmMap[z.id] = z.asIs ?? z.level ?? z.maturity ?? 0;
        });
      } else if(data.zt && data.zt.items){
        data.zt.items.forEach(z=>{ if(z.id) ztmmMap[z.id] = z.asIs ?? z.level ?? 0; });
      } else if(data.format === "maaz-v4" && data.assessment){
        // Try MAAZ v4.x specific shape
        Object.keys(data.assessment).forEach(k=>{
          if(/^(ID|DE|NW|AP|DA|CC)-\d+$/.test(k)) ztmmMap[k] = data.assessment[k].asIs ?? 0;
        });
      } else {
        // Fallback: scan for ZTMM-looking keys at top level
        Object.keys(data).forEach(k=>{
          if(/^(ID|DE|NW|AP|DA|CC)-\d+$/.test(k)){
            const v = data[k];
            ztmmMap[k] = typeof v==="number"?v:(v?.asIs??v?.level??0);
          }
        });
      }
      const count = Object.keys(ztmmMap).length;
      if(count === 0){
        setLog("⚠ ZTMMデータが見つかりません。MAAZエクスポートの形式を確認してください。\n\n検索キー: ztmmScores / ztmm[].id / zt.items / top-level (ID|DE|NW|AP|DA|CC)-NN", "err");
        return;
      }
      state.evidence = deriveEvidence(ztmmMap);
      state.maazLoaded = true;
      state.maazTimestamp = new Date().toISOString().slice(0,16).replace('T',' ');
      saveState();
      const evCount = Object.keys(state.evidence).length;
      // Render first (re-creates ioLogImport DOM), then set the log message on the fresh element
      renderMain();
      setLog(`✓ 取込成功\nZTMM項目: ${count}個 / Evidence導出: ${evCount}サブカテゴリ\n\n取込元: ${file.name}\n時刻: ${state.maazTimestamp}`, "ok");
    } catch(err){
      setLog("✗ JSONパース失敗: "+err.message, "err");
    }
  };
  reader.readAsText(file);
}

function exportJSON(){
  const logEl = document.getElementById('ioLogExport');
  const setLog = (msg,cls)=>{ if(logEl){ logEl.textContent=msg; logEl.className='io-log '+(cls||''); } };
  try{
    const data = {
      format: "csf-v1",
      csf_version: "2.0",
      customer: state.customer||"",
      date: state.date||"",
      maaz_linked: state.maazLoaded,
      maaz_timestamp: state.maazTimestamp,
      totals: {
        avg_maturity: +fmt(overallAvg(),2),
        zs_coverage_pct: Math.round(overallCoverage()),
        gap_count: gapCount(),
        self_evidence_delta: avgDelta()
      },
      functions: CSF_FRAMEWORK.functions.map(f=>({
        id: f.id,
        jp: f.jp,
        avg: +fmt(fnAvg(f),2),
        coverage_pct: Math.round(fnCoverage(f)),
        categories: f.categories.map(c=>({
          id: c.id,
          jp: c.jp,
          avg: +fmt(catAvg(c),2),
          coverage_pct: Math.round(catCoverage(c))
        }))
      })),
      subcategories: Object.fromEntries(
        CSF_FRAMEWORK.functions.flatMap(f=>f.categories.flatMap(c=>c.subs.map(s=>[
          s.id, {
            self: state.self[s.id]||0,
            target: state.target[s.id]||0,
            evidence: state.evidence[s.id] ?? null,
            cov_pct: CSF_ZTMM_MAP[s.id]?.cov||0,
            modules: CSF_ZTMM_MAP[s.id]?.mods||[],
            ztmm: CSF_ZTMM_MAP[s.id]?.ztmm||[]
          }
        ])))
      ),
      ai_rmf: {
        version: AI_RMF.version,
        totals: {
          avg_as_is: +fmt(aiRmfOverallAvg(),2),
          avg_to_be: +fmt(aiRmfOverallTarget(),2),
          zs_coverage_pct: Math.round(aiRmfOverallCov()),
          gap_count: aiRmfGapCount()
        },
        functions: AI_RMF.functions.map(fn=>({
          id: fn.id,
          en: fn.en,
          jp: fn.jp,
          avg_as_is: +fmt(aiRmfFnAvg(fn),2),
          avg_to_be: +fmt(aiRmfFnTargetAvg(fn),2),
          coverage_pct: Math.round(aiRmfFnCov(fn))
        })),
        subcategories: Object.fromEntries(
          aiRmfAllSubs().map(s=>[
            s.id, {
              self: state.aiRmfSelf[s.id]||0,
              target: state.aiRmfTarget[s.id]||0,
              cov_pct: aiRmfEffCov(s.id),
              ceiling: aiRmfCeiling(s.id),
              modules: AIRMF_ZS_MAP[s.id]?.mods||[],
              gai_risks: AIRMF_ZS_MAP[s.id]?.gaiRisks||[],
              linked_csfs: AIRMF_ZS_MAP[s.id]?.linkedCsfs||[]
            }
          ])
        )
      }
    };
    const blob = new Blob([JSON.stringify(data,null,2)], {type:"application/json"});
    const a = document.createElement('a');
    a.href = URL.createObjectURL(blob);
    a.download = `csf_${(state.customer||'assessment').replace(/\s+/g,'_')}_${state.date||'untitled'}.json`;
    a.click();
    URL.revokeObjectURL(a.href);
    setLog(`✓ エクスポート成功: ${a.download}\n${Object.keys(data.subcategories).length}サブカテゴリを書き出しました`, "ok");
  } catch(err){
    setLog("✗ エクスポート失敗: "+err.message, "err");
  }
}

loadState();

document.getElementById('customerName').addEventListener('input',(e)=>{state.customer=e.target.value;saveState();});

document.getElementById('btnImportMaaz').addEventListener('click',()=>document.getElementById('fileImport').click());

document.getElementById('btnReset').addEventListener('click',()=>{
  if(confirm('現在のアセスメント状態をすべてリセットしますか？')){
    localStorage.removeItem(STORAGE_KEY);
    location.reload();
  }
});
document.getElementById('fileImport').addEventListener('change',(e)=>{
  const f = e.target.files[0];
  if(f){
    if(state.currentTab !== 'io'){ state.currentTab = 'io'; saveState(); renderAll(); setTimeout(()=>handleMaazImport(f),50); }
    else handleMaazImport(f);
  }
  e.target.value = ""; // reset so same file can be re-imported
});
