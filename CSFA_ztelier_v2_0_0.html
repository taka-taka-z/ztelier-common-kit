<!DOCTYPE html>
<html lang="ja" data-theme="paper">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>CSFA — Zero Trust → Compliance Translator · CSF 2.0 × AI RMF</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&family=JetBrains+Mono:wght@400;500;600&family=Noto+Sans+JP:wght@300;400;500;600;700&display=swap" rel="stylesheet">
<style>
/* ═══════════════════════════════════════════════════════════════════
   CSFA · Ztelier v1.3 edition
   NIST CSF 2.0 × AI RMF — Governance Gap → Action Navigator
   Editorial bilingual (JA/EN) assessment artifact
   ═══════════════════════════════════════════════════════════════════ */

/* Design tokens ─── Paper (light) */
/* Design tokens ─── Paper (light · Ztelier準拠)
   Primary #246CF7 / Deep Navy #001744 / Accent Sage #7BA05B
   Surface Paper #F7F9FB / Ink #2A2D34 / Muted Stone #8A8F98 */
:root[data-theme="paper"]{
  --bg-0:#F7F9FB; --bg-1:#FFFFFF; --bg-2:#EFF3F8; --bg-3:#E6ECF3;
  --ink-0:#001744; --ink-1:#1B2C4E; --ink-2:#2A2D34; --ink-3:#8A8F98; --ink-4:#BAC0CC;
  --line-0:rgba(0,23,68,0.08); --line-1:rgba(0,23,68,0.14); --line-2:rgba(0,23,68,0.22);
  --primary:#246CF7; --primary-soft:rgba(36,108,247,0.12);
  --trust:#7BA05B; --trust-soft:rgba(123,160,91,0.14);
  --warn:#B5832C; --warn-soft:rgba(181,131,44,0.14);
  --danger:#C14149; --danger-soft:rgba(193,65,73,0.12);
  --magenta:#A0517E; --teal:#3D8888; --violet:#5B4B9E;
  --shadow-soft:0 1px 2px rgba(0,23,68,0.06), 0 6px 24px rgba(0,23,68,0.06);
  --shadow-lift:0 4px 12px rgba(0,23,68,0.10), 0 12px 32px rgba(0,23,68,0.08);
  --glass:rgba(247,249,251,0.86);
}
/* Design tokens ─── Indigo (dark) */
:root[data-theme="indigo"]{
  --bg-0:#050C1C; --bg-1:#0A1430; --bg-2:#0F1B3D; --bg-3:#15224A;
  --ink-0:#EEF3FE; --ink-1:#C7D2E9; --ink-2:#8B9AB8; --ink-3:#5A6A8C; --ink-4:#3B4968;
  --line-0:rgba(238,243,254,0.08); --line-1:rgba(238,243,254,0.14); --line-2:rgba(238,243,254,0.22);
  --primary:#5B8EFF; --primary-soft:rgba(91,142,255,0.14);
  --trust:#9BC47A; --trust-soft:rgba(155,196,122,0.16);
  --warn:#E0AA4E; --warn-soft:rgba(224,170,78,0.14);
  --danger:#E26470; --danger-soft:rgba(226,100,112,0.14);
  --magenta:#C77AA2; --teal:#5FA8A8; --violet:#8B7FCC;
  --shadow-soft:0 1px 2px rgba(0,0,0,0.3), 0 6px 24px rgba(0,0,0,0.25);
  --shadow-lift:0 4px 12px rgba(0,0,0,0.35), 0 12px 32px rgba(0,0,0,0.3);
  --glass:rgba(5,12,28,0.86);
}

/* CSF function accents (share palette with Ztelier pillars) */
:root{
  --fn-GV:var(--violet); --fn-ID:var(--trust); --fn-PR:var(--primary);
  --fn-DE:var(--warn); --fn-RS:var(--magenta); --fn-RC:var(--teal);
}

*,*::before,*::after{box-sizing:border-box}
html,body{margin:0;padding:0}
body{
  font-family:"Inter","Meiryo","メイリオ","Noto Sans JP",system-ui,-apple-system,sans-serif;
  font-feature-settings:"ss01","cv11","tnum";
  background:var(--bg-0); color:var(--ink-0);
  -webkit-font-smoothing:antialiased;
  line-height:1.6;
  font-size:14px;
  min-height:100vh;
}
body[lang="ja"],.jp{font-family:"Noto Sans JP","Inter",sans-serif;font-weight:400}
em{font-style:normal;color:var(--primary);font-weight:600}
.mono{font-family:"JetBrains Mono",ui-monospace,monospace;font-feature-settings:"ss01","cv11","tnum"}
.num{font-variant-numeric:tabular-nums;letter-spacing:-0.01em}
button{font-family:inherit;cursor:pointer;border:none;background:none}
input,select{font-family:inherit}
a{color:var(--primary);text-decoration:none}
hr{border:none;border-top:1px solid var(--line-1);margin:32px 0}

/* ─── Topbar (sticky glass) ─── */
.topbar{
  position:sticky; top:0; z-index:50;
  height:64px; display:flex; align-items:center; gap:24px;
  padding:0 32px;
  background:var(--glass);
  backdrop-filter:blur(12px) saturate(120%);
  -webkit-backdrop-filter:blur(12px) saturate(120%);
  border-bottom:1px solid var(--line-1);
}
.brand{display:flex; align-items:center; gap:12px; font-weight:600; letter-spacing:-0.01em}
.brand-mark{
  width:32px; height:32px; border-radius:9px;
  background:var(--bg-1);
  border:1px solid var(--line-1);
  display:flex; align-items:center; justify-content:center;
  box-shadow:var(--shadow-soft);
  flex-shrink:0;
}
.brand-mark svg{display:block; width:22px; height:22px}
.brand-mark .mk-csf{stroke:var(--primary); fill:none; stroke-width:1.6}
.brand-mark .mk-ai{stroke:var(--trust); fill:none; stroke-width:1.6}
.brand-mark .mk-dot{fill:var(--primary)}
.brand-text{display:flex; flex-direction:column; line-height:1.08; gap:1px}
.brand-jp{
  font-size:12px; font-weight:600;
  font-family:"Meiryo","メイリオ","Inter","Noto Sans JP",sans-serif;
  color:var(--ink-0); letter-spacing:0.01em;
}
.brand-en{
  font-size:9.5px; color:var(--ink-3); letter-spacing:0.14em;
  text-transform:uppercase; font-weight:500; font-family:"Inter",sans-serif;
}
.brand-jp em{color:var(--primary); font-style:normal; font-weight:700; letter-spacing:0.02em}

.topbar-divider{width:1px; height:24px; background:var(--line-1)}

.meta-inputs{display:flex; align-items:center; gap:8px}
.meta-inputs input{
  background:var(--bg-2); color:var(--ink-0);
  border:1px solid var(--line-1); border-radius:8px;
  padding:6px 10px; font-size:11px;
  font-family:"JetBrains Mono", monospace;
}
.meta-inputs input:focus{outline:none; border-color:var(--primary); box-shadow:0 0 0 3px var(--primary-soft)}
.meta-inputs input[type="text"]{width:180px}
.meta-inputs input[type="date"]{width:120px}

.chapter-pills{display:flex; gap:4px; margin-left:auto}
.chip{
  padding:7px 14px; border-radius:999px;
  font-size:11px; font-weight:500; letter-spacing:0.04em;
  color:var(--ink-2); background:transparent;
  border:1px solid transparent;
  display:flex; align-items:center; gap:6px;
  transition:all .16s ease;
}
.chip:hover{color:var(--ink-0); background:var(--bg-2)}
.chip.on{color:var(--ink-0); background:var(--bg-1); border-color:var(--line-1); box-shadow:var(--shadow-soft)}
.chip .num{font-size:9px; color:var(--ink-3); font-family:"JetBrains Mono"}
.chip.on .num{color:var(--primary)}

.topbar-actions{display:flex; align-items:center; gap:8px}
.theme-toggle{
  width:36px; height:36px; border-radius:10px;
  background:var(--bg-2); color:var(--ink-1);
  display:flex; align-items:center; justify-content:center;
  transition:all .2s ease;
}
.theme-toggle:hover{background:var(--bg-3); color:var(--ink-0)}
.maaz-pill{
  padding:6px 12px; border-radius:999px;
  font-size:10px; font-weight:600; letter-spacing:0.06em; text-transform:uppercase;
  font-family:"JetBrains Mono";
  display:flex; align-items:center; gap:6px;
}
.maaz-pill.awaiting{background:var(--warn-soft); color:var(--warn)}
.maaz-pill.loaded{background:var(--trust-soft); color:var(--trust)}
.maaz-pill .dot{width:6px; height:6px; border-radius:999px; background:currentColor}

/* ─── Layout container ─── */
.container{max-width:1280px; margin:0 auto; padding:0 48px}
.section{padding:96px 48px; max-width:1280px; margin:0 auto}
.hero{padding:120px 48px 80px; max-width:1280px; margin:0 auto}

/* ─── Chapter marker ─── */
.chapter-marker{
  display:flex; align-items:center; gap:16px;
  font-family:"JetBrains Mono"; font-size:10px; font-weight:500;
  letter-spacing:0.2em; text-transform:uppercase;
  color:var(--ink-3); margin-bottom:24px;
}
.chapter-marker .num{color:var(--primary); font-weight:600}
.chapter-marker .line{flex:1; height:1px; background:var(--line-1)}
.chapter-marker .label{letter-spacing:0.22em}

.sub-marker{
  font-family:"JetBrains Mono"; font-size:11px; font-weight:600;
  letter-spacing:0.16em; text-transform:uppercase;
  color:var(--ink-2); margin:64px 0 14px;
}
.sub-marker .num{color:var(--primary); font-weight:700; margin-right:10px}

/* Card-style section intro — 説明文とチップ凡例を一塊にして、長いpタグを避ける */
.section-intro{
  font-family:"Meiryo","メイリオ","Noto Sans JP";
  color:var(--ink-1); font-size:13px; line-height:1.75;
  margin:0 0 18px; max-width:920px;
}
.section-intro em{color:var(--primary); font-style:normal; font-weight:600}
.section-intro .legend{
  display:block; margin-top:6px;
  font-family:"JetBrains Mono"; font-size:10.5px; color:var(--ink-3);
  letter-spacing:0.02em; line-height:1.6;
}
.section-intro .legend strong{color:var(--ink-2); font-weight:600}

/* ─── Tier 0-4 定義テーブル (Ch02冒頭) ─── */
.tier-legend{
  background:var(--bg-1);
  border:1px solid var(--line-1);
  border-radius:12px;
  padding:18px 22px 20px;
  margin-bottom:32px;
  box-shadow:var(--shadow-soft);
}
.tier-legend-head{
  display:flex; align-items:baseline; gap:14px; flex-wrap:wrap;
  padding-bottom:14px; margin-bottom:14px;
  border-bottom:1px solid var(--line-0);
}
.tier-legend-head .mono{
  font-family:"JetBrains Mono"; font-size:11px; font-weight:700;
  color:var(--ink-1); letter-spacing:0.14em; text-transform:uppercase;
}
.tier-legend-hint{
  font-family:"Meiryo","メイリオ","Noto Sans JP";
  font-size:11px; color:var(--ink-3); font-weight:400;
  letter-spacing:0.01em;
}
.tier-legend-grid{
  display:grid; grid-template-columns:repeat(5, 1fr); gap:12px;
}
.tier-card{
  display:grid; grid-template-columns:42px 1fr; gap:12px;
  padding:12px 14px; border-radius:10px;
  background:var(--bg-0);
  border:1px solid var(--line-0);
  border-left:3px solid transparent;
  align-items:start;
}
.tier-card .tier-lv{
  width:32px; height:32px; border-radius:50%;
  display:flex; align-items:center; justify-content:center;
  font-family:"JetBrains Mono"; font-weight:700; font-size:15px;
  color:#fff; line-height:1;
  flex-shrink:0;
}
.tier-card .tier-body{min-width:0}
.tier-card .tier-name{
  font-family:"Meiryo","メイリオ","Noto Sans JP";
  font-size:12.5px; font-weight:600; color:var(--ink-0);
  margin-bottom:4px; letter-spacing:0.01em;
}
.tier-card .tier-desc{
  font-family:"Meiryo","メイリオ","Noto Sans JP";
  font-size:11px; color:var(--ink-2); line-height:1.6;
  letter-spacing:0.01em;
}
.tier-card .tier-desc strong{color:var(--ink-0); font-weight:600}

.tier-card.t-0{border-left-color:var(--ink-4)}
.tier-card.t-0 .tier-lv{background:var(--ink-3)}
.tier-card.t-1{border-left-color:var(--danger)}
.tier-card.t-1 .tier-lv{background:var(--danger)}
.tier-card.t-2{border-left-color:var(--warn)}
.tier-card.t-2 .tier-lv{background:var(--warn)}
.tier-card.t-3{border-left-color:var(--primary)}
.tier-card.t-3 .tier-lv{background:var(--primary)}
.tier-card.t-4{border-left-color:var(--trust)}
.tier-card.t-4 .tier-lv{background:var(--trust)}

@media (max-width:1100px){
  .tier-legend-grid{grid-template-columns:repeat(3, 1fr)}
}
@media (max-width:720px){
  .tier-legend-grid{grid-template-columns:1fr 1fr}
}
@media (max-width:520px){
  .tier-legend-grid{grid-template-columns:1fr}
}

/* ─── Hero ─── */
.kicker{
  font-family:"JetBrains Mono"; font-size:11px; font-weight:500;
  letter-spacing:0.22em; text-transform:uppercase;
  color:var(--primary); margin-bottom:24px;
}
.display{
  font-family:"Inter","Noto Sans JP",sans-serif; font-weight:300;
  font-size:clamp(40px, 5.2vw, 72px); line-height:1.08;
  letter-spacing:-0.02em; margin:0 0 28px;
}
.display em{font-weight:600}
.display .jp{font-weight:300}
.lede-jp{
  font-family:"Meiryo","メイリオ","Noto Sans JP"; font-weight:300;
  font-size:17px; line-height:1.8; color:var(--ink-1);
  max-width:720px; margin:0 0 48px;
}
.lede-jp em{font-weight:600; color:var(--primary)}

/* ─── Stats row (KPIs) ─── */
.stats-row{
  display:grid; grid-template-columns:repeat(4, 1fr); gap:24px;
  margin-top:40px;
}
.stat-cell{
  padding:24px 0 4px;
  border-top:1px solid var(--line-1);
}
.stat-label{
  font-family:"JetBrains Mono"; font-size:10px; font-weight:500;
  letter-spacing:0.14em; text-transform:uppercase;
  color:var(--ink-3); margin-bottom:14px;
}
.metric-lg{
  font-family:"Inter"; font-weight:200;
  font-size:56px; line-height:1; letter-spacing:-0.03em;
  color:var(--ink-0); font-variant-numeric:tabular-nums;
  margin-bottom:8px;
}
.metric-lg .unit{font-size:22px; font-weight:300; color:var(--ink-3); margin-left:4px; letter-spacing:-0.01em}
.metric-lg.primary{color:var(--primary)}
.metric-lg.trust{color:var(--trust)}
.metric-lg.warn{color:var(--warn)}
.metric-lg.danger{color:var(--danger)}
.stat-sub{
  font-family:"Meiryo","メイリオ","Noto Sans JP"; font-size:11px; font-weight:400;
  color:var(--ink-2); line-height:1.5;
}
.delta-badge{
  display:inline-block; padding:2px 8px; border-radius:4px;
  font-size:10px; font-weight:600; letter-spacing:0.04em;
  font-family:"JetBrains Mono"; margin-left:4px;
}
.delta-badge.up{background:var(--danger-soft); color:var(--danger)}
.delta-badge.down{background:var(--trust-soft); color:var(--trust)}
.delta-badge.flat{background:var(--bg-2); color:var(--ink-3)}

/* ─── Compliance journey stripe (signature component) ─── */
.journey-stripe{
  margin-top:72px;
  padding:32px;
  background:var(--bg-1);
  border:1px solid var(--line-1);
  border-radius:14px;
  box-shadow:var(--shadow-soft);
}
.journey-header{
  display:flex; justify-content:space-between; align-items:flex-end;
  margin-bottom:18px; gap:24px; flex-wrap:wrap;
}
.journey-side{display:flex; flex-direction:column; gap:4px; min-width:120px}
.journey-side.mid{align-items:center; text-align:center}
.journey-side.right{align-items:flex-end; text-align:right}
.journey-kicker{
  font-family:"JetBrains Mono"; font-size:10px; font-weight:500;
  letter-spacing:0.16em; text-transform:uppercase; color:var(--ink-3);
}
.journey-kicker.asis{color:var(--ink-2)}
.journey-kicker.uplift{color:var(--primary)}
.journey-kicker.tobe{color:var(--trust)}
.journey-kicker.residual{color:var(--warn)}
.journey-val{
  font-family:"Inter"; font-weight:200;
  font-size:38px; line-height:1; letter-spacing:-0.02em;
  font-variant-numeric:tabular-nums;
}
.journey-val.asis{color:var(--ink-1)}
.journey-val.uplift{color:var(--primary)}
.journey-val.tobe{color:var(--trust)}
.journey-val.residual{color:var(--warn)}
.journey-val .plus{font-size:0.7em; vertical-align:0.15em; margin-right:2px; font-weight:300}
.journey-bar{
  height:22px; border-radius:6px; overflow:hidden;
  display:flex; background:var(--bg-3);
  box-shadow:inset 0 1px 2px rgba(0,0,0,0.1);
  position:relative;
}
.journey-seg-asis{
  background:linear-gradient(90deg, color-mix(in oklab, var(--ink-1) 55%, transparent), color-mix(in oklab, var(--ink-1) 70%, transparent));
  transition:width .8s cubic-bezier(0.2,0.6,0.2,1);
  border-right:1px solid rgba(255,255,255,0.08);
}
.journey-seg-uplift{
  background:linear-gradient(90deg, color-mix(in oklab, var(--primary) 75%, transparent), color-mix(in oklab, var(--primary) 95%, var(--violet)));
  transition:width .8s cubic-bezier(0.2,0.6,0.2,1);
  position:relative;
  border-right:1px solid rgba(255,255,255,0.12);
  box-shadow:inset 0 0 8px color-mix(in oklab, var(--primary) 30%, transparent);
}
.journey-seg-residual{
  background:repeating-linear-gradient(45deg, color-mix(in oklab, var(--warn) 28%, transparent), color-mix(in oklab, var(--warn) 28%, transparent) 5px, transparent 5px, transparent 10px);
  flex:1;
}
.journey-markers{
  display:flex; margin-top:6px; position:relative; height:14px;
  font-family:"JetBrains Mono"; font-size:9px; color:var(--ink-3); letter-spacing:0.05em;
}
.journey-markers .mark{position:absolute; transform:translateX(-50%); white-space:nowrap}
.journey-markers .mark .dot{display:inline-block; width:1px; height:6px; background:var(--line-2); margin-right:4px; vertical-align:middle}
.journey-caption{
  display:flex; justify-content:space-between;
  margin-top:14px; gap:16px;
  font-family:"Meiryo","メイリオ","Noto Sans JP"; font-size:11px; font-weight:400; color:var(--ink-2);
}
.journey-caption .cap-mid{text-align:center; color:var(--primary); font-weight:500}
.journey-caption .right{text-align:right}

/* ─── Evidence banner ─── */
.evidence-banner{
  margin-top:32px;
  padding:16px 20px;
  border-radius:10px;
  display:flex; align-items:center; gap:14px;
  font-family:"Meiryo","メイリオ","Noto Sans JP"; font-size:12px; line-height:1.6;
}
.evidence-banner.awaiting{
  background:var(--warn-soft); color:var(--ink-0);
  border:1px solid color-mix(in oklab, var(--warn) 40%, transparent);
}
.evidence-banner.loaded{
  background:var(--trust-soft); color:var(--ink-0);
  border:1px solid color-mix(in oklab, var(--trust) 40%, transparent);
}
.evidence-banner .ico{
  flex:0 0 32px; width:32px; height:32px; border-radius:50%;
  display:flex; align-items:center; justify-content:center;
  font-family:"JetBrains Mono"; font-size:14px; font-weight:700;
}
.evidence-banner.awaiting .ico{background:var(--warn); color:#fff}
.evidence-banner.loaded .ico{background:var(--trust); color:#fff}
.evidence-banner strong{font-weight:600}
.evidence-banner .btn-inline{
  margin-left:auto;
  padding:6px 14px; border-radius:8px;
  background:var(--bg-1); color:var(--ink-0);
  border:1px solid var(--line-1);
  font-size:11px; font-weight:500;
  font-family:"Inter";
  cursor:pointer;
  transition:all .16s ease;
  white-space:nowrap; flex-shrink:0;
}
.evidence-banner .btn-inline:hover{background:var(--bg-2); border-color:var(--line-2)}

/* ─── Bottleneck callout (v4.3.0+) ─── */
.bottleneck-callout{
  display:flex; gap:16px; align-items:flex-start;
  padding:16px 20px; border-radius:12px;
  background:var(--warn-soft);
  border:1px solid color-mix(in oklab, var(--warn) 32%, transparent);
  border-left:3px solid var(--warn);
  margin:24px 0 32px;
  font-family:"Meiryo","メイリオ","Noto Sans JP";
}
.bottleneck-callout .bc-ico{
  width:28px; height:28px; border-radius:8px;
  background:var(--warn); color:#fff;
  display:flex; align-items:center; justify-content:center;
  flex-shrink:0; font-family:"JetBrains Mono"; font-weight:700; font-size:14px;
}
.bottleneck-callout .bc-title{
  font-family:"JetBrains Mono"; font-size:10px; font-weight:600;
  letter-spacing:0.14em; text-transform:uppercase;
  color:var(--warn); margin-bottom:4px;
}
.bottleneck-callout .bc-text{
  font-size:13px; font-weight:400; line-height:1.7; color:var(--ink-0);
}
.bottleneck-callout .bc-text strong{color:var(--warn); font-weight:600}
.bottleneck-callout .bc-num{
  font-family:"JetBrains Mono"; font-variant-numeric:tabular-nums;
  font-weight:600; color:var(--warn);
}

/* ─── MAAZ Pillar 脅威カバレッジパネル (v4.3.0+) ─── */
.pillar-threat-panel{
  background:var(--bg-1);
  border:1px solid var(--line-1);
  border-radius:14px;
  padding:20px 24px;
  box-shadow:var(--shadow-soft);
  margin-bottom:16px;
}
.pillar-threat-row{
  display:grid;
  grid-template-columns:150px 1fr 120px 220px;
  gap:16px; align-items:center;
  padding:10px 0;
  border-bottom:1px solid var(--line-0);
}
.pillar-threat-row:last-child{border-bottom:none}
.ptr-name{
  font-family:"Inter"; font-weight:600; font-size:13px;
}
.ptr-bar{
  position:relative; height:14px; border-radius:7px;
  background:var(--bg-2); overflow:visible;
  border:1px solid var(--line-0);
}
.ptr-bar-asis{
  position:absolute; left:0; top:0; bottom:0;
  border-radius:7px 0 0 7px;
}
.ptr-bar-new{
  position:absolute; top:0; bottom:0;
}
.ptr-bar-new:last-child{border-radius:0 7px 7px 0}
.ptr-bar-effmark{
  position:absolute; top:-3px; bottom:-3px; width:2px;
  background:var(--warn); z-index:2;
  box-shadow:0 0 0 2px var(--bg-1);
}
.ptr-nums{
  font-family:"JetBrains Mono"; font-size:11px;
  display:flex; gap:8px; align-items:baseline;
  font-variant-numeric:tabular-nums;
}
.ptr-n-asis{color:var(--ink-2)}
.ptr-arrow{color:var(--ink-3); font-size:10px}
.ptr-n-to{font-weight:600}
.ptr-n-new{
  color:var(--trust); font-weight:600; font-size:10px;
  padding:1px 5px; border-radius:3px;
  background:var(--trust-soft);
}
.ptr-eff{
  display:flex; gap:8px; flex-wrap:wrap;
  font-family:"JetBrains Mono"; font-size:10px;
}
.ptr-eff span{
  padding:2px 6px; border-radius:4px; background:var(--bg-2); color:var(--ink-2);
  font-size:9px; letter-spacing:0.04em;
}
.ptr-eff .ptr-lost{color:var(--warn); background:var(--warn-soft)}
.ptr-eff strong{color:var(--ink-0); font-weight:600; margin-left:2px; font-size:10px}
.ptr-eff .ptr-lost strong{color:var(--warn)}

/* Scope line — Y/P/N/NA breakdown per pillar */
.scope-line{
  display:flex; gap:8px; flex-wrap:wrap;
  padding:10px 14px; margin-bottom:24px;
  background:var(--bg-2); border-radius:10px;
  font-family:"JetBrains Mono"; font-size:10px;
  color:var(--ink-2);
}
.scope-chip{
  padding:3px 8px; border-radius:5px; background:var(--bg-1);
  border:1px solid var(--line-0);
  letter-spacing:0.02em;
}
.scope-chip strong{font-weight:600; margin-right:2px}

@media (max-width:900px){
  .pillar-threat-row{
    grid-template-columns:1fr;
    gap:6px;
  }
}

/* ─── MAAZ action meta chips (phase / priority / threats) ─── */
.maaz-chip{
  display:inline-flex; align-items:center; gap:4px;
  padding:2px 8px; border-radius:999px;
  font-family:"JetBrains Mono"; font-size:9px; font-weight:600;
  letter-spacing:0.08em; text-transform:uppercase;
  line-height:1.4;
}
.maaz-chip.phase-quick-win{background:color-mix(in oklab, var(--trust) 16%, transparent); color:var(--trust)}
.maaz-chip.phase-short-term{background:var(--primary-soft); color:var(--primary)}
.maaz-chip.phase-strategic{background:color-mix(in oklab, var(--violet) 18%, transparent); color:var(--violet)}
.maaz-chip.prio-critical{background:var(--danger-soft); color:var(--danger)}
.maaz-chip.prio-high{background:var(--warn-soft); color:var(--warn)}
.maaz-chip.prio-medium{background:var(--bg-2); color:var(--ink-2)}
.threat-chip{
  display:inline-flex; padding:1px 6px; border-radius:4px;
  background:var(--bg-2); color:var(--ink-2);
  font-family:"JetBrains Mono"; font-size:9px; font-weight:500;
  letter-spacing:0.02em; line-height:1.4;
  border:1px solid var(--line-0);
}
.threat-chip.atk{color:var(--danger); border-color:color-mix(in oklab, var(--danger) 24%, transparent); background:var(--danger-soft)}
.threat-chip.atlas{color:var(--violet); border-color:color-mix(in oklab, var(--violet) 24%, transparent); background:color-mix(in oklab, var(--violet) 10%, transparent)}
.threat-chip.more{color:var(--ink-3); font-style:italic}

/* ─── Effective-value sublabel on hero KPI ─── */
.metric-sub-eff{
  display:block; margin-top:6px;
  font-family:"JetBrains Mono"; font-size:11px; font-weight:500;
  color:var(--ink-2); font-variant-numeric:tabular-nums;
  letter-spacing:0.02em;
}
.metric-sub-eff .eff-label{color:var(--ink-3); margin-right:4px; font-size:9px; letter-spacing:0.1em; text-transform:uppercase}
.metric-sub-eff .eff-val{color:var(--warn); font-weight:600}

/* Chapter 04 exec summary — eff addendum */
.exec-eff-row{
  display:flex; gap:24px; margin-top:12px; padding-top:12px;
  border-top:1px dashed var(--line-1);
  font-family:"JetBrains Mono"; font-size:11px;
}
.exec-eff-row .eff-item{display:flex; gap:6px; align-items:baseline}
.exec-eff-row .eff-label{color:var(--ink-3); font-size:9px; letter-spacing:0.12em; text-transform:uppercase; font-weight:500}
.exec-eff-row .eff-val{color:var(--warn); font-weight:600; font-variant-numeric:tabular-nums}

/* ─── Card + block ─── */
.card{
  background:var(--bg-1);
  border:1px solid var(--line-1);
  border-radius:14px;
  padding:28px;
  box-shadow:var(--shadow-soft);
  margin-bottom:24px;
}
.card-head{margin-bottom:20px}
.card-title{
  font-family:"Inter"; font-weight:500; font-size:18px;
  letter-spacing:-0.01em; margin-bottom:4px;
  color:var(--ink-0);
}
.card-title em{color:var(--primary); font-weight:600}
.card-sub{
  font-family:"Meiryo","メイリオ","Noto Sans JP"; font-weight:400; font-size:12px;
  color:var(--ink-2); line-height:1.6;
}
.card-sub em{color:var(--primary); font-weight:500}

/* ─── Chart grid ─── */
.chart-grid{display:grid; grid-template-columns:1fr 1fr; gap:20px; margin-bottom:24px}
@media (max-width:900px){ .chart-grid{grid-template-columns:1fr} }
.chart-card{
  background:var(--bg-1); border:1px solid var(--line-1);
  border-radius:14px; padding:24px;
  box-shadow:var(--shadow-soft);
}
.chart-title{
  font-family:"Inter"; font-size:13px; font-weight:500;
  color:var(--ink-1); margin-bottom:14px;
  display:flex; align-items:center; gap:10px;
}
.chart-title .tag{
  font-family:"JetBrains Mono"; font-size:9px; font-weight:500;
  letter-spacing:0.14em; text-transform:uppercase;
  color:var(--ink-3);
}

/* ─── Radar ─── */
.radar-svg{width:100%; height:auto; max-height:320px; display:block}
.radar-grid{stroke:var(--line-1); stroke-width:1; fill:none}
.radar-axis{stroke:var(--line-1); stroke-width:1}
.radar-axis-label{font-family:"JetBrains Mono"; font-size:10px; fill:var(--ink-2); font-weight:500}
.radar-axis-label-jp{font-family:"Meiryo","メイリオ","Noto Sans JP"; font-size:9px; fill:var(--ink-3)}
.radar-area{fill:var(--primary); fill-opacity:0.15; stroke:var(--primary); stroke-width:2}
.radar-point{fill:var(--primary); stroke:var(--bg-1); stroke-width:2}
.radar-target{stroke:var(--ink-3); stroke-width:1; stroke-dasharray:2 3; fill:none}
.radar-target-custom{stroke:var(--warn); stroke-width:1.5; stroke-dasharray:1 3; fill:none; opacity:0.85}
.radar-target-maaz{stroke:var(--trust); stroke-width:1.5; stroke-dasharray:3 2; fill:none; opacity:0.85}

/* ─── Radar legend (SVG外部・HTML要素) ─── */
.radar-legend{
  display:flex; gap:22px; justify-content:center; flex-wrap:wrap;
  padding:12px 0 4px; margin-top:-4px;
  font-family:"JetBrains Mono"; font-size:10px;
  color:var(--ink-2); letter-spacing:0.04em;
}
.radar-legend .rl-item{display:inline-flex; align-items:center; gap:8px; line-height:1}
.radar-legend .rl-sw{
  display:inline-block; width:18px; height:10px; border-radius:2px;
  position:relative; flex-shrink:0;
}
.radar-legend .rl-asis{
  background:color-mix(in oklab, var(--primary) 22%, transparent);
  border:1.5px solid var(--primary);
}
.radar-legend .rl-maaz{
  background:transparent;
  border-top:1.5px dashed var(--trust);
  border-bottom:1.5px dashed var(--trust);
  border-left:none; border-right:none;
  height:8px; margin-top:1px;
}
.radar-legend .rl-cust{
  background:transparent;
  border-top:1.5px dotted var(--warn);
  border-bottom:1.5px dotted var(--warn);
  border-left:none; border-right:none;
  height:8px; margin-top:1px;
}

/* ─── Progression bars — 3-zone tier scale ─── */
.progbar-legend{
  display:flex; flex-wrap:wrap; gap:14px; align-items:center;
  margin-bottom:16px; padding:10px 14px;
  background:var(--bg-2); border-radius:8px;
  font-family:"Meiryo","メイリオ","Noto Sans JP"; font-size:10.5px; color:var(--ink-2);
}
.plg-item{display:inline-flex; align-items:center; gap:6px}
.plg-item.plg-right{margin-left:auto; color:var(--ink-3); font-size:10px}
.plg-swatch{display:inline-block; flex-shrink:0}
.plg-swatch.plg-cur{width:14px; height:8px; background:var(--primary); border-radius:2px}
.plg-swatch.plg-maaz{width:14px; height:8px; background:color-mix(in oklab, var(--primary) 35%, transparent); border-radius:2px; border:1px solid color-mix(in oklab, var(--primary) 60%, transparent)}
.plg-swatch.plg-zone{width:14px; height:8px; background:repeating-linear-gradient(45deg, color-mix(in oklab, var(--warn) 22%, transparent), color-mix(in oklab, var(--warn) 22%, transparent) 3px, transparent 3px, transparent 6px); border-left:1px dashed var(--warn); border-right:1px dashed var(--warn)}
.plg-swatch.plg-tick{width:2px; height:12px; background:var(--ink-0); border-radius:2px}
.plg-swatch.plg-chip{padding:1px 6px; border-radius:3px; background:var(--danger-soft); color:var(--danger); font-family:"JetBrains Mono"; font-size:9px; font-weight:600; width:auto; height:auto; content:"ZTA外N"}
.plg-swatch.plg-chip::after{content:"ZTA外N"}

.progbar-list{display:flex; flex-direction:column; gap:18px}
.progbar-row{display:grid; grid-template-columns:105px 1fr 140px; gap:14px; align-items:center}
.progbar-label{display:flex; flex-direction:column; gap:2px}
.progbar-id{font-family:"JetBrains Mono"; font-size:10px; font-weight:600; letter-spacing:0.04em}
.progbar-jp{font-family:"Meiryo","メイリオ","Noto Sans JP"; font-size:10.5px; color:var(--ink-2); font-weight:500}
.progbar-track{
  position:relative; height:18px; border-radius:4px;
  background:var(--bg-3); overflow:hidden;
  box-shadow:inset 0 1px 2px rgba(0,0,0,0.08);
}
.progbar-custzone{
  position:absolute; top:0; bottom:0;
  background:repeating-linear-gradient(45deg, color-mix(in oklab, var(--warn) 22%, transparent), color-mix(in oklab, var(--warn) 22%, transparent) 3px, transparent 3px, transparent 6px);
  border-left:1px dashed var(--warn); border-right:1px dashed var(--warn);
  z-index:1;
}
.progbar-fill-maaz{
  position:absolute; top:0; left:0; bottom:0;
  border-radius:4px 0 0 4px;
  transition:width 1s cubic-bezier(0.2,0.6,0.2,1);
  z-index:2;
}
.progbar-fill-cur{
  position:absolute; top:0; left:0; bottom:0;
  border-radius:4px 0 0 4px;
  transition:width 1s cubic-bezier(0.2,0.6,0.2,1);
  z-index:3;
}
.progbar-tick-target{
  position:absolute; top:-3px; bottom:-3px; width:2px;
  background:var(--ink-0);
  border-radius:2px;
  transform:translateX(-1px);
  z-index:4;
}
.progbar-tick-target::after{
  content:""; position:absolute; left:-3px; top:-4px;
  width:8px; height:4px; background:var(--ink-0); border-radius:2px;
}
.progbar-grid{position:absolute; inset:0; pointer-events:none; z-index:0}
.progbar-grid span{
  position:absolute; top:0; bottom:0; width:1px;
  background:color-mix(in oklab, var(--ink-0) 10%, transparent);
  transform:translateX(-0.5px);
}
.progbar-nums{
  display:flex; align-items:center; gap:4px; flex-wrap:wrap;
  font-family:"JetBrains Mono"; font-size:10.5px;
  font-variant-numeric:tabular-nums; letter-spacing:-0.01em;
}
.progbar-nums .num-cur{color:var(--ink-0); font-weight:600}
.progbar-nums .num-maaz{color:var(--trust); font-weight:600}
.progbar-nums .num-tgt{color:var(--warn); font-weight:600}
.progbar-nums .arrow{color:var(--ink-3); font-weight:400}
.progbar-nums .org-chip{
  margin-left:auto;
  font-size:9px; padding:2px 6px; border-radius:3px;
  background:var(--danger-soft); color:var(--danger);
  font-weight:600; letter-spacing:0.04em;
}
@media (max-width:760px){
  .progbar-row{grid-template-columns:1fr; gap:4px}
  .progbar-label{flex-direction:row; justify-content:space-between}
}

/* ─── Per-function compliance journey bars (As-Is / Uplift / Residual) ─── */
.jbar-legend{
  display:flex; flex-wrap:wrap; gap:14px; align-items:center;
  margin-bottom:16px; padding:10px 14px;
  background:var(--bg-2); border-radius:8px;
  font-family:"Meiryo","メイリオ","Noto Sans JP"; font-size:10.5px; color:var(--ink-2);
}
.jbar-lg-item{display:inline-flex; align-items:center; gap:6px}
.jbar-lg-sw{display:inline-block; flex-shrink:0; width:14px; height:8px; border-radius:2px}
.jbar-lg-sw.asis{background:linear-gradient(90deg, color-mix(in oklab, var(--ink-1) 55%, transparent), color-mix(in oklab, var(--ink-1) 70%, transparent))}
.jbar-lg-sw.uplift{background:linear-gradient(90deg, color-mix(in oklab, var(--primary) 75%, transparent), color-mix(in oklab, var(--primary) 95%, var(--violet)))}
.jbar-lg-sw.residual{background:repeating-linear-gradient(45deg, color-mix(in oklab, var(--warn) 28%, transparent), color-mix(in oklab, var(--warn) 28%, transparent) 3px, transparent 3px, transparent 6px)}
.jbar-lg-sw.custtgt{background:transparent; border-left:2px dashed var(--warn); border-right:2px dashed var(--warn); width:10px; height:12px; border-radius:0}

.jbar-list{display:flex; flex-direction:column; gap:16px}
.jbar-row{display:grid; grid-template-columns:96px 1fr 180px; gap:14px; align-items:center}
.jbar-label{display:flex; flex-direction:column; gap:2px}
.jbar-id{font-family:"JetBrains Mono"; font-size:11px; font-weight:600; letter-spacing:0.04em}
.jbar-jp{font-family:"Meiryo","メイリオ","Noto Sans JP"; font-size:10.5px; color:var(--ink-2); font-weight:500}
.jbar-track{
  position:relative; height:20px; border-radius:5px;
  background:var(--bg-3); overflow:hidden;
  box-shadow:inset 0 1px 2px rgba(0,0,0,0.08);
  display:flex;
}
.jbar-seg-asis{
  background:linear-gradient(90deg, color-mix(in oklab, var(--ink-1) 55%, transparent), color-mix(in oklab, var(--ink-1) 72%, transparent));
  transition:width .9s cubic-bezier(0.2,0.6,0.2,1);
  border-right:1px solid rgba(255,255,255,0.1);
}
.jbar-seg-uplift{
  background:linear-gradient(90deg, color-mix(in oklab, var(--primary) 75%, transparent), color-mix(in oklab, var(--primary) 95%, var(--violet)));
  box-shadow:inset 0 0 6px color-mix(in oklab, var(--primary) 30%, transparent);
  transition:width .9s cubic-bezier(0.2,0.6,0.2,1);
  border-right:1px solid rgba(255,255,255,0.12);
}
.jbar-seg-residual{
  background:repeating-linear-gradient(45deg, color-mix(in oklab, var(--warn) 28%, transparent), color-mix(in oklab, var(--warn) 28%, transparent) 5px, transparent 5px, transparent 10px);
  flex:1;
}
.jbar-custtgt{
  position:absolute; top:-3px; bottom:-3px; width:0;
  border-left:2px dashed var(--warn);
  transform:translateX(-1px); pointer-events:none; z-index:3;
}
.jbar-custtgt::after{
  content:""; position:absolute; left:-4px; top:-3px;
  width:8px; height:3px; background:var(--warn); border-radius:1px;
}
.jbar-nums{
  display:flex; align-items:center; gap:4px; flex-wrap:wrap; justify-content:flex-end;
  font-family:"JetBrains Mono"; font-size:10.5px;
  font-variant-numeric:tabular-nums; letter-spacing:-0.01em;
}
.jbar-nums .nasis{color:var(--ink-1); font-weight:600}
.jbar-nums .nupl{color:var(--primary); font-weight:700}
.jbar-nums .ntobe{color:var(--trust); font-weight:600}
.jbar-nums .nres{color:var(--warn); font-weight:600}
.jbar-nums .sep{color:var(--ink-3); font-weight:400}
@media (max-width:760px){
  .jbar-row{grid-template-columns:1fr; gap:4px}
  .jbar-label{flex-direction:row; justify-content:space-between}
  .jbar-nums{justify-content:flex-start}
}

/* ─── Coverage bars (legacy, still used for older callsites) ─── */
.covbar-list{display:flex; flex-direction:column; gap:14px}
.covbar-row{display:grid; grid-template-columns:60px 1fr 48px; gap:12px; align-items:center}
.covbar-label{font-family:"JetBrains Mono"; font-size:10px; font-weight:500; color:var(--ink-2); letter-spacing:0.04em}
.covbar-track{height:10px; background:var(--bg-3); border-radius:3px; overflow:hidden; position:relative}
.covbar-fill{height:100%; border-radius:3px; transition:width 1s cubic-bezier(0.2,0.6,0.2,1)}
.covbar-val{font-family:"JetBrains Mono"; font-size:11px; font-weight:600; text-align:right; font-variant-numeric:tabular-nums}

/* ─── Pillar chips (CSF function selector) ─── */
.pchips{display:flex; flex-wrap:wrap; gap:8px; margin-bottom:32px}
.pchip{
  padding:9px 16px; border-radius:999px;
  background:var(--bg-1); border:1px solid var(--line-1);
  display:flex; align-items:center; gap:8px;
  font-size:12px; font-weight:500;
  color:var(--ink-1);
  cursor:pointer; transition:all .16s ease;
}
.pchip:hover{background:var(--bg-2); border-color:var(--line-2)}
.pchip.on{background:var(--ink-0); color:var(--bg-0); border-color:var(--ink-0)}
.pchip .dot{width:8px; height:8px; border-radius:999px; background:var(--pc); flex-shrink:0}
.pchip .mono{font-size:10px; font-weight:600; letter-spacing:0.04em}
.pchip .jp{font-family:"Meiryo","メイリオ","Noto Sans JP"; font-weight:500; font-size:11px}
.pchip .count{font-family:"JetBrains Mono"; font-size:9px; color:var(--ink-3); margin-left:4px}
.pchip.on .count{color:var(--bg-3)}

/* ─── Function hero (compact) ─── */
.fn-hero{
  display:flex; align-items:flex-end; gap:20px;
  padding:28px; border-radius:14px;
  background:linear-gradient(135deg, color-mix(in oklab, var(--fn-accent) 8%, var(--bg-1)) 0%, var(--bg-1) 80%);
  border:1px solid var(--line-1);
  margin-bottom:28px;
  box-shadow:var(--shadow-soft);
  position:relative; overflow:hidden;
}
.fn-hero::before{
  content:""; position:absolute; top:0; left:0; bottom:0; width:4px;
  background:var(--fn-accent);
}
.fn-hero-body{flex:1}
.fn-hero-en{
  font-family:"JetBrains Mono"; font-size:11px; font-weight:500;
  letter-spacing:0.16em; text-transform:uppercase;
  color:var(--fn-accent); margin-bottom:4px;
}
.fn-hero-jp{
  font-family:"Inter","Noto Sans JP"; font-weight:500; font-size:28px;
  letter-spacing:-0.01em; margin-bottom:8px;
}
.fn-hero-purpose{
  font-family:"Meiryo","メイリオ","Noto Sans JP"; font-weight:400; font-size:12px;
  color:var(--ink-2); line-height:1.7; max-width:680px;
}
.fn-hero-stats{display:flex; gap:28px; flex-shrink:0}
.fn-hero-stat{text-align:right}
.fn-hero-stat-label{
  font-family:"JetBrains Mono"; font-size:9px; font-weight:500;
  letter-spacing:0.1em; text-transform:uppercase; color:var(--ink-3);
  margin-bottom:4px;
}
.fn-hero-stat-val{
  font-family:"Inter"; font-weight:300; font-size:28px;
  color:var(--ink-0); font-variant-numeric:tabular-nums; letter-spacing:-0.02em;
}
.fn-hero-stat-val .unit{font-size:12px; color:var(--ink-3); margin-left:2px}

/* ─── Category block ─── */
.cat-card{
  background:var(--bg-1); border:1px solid var(--line-1);
  border-radius:12px; margin-bottom:12px;
  overflow:hidden;
}
.cat-header{
  padding:18px 22px; cursor:pointer;
  display:flex; align-items:center; gap:14px;
  transition:background .15s ease;
}
.cat-header:hover{background:var(--bg-2)}
.cat-caret{
  width:14px; height:14px; flex-shrink:0;
  transition:transform .2s ease;
  color:var(--ink-3);
}
.cat-header.expanded .cat-caret{transform:rotate(90deg)}
.cat-id{
  font-family:"JetBrains Mono"; font-size:10px; font-weight:600;
  color:var(--fn-accent); letter-spacing:0.04em;
  padding:3px 8px; background:color-mix(in oklab, var(--fn-accent) 10%, transparent);
  border-radius:4px;
}
.cat-title{font-family:"Inter"; font-weight:500; font-size:14px; color:var(--ink-0)}
.cat-jp{font-family:"Meiryo","メイリオ","Noto Sans JP"; font-weight:500; font-size:12px; color:var(--ink-1)}
.cat-meta{margin-left:auto; display:flex; align-items:center; gap:12px}
.cat-meta-stat{
  font-family:"JetBrains Mono"; font-size:10px; font-weight:500;
  color:var(--ink-2);
}
.cat-meta-stat .val{color:var(--ink-0); font-weight:600; margin-right:2px}
.cat-body{display:none; padding:0 8px 8px}
.cat-body.show{display:block}
.cat-desc{
  padding:0 14px 12px;
  font-family:"Meiryo","メイリオ","Noto Sans JP"; font-size:11px; color:var(--ink-2); line-height:1.65;
}

/* ─── Subcategory item ─── */
.sub-item{
  display:grid; grid-template-columns:60px 1fr 300px;
  gap:16px; padding:14px 16px;
  border-radius:8px; margin-bottom:4px;
  transition:background .12s ease;
  align-items:start;
}
.sub-item:hover{background:var(--bg-2)}
.sub-item.has-evidence{border-left:3px solid var(--trust); padding-left:13px}
.sub-item.sub-item-org{background:color-mix(in oklab, var(--warn) 4%, transparent); border-left:3px solid color-mix(in oklab, var(--warn) 60%, transparent); padding-left:13px}
.sub-item.sub-item-org:hover{background:color-mix(in oklab, var(--warn) 7%, var(--bg-2))}
.sub-item.sub-item-org.has-evidence{border-left:3px solid var(--trust)}

/* Classification chip — inline in sub-text */
.class-chip{
  display:inline-block;
  padding:1px 7px; margin-right:8px;
  border-radius:4px;
  font-family:"JetBrains Mono"; font-size:9px; font-weight:600;
  letter-spacing:0.06em;
  vertical-align:2px;
}
.class-chip.zta{background:var(--trust-soft); color:var(--trust)}
.class-chip.hybrid{background:var(--warn-soft); color:var(--warn)}
.class-chip.org{background:var(--danger-soft); color:var(--danger)}

/* Filter chips for classification */
.filter-chips{display:flex; flex-wrap:wrap; gap:8px; align-items:center; margin-bottom:20px; padding:8px 14px; background:var(--bg-2); border-radius:10px}
.filter-chips-label{font-size:10px; letter-spacing:0.2em; color:var(--ink-3); font-weight:500; margin-right:4px}
.filter-chip{
  padding:6px 12px; border-radius:999px;
  background:var(--bg-1); border:1px solid var(--line-1);
  font-family:"Meiryo","メイリオ","Noto Sans JP"; font-size:11px; font-weight:500;
  color:var(--ink-1);
  cursor:pointer; transition:all .15s ease;
  display:inline-flex; align-items:center; gap:6px;
}
.filter-chip:hover{background:var(--bg-3); border-color:var(--line-2)}
.filter-chip.on{background:var(--ink-0); color:var(--bg-0); border-color:var(--ink-0)}
.filter-chip .num{font-size:9px; color:var(--ink-3); font-family:"JetBrains Mono"; font-weight:600; padding:1px 5px; background:var(--bg-2); border-radius:3px}
.filter-chip.on .num{background:var(--bg-3); color:var(--ink-2)}

/* Filter effects — hide non-matching subs */
[data-filter-class="zta"] .sub-item:not([data-class="zta"]),
[data-filter-class="hybrid"] .sub-item:not([data-class="hybrid"]),
[data-filter-class="org"] .sub-item:not([data-class="org"]){display:none}

/* MAAZ target row (readonly) */
.maaz-target-row{display:flex; gap:3px}
.tier-btn.maaz-tier{
  background:transparent; color:var(--ink-3);
  border:1px dashed var(--line-2);
  cursor:default;
}
.tier-btn.maaz-tier.active{
  background:var(--trust); color:#fff; border:1px solid var(--trust);
  box-shadow:0 1px 3px var(--trust-soft);
}
.sub-id{
  font-family:"JetBrains Mono"; font-size:10px; font-weight:600;
  color:var(--ink-1); padding:4px 6px; background:var(--bg-3);
  border-radius:4px; text-align:center;
  display:flex; flex-direction:column; gap:3px; align-items:center;
}
.ai-indicator{
  font-family:"JetBrains Mono"; font-size:8px; font-weight:700;
  color:#fff; background:var(--violet); padding:1px 4px;
  border-radius:2px; letter-spacing:0.06em;
}
.sub-content{min-width:0}
.sub-text{
  font-family:"Meiryo","メイリオ","Noto Sans JP"; font-weight:400; font-size:12px;
  color:var(--ink-0); line-height:1.65; margin-bottom:8px;
}
.sub-meta{display:flex; flex-wrap:wrap; gap:4px; margin-bottom:6px; align-items:center}
.sub-note{
  font-family:"Meiryo","メイリオ","Noto Sans JP"; font-size:10.5px; color:var(--ink-2);
  line-height:1.6; padding:6px 10px; background:var(--bg-2);
  border-left:2px solid var(--line-2); border-radius:0 4px 4px 0;
  margin-top:4px;
}
.ai-note{
  margin-top:6px; padding:8px 10px;
  background:color-mix(in oklab, var(--violet) 8%, var(--bg-1));
  border-left:2px solid var(--violet); border-radius:0 4px 4px 0;
  font-family:"Meiryo","メイリオ","Noto Sans JP"; font-size:10.5px; color:var(--ink-1); line-height:1.6;
}
.ai-note strong{color:var(--violet); font-weight:600}
.ai-note-meta{display:flex; flex-wrap:wrap; gap:3px; margin-top:5px}

.sub-meta-chip{
  font-family:"JetBrains Mono"; font-size:9.5px; font-weight:500;
  padding:2px 6px; border-radius:3px; letter-spacing:0.02em;
  white-space:nowrap;
}
.sub-meta-chip.zs{background:var(--primary-soft); color:var(--primary); font-weight:600}
.sub-meta-chip.ai{background:color-mix(in oklab, var(--violet) 14%, transparent); color:var(--violet); font-weight:600}
.sub-meta-chip.ztmm{background:var(--bg-3); color:var(--ink-2)}
.sub-meta-chip.airmf{background:color-mix(in oklab, var(--trust) 14%, transparent); color:var(--trust); font-weight:500}
.sub-meta-chip.gai{background:color-mix(in oklab, var(--magenta) 14%, transparent); color:var(--magenta); font-weight:500}

.sub-meta-chip.cov-0{background:var(--bg-3); color:var(--ink-3)}
.sub-meta-chip.cov-25{background:var(--danger-soft); color:var(--danger)}
.sub-meta-chip.cov-50{background:var(--warn-soft); color:var(--warn)}
.sub-meta-chip.cov-75{background:var(--trust-soft); color:var(--trust)}
.sub-meta-chip.cov-100{background:var(--trust); color:#fff; font-weight:600}

.cov-mini{height:3px; background:var(--bg-3); border-radius:2px; overflow:hidden; width:60px; margin-right:4px}
.cov-mini-fill{height:100%; border-radius:2px; transition:width .5s ease}
.cov-mini-fill.c0{background:var(--ink-4)}
.cov-mini-fill.c25{background:var(--danger)}
.cov-mini-fill.c50{background:var(--warn)}
.cov-mini-fill.c75{background:var(--trust)}
.cov-mini-fill.c100{background:var(--trust)}

/* Tier picker */
.sub-scores{display:flex; flex-direction:column; gap:6px}
.tier-row{display:flex; align-items:center; gap:8px}
.tier-row-label{
  font-family:"Meiryo","メイリオ","Noto Sans JP"; font-size:10px; font-weight:500;
  color:var(--ink-3); min-width:30px;
}
.tier-btns{display:flex; gap:3px}
.tier-btn{
  width:26px; height:26px; border-radius:6px;
  background:var(--bg-2); color:var(--ink-2);
  border:1px solid var(--line-1);
  font-family:"JetBrains Mono"; font-size:11px; font-weight:600;
  display:inline-flex; align-items:center; justify-content:center;
  transition:all .12s ease;
}
.tier-btn:hover{background:var(--bg-3); color:var(--ink-0); border-color:var(--line-2)}
.tier-btn.active{
  background:var(--primary); color:#fff; border-color:var(--primary);
  box-shadow:0 1px 4px var(--primary-soft);
}
.tier-btn.evidence{background:var(--trust); border-color:var(--trust); color:#fff}
.tier-btn.evidence.active{background:var(--trust); border-color:var(--trust); box-shadow:0 1px 6px var(--trust-soft)}
.tier-warn{
  font-family:"JetBrains Mono"; font-size:9px; font-weight:600;
  padding:2px 5px; border-radius:3px; letter-spacing:0.04em;
}
.tier-warn.over{background:var(--danger-soft); color:var(--danger)}
.tier-warn.under{background:var(--warn-soft); color:var(--warn)}
.tier-warn.align{background:var(--trust-soft); color:var(--trust)}

/* ─── Priority gap list ─── */
.gap-list{display:flex; flex-direction:column; gap:6px}
.gap-row{
  display:grid; grid-template-columns:56px 48px 1fr 70px 70px;
  gap:14px; padding:12px 14px; align-items:center;
  background:var(--bg-1); border:1px solid var(--line-1);
  border-radius:8px;
  transition:all .15s ease;
}
.gap-row:hover{border-color:var(--line-2); box-shadow:var(--shadow-soft)}
.gap-idx{
  font-family:"JetBrains Mono"; font-size:11px; font-weight:300;
  color:var(--ink-3); letter-spacing:0.04em;
}
.gap-fn{
  font-family:"JetBrains Mono"; font-size:10px; font-weight:600;
  padding:3px 7px; border-radius:4px; text-align:center;
}
.gap-row-text{font-family:"Meiryo","メイリオ","Noto Sans JP"; font-size:11.5px; color:var(--ink-0); line-height:1.5}
.gap-row-text .sub-id-inline{
  font-family:"JetBrains Mono"; font-size:10px; font-weight:600;
  color:var(--ink-2); margin-right:8px;
}
.gap-feas{
  font-family:"JetBrains Mono"; font-size:10px; font-weight:600;
  padding:4px 8px; border-radius:4px; text-align:center;
}
.gap-delta{
  font-family:"JetBrains Mono"; font-size:12px; font-weight:700;
  text-align:center;
  padding:5px 8px; border-radius:5px;
}
.gap-delta.high{background:var(--danger-soft); color:var(--danger)}
.gap-delta.mid{background:var(--warn-soft); color:var(--warn)}
.gap-delta.low{background:var(--trust-soft); color:var(--trust)}

/* ─── Residual risk list ─── */
.residual-grid{display:grid; grid-template-columns:repeat(2, 1fr); gap:12px}
@media (max-width:900px){ .residual-grid{grid-template-columns:1fr} }
.residual-row{
  padding:14px 16px;
  background:color-mix(in oklab, var(--warn) 6%, var(--bg-1));
  border:1px solid color-mix(in oklab, var(--warn) 22%, transparent);
  border-left:3px solid var(--warn);
  border-radius:8px;
}
.residual-id{
  font-family:"JetBrains Mono"; font-size:10px; font-weight:600;
  color:var(--warn); margin-bottom:4px;
}
.residual-text{
  font-family:"Meiryo","メイリオ","Noto Sans JP"; font-size:11.5px; color:var(--ink-0);
  line-height:1.55; margin-bottom:6px;
}
.residual-action{
  font-family:"Meiryo","メイリオ","Noto Sans JP"; font-size:10.5px; color:var(--ink-2);
  line-height:1.55;
  padding-top:6px; border-top:1px dashed var(--line-1);
}
.residual-action strong{color:var(--warn); font-weight:600}

/* ─── Causal chain diagram ─── */
.chain-wrap{margin-top:12px; overflow-x:auto}
.chain-svg{display:block; min-width:100%}
.chain-node{rx:8; ry:8; stroke:var(--line-2); stroke-width:1.2}
.chain-node.csf{fill:color-mix(in oklab, var(--primary) 6%, var(--bg-1))}
.chain-node.ztmm{fill:color-mix(in oklab, var(--trust) 6%, var(--bg-1))}
.chain-node.zs{fill:color-mix(in oklab, var(--warn) 6%, var(--bg-1))}
.chain-label{font-family:"JetBrains Mono"; font-size:10px; font-weight:600; fill:var(--ink-1)}
.chain-label-sub{font-family:"Meiryo","メイリオ","Noto Sans JP"; font-size:9px; fill:var(--ink-3)}
.chain-arrow{stroke:var(--ink-3); stroke-width:1.2; fill:none; marker-end:url(#arrowhead)}

/* ─── Matrix heatmap ─── */
.matrix-wrap{overflow-x:auto; margin-bottom:24px}
.matrix-table{width:100%; border-collapse:separate; border-spacing:3px}
.matrix-table th{
  font-family:"JetBrains Mono"; font-size:10px; font-weight:500;
  letter-spacing:0.08em; text-transform:uppercase;
  color:var(--ink-2); padding:8px; text-align:left;
  font-weight:500;
}
.matrix-table td{
  padding:6px 8px; font-family:"JetBrains Mono"; font-size:10px;
  border-radius:4px; text-align:center;
  font-weight:600;
}
.matrix-table .row-label{text-align:left; background:var(--bg-2); font-family:"Meiryo","メイリオ","Noto Sans JP"; font-size:11px; padding:8px 12px}
.matrix-cell{min-width:36px}

/* ─── GAI risk grid (for Ch.03) ─── */
.gai-grid{display:grid; grid-template-columns:repeat(3, 1fr); gap:10px}
@media (max-width:900px){ .gai-grid{grid-template-columns:repeat(2, 1fr)} }
@media (max-width:600px){ .gai-grid{grid-template-columns:1fr} }
.gai-card{
  padding:14px; border-radius:10px;
  background:var(--bg-1); border:1px solid var(--line-1);
  transition:border-color .15s ease;
}
.gai-card:hover{border-color:var(--line-2)}
.gai-head{display:flex; align-items:center; gap:8px; margin-bottom:6px}
.gai-id{
  font-family:"JetBrains Mono"; font-size:10px; font-weight:600;
  padding:2px 7px; border-radius:4px;
  background:color-mix(in oklab, var(--magenta) 14%, transparent);
  color:var(--magenta);
}
.gai-title{font-family:"Meiryo","メイリオ","Noto Sans JP"; font-size:12px; font-weight:500; color:var(--ink-0)}
.gai-desc{font-family:"Meiryo","メイリオ","Noto Sans JP"; font-size:10.5px; color:var(--ink-2); line-height:1.55}
.gai-mods{display:flex; flex-wrap:wrap; gap:3px; margin-top:8px}

/* ─── AS-IS / TO-BE grid (Ch.03) ─── */
.asis-tobe-grid{display:grid; grid-template-columns:repeat(4, 1fr); gap:12px; margin-bottom:20px}
@media (max-width:900px){ .asis-tobe-grid{grid-template-columns:repeat(2, 1fr)} }
.atb-cell{
  padding:16px; border-radius:10px;
  background:var(--bg-1); border:1px solid var(--line-1);
}
.atb-head{
  font-family:"JetBrains Mono"; font-size:10px; font-weight:600;
  letter-spacing:0.08em; text-transform:uppercase;
  margin-bottom:10px;
}
.atb-nums{display:flex; gap:14px; align-items:center}
.atb-num{display:flex; flex-direction:column}
.atb-num-label{font-family:"JetBrains Mono"; font-size:9px; color:var(--ink-3); letter-spacing:0.08em; text-transform:uppercase}
.atb-num-val{font-family:"Inter"; font-size:28px; font-weight:300; color:var(--ink-0); line-height:1}
.atb-arrow{font-size:16px; color:var(--ink-3)}
.atb-num-val.target{color:var(--primary)}
.atb-cov{
  font-family:"JetBrains Mono"; font-size:10px; color:var(--ink-2);
  margin-top:8px; padding-top:8px; border-top:1px dashed var(--line-1);
}
.atb-cov strong{color:var(--trust); font-weight:600}

/* ─── Directive / CISO report section ─── */
.directive-layout{display:grid; grid-template-columns:2fr 1fr; gap:24px; align-items:start}
@media (max-width:900px){ .directive-layout{grid-template-columns:1fr} }
.exec-summary{
  padding:32px; border-radius:14px;
  background:linear-gradient(135deg, var(--primary-soft) 0%, var(--bg-1) 80%);
  border:1px solid var(--line-1);
  box-shadow:var(--shadow-soft);
}
.exec-summary-kicker{
  font-family:"JetBrains Mono"; font-size:10px; font-weight:600;
  letter-spacing:0.14em; text-transform:uppercase;
  color:var(--primary); margin-bottom:12px;
}
.exec-summary-text{
  font-family:"Meiryo","メイリオ","Noto Sans JP"; font-size:14px; font-weight:400;
  color:var(--ink-0); line-height:1.95;
}
.exec-summary-text em{color:var(--primary); font-weight:600}
.exec-kpis{margin-top:24px; display:grid; grid-template-columns:repeat(2, 1fr); gap:16px}
.exec-kpi{padding:14px 16px; background:var(--bg-1); border-radius:10px; border:1px solid var(--line-1)}
.exec-kpi-label{font-family:"JetBrains Mono"; font-size:9px; color:var(--ink-3); letter-spacing:0.1em; text-transform:uppercase; margin-bottom:4px}
.exec-kpi-val{font-family:"Inter"; font-weight:300; font-size:26px; color:var(--ink-0); line-height:1}

.action-list{display:flex; flex-direction:column; gap:10px}
.action-row{
  display:grid; grid-template-columns:32px auto minmax(0,1fr) auto;
  gap:14px; padding:16px 18px; align-items:start;
  background:var(--bg-1); border:1px solid var(--line-1);
  border-radius:10px;
  transition:all .15s ease;
}
.action-row:hover{border-color:var(--primary); box-shadow:var(--shadow-soft)}
.action-idx{
  font-family:"Inter"; font-weight:300; font-size:22px;
  color:var(--ink-3); line-height:1.2; text-align:center;
  font-variant-numeric:tabular-nums;
  padding-top:2px;
}
.action-fn-badge{
  padding:4px 10px; border-radius:6px;
  font-family:"JetBrains Mono"; font-size:10px; font-weight:700;
  letter-spacing:0.08em; line-height:1.4;
  align-self:flex-start; margin-top:3px;
  white-space:nowrap;
}
.action-body{min-width:0}
.action-id{
  font-family:"JetBrains Mono"; font-size:11px; font-weight:600;
  color:var(--ink-2); margin-bottom:4px; letter-spacing:0.03em;
}
.action-id .action-id-fn{color:var(--ink-0); font-weight:700; margin-left:2px}
.action-text{
  font-family:"Meiryo","メイリオ","Noto Sans JP";
  font-size:14px; font-weight:500; color:var(--ink-0); line-height:1.55;
  letter-spacing:0.01em;
}
.action-meta{display:flex; gap:5px; margin-top:10px; flex-wrap:wrap; align-items:center}
.action-delta{
  font-family:"JetBrains Mono"; font-size:16px; font-weight:700;
  color:var(--primary); text-align:right;
  padding-top:2px; white-space:nowrap;
}
.action-delta .eff-note{
  display:inline-block; font-size:11px; font-weight:500;
  color:var(--warn); margin-left:4px;
}

/* ─── IO block ─── */
.io-grid{display:grid; grid-template-columns:1fr 1fr; gap:20px}
@media (max-width:900px){ .io-grid{grid-template-columns:1fr} }
.io-card{
  padding:24px; border-radius:12px;
  background:var(--bg-1); border:1px solid var(--line-1);
}
.io-card h4{
  font-family:"Inter"; font-weight:500; font-size:14px;
  margin:0 0 8px; color:var(--ink-0);
}
.io-card p{font-family:"Meiryo","メイリオ","Noto Sans JP"; font-size:11.5px; color:var(--ink-2); line-height:1.6; margin:0 0 14px}
.btn{
  padding:9px 18px; border-radius:8px;
  font-family:"Inter"; font-weight:500; font-size:12px;
  cursor:pointer; transition:all .15s ease;
  display:inline-flex; align-items:center; gap:8px;
}
.btn-primary{background:var(--primary); color:#fff}
.btn-primary:hover{background:color-mix(in oklab, var(--primary) 80%, black); transform:translateY(-1px); box-shadow:0 3px 10px var(--primary-soft)}
.btn-ghost{background:transparent; color:var(--ink-1); border:1px solid var(--line-1)}
.btn-ghost:hover{background:var(--bg-2); border-color:var(--line-2); color:var(--ink-0)}
.btn-danger-ghost{background:transparent; color:var(--danger); border:1px solid color-mix(in oklab, var(--danger) 40%, transparent)}
.btn-danger-ghost:hover{background:var(--danger-soft)}

.io-log{
  margin-top:12px; padding:12px 14px;
  font-family:"JetBrains Mono"; font-size:10.5px; line-height:1.6;
  background:var(--bg-2); border-radius:8px;
  border:1px solid var(--line-1);
  white-space:pre-wrap; color:var(--ink-2);
  min-height:60px;
}
.io-log.ok{color:var(--trust); border-color:color-mix(in oklab, var(--trust) 30%, transparent); background:color-mix(in oklab, var(--trust) 8%, var(--bg-1))}
.io-log.err{color:var(--danger); border-color:color-mix(in oklab, var(--danger) 30%, transparent); background:color-mix(in oklab, var(--danger) 8%, var(--bg-1))}

/* ─── Reveal animation ─── */
.reveal{opacity:0; transform:translateY(14px); transition:opacity .65s cubic-bezier(0.2,0.6,0.2,1), transform .65s cubic-bezier(0.2,0.6,0.2,1)}
.reveal.in{opacity:1; transform:translateY(0)}
.d1{transition-delay:80ms}
.d2{transition-delay:160ms}
.d3{transition-delay:240ms}
.d4{transition-delay:320ms}

/* Chapter section transition */
.chapter-view{display:none}
.chapter-view.active{display:block; animation:fadein .35s ease}
@keyframes fadein{from{opacity:0; transform:translateY(8px)} to{opacity:1; transform:translateY(0)}}

/* Reduced motion */
@media (prefers-reduced-motion: reduce){
  *,*::before,*::after{animation-duration:.01ms !important; transition-duration:.01ms !important}
  .reveal{opacity:1; transform:none}
}

/* Responsive */
@media (max-width:900px){
  .topbar{padding:0 16px; gap:12px; flex-wrap:wrap; height:auto; padding-top:12px; padding-bottom:12px}
  .chapter-pills{order:10; width:100%; overflow-x:auto; margin-left:0}
  .section, .hero{padding:64px 20px}
  .container{padding:0 20px}
  .stats-row{grid-template-columns:repeat(2,1fr); gap:18px}
  .journey-stripe{padding:20px}
  .journey-header{flex-direction:column; gap:10px; align-items:flex-start}
  .journey-side.mid,.journey-side.right{align-items:flex-start; text-align:left}
  .fn-hero{flex-direction:column; align-items:flex-start; gap:16px}
  .fn-hero-stats{width:100%; justify-content:space-between}
  .sub-item{grid-template-columns:1fr; gap:8px}
  .sub-id{align-self:flex-start; flex-direction:row}
  .gap-row{grid-template-columns:40px 42px 1fr 60px; gap:8px; font-size:10px}
}

/* Scrollbar */
::-webkit-scrollbar{width:10px; height:10px}
::-webkit-scrollbar-track{background:transparent}
::-webkit-scrollbar-thumb{background:var(--line-1); border-radius:999px; border:2px solid var(--bg-0)}

/* ==================================================================
   ZTELIER COMMON KIT v2.0 — UNIFICATION PATCH (AUTO-INJECTED)
   ==================================================================
*/
/* ============================================================
   Ztelier v2.0 — Common Kit Unification Patch
   Applied to: Amp / CSFA / Endeavor / MAAZ / forg / pupy
   Strategy: Non-destructive overlay. Adds v2 tokens + v2
   components + micro-interaction polish on top of existing v1.
   Fallback chains absorb CSFA's --bg-0/--ink-1 naming.
   ============================================================ */

/* ---------- v2 additive tokens (Paper) ---------- */
:root,
[data-theme="paper"]{
  /* 6段階Inkの補完 (既存5段階にGhostを追加) */
  --ink-ghost:    #D5DCE6;

  /* v2 エイリアス — 「Blue」命名で v2 ガイドと整合 */
  --blue:         var(--primary, #246CF7);
  --blue-dark:    var(--primary-2, #1853CC);
  --blue-tint:    var(--primary-tint, #E8EFFD);
  --blue-glow:    rgba(36, 108, 247, 0.14);
  --line-focus:   var(--primary, #246CF7);
  --line-strong:  var(--line-2, #C9D1DE);

  /* Semantic tints (未定義ファイル向けのフォールバック値) */
  --trust-tint:   #EEF3E6;
  --warn-tint:    #FAF1DF;
  --danger-tint:  #F8E7E7;

  /* Zero Trust 7 柱の固定色 (v2 標準) */
  --p-identity:    #1853CC;
  --p-devices:     #7BA05B;
  --p-networks:    #5B4B9E;
  --p-apps:        #B5832C;
  --p-data:        #A0517E;
  --p-visibility:  #3D8888;
  --p-automation:  #4A6FA5;

  /* v2 Horizon Gradient — 現在→未来 */
  --horizon-from:  #E8EFFD;
  --horizon-mid:   #DCE8FB;
  --horizon-to:    #CFE0F9;

  /* v2 radius / motion 標準 */
  --r-sm:  6px;
  --r-md:  10px;
  --r-lg:  14px;
  --r-pill: 999px;
  --ease-z: cubic-bezier(0.22, 0.61, 0.36, 1);
  --dur-fast: 180ms;
  --dur-z:    280ms;
  --dur-slow: 520ms;
  --shadow-focus-v2: 0 0 0 3px var(--blue-glow);
}

/* ---------- Indigo theme 差分 ---------- */
[data-theme="indigo"]{
  --ink-ghost:    #2E416B;
  --blue-glow:    rgba(91, 142, 255, 0.22);
  --horizon-from: #0C1730;
  --horizon-mid:  #122044;
  --horizon-to:   #1B2D5C;
  --trust-tint:   #14291A;
  --warn-tint:    #2B1F0D;
  --danger-tint:  #2B1212;
}

/* ============================================================
   Focus ring — WCAG 2.2 AA を満たす統一リング
   既存 outline を上書きせず、補強のみ
   ============================================================ */
:focus-visible{
  outline: 2px solid var(--blue, #246CF7);
  outline-offset: 2px;
}
button:focus-visible,
a:focus-visible,
[role="button"]:focus-visible,
input:focus-visible,
select:focus-visible,
textarea:focus-visible{
  outline: 2px solid var(--blue, #246CF7);
  outline-offset: 2px;
  box-shadow: var(--shadow-focus-v2);
}

/* ============================================================
   v2 Component: Chapter Marker
   「Chapter 02  ───  Maturity · 成熟度」 パターン
   ============================================================ */
.zt2-chapter{
  display: inline-flex;
  align-items: center;
  gap: 14px;
  font-family: var(--font-mono, "JetBrains Mono", monospace);
  font-size: 11px;
  letter-spacing: 0.18em;
  text-transform: uppercase;
  color: var(--ink-3, var(--ink-2, #6B7A95));
}
.zt2-chapter__num{ color: var(--blue); font-weight: 500; }
.zt2-chapter__line{
  display:inline-block;
  width: 36px; height: 1px;
  background: var(--line-2, var(--line-1, #C9D1DE));
}

/* ============================================================
   v2 Component: Kicker (統一仕様)
   既存 .kicker を再定義せず、.zt2-kicker として追加
   ============================================================ */
.zt2-kicker{
  font-family: var(--font-mono, monospace);
  font-size: 11px;
  letter-spacing: 0.18em;
  text-transform: uppercase;
  color: var(--blue);
  font-weight: 500;
  margin-bottom: 12px;
  display: inline-block;
}

/* ============================================================
   v2 Component: Z-Flow Grid (思考の Z 字動線)
   ============================================================ */
.zt2-zflow{
  position: relative;
  padding: 32px;
  background: var(--bg-2, var(--bg-2, #F1F4F8));
  border: 1px solid var(--line, var(--line-1, #E1E6EE));
  border-radius: var(--r-lg);
  background-image: radial-gradient(circle, var(--line-2, var(--line-strong, #C9D1DE)) 1px, transparent 1px);
  background-size: 24px 24px;
  background-position: -1px -1px;
}
.zt2-zflow__grid{
  display: grid;
  grid-template-columns: repeat(3, 1fr);
  gap: 20px;
  position: relative;
}
.zt2-zflow__cell{
  background: var(--bg-1, #FFFFFF);
  border: 1px solid var(--line, var(--line-1, #E1E6EE));
  border-radius: var(--r-md);
  padding: 18px;
  position: relative;
  min-height: 120px;
  transition: transform var(--dur-z) var(--ease-z), box-shadow var(--dur-z) var(--ease-z);
}
.zt2-zflow__cell.is-subject{
  border-color: var(--blue);
  box-shadow: var(--shadow-focus-v2);
}
.zt2-zflow__cell:hover{
  transform: translateY(-1px);
}
.zt2-zflow__step{
  position: absolute;
  top: -12px; left: -12px;
  width: 28px; height: 28px;
  border-radius: 50%;
  background: var(--blue);
  color: #fff;
  font-family: var(--font-mono);
  font-size: 12px; font-weight: 600;
  display: flex; align-items: center; justify-content: center;
  box-shadow: 0 0 0 4px var(--bg-2, #F1F4F8);
}
.zt2-zflow__step.is-supporting{ background: var(--ink-ghost); color: var(--ink-3); }
.zt2-zflow__label{
  font-family: var(--font-mono);
  font-size: 10px;
  letter-spacing: 0.14em;
  color: var(--ink-3, var(--ink-2));
  text-transform: uppercase;
  margin-bottom: 8px;
}
.zt2-zflow__title{
  font-family: var(--font-display, var(--font-sans));
  font-size: 15px; font-weight: 500;
  color: var(--ink, var(--ink-1));
  margin: 0 0 6px;
  line-height: 1.35;
}
.zt2-zflow__body{
  font-size: 12px;
  color: var(--ink-2);
  line-height: 1.65;
  margin: 0;
}

/* ============================================================
   v2 Component: Horizon Bar (現在→未来の帯)
   ============================================================ */
.zt2-horizon{
  background: var(--bg-1, #FFFFFF);
  border: 1px solid var(--line, var(--line-1, #E1E6EE));
  border-radius: var(--r-lg);
  padding: 32px;
}
.zt2-horizon__track{
  position: relative;
  height: 64px;
  border-radius: var(--r-md);
  background: linear-gradient(90deg, var(--horizon-from), var(--horizon-mid), var(--horizon-to));
  overflow: visible;
  margin: 28px 0 16px;
}
.zt2-horizon__now{
  position: absolute;
  top: 0; bottom: 0;
  width: 2px;
  background: var(--blue);
  z-index: 2;
}
.zt2-horizon__now::after{
  content: "NOW";
  position: absolute;
  top: -22px; left: 50%;
  transform: translateX(-50%);
  font-family: var(--font-mono);
  font-size: 10px;
  color: var(--blue);
  letter-spacing: 0.14em;
  background: var(--bg, var(--bg-0));
  padding: 2px 6px;
  border-radius: 3px;
  font-weight: 500;
}
.zt2-horizon__future{
  position: absolute;
  right: 12px; top: 50%;
  transform: translateY(-50%);
  color: var(--p-networks);
  font-family: var(--font-mono);
  font-size: 11px;
  letter-spacing: 0.14em;
}
.zt2-horizon__future::before{ content: "→  "; font-size: 14px; }
.zt2-horizon__stages{
  display: grid;
  grid-template-columns: repeat(4, 1fr);
  gap: 16px;
  margin-top: 24px;
}
.zt2-horizon__stage{
  padding: 14px 16px;
  border: 1px solid var(--line, var(--line-1));
  border-radius: var(--r-md);
  background: var(--bg-1, #FFFFFF);
}
.zt2-horizon__stage.is-current{
  border-color: var(--blue);
  background: var(--blue-tint);
}
[data-theme="indigo"] .zt2-horizon__stage.is-current{
  background: var(--bg-3);
}
.zt2-horizon__stage-num{
  font-family: var(--font-mono);
  font-size: 10px;
  letter-spacing: 0.14em;
  color: var(--ink-3, var(--ink-2));
  margin-bottom: 4px;
}
.zt2-horizon__stage.is-current .zt2-horizon__stage-num{ color: var(--blue); }
.zt2-horizon__stage-name{
  font-family: var(--font-display, var(--font-sans));
  font-size: 14px; font-weight: 500;
  color: var(--ink, var(--ink-1));
  margin-bottom: 2px;
}
.zt2-horizon__stage-meta{
  font-size: 11px;
  color: var(--ink-3, var(--ink-2));
}

/* ============================================================
   v2 Component: Pillar Rail / Dot (7 柱分類)
   ============================================================ */
.zt2-pillar{
  border-left: 3px solid var(--pillar-color, var(--blue));
  padding-left: 12px;
}
.zt2-pillar-dot{
  display: inline-block;
  width: 8px; height: 8px;
  border-radius: 50%;
  background: var(--pillar-color, var(--blue));
  margin-right: 8px;
  vertical-align: middle;
  flex-shrink: 0;
}
.zt2-pillar--identity{    --pillar-color: var(--p-identity); }
.zt2-pillar--devices{     --pillar-color: var(--p-devices); }
.zt2-pillar--networks{    --pillar-color: var(--p-networks); }
.zt2-pillar--apps{        --pillar-color: var(--p-apps); }
.zt2-pillar--data{        --pillar-color: var(--p-data); }
.zt2-pillar--visibility{  --pillar-color: var(--p-visibility); }
.zt2-pillar--automation{  --pillar-color: var(--p-automation); }

/* ============================================================
   v2 Component: Ink Scale (6段階可視化)
   ============================================================ */
.zt2-ink-scale{
  display: grid;
  grid-template-columns: repeat(6, 1fr);
  gap: 0;
  border: 1px solid var(--line, var(--line-1));
  border-radius: var(--r-md);
  overflow: hidden;
  background: var(--bg-1, #FFFFFF);
}
.zt2-ink-scale__item{
  padding: 14px 12px;
  border-right: 1px solid var(--line, var(--line-1));
}
.zt2-ink-scale__item:last-child{ border-right: none; }
.zt2-ink-scale__dot{
  width: 14px; height: 14px;
  border-radius: 3px;
  margin-bottom: 10px;
}

/* ============================================================
   既存コンポーネントの micro-interaction 統一
   (既存の .btn / .card / .tag / .topbar を弱めに上書き)
   ============================================================ */

/* Buttons — 押下感・フォーカス統一 */
.btn{
  transition:
    background var(--dur-fast) var(--ease-z),
    border-color var(--dur-fast) var(--ease-z),
    color var(--dur-fast) var(--ease-z),
    box-shadow var(--dur-fast) var(--ease-z),
    transform var(--dur-fast) var(--ease-z);
}
.btn:active{ transform: translateY(1px); }
.btn.primary:focus-visible{ box-shadow: var(--shadow-focus-v2); }

/* Cards — 浮き上がりの統一 */
.card{
  transition:
    transform var(--dur-z) var(--ease-z),
    box-shadow var(--dur-z) var(--ease-z),
    border-color var(--dur-z) var(--ease-z);
}

/* Tag / Pill — v2 variants */
.tag, .pill{
  transition: all var(--dur-fast) var(--ease-z);
}
.tag--zt2-blue, .pill--zt2-blue{
  background: var(--blue-tint);
  color: var(--blue-dark);
  border-color: transparent;
}
.tag--zt2-trust, .pill--zt2-trust{
  background: var(--trust-tint);
  color: var(--trust);
  border-color: transparent;
}
.tag--zt2-warn, .pill--zt2-warn{
  background: var(--warn-tint);
  color: var(--warn);
  border-color: transparent;
}
.tag--zt2-active, .pill--zt2-active{
  background: var(--ink-0, var(--ink-deep, #001744));
  color: #fff;
  border-color: var(--ink-0, #001744);
}

/* Topbar — スムーズなテーマ切替 */
.topbar{
  transition:
    background var(--dur-z) var(--ease-z),
    border-color var(--dur-z) var(--ease-z);
}

/* ============================================================
   v2 Utilities
   ============================================================ */
.zt2-ink-deep    { color: var(--ink-0) !important; }
.zt2-ink-primary { color: var(--ink, var(--ink-1)) !important; }
.zt2-ink-sec     { color: var(--ink-2) !important; }
.zt2-ink-muted   { color: var(--ink-3) !important; }
.zt2-ink-faint   { color: var(--ink-4) !important; }
.zt2-ink-ghost   { color: var(--ink-ghost) !important; }

.zt2-mono{
  font-family: var(--font-mono);
  letter-spacing: 0.14em;
  text-transform: uppercase;
  font-size: 11px;
  color: var(--ink-3, var(--ink-2));
}

/* Large metric (KPI) — v2 標準 */
.zt2-metric{
  font-family: var(--font-display, var(--font-sans));
  font-weight: 300;
  font-size: 48px;
  line-height: 1;
  color: var(--ink, var(--ink-1));
  letter-spacing: -0.01em;
}
.zt2-metric__unit{
  font-size: 14px;
  color: var(--ink-3);
  margin-left: 4px;
  font-weight: 400;
}

/* ============================================================
   Reduced motion — アクセシビリティ
   ============================================================ */
@media (prefers-reduced-motion: reduce){
  *, *::before, *::after{
    animation-duration: 0.01ms !important;
    animation-iteration-count: 1 !important;
    transition-duration: 0.01ms !important;
    scroll-behavior: auto !important;
  }
}

/* ============================================================
   Version signature (for debugging)
   ============================================================ */
body::before{
  content: "";
  /* Ztelier Common Kit v2.0 — applied */
}$

</style>

/* Compute effective AI-enhanced coverage for a subcategory */
function effCov(subId){
  const base = CSF_ZTMM_MAP[subId]?.cov || 0;
  const boost = CSF_AI_OVERLAY[subId]?.cov_boost || 0;
  return Math.min(100, base + boost);
}

/* AI RMF → Zscaler module mapping (derived) */
const AIRMF_ZS_MAP = (() => {
  const agg = {};
  Object.entries(CSF_AI_OVERLAY).forEach(([csfId, ov])=>{
    (ov.ai_rmf||[]).forEach(rmfId=>{
      if(!agg[rmfId]) agg[rmfId] = {mods:new Set(), gaiRisks:new Set(), linkedCsfs:[], maxBoost:0, notes:[]};
      (ov.ai_mods||[]).forEach(m=>agg[rmfId].mods.add(m));
      (ov.ai_gai||[]).forEach(g=>agg[rmfId].gaiRisks.add(g));
      agg[rmfId].linkedCsfs.push(csfId);
      agg[rmfId].maxBoost = Math.max(agg[rmfId].maxBoost, ov.cov_boost||0);
      if(ov.note) agg[rmfId].notes.push(ov.note);
    });
  });
  const result = {};
  Object.entries(agg).forEach(([rmfId, v])=>{
    const modCount = v.mods.size;
    const csfCount = v.linkedCsfs.length;
    let cov = 0;
    if(modCount === 0) cov = csfCount >= 2 ? 20 : 0;
    else if(modCount === 1) cov = csfCount >= 3 ? 55 : csfCount >= 2 ? 45 : 35;
    else if(modCount === 2) cov = csfCount >= 3 ? 75 : csfCount >= 2 ? 65 : 55;
    else cov = csfCount >= 2 ? 90 : 75;
    result[rmfId] = {
      mods:[...v.mods], cov,
      gaiRisks:[...v.gaiRisks],
      linkedCsfs:[...new Set(v.linkedCsfs)],
      notes:v.notes
    };
  });
  return result;
})();
function aiRmfEffCov(rmfId){ return AIRMF_ZS_MAP[rmfId]?.cov || 0; }
/* AI RMF ceiling by coverage
 * ──────────────────────────
 * v1.0.9 fix (2026-04-24): Pattern-D 対処
 *   aiRmfZtToBePct の target 側に現状 cov 基準の strict ceiling を当てており、
 *   CSFA側 deriveMaazTarget と同じ論理破綻 (現状 cov で未来 target を抑制)
 *   を引き起こしていた。
 *   分岐:
 *     - aiRmfCeiling(rmfId)           : AS-IS 用 (現状保守的、未変更)
 *     - aiRmfCeilingForTarget(rmfId)  : TO-BE 用 (1ティア緩和、CSFA側と対称)
 */
function aiRmfCeiling(rmfId){
  const cov = aiRmfEffCov(rmfId);
  return cov >= 75 ? 4 : cov >= 50 ? 3 : cov >= 25 ? 2 : cov > 0 ? 1 : 0;
}
function aiRmfCeilingForTarget(rmfId){
  const cov = aiRmfEffCov(rmfId);
  // deriveMaazTarget と同じ緩和カーブ
  return cov >= 50 ? 4 : cov >= 25 ? 3 : cov > 0 ? 2 : 1;
}

const STORAGE_KEY = "csfa_ztelier_v1_state";
const state = {
  customer:"", date:new Date().toISOString().slice(0,10),
  self:{}, target:{}, evidence:{}, maazTarget:{},
  aiRmfSelf:{}, aiRmfTarget:{},
  maazLoaded:false, maazTimestamp:null,
  maazMeta:null,               /* v4.3.0+ : threatCoverage/pillarScores/effectiveCoverage/bottleneck/scopeState */
  maazFormat:null,             /* 取込JSONの format 文字列 (例: "maaz-v4.3.0") */
  sourceSessions:{},           /* ④: 上流ツールの session_id (例: {maaz: "acme-20260422"}) */
  currentChapter:"00", currentPillar:"GV",
  pillarFilter:"all",
  theme:"paper"
};
/* MAAZ由来の一時データ (evidence/maazTarget/maazLoaded/maazTimestamp/maazMeta/maazFormat) は
 * localStorage に保存しない。毎セッション MAAZ を再取込する設計。
 * 自己申告値 (self/target/aiRmfSelf/aiRmfTarget/customer/date) のみ永続化。 */
const PERSIST_KEYS = ["customer","date","self","target","aiRmfSelf","aiRmfTarget","currentChapter","currentPillar","pillarFilter","theme"];
function saveState(){
  try{
    const snap = {};
    PERSIST_KEYS.forEach(k=>{ if(k in state) snap[k] = state[k]; });
    localStorage.setItem(STORAGE_KEY, JSON.stringify(snap));
  }catch(e){}
}
function loadState(){
  try{
    const s = localStorage.getItem(STORAGE_KEY);
    if(s){
      const parsed = JSON.parse(s);
      PERSIST_KEYS.forEach(k=>{ if(k in parsed) state[k] = parsed[k]; });
    }
  }catch(e){}
  // Ephemeral fields: always reset on page load
  state.evidence = {};
  state.maazTarget = {};
  state.maazLoaded = false;
  state.maazTimestamp = null;
  state.maazMeta = null;
  state.maazFormat = null;
  if(!state.aiRmfSelf) state.aiRmfSelf={};
  if(!state.aiRmfTarget) state.aiRmfTarget={};
  if(!state.pillarFilter) state.pillarFilter="all";
  CSF_FRAMEWORK.functions.forEach(f=>f.categories.forEach(c=>c.subs.forEach(s=>{
    if(!(s.id in state.self)) state.self[s.id]=0;
    if(!(s.id in state.target)) state.target[s.id]=3;
  })));
  AI_RMF.functions.forEach(f=>f.categories.forEach(c=>c.subs.forEach(s=>{
    if(!(s.id in state.aiRmfSelf)) state.aiRmfSelf[s.id]=0;
    if(!(s.id in state.aiRmfTarget)){
      // v1.0.9 fix: target 初期値にも緩和 ceiling を適用 (Pattern-D 対処)
      const ceil = aiRmfCeilingForTarget(s.id);
      state.aiRmfTarget[s.id] = Math.min(ceil, 3);
    }
  })));
}

function getActive(subId){ return (subId in state.evidence) ? state.evidence[subId] : state.self[subId]; }
function getDelta(subId){
  if(!(subId in state.evidence)) return null;
  return (state.self[subId]||0) - state.evidence[subId];
}
function catAvg(cat){ if(!cat.subs.length) return 0; return cat.subs.reduce((a,s)=>a+getActive(s.id),0)/cat.subs.length; }
function fnAvg(fn){ const all=fn.categories.flatMap(c=>c.subs); return all.length ? all.reduce((a,s)=>a+getActive(s.id),0)/all.length : 0; }
function catCoverage(cat){ if(!cat.subs.length) return 0; return cat.subs.reduce((a,s)=>a+effCov(s.id),0)/cat.subs.length; }
function fnCoverage(fn){ const all=fn.categories.flatMap(c=>c.subs); return all.length ? all.reduce((a,s)=>a+effCov(s.id),0)/all.length : 0; }
function totalSubs(){ return CSF_FRAMEWORK.functions.flatMap(f=>f.categories.flatMap(c=>c.subs)).length; }
function gapCount(){
  return CSF_FRAMEWORK.functions.flatMap(f=>f.categories.flatMap(c=>c.subs))
    .filter(s=>getActive(s.id) < (state.target[s.id]||0)).length;
}
function avgDelta(){
  const deltas=[];
  Object.keys(state.evidence).forEach(k=>deltas.push((state.self[k]||0) - state.evidence[k]));
  return deltas.length ? deltas.reduce((a,b)=>a+b,0)/deltas.length : null;
}
function overallAvg(){
  const all = CSF_FRAMEWORK.functions.flatMap(f=>f.categories.flatMap(c=>c.subs));
  return all.reduce((a,s)=>a+getActive(s.id),0)/all.length;
}
function overallCoverage(){
  const all = CSF_FRAMEWORK.functions.flatMap(f=>f.categories.flatMap(c=>c.subs));
  return all.reduce((a,s)=>a+effCov(s.id),0)/all.length;
}
function aiRmfAllSubs(){ return AI_RMF.functions.flatMap(f=>f.categories.flatMap(c=>c.subs)); }

/* v1.0.9 fix: 以下 2 関数は現状未使用 (デッドコード) だが、将来レーダー等で
