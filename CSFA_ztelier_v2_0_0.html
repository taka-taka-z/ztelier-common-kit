/* MAAZ → Evidence (As-Is)
 * ────────────────────────
 * v1.0.9 fix (2026-04-24): deriveMaazTarget と対称な peak 方式に変更
 *   旧: Math.round(平均) で複数ztmm時に低ティアへ引きずられる
 *   新: Math.max(levels) で最良のサポート機能が達成水準を決める
 * 
 * 例) DE.CM-01: ztmm=[NW-03:L1, CC-01:L3, AP-02:L3]
 *     旧 avg=2.33→round=2 (NW-03 のボトルネックに引きずり)
 *     新 max=3           (既に CC-01/AP-02 L3 で対応済を反映)
 * 
 * 影響14サブ: GV.OV-01, GV.SC-07/09, ID.AM-02/03/04, ID.IM-03,
 *            PR.PS-05, DE.CM-01/03 など
 * (ceilByCov は現状値なので AS-IS 側では維持、TO-BE側と非対称)
 */
function deriveEvidence(maazZtmm){
  const ev = {};
  Object.keys(CSF_ZTMM_MAP).forEach(subId=>{
    const map = CSF_ZTMM_MAP[subId];
    if(!map.ztmm.length) return;
    const levels = map.ztmm.map(z=>maazZtmm[z])
      .filter(x=>x!==undefined && x!==null)
      .map(x=>typeof x==="object" ? (x.asIs ?? x.level ?? 0) : x);
    if(!levels.length) return;
    const peak = Math.max(...levels);  // 旧: reduce/length (avg)
    const ceilByCov = map.cov >= 75 ? 4 : map.cov >= 50 ? 3 : map.cov >= 25 ? 2 : 1;
    ev[subId] = Math.min(peak, ceilByCov);  // 旧: Math.round(avg)
  });
  return ev;
}
/* MAAZ → MAAZ-derived To-Be (ZTMM target propagated to CSF subs)
 * ───────────────────────────────────────────────────────────────
 * v1.0.9 fix (2026-04-24): 下方バイアス 2 点を是正
 *   旧: Math.round(平均) ∩ 現状cov基準の厳しいキャップ
 *   新: Math.max(levels)  ∩ 未来state向けに1ティア緩和したキャップ
 *
 * 理由:
 *  (A) 複数 ztmm にマップされる場合、最良のサポート機能が達成可能ティアを
 *      決めるのが妥当 (平均だと強い機能が弱い機能にボトルネック化される)
 *  (B) cov は「現状の ZT 投影強度」であり、未来state (TO-BE) に同一キャップを
 *      当てると MAAZ が計画している改善が無効化される
 *      → TO-BE 専用にキャップを +1 ティア緩和 (evidence 側は厳しいまま)
 * 影響を受けた代表サブ:
 *   GV.OC-05, GV.RM-05, PR.AT-01/02, ID.RA-10, RS.MA-05, RC.RP-01 ほか
 */
function deriveMaazTarget(maazZtmmTarget){
  const tgt = {};
  Object.keys(CSF_ZTMM_MAP).forEach(subId=>{
    const map = CSF_ZTMM_MAP[subId];
    if(!map.ztmm.length) return;
    const levels = map.ztmm.map(z=>maazZtmmTarget[z])
      .filter(x=>x!==undefined && x!==null)
      .map(x=>typeof x==="object" ? (x.toBe ?? x.target ?? x.level ?? 0) : x);
    if(!levels.length) return;
    // (A) 最良のサポート ztmm が達成可能ティアを決める
    const peak = Math.max(...levels);
    // (B) TO-BE 用の緩和キャップ (evidence 側は変更しない)
    const ceilByCovForTarget =
      map.cov >= 50 ? 4 :
      map.cov >= 25 ? 3 :
      map.cov > 0   ? 2 : 1;
    tgt[subId] = Math.min(peak, ceilByCovForTarget);
  });
  return tgt;
}

/* Classification — 顧客視点でサブカテゴリの対応責任を分類 */
/*   zta    : Zscaler高カバー(≥75%) — MAAZ To-Beがそのまま提案になる
 *   hybrid : 中カバー(25-75%)      — ZTA実装+組織施策併用
 *   org    : 低カバー/未対応(<25%) — 顧客が独自にTo-Beを定義する必要
 */
function classifySub(subId){
  const cov = effCov(subId);
  if(cov >= 75) return {type:'zta', jp:'ZTA', desc:'Zscalerで閉じる', color:'trust'};
  if(cov >= 25) return {type:'hybrid', jp:'併用', desc:'ZTA+組織施策', color:'warn'};
  return {type:'org', jp:'顧客定義', desc:'顧客が独自にTo-Beを定義', color:'danger'};
}
function getMaazTarget(subId){ return state.maazTarget[subId]; } // may be undefined
function getEffectiveTarget(subId){
  // Target priority: MAAZ-derived if present, else customer-set
  const mt = state.maazTarget[subId];
  return mt !== undefined ? mt : (state.target[subId]||0);
}
/* Per-function MAAZ target avg (returns null if no MAAZ data for this fn)
 * ──────────────────────────────────────────────────────────────────────
 * v1.0.9 fix (2026-04-24): TO-BE < AS-IS バグ修正
 *   旧: 未マッピングサブを tier 0 として平均に混ぜ、サブ全数で割っていた
 *       → MAAZ target の無い GV/RC 系サブが多いと TO-BE が AS-IS を下回る
 *   新: 未マッピングサブは AS-IS を使い (退化させず)、
 *       マッピングありサブも max(maazTarget, active) で AS-IS 保護
 *       (サブ単位 ztToBePct と同じ単調非減少性を機能レベルでも保証)
 */
function fnMaazTarget(fn){
  const subs = fn.categories.flatMap(c=>c.subs);
  const mapped = subs.filter(s=>state.maazTarget[s.id]!==undefined);
  if(!mapped.length) return null;
  const sum = subs.reduce((a,s)=>{
    const mt = state.maazTarget[s.id];
    const active = getActive(s.id);
    // MAAZ target 未定義 → AS-IS を採用 (退化させない)
    // MAAZ target 定義済 → AS-IS と maazTarget の大きい方 (ZTで退化しない)
    return a + (mt !== undefined ? Math.max(mt, active) : active);
  }, 0);
  return sum/subs.length;
}
function fnTargetAvg(fn){
  const subs = fn.categories.flatMap(c=>c.subs);
  return subs.length ? subs.reduce((a,s)=>a+(state.target[s.id]||0),0)/subs.length : 0;
}
/* Count of customer-defined subs per function (cov<25%) */
function fnOrgLedCount(fn){
  return fn.categories.flatMap(c=>c.subs).filter(s=>classifySub(s.id).type==='org').length;
}
function fnSubCount(fn){ return fn.categories.flatMap(c=>c.subs).length; }

/* ═══════════════════════════════════════════════════════════════════
   Compliance uplift math — ZT journey translated to compliance %
   ───────────────────────────────────────────────────────────────────
   tier 0..4 → compliance 0..100%
   As-Is       : MAAZ実証(or 自己申告) の現状 tier を % 化
   ZT To-Be    : MAAZ定義 ZTMM To-Be を CSF/AI RMF に投影したもの
                 (MAAZ未取込時は As-Is のまま = ZT 押し上げなし)
   Uplift      : ZT To-Be − As-Is  (ZTで押し上がる幅)
   Residual    : 100 − ZT To-Be    (組織施策で閉じる領域)
   ═══════════════════════════════════════════════════════════════════ */
function tierToPct(t){ return Math.max(0, Math.min(4, t||0)) * 25; }
function asIsPct(subId){ return tierToPct(getActive(subId)); }
function ztToBePct(subId){
  const mt = state.maazTarget[subId];
  if(mt === undefined) return asIsPct(subId); // No MAAZ To-Be → ZT can't help
  return Math.max(tierToPct(mt), asIsPct(subId));
}
function upliftPct(subId){ return ztToBePct(subId) - asIsPct(subId); }
function residualPct(subId){ return 100 - ztToBePct(subId); }

function fnAsIs(fn){ const s=fn.categories.flatMap(c=>c.subs); return s.length?s.reduce((a,x)=>a+asIsPct(x.id),0)/s.length:0; }
function fnZtToBe(fn){ const s=fn.categories.flatMap(c=>c.subs); return s.length?s.reduce((a,x)=>a+ztToBePct(x.id),0)/s.length:0; }
function fnUplift(fn){ return fnZtToBe(fn) - fnAsIs(fn); }
function fnResidual(fn){ return 100 - fnZtToBe(fn); }

function overallAsIs(){ const s=CSF_FRAMEWORK.functions.flatMap(f=>f.categories.flatMap(c=>c.subs)); return s.reduce((a,x)=>a+asIsPct(x.id),0)/s.length; }
function overallZtToBe(){ const s=CSF_FRAMEWORK.functions.flatMap(f=>f.categories.flatMap(c=>c.subs)); return s.reduce((a,x)=>a+ztToBePct(x.id),0)/s.length; }
function overallUplift(){ return overallZtToBe() - overallAsIs(); }
function overallResidual(){ return 100 - overallZtToBe(); }

/* ═══════════════════════════════════════════════════════════════════
   SCF (Scope Coverage Factor) 補正 — MAAZ v4.3.0+
   ───────────────────────────────────────────────────────────────────
   理想 To-Be   : MAAZ が定義した ZTMM To-Be が全て実装された場合
   実効 To-Be   : スコープ未選択 Pillar の寄与を SCF で減衰した現実値
                  As-Is + Uplift × SCF(sub)

   SCF(sub) = CSFサブが参照する ZTMM function の Pillar の SCF 平均
   ═══════════════════════════════════════════════════════════════════ */
const _PILLAR_PREFIX = {
  "ID":"Identity","DE":"Devices","NW":"Networks",
  "AP":"App & Workload","DA":"Data","CC":"Cross-Cutting"
};
function hasScfData(){
  return !!(state.maazMeta && state.maazMeta.effectiveCoverage && state.maazMeta.effectiveCoverage.byPillar);
}
function subScf(subId){
  if(!hasScfData()) return 1;
  const bp = state.maazMeta.effectiveCoverage.byPillar;
  const map = CSF_ZTMM_MAP[subId];
  if(!map || !map.ztmm || !map.ztmm.length) return 1;
  const pillars = [...new Set(map.ztmm.map(z=>_PILLAR_PREFIX[z.slice(0,2)]).filter(Boolean))];
  const scfs = pillars.map(p=>bp[p]?.scf).filter(x=>typeof x==="number");
  if(!scfs.length) return 1;
  return scfs.reduce((a,b)=>a+b,0)/scfs.length;
}
function upliftEffectivePct(subId){ return upliftPct(subId) * subScf(subId); }
function ztToBeEffectivePct(subId){ return asIsPct(subId) + upliftEffectivePct(subId); }
function residualEffectivePct(subId){ return 100 - ztToBeEffectivePct(subId); }
function overallZtToBeEffective(){
  const s = CSF_FRAMEWORK.functions.flatMap(f=>f.categories.flatMap(c=>c.subs));
  return s.reduce((a,x)=>a+ztToBeEffectivePct(x.id),0)/s.length;
}
function overallUpliftEffective(){ return overallZtToBeEffective() - overallAsIs(); }
function overallResidualEffective(){ return 100 - overallZtToBeEffective(); }
function fnZtToBeEffective(fn){
  const subs = fn.categories.flatMap(c=>c.subs);
  return subs.length ? subs.reduce((a,s)=>a+ztToBeEffectivePct(s.id),0)/subs.length : 0;
}

/* ═══════════════════════════════════════════════════════════════════
   MAAZ actions 逆引き — CSFサブ → 関連 MAAZ actions(複数)
   priority は最高位、phase は最速(quick-win>short-term>strategic)、
   threats は union。 MAAZ v4.3.0+ のみ有効。
   ═══════════════════════════════════════════════════════════════════ */
const _PHASE_RANK = {'quick-win':1,'short-term':2,'strategic':3};
const _PRIORITY_RANK = {'critical':3,'high':2,'medium':1,'low':0};
const _PHASE_COLOR = {'quick-win':'var(--trust)','short-term':'var(--primary)','strategic':'var(--violet)'};
const _PRIORITY_COLOR = {'critical':'var(--danger)','high':'var(--warn)','medium':'var(--ink-2)','low':'var(--ink-3)'};
function getMaazActionsForSub(subId){
  const actions = state.maazMeta && state.maazMeta.actions;
  if(!actions || !actions.length) return null;
  const map = CSF_ZTMM_MAP[subId];
  if(!map || !map.ztmm || !map.ztmm.length) return null;
  const hits = actions.filter(a=> map.ztmm.includes(a.id));
  if(!hits.length) return null;
  let minPhase=null, minRank=99;
  let maxPr=null, maxRank=-1;
  hits.forEach(a=>{
    const rp = _PHASE_RANK[a.phase] || 99;
    if(rp < minRank){ minRank=rp; minPhase=a.phase; }
    const pr = _PRIORITY_RANK[a.priority] ?? -1;
    if(pr > maxRank){ maxRank=pr; maxPr=a.priority; }
  });
  const threats = [...new Set(hits.flatMap(a=>a.threats||[]))];
  return { phase:minPhase, priority:maxPr, threats, count:hits.length };
}

/* AI RMF compliance — uses AIRMF_ZS_MAP.cov as a ceiling + self/target as baseline
 * v1.0.9 fix: target 側には緩和ceiling を適用 (Pattern-D 対処)
 */
function aiRmfAsIsPct(subId){ return tierToPct(state.aiRmfSelf[subId]||0); }
function aiRmfZtToBePct(subId){
  const ceil = aiRmfCeilingForTarget(subId); // 緩和ceiling (target専用)
  const tgt = Math.min(state.aiRmfTarget[subId]||0, ceil);
  const asIs = aiRmfAsIsPct(subId);
  return Math.max(tierToPct(tgt), asIs);
}
function aiRmfUpliftPct(subId){ return aiRmfZtToBePct(subId) - aiRmfAsIsPct(subId); }
function aiRmfResidualPct(subId){ return 100 - aiRmfZtToBePct(subId); }
function aiRmfFnAsIs(fn){ const s=fn.categories.flatMap(c=>c.subs); return s.length?s.reduce((a,x)=>a+aiRmfAsIsPct(x.id),0)/s.length:0; }
function aiRmfFnZtToBe(fn){ const s=fn.categories.flatMap(c=>c.subs); return s.length?s.reduce((a,x)=>a+aiRmfZtToBePct(x.id),0)/s.length:0; }
function aiRmfFnUplift(fn){ return aiRmfFnZtToBe(fn) - aiRmfFnAsIs(fn); }
function aiRmfFnResidual(fn){ return 100 - aiRmfFnZtToBe(fn); }
function aiRmfOverallAsIsPct(){ const s=aiRmfAllSubs(); return s.reduce((a,x)=>a+aiRmfAsIsPct(x.id),0)/s.length; }
function aiRmfOverallZtToBePct(){ const s=aiRmfAllSubs(); return s.reduce((a,x)=>a+aiRmfZtToBePct(x.id),0)/s.length; }
function aiRmfOverallUpliftPct(){ return aiRmfOverallZtToBePct() - aiRmfOverallAsIsPct(); }
function aiRmfOverallResidualPct(){ return 100 - aiRmfOverallZtToBePct(); }

/* ═══════════════════════════════════════════════════════════════════
   MAAZ Pillar 別 MITRE ATT&CK 脅威カバレッジパネル (v4.3.0+)
   ───────────────────────────────────────────────────────────────────
   各 Pillar で As-Is → To-Be の脅威緩和がどれだけ進むかを水平バーで示す。
   更に effectiveContribution (SCF補正後の実効寄与) と techniquesLost
   (スコープ未選択で失われる Technique 数) を併記。
   MAAZ 未取込 or v4.3.0 未満なら描画されない。
   ═══════════════════════════════════════════════════════════════════ */
function renderMaazPillarThreatPanel(){
  const ps = state.maazMeta && state.maazMeta.pillarScores;
  const ec = state.maazMeta && state.maazMeta.effectiveCoverage && state.maazMeta.effectiveCoverage.byPillar;
  if(!ps) return '';

  const pillarOrder = ["Identity","Devices","Networks","App & Workload","Data","Cross-Cutting"];
  const PILLAR_COLOR = {
    "Identity":"var(--trust)",
    "Devices":"var(--warn)",
    "Networks":"var(--primary)",
    "App & Workload":"var(--magenta)",
    "Data":"var(--teal)",
    "Cross-Cutting":"var(--violet)"
  };
  const tc = state.maazMeta.threatCoverage || {};
  const totalThreats = tc.total || 0;

  const rows = pillarOrder.map(p=>{
    const s = ps[p];
    if(!s) return '';
    const ecp = ec ? ec[p] : null;
    const pct = totalThreats ? Math.round((s.threatsAtTo||0)/totalThreats*100) : 0;
    const pctAs = totalThreats ? Math.round((s.threatsAtAs||0)/totalThreats*100) : 0;
    const pctEff = (ecp && totalThreats) ? Math.round((ecp.effectiveContribution||0)/totalThreats*100) : null;
    const scfPct = ecp ? Math.round((ecp.scf||0)*100) : null;
    const lost = ecp ? (ecp.techniquesLost||0) : null;
    const color = PILLAR_COLOR[p];
    return `
      <div class="pillar-threat-row">
        <div class="ptr-name" style="color:${color}">${p}</div>
        <div class="ptr-bar" title="As-Is ${s.threatsAtAs||0} → To-Be ${s.threatsAtTo||0} / ${totalThreats} (+${s.newThreats||0} 新規緩和)">
          <div class="ptr-bar-asis" style="width:${pctAs}%; background:${color}"></div>
          <div class="ptr-bar-new"  style="width:${pct - pctAs}%; background:${color}; opacity:0.42"></div>
          ${pctEff !== null && pctEff < pct ? `<div class="ptr-bar-effmark" style="left:${pctEff}%" title="実効寄与 ${pctEff}%"></div>` : ''}
        </div>
        <div class="ptr-nums">
          <span class="ptr-n-asis">${s.threatsAtAs||0}</span>
          <span class="ptr-arrow">→</span>
          <span class="ptr-n-to" style="color:${color}">${s.threatsAtTo||0}</span>
          <span class="ptr-n-new">+${s.newThreats||0}</span>
        </div>
        ${ecp ? `<div class="ptr-eff" title="SCF = スコープ網羅係数 / 実効寄与 / 失われるテクニック数">
          <span class="ptr-scf">SCF <strong>${scfPct}%</strong></span>
          <span class="ptr-contrib">実効 <strong>${(ecp.effectiveContribution||0).toFixed(1)}</strong></span>
          <span class="ptr-lost" title="SCF未達で失われる Technique 数">欠損 <strong>${lost.toFixed(1)}</strong></span>
        </div>` : ''}
      </div>`;
  }).join('');

  const scope = state.maazMeta.scopeState;
  let scopeLine = '';
  if(scope){
    const bits = [];
    Object.entries(scope).forEach(([pillar,obj])=>{
      const ys = Object.values(obj||{}).filter(v=>v==='Y').length;
      const ps2 = Object.values(obj||{}).filter(v=>v==='P').length;
      const ns = Object.values(obj||{}).filter(v=>v==='N').length;
      const nas = Object.values(obj||{}).filter(v=>v==='NA').length;
      bits.push(`<span class="scope-chip" style="color:${PILLAR_COLOR[pillar]||'var(--ink-2)'}"><strong>${pillar}</strong> Y:${ys} P:${ps2} N:${ns} NA:${nas}</span>`);
    });
    scopeLine = `<div class="scope-line">${bits.join('')}</div>`;
  }

  return `
    <div class="sub-marker"><span class="num">01.2</span> MAAZ Pillar 別 MITRE ATT&CK 脅威カバレッジ</div>
    <p style="color:var(--ink-2); font-family:'Meiryo','メイリオ','Noto Sans JP'; font-size:12px; margin:0 0 20px; line-height:1.7">
      MAAZ v4.3.0+ の実証する Pillar 別の脅威緩和進化と、<em style="color:var(--warn); font-style:normal; font-weight:600">スコープ選択状態(SCF)で失われる実効寄与</em> を可視化する。
      ${tc.coveredAsIs !== undefined ? `全体: As-Is <em style="color:var(--ink-0)">${tc.coveredAsIs}</em> → To-Be <em style="color:var(--trust)">${tc.coveredToBe}</em> / ${tc.total} (新規緩和 +${tc.newlyMitigated})。` : ''}
      <em style="color:var(--warn); font-style:normal; font-weight:600">欠損</em> が大きい Pillar はスコープ選択の再設計余地あり。
    </p>
    <div class="pillar-threat-panel">
      ${rows}
    </div>
    ${scopeLine}`;
}

/* Radar — 3 layers: current (filled) / MAAZ To-Be (dashed trust) / customer target (dotted primary)
 * If no MAAZ To-Be loaded, the MAAZ layer is skipped. */
function renderRadarSvg(stats){
  const cx=200, cy=180, r=130;
  const n = stats.length;
  function poly(valFn){
    return stats.map((s,i)=>{
      const ang = -Math.PI/2 + i*2*Math.PI/n;
      const v = valFn(s);
      if(v===null || v===undefined) return null;
      const rv = Math.min(v,4)/4 * r;
      return {x:cx+rv*Math.cos(ang), y:cy+rv*Math.sin(ang)};
    });
  }
  function toPath(pts){
    const valid = pts.filter(p=>p);
    if(valid.length < 3) return null;
    return pts.map((p,i)=>p ? `${i===0?'M':'L'}${p.x},${p.y}` : '').join(' ')+' Z';
  }
  const curPts = poly(s=>s.avg);
  const maazTgtPts = poly(s=>s.maazTarget);
  const custTgtPts = poly(s=>s.custTarget);

  const axPts = stats.map((s,i)=>{
    const ang = -Math.PI/2 + i*2*Math.PI/n;
    return {x:cx+r*Math.cos(ang), y:cy+r*Math.sin(ang), lx:cx+(r+18)*Math.cos(ang), ly:cy+(r+18)*Math.sin(ang), id:s.id, jp:s.jp};
  });
  const grids = [1,2,3,4].map(lv=>{
    const pp = stats.map((_,i)=>{
      const ang = -Math.PI/2 + i*2*Math.PI/n;
      const rv = (lv/4)*r;
      return `${cx+rv*Math.cos(ang)},${cy+rv*Math.sin(ang)}`;
    }).join(' ');
    return `<polygon class="radar-grid" points="${pp}" />`;
  }).join('');
  const hasMaaz = maazTgtPts.some(p=>p);
  const custPath = toPath(custTgtPts);
  const maazPath = hasMaaz ? toPath(maazTgtPts) : null;
  const curPath = toPath(curPts);

  return `<svg class="radar-svg" viewBox="0 0 400 320" preserveAspectRatio="xMidYMid meet">
    ${grids}
    ${axPts.map(p=>`<line class="radar-axis" x1="${cx}" y1="${cy}" x2="${p.x}" y2="${p.y}"/>`).join('')}
    ${custPath?`<path class="radar-target-custom" d="${custPath}"/>`:''}
    ${maazPath?`<path class="radar-target-maaz" d="${maazPath}"/>`:''}
    ${curPath?`<path class="radar-area" d="${curPath}"/>`:''}
    ${curPts.filter(p=>p).map(p=>`<circle class="radar-point" cx="${p.x}" cy="${p.y}" r="4"/>`).join('')}
    ${axPts.map(p=>{
      const anchor = Math.abs(p.lx-cx)<12?'middle':(p.lx>cx?'start':'end');
      return `<text class="radar-axis-label" x="${p.lx}" y="${p.ly-2}" text-anchor="${anchor}">${p.id}</text>
              <text class="radar-axis-label-jp" x="${p.lx}" y="${p.ly+10}" text-anchor="${anchor}">${p.jp}</text>`;
    }).join('')}
  </svg>
  <div class="radar-legend">
    <span class="rl-item"><span class="rl-sw rl-asis"></span>As-Is</span>
    ${hasMaaz?'<span class="rl-item"><span class="rl-sw rl-maaz"></span>ZT To-Be</span>':''}
    <span class="rl-item"><span class="rl-sw rl-cust"></span>顧客独自目標</span>
  </div>`;
}

function renderSubItem(sub, fnId){
  const map = CSF_ZTMM_MAP[sub.id] || {ztmm:[],mods:[],cov:0,note:""};
  const ai = CSF_AI_OVERLAY[sub.id];
  const active = getActive(sub.id);
  const self = state.self[sub.id]||0;
  const target = state.target[sub.id]||0;
  const ev = state.evidence[sub.id];
  const maazTgt = state.maazTarget[sub.id];
  const delta = getDelta(sub.id);
  const eCov = effCov(sub.id);
  const cls = classifySub(sub.id);

  const modsHtml = map.mods.length > 0
    ? map.mods.map(m=>`<span class="sub-meta-chip zs">${m}</span>`).join('')
    : (ai && ai.ai_mods.length > 0 ? '' : '<span class="sub-meta-chip" style="background:var(--bg-3);color:var(--ink-3)">対象外</span>');
  const aiModsHtml = ai && ai.ai_mods.length > 0
    ? ai.ai_mods.map(m=>`<span class="sub-meta-chip ai" title="${ZS_MODULES[m]?.jp||m}">${m}</span>`).join('')
    : '';
  const ztmmHtml = map.ztmm.length > 0
    ? map.ztmm.map(z=>`<span class="sub-meta-chip ztmm">${z}</span>`).join('')
    : '';

  let warn = '';
  if(ev !== undefined){
    if(delta > 0) warn = `<span class="tier-warn over">+${delta}</span>`;
    else if(delta < 0) warn = `<span class="tier-warn under">${delta}</span>`;
    else warn = `<span class="tier-warn align">=</span>`;
  }
  const classChip = `<span class="class-chip ${cls.type}" title="${cls.desc}">${cls.jp}</span>`;

  let aiBlock = '';
  if(ai){
    const rmfHtml = ai.ai_rmf.map(r=>`<span class="sub-meta-chip airmf">AI RMF · ${r}</span>`).join('');
    const gaiHtml = ai.ai_gai.map(g=>{
      const risk = AI_RMF.gaiRisks.find(r=>r.id===g);
      return `<span class="sub-meta-chip gai" title="${risk?.desc||''}">GAI · ${risk?.jp||g}</span>`;
    }).join('');
    aiBlock = `
      <div class="ai-note">
        <strong>AI観点:</strong> ${ai.note}
        ${ai.cov_boost>0?`<span style="margin-left:6px;padding:1px 6px;background:var(--violet);color:#fff;border-radius:3px;font-size:9px;font-weight:700;font-family:var(--mono)">+${ai.cov_boost}%</span>`:''}
        <div class="ai-note-meta">${rmfHtml}${gaiHtml}</div>
      </div>`;
  }

  const evidenceBorder = (ev !== undefined) ? 'has-evidence' : '';

  const subAsIs = asIsPct(sub.id);
  const subUplift = upliftPct(sub.id);
  const subToBe = ztToBePct(sub.id);
  const subResidual = residualPct(sub.id);
  const upliftClass = subUplift >= 50 ? 'cov-100' : subUplift >= 25 ? 'cov-75' : subUplift > 0 ? 'cov-50' : 'cov-0';

  return `
  <div class="sub-item sub-item-${cls.type} ${evidenceBorder}" data-subid="${sub.id}" data-class="${cls.type}">
    <div class="sub-id mono">${sub.id}${ai?'<span class="ai-indicator">AI</span>':''}</div>
    <div class="sub-content">
      <div class="sub-text">${classChip}${sub.jp}</div>
      <div class="sub-meta">
        <span class="cov-mini"><span class="cov-mini-fill ${covBarClass(eCov)}" style="width:${eCov}%"></span></span>
        <span class="sub-meta-chip ${upliftClass}" title="As-Is ${pctFmt(subAsIs)} → To-Be ${pctFmt(subToBe)} | 残 ${pctFmt(subResidual)}">ZT Uplift +${pctFmt(subUplift)}</span>
        ${modsHtml}
        ${aiModsHtml}
        ${ztmmHtml?`<span style="color:var(--ink-3);margin:0 2px">·</span>${ztmmHtml}`:''}
      </div>
      ${map.note?`<div class="sub-note">${map.note}</div>`:''}
      ${aiBlock}
    </div>
    <div class="sub-scores">
      <div class="tier-row">
        <span class="tier-row-label jp">現状</span>
        <div class="tier-btns" data-kind="self" data-subid="${sub.id}">
          ${[0,1,2,3,4].map(t=>{
            const isActive = (ev !== undefined ? ev === t : self === t);
            const isEv = ev !== undefined && ev === t;
            return `<button class="tier-btn ${isActive?'active':''} ${isEv?'evidence':''}" data-t="${t}" ${isEv?'title="Evidence(MAAZ由来)"':''}>${t}</button>`;
          }).join('')}
        </div>
        ${warn}
      </div>
      ${maazTgt !== undefined ? `
      <div class="tier-row">
        <span class="tier-row-label jp" style="color:var(--trust); font-weight:600">MAAZ</span>
        <div class="tier-btns maaz-target-row">
          ${[0,1,2,3,4].map(t=>`<span class="tier-btn maaz-tier ${maazTgt===t?'active':''}" title="MAAZで定義されたZTMM To-Be由来">${t}</span>`).join('')}
        </div>
        <span style="font-family:'JetBrains Mono'; font-size:9px; color:var(--trust); font-weight:600">ZTA提案</span>
      </div>` : ''}
      <div class="tier-row">
        <span class="tier-row-label jp" ${cls.type==='org'?'style="color:var(--warn); font-weight:600"':''}>目標</span>
        <div class="tier-btns" data-kind="target" data-subid="${sub.id}">
          ${[0,1,2,3,4].map(t=>`<button class="tier-btn ${target===t?'active':''}" data-t="${t}">${t}</button>`).join('')}
        </div>
        ${cls.type==='org'?'<span style="font-family:\'JetBrains Mono\'; font-size:9px; color:var(--warn); font-weight:600">要定義</span>':''}
      </div>
      ${ev !== undefined && self !== ev?`
      <div class="tier-row">
        <span class="tier-row-label jp" style="color:var(--ink-3)">申告</span>
        <div class="tier-btns" data-kind="self-override" data-subid="${sub.id}">
          ${[0,1,2,3,4].map(t=>`<button class="tier-btn ${self===t?'active':''}" data-t="${t}" style="opacity:0.55;transform:scale(0.88)">${t}</button>`).join('')}
        </div>
      </div>`:''}
    </div>
  </div>`;
}

function renderCategoryBlock(cat, fnId){
  const catAsIs = cat.subs.length ? cat.subs.reduce((a,s)=>a+asIsPct(s.id),0)/cat.subs.length : 0;
  const catToBe = cat.subs.length ? cat.subs.reduce((a,s)=>a+ztToBePct(s.id),0)/cat.subs.length : 0;
  const catUpl = catToBe - catAsIs;
  const catRes = 100 - catToBe;
  return `
  <div class="cat-card" style="--fn-accent:var(${FN_ACCENT[fnId]})">
    <div class="cat-header" data-catid="${cat.id}">
      <svg class="cat-caret" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><polyline points="9 18 15 12 9 6"></polyline></svg>
      <div class="cat-id mono">${cat.id}</div>
      <div>
        <div class="cat-title">${cat.en}</div>
        <div class="cat-jp">${cat.jp}</div>
      </div>
      <div class="cat-meta">
        <div class="cat-meta-stat mono" title="As-Is コンプライアンス準拠度">A<span class="val">${pctFmt(catAsIs)}</span></div>
        <div class="cat-meta-stat mono" title="ZT Uplift" style="color:var(--primary)">+<span class="val">${pctFmt(catUpl)}</span></div>
        <div class="cat-meta-stat mono" title="Residual (組織施策)" style="color:var(--warn)">残<span class="val">${pctFmt(catRes)}</span></div>

/* ═══════════════════════════════════════════════════════════════════
   Chapter switch + render orchestration
   ═══════════════════════════════════════════════════════════════════ */
function switchChapter(chapId){
  document.querySelectorAll('.chapter-view').forEach(v=>v.classList.remove('active'));
  const el = document.getElementById('chap'+chapId);
  if(el) el.classList.add('active');
  // Update pill state
  document.querySelectorAll('#chapterPills .chip').forEach(b=>{
    b.classList.toggle('on', b.dataset.chap===chapId);
  });
  // Scroll to top smoothly
  window.scrollTo({top:0, behavior:'smooth'});
  // Re-attach handlers for the visible chapter
  attachHandlers();
  // Re-run reveal observer
  setTimeout(observeReveals, 30);
}
function renderAll(){
  document.getElementById('chap00').innerHTML = renderCh00();
  document.getElementById('chap01').innerHTML = renderCh01();
  document.getElementById('chap02').innerHTML = renderCh02();
  document.getElementById('chap03').innerHTML = renderCh03();
  document.getElementById('chap04').innerHTML = renderCh04();
  renderChapterPills();
  updateMaazStatus();
  const cust = document.getElementById("customerName");
  const dt = document.getElementById("assessmentDate");
  if(cust) cust.value = state.customer||"";
  if(dt) dt.value = state.date||"";
  applyFilterAttr();
  attachHandlers();
  setTimeout(observeReveals, 30);
}

/* Apply the current filter class to chap02 so CSS filter rules fire */
function applyFilterAttr(){
  const chap2 = document.getElementById('chap02');
  if(!chap2) return;
  if(state.pillarFilter && state.pillarFilter !== 'all'){
    chap2.setAttribute('data-filter-class', state.pillarFilter);
  } else {
    chap2.removeAttribute('data-filter-class');
  }
  // Auto-expand categories that contain visible subs (only under filter)
  if(state.pillarFilter && state.pillarFilter !== 'all'){
    chap2.querySelectorAll('.cat-card').forEach(card=>{
      const visible = [...card.querySelectorAll('.sub-item')].some(s=>s.dataset.class === state.pillarFilter);
      const body = card.querySelector('.cat-body');
      const head = card.querySelector('.cat-header');
      if(visible){
        body?.classList.add('show');
        head?.classList.add('expanded');
        card.style.display = '';
      } else {
        card.style.display = 'none';
      }
    });
  } else {
    chap2.querySelectorAll('.cat-card').forEach(card=>{ card.style.display = ''; });
  }
}

/* Handlers — attach once per element, skip if already attached.
 * attachHandlers() is called from multiple places (renderAll, switchChapter,
 * pchip handler). Without the flag, duplicate listeners accumulate and
 * even-numbered duplicates cancel each other via toggle-class calls. */
function attachHandlers(){
  // Category expand/collapse
  document.querySelectorAll('.cat-header').forEach(h=>{
    if(h.dataset.handlerBound) return;
    h.dataset.handlerBound = '1';
    h.addEventListener('click',(e)=>{
      if(e.target.closest('.tier-btn')) return;
      const card = h.closest('.cat-card');
      const body = card.querySelector('.cat-body');
      h.classList.toggle('expanded');
      body.classList.toggle('show');
    });
  });
  // Tier buttons
  document.querySelectorAll('.tier-btns').forEach(group=>{
    const kind = group.dataset.kind;
    const subId = group.dataset.subid;
    group.querySelectorAll('.tier-btn').forEach(btn=>{
      if(btn.classList.contains('evidence')) return;
      if(btn.dataset.handlerBound) return;
      btn.dataset.handlerBound = '1';
      btn.addEventListener('click',(e)=>{
        e.stopPropagation();
        const t = +btn.dataset.t;
        if(kind === "self" || kind === "self-override"){ state.self[subId] = t; }
        else if(kind === "target"){ state.target[subId] = t; }
        else if(kind === "airmf-self"){ state.aiRmfSelf[subId] = t; }
        else if(kind === "airmf-target"){ state.aiRmfTarget[subId] = t; }
        saveState();
        // Preserve UX: capture scroll + expanded cats before full re-render
        const scrollY = window.scrollY;
        const expandedCatIds = [...document.querySelectorAll('#chap02 .cat-header.expanded')].map(h=>h.dataset.catid);
        const expandedAiIds = [...document.querySelectorAll('#chap03 .cat-header.expanded')].map(h=>h.dataset.catid);
        renderAll(); // KPIs across chapters depend on all subs
        // Restore expanded state on re-rendered DOM
        expandedCatIds.forEach(id=>{
          const hdr = document.querySelector(`#chap02 [data-catid="${CSS.escape(id)}"]`);
          if(hdr){
            hdr.classList.add('expanded');
            hdr.closest('.cat-card')?.querySelector('.cat-body')?.classList.add('show');
          }
        });
        expandedAiIds.forEach(id=>{
          const hdr = document.querySelector(`#chap03 [data-catid="${CSS.escape(id)}"]`);
          if(hdr){
            hdr.classList.add('expanded');
            hdr.closest('.cat-card')?.querySelector('.cat-body')?.classList.add('show');
          }
        });
        // Restore scroll without smooth jump
        window.scrollTo(0, scrollY);
      });
    });
  });
  // Pillar chips (CSF function)
  document.querySelectorAll('.pchip').forEach(chip=>{
    if(chip.dataset.handlerBound) return;
    chip.dataset.handlerBound = '1';
    chip.addEventListener('click',()=>{
      state.currentPillar = chip.dataset.pc;
      saveState();
      document.getElementById('chap02').innerHTML = renderCh02();
      applyFilterAttr();
      attachHandlers();
      setTimeout(observeReveals, 30);
    });
  });
  // Classification filter chips
  document.querySelectorAll('.filter-chip').forEach(fc=>{
    if(fc.dataset.handlerBound) return;
    fc.dataset.handlerBound = '1';
    fc.addEventListener('click',()=>{
      state.pillarFilter = fc.dataset.filter;
      saveState();
      document.querySelectorAll('.filter-chip').forEach(x=>x.classList.toggle('on', x.dataset.filter===state.pillarFilter));
      applyFilterAttr();
    });
  });
  // IO buttons (only exist in chap04)
  const btnImp = document.getElementById('btnImportMaaz');
  const btnExp = document.getElementById('btnExport');
  const btnReport = document.getElementById('btnReport');
  const btnReset = document.getElementById('btnReset');
  if(btnImp && !btnImp.dataset.handlerBound){ btnImp.dataset.handlerBound='1'; btnImp.addEventListener('click',()=>document.getElementById('fileImport').click()); }
  if(btnExp && !btnExp.dataset.handlerBound){ btnExp.dataset.handlerBound='1'; btnExp.addEventListener('click', exportJSON); }
  if(btnReport && !btnReport.dataset.handlerBound){ btnReport.dataset.handlerBound='1'; btnReport.addEventListener('click', downloadExecutiveReport); }
  if(btnReset && !btnReset.dataset.handlerBound){
    btnReset.dataset.handlerBound='1';
    btnReset.addEventListener('click',()=>{
      if(confirm('現在のアセスメント状態をすべてリセットしますか？')){
        localStorage.removeItem(STORAGE_KEY);
        location.reload();
      }
    });
  }
}

/* Reveal animation observer */
function observeReveals(){
  const els = document.querySelectorAll('.reveal:not(.in)');
  if(!('IntersectionObserver' in window)){
    els.forEach(e=>e.classList.add('in'));
    return;
  }
  const io = new IntersectionObserver((entries)=>{
    entries.forEach(en=>{
      if(en.isIntersecting){ en.target.classList.add('in'); io.unobserve(en.target); }
    });
  }, {threshold:0.12, rootMargin:'0px 0px -40px 0px'});
  els.forEach(e=>io.observe(e));
}

/* ═══════════════════════════════════════════════════════════════════
   MAAZ import + JSON export
   ═══════════════════════════════════════════════════════════════════ */
function handleMaazImport(file){
  const setLog = (msg,cls)=>{
    const el = document.getElementById('ioLogImport');
    if(el){ el.textContent=msg; el.className='io-log '+(cls||''); }
  };
  const reader = new FileReader();
  reader.onload = (e)=>{
    try{
      const data = JSON.parse(e.target.result);
      let ztmmMap = {};       // As-Is
      let ztmmTargetMap = {}; // To-Be
      let meta = null;        // v4.3.0+ 付加メタ

      const isMaazV43Plus = typeof data.format === "string"
        && /^maaz-v4\.(3|[4-9]|\d{2,})/.test(data.format)
        && data.ztCur && typeof data.ztCur === "object";

      if(isMaazV43Plus || (data.ztCur && typeof data.ztCur === "object")){
        /* ── maaz-v4.3.0+ (ztelier): ztCur / ztTgt ベース ────────────── */
        ztmmMap = data.ztCur;
        if(data.ztTgt && typeof data.ztTgt === "object") ztmmTargetMap = data.ztTgt;
        meta = {
          threatCoverage   : data.threatCoverage   || null,
          pillarScores     : data.pillarScores     || null,
          effectiveCoverage: data.effectiveCoverage|| null,
          bottleneck       : data.bottleneck       || null,
          scopeState       : data.scopeState       || null,
          overall          : data.overall          || null,
          actions          : Array.isArray(data.actions) ? data.actions : null
        };
      } else if(data.ztmmScores && typeof data.ztmmScores === "object"){
        ztmmMap = data.ztmmScores;
        if(data.ztmmTargets && typeof data.ztmmTargets === "object") ztmmTargetMap = data.ztmmTargets;
      } else if(Array.isArray(data.ztmm)){
        data.ztmm.forEach(z=>{
          if(!z.id) return;
          ztmmMap[z.id] = z.asIs ?? z.level ?? z.maturity ?? 0;
          if(z.toBe !== undefined || z.target !== undefined) ztmmTargetMap[z.id] = z.toBe ?? z.target;
        });
      } else if(data.zt && data.zt.items){
        data.zt.items.forEach(z=>{
          if(!z.id) return;
          ztmmMap[z.id] = z.asIs ?? z.level ?? 0;
          if(z.toBe !== undefined) ztmmTargetMap[z.id] = z.toBe;
        });
      } else if((data.format === "maaz-v4" || data.format === "maaz-v4-csfa") && (data.assessment || data.controls)){
        const src = data.controls || Object.entries(data.assessment||{}).map(([id,v])=>({id, ...(v||{})}));
        (Array.isArray(src) ? src : []).forEach(c=>{
          if(!c.id || !/^(ID|DE|NW|AP|DA|CC)-\d+$/.test(c.id)) return;
          ztmmMap[c.id] = c.asIs ?? 0;
          if(c.toBe !== undefined) ztmmTargetMap[c.id] = c.toBe;
        });
      } else {
        Object.keys(data).forEach(k=>{
          if(/^(ID|DE|NW|AP|DA|CC)-\d+$/.test(k)){
            const v = data[k];
            ztmmMap[k] = typeof v==="number"?v:(v?.asIs??v?.level??0);
            if(v && typeof v==="object" && v.toBe !== undefined) ztmmTargetMap[k] = v.toBe;
          }
        });
      }
      const count = Object.keys(ztmmMap).length;
      if(count === 0){
        setLog("⚠ ZTMMデータが見つかりません\n\n対応フォーマット:\n  • maaz-v4.3.0+ (ztCur / ztTgt) ★最新\n  • ztmmScores / ztmmTargets\n  • ztmm[].id\n  • zt.items[]\n  • maaz-v4 / maaz-v4-csfa (controls / assessment)\n  • top-level (ID|DE|NW|AP|DA|CC)-NN", "err");
        return;
      }
      state.evidence = deriveEvidence(ztmmMap);
      state.maazTarget = Object.keys(ztmmTargetMap).length ? deriveMaazTarget(ztmmTargetMap) : {};
      state.maazLoaded = true;
      state.maazTimestamp = new Date().toISOString().slice(0,16).replace('T',' ');
      state.maazMeta = meta;
      state.maazFormat = data.format || null;

      /* customer / assessmentDate の自動反映 (空欄時のみ上書き)
         ③: data.customer は string (MAAZ v1.0.1以前) または object (v1.0.2+) */
      let importedCustomerName = '';
      let importedSessionId = null;
      if (data.customer){
        if (typeof data.customer === 'object' && data.customer.company_name){
          importedCustomerName = String(data.customer.company_name).trim();
          importedSessionId = data.customer.session_id || null;
        } else if (typeof data.customer === 'string'){
          importedCustomerName = data.customer.trim();
        }
      }
      if (importedCustomerName && !state.customer){
        state.customer = importedCustomerName;
        const cEl = document.getElementById('customerName');
        if(cEl) cEl.value = state.customer;
      }
      /* ④: session_id lineage 捕捉 */
      if (importedSessionId){
        if (!state.sourceSessions) state.sourceSessions = {};
        state.sourceSessions.maaz = importedSessionId;
      }
      if(data.assessmentDate && typeof data.assessmentDate === "string" && /^\d{4}-\d{2}-\d{2}/.test(data.assessmentDate)){
        state.date = data.assessmentDate.slice(0,10);
        const dEl = document.getElementById('assessmentDate');
        if(dEl) dEl.value = state.date;
      }

      saveState();
      const evCount = Object.keys(state.evidence).length;
      const tgtCount = Object.keys(state.maazTarget).length;
      renderAll();
      switchChapter(state.currentChapter);

      /* 取込サマリにv4.3.0の付加情報も表示 */
      let summary = `✓ 取込成功\nFormat: ${data.format||'(unspecified)'}\nZTMM項目: ${count}個 / Evidence(As-Is)導出: ${evCount}サブ / MAAZ To-Be導出: ${tgtCount}サブ`;
      if(meta && meta.threatCoverage){
        const tc = meta.threatCoverage;
        summary += `\nMITRE ATT&CK脅威: ${tc.coveredAsIs}→${tc.coveredToBe} / ${tc.total} (新規緩和 ${tc.newlyMitigated})`;
      }
      if(meta && meta.bottleneck){
        const bn = meta.bottleneck;
        summary += `\nボトルネック: ${bn.pillar} (SCF ${Math.round((bn.scf||0)*100)}%)`;
      }
      summary += `\n\n取込元: ${file.name}\n時刻: ${state.maazTimestamp}`;
      summary += `\n\n→ 本編(Ch.02)で As-Is を確認・必要に応じて手動調整\n→ 完了したら 提言(Ch.04) で経営層提示案をレビュー`;
      setLog(summary, "ok");
    } catch(err){
      setLog("✗ JSONパース失敗: "+err.message, "err");
    }
  };
  reader.readAsText(file);
}

/* ═══════════════════════════════════════════════════════════════════

function escapeHtml(s){ return String(s??'').replace(/[&<>"']/g, c=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[c])); }

function generateExecutiveReportHTML(){

  const asIs = overallAsIs();

  const residual = 100 - toBe;
  const aiAsIs = aiRmfOverallAsIsPct();
  const aiToBe = aiRmfOverallZtToBePct();
  const aiUplift = aiToBe - aiAsIs;
  const aiResidual = 100 - aiToBe;

                         Object.values(state.aiRmfSelf||{}).some(v=>v>0);
  let provenanceNote;
  if(state.maazLoaded){

  } else if(hasManualInput){

  } else {
    provenanceNote = `<strong style="color:#C14149">警告: データが入力されていません。</strong> MAAZ を取込むか、Ch.02 で自己申告値を入力してから再生成してください。`;
  }

  // Per-function stats (CSF + AI RMF)
  const csfFnStats = CSF_FRAMEWORK.functions.map(f=>({
    id:f.id, jp:f.jp, en:f.en,

    ...s, fnId:f.id, fnJp:f.jp, cov:effCov(s.id),
    asIs:asIsPct(s.id), uplift:upliftPct(s.id), toBe:ztToBePct(s.id), residual:residualPct(s.id),
    upliftEff:upliftEffectivePct(s.id), scf:subScf(s.id)
  }))));
  const upliftActions = allSubs.filter(s=>s.uplift>0).sort((a,b)=>b.uplift-a.uplift||a.asIs-b.asIs).slice(0,8);
  const orgResidual = allSubs.filter(s=>s.residual>=50 && s.uplift<25).sort((a,b)=>b.residual-a.residual).slice(0,6);
  const aiActions = Object.entries(CSF_AI_OVERLAY)
    .map(([id,ov])=>{
      const s = allSubs.find(x=>x.id===id);
      if(!s) return null;
      return {id, jp:s.jp, fnJp:s.fnJp, note:ov.note, mods:ov.ai_mods, uplift:s.uplift, boost:ov.cov_boost};
    })
    .filter(x=>x && (x.uplift>0 || x.boost>0))
    .sort((a,b)=>(b.uplift+b.boost)-(a.uplift+a.boost))
    .slice(0,5);

  // SVG-based journey stripe for print fidelity
  const stripe = (a, u, r, label) => {
    const aPct = Math.max(0, Math.min(100, a));
    const uPct = Math.max(0, Math.min(100-aPct, u));
    const rPct = Math.max(0, 100 - aPct - uPct);
    return `
      <div class="rpt-stripe-row">
        <div class="rpt-stripe-label">${label}</div>
        <div class="rpt-stripe-bar">
          <div class="rs-asis" style="width:${aPct}%"></div>

        <div class="rpt-stripe-nums">

          <span class="sep">+</span>
          <span class="nupl">${Math.round(u)}%</span>
          <span class="sep">=</span>
          <span class="ntobe">${Math.round(a+u)}%</span>
          <span class="sep">|</span>
          <span class="nres">残 ${Math.round(r)}%</span>
        </div>

  };

  const fnBarRow = (s, accent) => `
    <div class="rpt-fn-row" style="--accent:${accent}">
      <div class="rpt-fn-label">
        <span class="rpt-fn-id">${s.id}</span>

        <div class="rs-uplift" style="width:${s.uplift}%"></div>
        <div class="rs-residual"></div>
      </div>
      <div class="rpt-fn-nums">
        <span class="nasis">${Math.round(s.asIs)}%</span>
        <span>+</span>
        <span class="nupl">${Math.round(s.uplift)}%</span>
        <span>=</span>
        <span class="ntobe">${Math.round(s.toBe)}%</span>
      </div>
    </div>`;

  const FN_COLORS = {GV:'#5B4B9E', ID:'#7BA05B', PR:'#246CF7', DE:'#B5832C', RS:'#A0517E', RC:'#3D8888'};
  const AI_COLOR = '#8B7FCC';

  /* MAAZ chip/threats rendering for report (inline styles for print fidelity) */
  const RPT_PHASE_COLOR = {'quick-win':'#7BA05B','short-term':'#246CF7','strategic':'#5B4B9E'};
  const RPT_PHASE_BG = {'quick-win':'rgba(123,160,91,0.14)','short-term':'rgba(36,108,247,0.12)','strategic':'rgba(91,75,158,0.16)'};
  const RPT_PRIO_COLOR = {'critical':'#C14149','high':'#B5832C','medium':'#2A2D34','low':'#8A8F98'};
  const RPT_PRIO_BG = {'critical':'rgba(193,65,73,0.12)','high':'rgba(181,131,44,0.14)','medium':'rgba(11,30,63,0.06)','low':'rgba(11,30,63,0.04)'};
  function renderRptMaazChips(subId){
    const ma = getMaazActionsForSub(subId);
    if(!ma) return '';
    const parts = [];
    if(ma.priority){
      parts.push(`<span class="rpt-maaz-chip" style="color:${RPT_PRIO_COLOR[ma.priority]};background:${RPT_PRIO_BG[ma.priority]}">${escapeHtml(ma.priority)}</span>`);
    }
    if(ma.phase){
      parts.push(`<span class="rpt-maaz-chip" style="color:${RPT_PHASE_COLOR[ma.phase]};background:${RPT_PHASE_BG[ma.phase]}">${escapeHtml(ma.phase)}</span>`);
    }
    const threats = ma.threats || [];
    threats.slice(0,5).forEach(t=>{
      const isAtlas = t.startsWith('AML.');
      const color = isAtlas ? '#5B4B9E' : '#C14149';
      const bg = isAtlas ? 'rgba(91,75,158,0.10)' : 'rgba(193,65,73,0.10)';
      parts.push(`<span class="rpt-threat-chip" style="color:${color};background:${bg};border-color:${color}33">${escapeHtml(t)}</span>`);
    });
    if(threats.length > 5){
      parts.push(`<span class="rpt-threat-chip" style="color:#8A8F98;font-style:italic">+${threats.length-5}</span>`);
    }
    return parts.length ? `<div class="rpt-maaz-row">${parts.join('')}</div>` : '';
  }

  const actionRow = (a, i, accent, rightLabel, showMaazChips) => {
    const maazChips = showMaazChips ? renderRptMaazChips(a.id) : '';
    return `
    <div class="rpt-action">
      <div class="rpt-action-idx">${String(i+1).padStart(2,'0')}</div>
      <div class="rpt-action-body">
        <div class="rpt-action-id" style="color:${accent}">${escapeHtml(a.id)}${a.fnJp?` · ${escapeHtml(a.fnJp)}`:''}</div>
        <div class="rpt-action-text">${escapeHtml(a.jp || a.note || '')}</div>
        ${a.mods ? `<div class="rpt-action-meta">${a.mods.map(m=>`<span class="rpt-mod">${escapeHtml(m)}</span>`).join('')}</div>` : ''}

      <div class="rpt-action-delta" style="color:${accent}">${rightLabel}</div>
    </div>`;
  };

  const css = `
    @page{size:A4; margin:16mm 14mm}

    /* ─── KPI grid (P1) ─── */

    .rpt-maaz-row{
      margin-top:5px; display:flex; gap:4px; flex-wrap:wrap; align-items:center;

      width:22px; height:22px; border-radius:6px;

    .rpt-bottleneck .bc-title{
      font-family:"JetBrains Mono"; font-size:8.5px; font-weight:700;

    .rpt-bottleneck .bc-body{font-size:10px; line-height:1.55; color:#001744}
    .rpt-bottleneck .bc-num{font-family:"JetBrains Mono"; color:#B5832C; font-weight:700}

    /* ─── SCF 補正行 (KPI block 直下) ─── */
    .rpt-eff-row{
      display:flex; gap:14px; flex-wrap:wrap;

    .rpt-foot{

      .rpt-page{page-break-after:always}
      a{color:inherit; text-decoration:none}
    }
  `;

  return `<!DOCTYPE html>

<body>

  <!-- ══════ P1: Cover + Executive Summary ══════ -->
  <section class="rpt-page">

    <h1 class="rpt-title">
      ゼロトラスト刷新で<br>
      コンプライアンス準拠度は<br>

function downloadExecutiveReport(){
  const logEl = document.getElementById('ioLogReport');
  const setLog = (msg,cls)=>{ if(logEl){ logEl.textContent=msg; logEl.className='io-log '+(cls||''); } };
  try{
    const html = generateExecutiveReportHTML();
    const blob = new Blob([html], {type:"text/html;charset=utf-8"});
    const a = document.createElement('a');
    a.href = URL.createObjectURL(blob);
    a.download = `csfa_report_${(state.customer||'assessment').replace(/\s+/g,'_')}_${state.date||'untitled'}.html`;
    a.click();
    URL.revokeObjectURL(a.href);
    const hasManual = Object.values(state.self||{}).some(v=>v>0) || Object.values(state.aiRmfSelf||{}).some(v=>v>0);
    const mode = state.maazLoaded ? 'MAAZ実証ベース' : hasManual ? '自己申告のみ (MAAZ未取込 注釈入り)' : 'データなし (警告付き)';
    setLog(`✓ レポート生成成功: ${a.download}\nモード: ${mode}\nブラウザで開いて印刷→PDF化してください`, "ok");
  }catch(err){
    setLog("✗ レポート生成失敗: "+err.message, "err");
  }
}

document.getElementById('themeToggle').addEventListener('click',()=>{
  state.theme = state.theme==='indigo' ? 'paper' : 'indigo';
  document.documentElement.setAttribute('data-theme', state.theme);
  saveState();
});
document.getElementById('fileImport').addEventListener('change',(e)=>{
  const f = e.target.files[0];
  if(f){
    /* 取込後は Ch02 (本編 · As-Is調整) に遷移。Ch04 (提言) へは
     * ユーザー自身が As-Is を確認・調整してから進む自然な動線。 */
    if(state.currentChapter !== '02'){
      state.currentChapter = '02';
      saveState();
      switchChapter('02');
      setTimeout(()=>handleMaazImport(f), 100);
    } else handleMaazImport(f);
  }
  e.target.value = "";
});
